<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA-CONSULT | GLOBAL KMS V360</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;600;800&family=Amiri:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #c5a021; --navy: #0a1128; --white: #ffffff; --bg: #f4f7f9; --linkedin: #0077b5; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--navy); }
        body.rtl { direction: rtl; font-family: 'Amiri', serif; }

        /* UI ELEMENTS */
        #lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 40000; display: flex; gap: 8px; background: rgba(10,17,40,0.95); padding: 10px; border-radius: 8px; border: 1px solid var(--gold); }
        .lang-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 6px 14px; cursor: pointer; font-weight: 800; border-radius: 4px; font-size: 0.8em; }
        .lang-btn.active { background: var(--gold); color: var(--navy); }

        #vision-portal { position: fixed; inset: 0; background: var(--navy); z-index: 30000; display: flex; justify-content: center; align-items: center; color: white; padding: 20px; text-align: center; }
        .welcome-box { background: rgba(15, 25, 55, 0.98); border: 2px solid var(--gold); padding: 50px; border-radius: 15px; max-width: 900px; }
        
        header { background: var(--navy); color: var(--gold); padding: 25px; text-align: center; border-bottom: 5px solid var(--gold); font-family: 'Cinzel'; font-size: 1.8em; letter-spacing: 6px; }

        /* SECTOR GRID (Design V320 original) */
        .sector-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 40px; max-width: 1400px; margin: 0 auto; }
        .sector-card { background: white; padding: 50px; border-radius: 15px; border: 2px solid #eee; cursor: pointer; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .sector-card:hover { border-color: var(--gold); transform: translateY(-10px); }
        .sector-logo { font-size: 4em; display: block; margin-bottom: 20px; }

        /* AUDIT INTERFACE */
        #audit-interface { display: none; max-width: 950px; margin: 40px auto; background: white; padding: 50px; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border-left: 10px solid var(--gold); }
        .opt-button { display: block; width: 100%; padding: 22px; margin: 12px 0; border: 2px solid #eee; cursor: pointer; background: white; text-align: inherit; border-radius: 8px; font-size: 1.1em; line-height: 1.5; }
        .opt-button.selected { border-color: var(--gold); background: #fdfaf0; font-weight: 800; border-width: 3px; }

        /* CERTIFICAT MEP CORRIGÉE & ACTIONS */
        #certificat-wrapper { display: none; padding: 40px 0; text-align: center; }
        .action-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        
        #cert-area { 
            width: 1050px; height: 740px; 
            background: white; margin: 0 auto; 
            padding: 50px; position: relative; 
            border: 30px double var(--gold); 
            overflow: hidden; 
        }
        .cert-footer { position: absolute; bottom: 50px; left: 50px; right: 50px; display: flex; justify-content: space-between; align-items: flex-end; }
        
        .btn-action { padding: 15px 30px; border: none; font-weight: 800; cursor: pointer; border-radius: 5px; font-size: 1.1em; display: flex; align-items: center; gap: 10px; color: white; }
        #download-btn { background: #27ae60; }
        #linkedin-btn { background: var(--linkedin); }
        .btn-action:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body>

<div id="lang-switcher">
    <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-ar" onclick="setLang('ar')">AR</button>
</div>

<div id="vision-portal">
    <div class="welcome-box">
        <h1 style="font-family: 'Cinzel'; font-size: 3em; margin: 0;">MBA-CONSULT</h1>
        <div id="v-msg" style="font-size: 1.4em; line-height: 1.8; margin: 30px 0;"></div>
        <div id="v-vigilance" style="color:#ff4d4d; font-weight:800; letter-spacing:2px;"></div>
        <button class="lang-btn active" id="v-btn" onclick="document.getElementById('vision-portal').style.display='none'" style="margin-top: 30px; padding: 15px 40px;"></button>
    </div>
</div>

<header>MBA-CONSULT | GLOBAL KMS V360</header>

<div class="container" style="max-width: 1300px; margin: auto;">
    <div id="selection-interface">
        <h2 id="s-title" style="text-align:center; font-family: 'Cinzel'; margin-top: 40px;"></h2>
        <div class="sector-grid" id="sector-grid"></div>
    </div>

    <div id="audit-interface">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <span id="audit-step" style="font-weight: 800; color: var(--gold); font-size: 1.2em;"></span>
            <span id="job-badge" style="background: var(--navy); color: white; padding: 10px 25px; border-radius: 30px; font-weight: bold;"></span>
        </div>
        <h2 id="q-text" style="font-size: 1.7em; line-height: 1.4; color: var(--navy); margin-bottom: 40px;"></h2>
        <div id="options-stack"></div>
        <button id="q-submit" onclick="submitStep()" style="background: var(--gold); color: var(--navy); border: none; padding: 20px 60px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 20px;"></button>
    </div>

    <div id="certificat-wrapper">
        <div class="action-bar">
            <button id="download-btn" class="btn-action" onclick="generatePDF()">
                <i class="fa-solid fa-file-pdf"></i> PDF OFFICIEL
            </button>
            <button id="linkedin-btn" class="btn-action" onclick="shareLinkedIn()">
                <i class="fa-brands fa-linkedin"></i> PARTAGER SUR LINKEDIN
            </button>
        </div>

        <div id="cert-area">
            <div style="font-family: 'Cinzel'; font-size: 45px; margin-top: 40px;">CERTIFICATE OF EXCELLENCE</div>
            <div style="letter-spacing: 10px; font-weight: 800; color: var(--gold); margin-top: 10px;">GLOBAL PROFESSIONAL ACCREDITATION</div>
            <p id="c-confirm" style="font-size: 1.6em; margin-top: 50px;"></p>
            <div id="c-name" style="font-family: 'Amiri', serif; font-size: 60px; border-bottom: 3px solid #333; display: inline-block; padding: 0 50px; margin: 10px 0;"></div>
            <p id="c-expert-text" style="font-size: 1.6em; margin-top: 15px;"></p>
            <div id="c-job" style="font-size: 40px; font-weight: 900; color: var(--gold); text-transform: uppercase;"></div>
            <div style="background: var(--navy); color: white; padding: 20px 60px; font-size: 2em; font-weight: 800; width: fit-content; margin: 40px auto; border: 2px solid var(--gold);">SCORE: <span id="c-score"></span>/50</div>
            
            <div class="cert-footer">
                <div style="text-align:left;">
                    <div id="c-sig" style="font-family: 'Amiri'; font-size: 32px; border-bottom: 2px solid #333; width: 300px; padding-bottom: 5px;"></div>
                    <small style="font-weight: 800; display: block; margin-top: 5px;">SIGNATURE ÉLECTRONIQUE VÉRIFIÉE</small>
                </div>
                <div style="text-align: center;">
                    <img id="c-qr" src="" style="width: 120px; border: 1px solid #eee;">
                    <br><small id="c-hash" style="color: var(--gold); font-weight: bold;"></small>
                </div>
                <div style="text-align:right;">
                    <div style="font-family: 'Cinzel'; font-size: 20px; border-bottom: 2px solid #333; width: 300px; padding-bottom: 5px;">MBA BOARD ALPHA</div>
                    <small style="font-weight: 800; display: block; margin-top: 5px;">ACCRÉDITATION MBA-CONSULT</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- DATABASE V320 + 20 MÉTIERS ---
    const DATABASE = {
        Finance: { logo: "🏦", list: ["Trader Haute Fréquence", "Analyste M&A Senior", "Auditeur Financier", "Risk Manager", "Directeur de Trésorerie", "Banquier d'Affaires", "Fiscaliste International", "Actuaire", "Gestionnaire de Fortune", "Analyste ESG", "Compliance Officer", "Broker", "Contrôleur de Gestion", "Analyste Quantitatif", "Gestionnaire de Fonds", "Expert Comptable", "Credit Analyst", "Spécialiste Blockchain", "Directeur Financier (CFO)", "Consultant en Restructuration"] },
        Energie: { logo: "⚡", list: ["Ingénieur Forage", "Expert Solaire", "Analyste Smart-Grid", "Géologue de Réservoir", "Manager Éolien", "Ingénieur Nucléaire", "Consultant Hydrogène", "Responsable HSE", "Directeur de Centrale", "Analyste Marchés de l'Énergie", "Technicien Réseaux", "Auditeur Énergétique", "Manager Biomasse", "Géophysicien", "Planificateur Infrastructures", "Expert Off-shore", "Spécialiste Transport GRID", "Ingénieur Thermique", "Foreur Puits Profonds", "Consultant Décarbonation"] },
        IT_AI: { logo: "🤖", list: ["Data Scientist", "Architecte Cloud", "Expert Cybersécurité", "Prompt Engineer", "Ingénieur ML Ops", "Pentester", "Architecte de Données", "Scrum Master", "Analyste SOC", "Ingénieur Réalité VR", "DevSecOps", "UX Designer Senior", "Product Owner AI", "Expert Big Data", "Manager IT", "Architecte Réseaux", "Développeur Fullstack", "Ingénieur Blockchain", "Consultant ERP", "Ingénieur Robotique"] },
        Agri_Food: { logo: "🌾", list: ["Ingénieur Agronome", "Responsable Qualité", "Manager Supply Chain", "Généticien Végétal", "Auditeur Bio", "Oenologue", "Nutritionniste Industriel", "Expert Irrigation", "Acheteur Matières Premières", "Manager de Production", "Expert des Sols", "Responsable RSE", "Ingénieur Agro-Alimentaire", "Logistique Chaîne du Froid", "Manager de Coopérative", "Phytopathologiste", "Expert Semences", "Chef de Culture", "Analyste Terroir", "Horticulteur"] },
        Tourism: { logo: "🌍", list: ["Revenue Manager", "Directeur de Resort", "Yield Analyst", "Expert E-reputation", "Concepteur Expériences", "Manager Écotourisme", "Chef de Réception", "Directeur de Croisière", "Guide de Haute Montagne", "Concierge Clés d'Or", "Manager Destination", "Analyste de Flux", "Directeur de Parc", "Event Planner Senior", "Responsable Loisirs", "Auditeur Hôtelier", "Expert Mobilité", "Manager Incentive", "Chef de Produit Voyage", "Directeur Hôtelier"] },
        Education: { logo: "🎓", list: ["Ingénieur Pédagogique", "Directeur Académique", "Chercheur EdTech", "Directeur de Campus", "Andragogue", "Coach de Dirigeants", "Spécialiste LMS", "Analyste Compétences", "Manager Innovation", "Expert VAE", "Consultant Orientation", "Directeur Recherche", "Manager de Faculté", "Médiateur Éducatif", "Expert Inclusion", "Concepteur E-learning", "Formateur Expert", "Auditeur Qualité Éducation", "Planificateur Académique", "Directeur d'École"] }
    };

    const TRANSLATIONS = {
        fr: {
            vMsg: "L'excellence mondiale définit votre rang. Bienvenue dans l'unité d'élite MBA-Consult.",
            vVigilance: "⚠ SEUIL CRITIQUE : 80% (40/50 pts). Zéro tolérance.",
            vBtn: "DÉMARRER L'AUDIT ÉLITE",
            sTitle: "UNITÉS D'ACCRÉDITATION MBA",
            qSubmit: "CONFIRMER LA STRATÉGIE",
            promptJob: "SÉLECTIONNEZ VOTRE MÉTIER :",
            promptName: "NOM COMPLET DE L'EXPERT :",
            cConfirm: "Ce document atteste solennellement que",
            cExpert: "A validé son accréditation mondiale pour le métier de :",
            fail: "CERTIFICATION REFUSÉE. SCORE INSUFFISANT.",
            liPost: "Je suis fier d'annoncer avoir obtenu mon accréditation mondiale MBA-CONSULT avec un score de ",
            scenarios: [
                { q: "En situation de crise systémique, quel est votre protocole de sécurisation ?", r: ["Alpha: Hedging global et isolation des actifs critiques.", "Beta: Optimisation des flux et réduction des coûts.", "Gamma: Analyse d'impact et observation."] },
                { q: "Une rupture technologique menace votre secteur. Votre décision ?", r: ["Alpha: Pivot disruptif immédiat vers l'innovation.", "Beta: Intégration hybride et formation.", "Gamma: Veille technologique prudente."] },
                { q: "Un conflit d'éthique réglementaire surgit. Votre posture ?", r: ["Alpha: Mise en conformité radicale et transparence.", "Beta: Négociation tactique et ajustement.", "Gamma: Analyse juridique et temporisation."] },
                { q: "La performance globale chute de 15%. Quel levier actionnez-vous ?", r: ["Alpha: Restructuration du modèle de valeur.", "Beta: Renforcement des KPIs et proximité.", "Gamma: Audit externe et réduction budgétaire."] },
                { q: "Une opportunité d'acquisition se présente. Votre décision ?", r: ["Alpha: Intégration verticale pour domination.", "Beta: Partenariat et partage de risques.", "Gamma: Étude de marché approfondie."] }
            ]
        },
        en: {
            vMsg: "Global excellence defines your rank. Welcome to the MBA-Consult elite unit.",
            vVigilance: "⚠ CRITICAL THRESHOLD: 80% (40/50 pts). Zero tolerance.",
            vBtn: "START ELITE AUDIT",
            sTitle: "MBA ACCREDITATION UNITS",
            qSubmit: "CONFIRM STRATEGY",
            promptJob: "SELECT YOUR PROFESSION:",
            promptName: "EXPERT FULL NAME:",
            cConfirm: "This document solemnly certifies that",
            cExpert: "Has validated global accreditation for the profession of:",
            fail: "CERTIFICATION DENIED. INSUFFICIENT SCORE.",
            liPost: "Proud to announce that I have received my MBA-CONSULT global accreditation with a score of ",
            scenarios: [
                { q: "In a systemic crisis, what is your security protocol?", r: ["Alpha: Global hedging and isolation of critical assets.", "Beta: Flow optimization and cost reduction.", "Gamma: Impact analysis and observation."] },
                { q: "A technological disruption threatens your sector. Your pivot?", r: ["Alpha: Immediate disruptive pivot to innovation.", "Beta: Hybrid integration and upskilling.", "Gamma: Prudent tech watch."] },
                { q: "A regulatory ethics conflict arises. Your stance?", r: ["Alpha: Total transparency and immediate compliance.", "Beta: Tactical negotiation and adjustment.", "Gamma: Legal analysis and delay."] },
                { q: "Global performance drops by 15%. What lever do you pull?", r: ["Alpha: Value model restructuring.", "Beta: KPI reinforcement and management.", "Gamma: External audit and budget cuts."] },
                { q: "An acquisition opportunity arises. Your decision?", r: ["Alpha: Vertical integration for market dominance.", "Beta: Strategic partnership and risk sharing.", "Gamma: In-depth market study."] }
            ]
        },
        ar: {
            vMsg: "التميز العالمي يحدد رتبتك. مرحباً بكم في وحدة النخبة بمؤسسة MBA-Consult.",
            vVigilance: "⚠ عتبة حرجة: 80٪ (40/50 نقطة). لا تسامح.",
            vBtn: "بدء التدقيق المهني",
            sTitle: "وحدات الاعتماد المهني",
            qSubmit: "تأكيد الاستراتيجية",
            promptJob: "اختر مهنتك:",
            promptName: "الاسم الكامل للخبير:",
            cConfirm: "تشهد هذه الوثيقة رسمياً بأن",
            cExpert: "قد اجتاز الاعتماد العالمي لمهنة:",
            fail: "تم رفض الشهادة. النتيجة غير كافية.",
            liPost: "أنا فخور بالإعلان عن حصولي على الاعتماد العالمي من MBA-CONSULT بدرجة ",
            scenarios: [
                { q: "في حالة وجود أزمة نظامية، ما هو بروتوكول التأمين لديك؟", r: ["ألفا: التحوط العالمي وعزل الأصول.", "بيتا: تحسين التدفقات وتقليل التكاليف.", "غاما: تحليل الأثر والمراقبة."] },
                { q: "تهديد تقني يواجه قطاعك. كيف تقود مرحلة الانتقال؟", r: ["ألفا: التحول الجذري الفوري نحو الابتكار.", "بيتا: التكامل الهجين والتدريب.", "غاما: مراقبة تقنية حذرة."] },
                { q: "نشوب صراع أخلاقي تنظيمي. ما هو موقفك؟", r: ["ألفا: الامتثال الجذري مع الشفافية.", "بيتا: التفاوض وتعديل الإجراءات.", "غاما: التحليل القانوني والتريث."] },
                { q: "انخفاض الأداء العالمي بنسبة 15٪. ما هو المحرك؟", r: ["ألفا: إعادة هيكلة نموذج القيمة.", "بيتا: تعزيز مؤشرات الأداء والإدارة.", "غاما: تدقيق خارجي وخفض الميزانية."] },
                { q: "فرصة استحواذ معقدة. ما هو قرارك؟", r: ["ألفا: التكامل العمودي للسيطرة.", "بيتا: الشراكة وتقاسم المخاطر.", "غاما: دراسة سوقية متعمقة."] }
            ]
        }
    };

    let curL = 'fr', score = 0, step = 0, selectedJob = "", userName = "";

    function setLang(l) {
        curL = l;
        document.body.className = l === 'ar' ? 'rtl' : '';
        const d = TRANSLATIONS[l];
        document.getElementById('v-msg').innerText = d.vMsg;
        document.getElementById('v-vigilance').innerText = d.vVigilance;
        document.getElementById('v-btn').innerText = d.vBtn;
        document.getElementById('s-title').innerText = d.sTitle;
        document.getElementById('q-submit').innerText = d.qSubmit;
        initSectors();
    }

    function initSectors() {
        const grid = document.getElementById('sector-grid'); grid.innerHTML = "";
        for (const [id, data] of Object.entries(DATABASE)) {
            grid.innerHTML += `<div class="sector-card" onclick="selectSector('${id}')"><span class="sector-logo">${data.logo}</span><h3>${id}</h3></div>`;
        }
    }

    function selectSector(id) {
        const jobs = DATABASE[id].list;
        selectedJob = prompt(`${TRANSLATIONS[curL].promptJob}\n\n${jobs.slice(0,10).join(" | ")}...`) || jobs[0];
        document.getElementById('selection-interface').style.display = 'none';
        document.getElementById('audit-interface').style.display = 'block';
        document.getElementById('job-badge').innerText = selectedJob;
        loadQ();
    }

    function loadQ() {
        if(step >= 5) { conclude(); return; }
        const scenario = TRANSLATIONS[curL].scenarios[step];
        document.getElementById('audit-step').innerText = `STEP ${step+1}/5`;
        document.getElementById('q-text').innerText = scenario.q;
        const stack = document.getElementById('options-stack'); stack.innerHTML = "";
        scenario.r.forEach((o) => {
            let pts = o.includes("Alpha") ? 10 : (o.includes("Beta") ? 7 : 4);
            stack.innerHTML += `<button class="opt-button" onclick="sel(this, ${pts})">${o}</button>`;
        });
        tempPts = 0;
    }

    function sel(btn, p) {
        document.querySelectorAll('.opt-button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); tempPts = p;
    }

    function submitStep() { if(tempPts) { score += tempPts; step++; loadQ(); } }

    function conclude() {
        document.getElementById('audit-interface').style.display = 'none';
        if(score < 40) { alert(TRANSLATIONS[curL].fail); location.reload(); }
        else {
            userName = prompt(TRANSLATIONS[curL].promptName) || "EXPERT";
            document.getElementById('certificat-wrapper').style.display = 'block';
            document.getElementById('c-name').innerText = userName.toUpperCase();
            document.getElementById('c-job').innerText = selectedJob;
            document.getElementById('c-score').innerText = score;
            document.getElementById('c-sig').innerText = userName;
            document.getElementById('c-confirm').innerText = TRANSLATIONS[curL].cConfirm;
            document.getElementById('c-expert-text').innerText = TRANSLATIONS[curL].cExpert;
            const hash = "MBA-" + Math.random().toString(36).substr(2, 9).toUpperCase();
            document.getElementById('c-hash').innerText = hash;
            document.getElementById('c-qr').src = `https://api.qrserver.com/v1/create-qr-code/?data=${hash}`;
        }
    }

    function generatePDF() {
        const element = document.getElementById('cert-area');
        const opt = {
            margin: 0,
            filename: `MBA-CONSULT-${userName.replace(' ','-')}.pdf`,
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
        };
        html2pdf().set(opt).from(element).save();
    }

    function shareLinkedIn() {
        const text = encodeURIComponent(`${TRANSLATIONS[curL].liPost}${score}/50 en tant que ${selectedJob}. #MBAConsult #EliteAccreditation #GlobalKMS`);
        const url = encodeURIComponent(window.location.href);
        window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${url}&summary=${text}`, '_blank');
    }

    setLang('fr');
</script>
</body>
</html>
