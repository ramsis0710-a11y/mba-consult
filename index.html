<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MBA-CONSULT | GLOBAL KMS V390 PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;600;800&family=Amiri:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #c5a021; --navy: #0a1128; --white: #ffffff; --bg: #f4f7f9; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--navy); overflow-x: hidden; }
        
        /* RTL Management */
        body.rtl { direction: rtl; font-family: 'Amiri', serif; }
        body.rtl .cert-validation-block { left: auto; right: 70px; text-align: right; }
        body.rtl .cert-footer { flex-direction: row-reverse; }
        body.rtl #lang-switcher { right: auto; left: 20px; }

        #lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 40000; display: flex; gap: 8px; background: rgba(10,17,40,0.95); padding: 10px; border-radius: 8px; border: 1px solid var(--gold); }
        .lang-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 6px 14px; cursor: pointer; font-weight: 800; border-radius: 4px; }
        .lang-btn.active { background: var(--gold); color: var(--navy); }

        #vision-portal { position: fixed; inset: 0; background: var(--navy); z-index: 30000; display: flex; justify-content: center; align-items: center; color: white; padding: 20px; text-align: center; }
        .welcome-box { background: rgba(15, 25, 55, 0.98); border: 2px solid var(--gold); padding: 40px; border-radius: 15px; max-width: 1000px; width: 100%; }
        .speech-text { font-size: 1.5em; line-height: 1.6; margin: 30px 0; font-weight: 300; font-style: italic; color: #e0e0e0; }
        
        header { background: var(--navy); color: var(--gold); padding: 25px; text-align: center; border-bottom: 5px solid var(--gold); font-family: 'Cinzel'; font-size: 1.8em; letter-spacing: 6px; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; padding: 30px; max-width: 1400px; margin: 0 auto; }
        .card { background: white; padding: 30px; border-radius: 15px; border: 2px solid #eee; cursor: pointer; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .card i { font-size: 4em; color: var(--gold); margin-bottom: 20px; display: block; }
        .card h3 { font-family: 'Cinzel'; margin: 10px 0; }
        .card:hover { border-color: var(--gold); transform: translateY(-8px); background: #fffcf0; }

        #audit-interface { display: none; max-width: 900px; width: 95%; margin: 40px auto; background: white; padding: 40px; border-radius: 15px; border-left: 10px solid var(--gold); box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .opt-button { display: block; width: 100%; padding: 20px; margin: 12px 0; border: 2px solid #eee; cursor: pointer; background: white; text-align: inherit; border-radius: 8px; font-weight: 500; }
        .opt-button.selected { border-color: var(--gold); background: #fdfaf0; border-width: 3px; font-weight: 800; }

        /* PRESTIGE CERTIFICATE V390 MODIFIED */
        #certificat-wrapper { display: none; padding: 40px 0; text-align: center; }
        .scroll-box { width: 100%; overflow-x: auto; padding: 20px 0; }
        #cert-area { 
            width: 1120px; height: 790px; background: white; margin: 0 auto; padding: 60px; 
            position: relative; border: 35px double var(--gold); overflow: hidden;
            background-image: radial-gradient(circle, #fff 70%, #fdfaf0 100%);
        }

        /* QR CODE MOVED TO THE RIGHT */
        .cert-validation-block { position: absolute; top: 70px; right: 70px; text-align: right; z-index: 10; }
        .cert-qr { width: 135px; border: 1px solid #ddd; margin-bottom: 10px; }
        #c-score-pct { font-size: 2.2em; font-weight: 900; color: var(--navy); }

        .cert-content { margin-top: 40px; text-align: center; }
        #c-cert-title { font-family: 'Cinzel'; font-size: 48px; margin-bottom: 5px; }
        #c-sub { letter-spacing: 12px; font-weight: 800; color: var(--gold); font-size: 16px; margin-bottom: 60px; }
        
        #c-confirm { font-size: 1.8em; margin-bottom: 20px; color: #444; }
        #c-name { font-family: 'Amiri', serif; font-size: 58px; border-bottom: 4px solid var(--navy); display: inline-block; padding: 0 50px; color: var(--navy); margin-bottom: 25px; min-height: 85px; }
        #c-expert-text { font-size: 1.8em; margin-bottom: 15px; color: #444; }
        #c-job { font-size: 42px; font-weight: 900; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; min-height: 60px; }

        /* FOOTER & SIGNATURE MOVED UP */
        .cert-footer { position: absolute; bottom: 80px; left: 80px; right: 80px; display: flex; justify-content: space-between; align-items: flex-end; }
        .sig-block { text-align: left; margin-bottom: 20px; } /* Signature position raised via margin/bottom */
        #c-sig { font-family: 'Amiri'; font-size: 34px; border-bottom: 2px solid #333; width: 300px; font-style: italic; color: #222; margin-bottom: 5px; }
        #c-sig-label { font-weight: 800; color: var(--gold); display: block; }
        
        .rank-badge { position: absolute; top: 70px; left: 70px; border: 2px solid var(--gold); padding: 10px; font-weight: 900; color: var(--gold); font-size: 14px; }
    </style>
</head>
<body>

<div id="lang-switcher">
    <button class="lang-btn" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('ar')">AR</button>
</div>

<div id="vision-portal">
    <div class="welcome-box">
        <h1 style="font-family: 'Cinzel'; font-size: clamp(2em, 5vw, 4em); margin: 0; color: var(--gold);">MBA-CONSULT</h1>
        <div class="speech-text" id="v-speech"></div>
        <button class="lang-btn active" id="v-btn" onclick="document.getElementById('vision-portal').style.display='none'"></button>
    </div>
</div>

<header id="h-main">MBA-CONSULT | GLOBAL KMS V390</header>

<div id="selection-interface">
    <h2 id="s-title" style="text-align:center; font-family: 'Cinzel'; margin-top: 40px;"></h2>
    <div class="grid-container" id="sector-grid"></div>
</div>

<div id="job-interface" style="display:none;">
    <h2 id="j-title" style="text-align:center; font-family: 'Cinzel'; margin-top: 40px;"></h2>
    <div class="grid-container" id="job-grid"></div>
</div>

<div id="audit-interface">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <span id="audit-step" style="font-weight: 800; color: var(--gold); font-size: 1.2em;"></span>
        <span id="job-badge" style="background: var(--navy); color: white; padding: 8px 20px; border-radius: 20px; font-size: 0.9em; font-weight: 700;"></span>
    </div>
    <h2 id="q-text" style="font-size: 1.6em; color: var(--navy);"></h2>
    <div id="options-stack"></div>
    <button id="q-submit" onclick="submitStep()" style="background: var(--gold); color: var(--navy); border: none; padding: 22px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 30px; border-radius: 8px;"></button>
</div>

<div id="certificat-wrapper">
    <button id="btn-pdf" onclick="generatePDF()" style="padding:18px 40px; background:#27ae60; color:white; border:none; cursor:pointer; font-weight:800; margin-bottom:30px; border-radius: 5px;"></button>
    <div class="scroll-box">
        <div id="cert-area">
            <div class="rank-badge" id="c-rank">WORLD RANK: #1 TOP TIER</div>
            <div class="cert-validation-block">
                <img id="c-qr" class="cert-qr" src="">
                <div id="c-score-pct"></div>
            </div>
            
            <div class="cert-content">
                <div id="c-cert-title"></div>
                <div id="c-sub"></div>
                <p id="c-confirm"></p>
                <div id="c-name"></div>
                <p id="c-expert-text"></p>
                <div id="c-job"></div>
            </div>

            <div class="cert-footer">
                <div class="sig-block">
                    <div id="c-sig"></div>
                    <small id="c-sig-label"></small>
                </div>
                <div style="text-align:right;">
                    <div style="color: var(--gold); font-weight: 900; letter-spacing: 1px;" id="c-footer-auth">MBA-CONSULT GLOBAL ACCREDITATION</div>
                    <div style="font-family: 'Cinzel'; font-size: 22px; border-bottom: 2px solid #333; width: 320px; margin-top: 10px; color: var(--navy);" id="c-footer-board">OFFICIAL BOARD ALPHA</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SECTORS = {
        "Finance": { icon: "fa-chart-line", jobs: ["Trader HFT", "Directeur M&A", "Analyste ESG", "Risk Manager", "CFO / DAF", "Banquier Privé", "Actuaire", "Fiscaliste Int.", "Auditeur Senior", "Trésorier Group", "Analyste Quant", "Compliance Officer", "Asset Manager", "Directeur Crédit", "Expert Crypto"] },
        "IT & AI": { icon: "fa-robot", jobs: ["AI Architect", "Cyber Security", "Cloud Engineer", "Data Scientist", "CTO / IT Dir", "DevSecOps", "ML Engineer", "Prompt Expert", "Blockchain Dev", "Product Owner", "UX Strategist", "IT Auditor", "Fullstack Expert", "Solution Arch.", "SOC Lead"] },
        "Energie": { icon: "fa-bolt", jobs: ["Ingénieur Solaire", "Expert Éolien", "Nucléaire Spec.", "Consultant Carbone", "Energy Trader", "Smart Grid Eng.", "Hydrogène Spec.", "Drilling Manager", "HSE Director", "Project Manager", "Bio-Energy Eng.", "Geophysicist", "Offshore Lead", "Storage Spec.", "Grid Operator"] },
        "Agri-Food": { icon: "fa-leaf", jobs: ["Ing. Agronome", "Qualité Senior", "Food Tech Spec.", "Supply Chain Mgr", "Plant Manager", "R&D Scientist", "Export Manager", "Farm Director", "Nutritionist", "Logistics Lead", "Bio-Tech Spec.", "Certification Aud.", "Packaging Eng.", "Food Safety", "Procurement"] },
        "Tourisme": { icon: "fa-plane", jobs: ["Directeur Hôtel", "Yield Manager", "E-Reputation Mgr", "Revenue Manager", "Event Director", "Resort Manager", "Cruise Director", "MICE Expert", "Travel Tech Spec", "Luxury Planner", "Experience Mgr", "Airport Director", "F&B Director", "Marketing Dir.", "Destination Spec."] },
        "Education": { icon: "fa-graduation-cap", jobs: ["Doyen Académique", "EdTech Designer", "Chercheur IA", "L&D Director", "E-learning Mgr.", "Principal", "Executive Coach", "Career Counselor", "Inclusion Spec.", "Admissions Dir.", "Curriculum Dev.", "Policy Analyst", "Student Success", "Training Dir.", "Academic Dean"] }
    };

    const UI = {
        fr: {
            vSpeech: "Intégrez l'élite mondiale. Votre expertise est votre actif précieux.", vBtn: "DÉPLOYER L'AUDIT",
            sTitle: "UNITÉS D'ACCRÉDITATION MBA", jTitle: "SÉLECTIONNEZ VOTRE MÉTIER", qSubmit: "VALIDER LA DÉCISION",
            promptName: "NOM COMPLET :", cTitle: "CERTIFICAT D'EXCELLENCE", cSub: "ACCRÉDITATION MONDIALE MBA",
            cConfirm: "Ce document atteste solennellement que", cExpert: "A validé son accréditation pour le métier de :",
            cSig: "SIGNATURE ÉLECTRONIQUE VÉRIFIÉE", btnPdf: "TÉLÉCHARGER LE PDF SÉCURISÉ", rank: "RANG MONDIAL: #1 TOP TIER",
            auth: "ACCRÉDITATION GLOBALE MBA-CONSULT", board: "CONSEIL OFFICIEL ALPHA"
        },
        en: {
            vSpeech: "Join the global elite. Your expertise is your most valuable asset.", vBtn: "DEPLOY AUDIT",
            sTitle: "MBA ACCREDITATION UNITS", jTitle: "SELECT YOUR PROFESSION", qSubmit: "VALIDATE DECISION",
            promptName: "FULL NAME:", cTitle: "CERTIFICATE OF EXCELLENCE", cSub: "GLOBAL MBA ACCREDITATION",
            cConfirm: "This document solemnly certifies that", cExpert: "Has validated accreditation for the profession of:",
            cSig: "VERIFIED ELECTRONIC SIGNATURE", btnPdf: "DOWNLOAD SECURE PDF", rank: "WORLD RANK: #1 TOP TIER",
            auth: "MBA-CONSULT GLOBAL ACCREDITATION", board: "OFFICIAL BOARD ALPHA"
        },
        ar: {
            vSpeech: "انضم إلى نخبة الخبراء في العالم. خبرتك هي أثمن أصولك الاستراتيجية.", vBtn: "بدء التدقيق المهني",
            sTitle: "وحدات الاعتماد المهني MBA", jTitle: "اختر تخصصك المهني الدقيق", qSubmit: "تأكيد القرار التقني",
            promptName: "الاسم الكامل للخبير:", cTitle: "شهادة التميـــــــــز", cSub: "الاعتماد المهنـي العالمـي",
            cConfirm: "تشهد هذه الوثيقة رسمياً وبكل فخر بأن", cExpert: "قد اجتاز بنجاح الاعتماد العالمي لمهنة:",
            cSig: "توقيع إلكتروني معتمد", btnPdf: "تحميل الشهادة بصيغة PDF", rank: "التصنيف العالمي: الفئة الأولى",
            auth: "اعتماد MBA-CONSULT العالمي", board: "المجلس الرسمي ألفا"
        }
    };

    let curL = 'fr', score = 0, step = 0, selSec = "", selJob = "", tempPts = 0;

    function setLang(l) {
        curL = l; document.body.className = (l === 'ar' ? 'rtl' : '');
        const d = UI[l];
        document.getElementById('v-speech').innerText = d.vSpeech;
        document.getElementById('v-btn').innerText = d.vBtn;
        document.getElementById('s-title').innerText = d.sTitle;
        document.getElementById('j-title').innerText = d.jTitle;
        document.getElementById('q-submit').innerText = d.qSubmit;
        document.getElementById('btn-pdf').innerText = d.btnPdf;
        initSectors();
    }

    function initSectors() {
        const grid = document.getElementById('sector-grid'); grid.innerHTML = "";
        Object.keys(SECTORS).forEach(s => {
            grid.innerHTML += `<div class="card" onclick="openJobs('${s}')"><i class="fas ${SECTORS[s].icon}"></i><h3>${s}</h3></div>`;
        });
    }

    function openJobs(s) {
        selSec = s; document.getElementById('selection-interface').style.display = 'none';
        document.getElementById('job-interface').style.display = 'block';
        const grid = document.getElementById('job-grid'); grid.innerHTML = "";
        SECTORS[s].jobs.forEach(j => {
            grid.innerHTML += `<div class="card" onclick="startAudit('${j}')" style="padding:15px; font-size:0.9em;">${j}</div>`;
        });
    }

    function startAudit(j) {
        selJob = j; document.getElementById('job-interface').style.display = 'none';
        document.getElementById('audit-interface').style.display = 'block';
        document.getElementById('job-badge').innerText = j;
        loadQ();
    }

    function loadQ() {
        if(step >= 5) { conclude(); return; }
        document.getElementById('audit-step').innerText = (curL==='ar'?'المرحلة':'ÉTAPE') + ` ${step+1}/5`;
        
        // Dynamic Technical Logic Generation
        const techLabels = {
            fr: ["Alpha: Optimisation prédictive et architecture résiliente (+10)", "Beta: Approche analytique et conformité intégrée (+7)", "Gamma: Exécution opérationnelle standard (+4)"],
            en: ["Alpha: Predictive optimization and resilient architecture (+10)", "Beta: Analytical approach and integrated compliance (+7)", "Gamma: Standard operational execution (+4)"],
            ar: ["ألفا: تحسين استباقي وهيكلية مرنة (+10)", "بيتا: نهج تحليلي وامتثال متكامل (+7)", "غاما: تنفيذ عملياتي قياسي (+4)"]
        };

        const questions = {
            fr: `Décision critique pour ${selJob}: Comment gérez-vous une rupture technologique majeure ?`,
            en: `Critical decision for ${selJob}: How do you manage a major technological disruption?`,
            ar: `قرار استراتيجي لـ ${selJob}: كيف تتعامل مع تحول تكنولوجي جذري؟`
        };

        document.getElementById('q-text').innerText = questions[curL];
        const stack = document.getElementById('options-stack'); stack.innerHTML = "";
        techLabels[curL].forEach((o, i) => {
            stack.innerHTML += `<button class="opt-button" onclick="sel(this, ${[10,7,4][i]})">${o}</button>`;
        });
    }

    function sel(btn, p) {
        document.querySelectorAll('.opt-button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); tempPts = p;
    }

    function submitStep() { if(tempPts) { score += tempPts; step++; tempPts=0; loadQ(); } }

    function conclude() {
        document.getElementById('audit-interface').style.display = 'none';
        const name = prompt(UI[curL].promptName) || "EXPERT";
        const d = UI[curL];
        document.getElementById('certificat-wrapper').style.display = 'block';
        
        // Full translation of certificate
        document.getElementById('c-cert-title').innerText = d.cTitle;
        document.getElementById('c-sub').innerText = d.cSub;
        document.getElementById('c-confirm').innerText = d.cConfirm;
        document.getElementById('c-expert-text').innerText = d.cExpert;
        document.getElementById('c-sig-label').innerText = d.cSig;
        document.getElementById('c-rank').innerText = d.rank;
        document.getElementById('c-footer-auth').innerText = d.auth;
        document.getElementById('c-footer-board').innerText = d.board;
        
        document.getElementById('c-name').innerText = name.toUpperCase();
        document.getElementById('c-job').innerText = selJob;
        document.getElementById('c-score-pct').innerText = (score/50*100) + "%";
        document.getElementById('c-sig').innerText = name;
        document.getElementById('c-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=MBA-V390-${name}-${selJob}`;
    }

    function generatePDF() {
        const opt = { 
            margin: 0, 
            filename: `MBA-ACCREDITATION-${selJob}.pdf`, 
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2, useCORS: true, letterRendering: true },
            jsPDF: { unit: 'px', format: [1120, 790], orientation: 'landscape' }
        };
        html2pdf().set(opt).from(document.getElementById('cert-area')).save();
    }

    setLang('fr');
</script>
</body>
</html>
