<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>V390 TITANIUM OMNI-GENESIS GOLD - OPERATIONAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --navy: #0A1128; --bg: #050A18; --white: #FFFFFF; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--white); margin: 0; }
        
        /* NAVIGATION HEADER */
        #nav-header { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(10,17,40,0.95); border-bottom: 2px solid var(--gold); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 10000; box-sizing: border-box; }
        .btn-nav { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; cursor: pointer; margin: 0 5px; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        .btn-nav:hover { background: var(--gold); color: var(--navy); }

        .page { display: none; min-height: 100vh; padding: 100px 5% 40px; box-sizing: border-box; }
        .active-page { display: block; }
        
        /* MOTIVATION BOX */
        .motivation-box { border-left: 5px solid var(--gold); padding: 25px; background: rgba(255,255,255,0.05); margin: 20px 0; border-radius: 0 15px 15px 0; line-height: 1.6; font-size: 1.1rem; }

        /* GRID SYSTEM */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--navy); border: 1px solid rgba(212,175,55,0.3); padding: 25px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 5px 20px rgba(212,175,55,0.2); }
        .card i { font-size: 3rem; color: var(--gold); margin-bottom: 15px; }

        /* AUDIT INTERFACE */
        #audit-container { max-width: 900px; margin: auto; background: rgba(255,255,255,0.03); padding: 40px; border-radius: 20px; border: 1px solid var(--gold); }
        .opt-btn { width: 100%; text-align: left; padding: 15px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid var(--gold); color: white; cursor: pointer; border-radius: 8px; font-size: 1rem; }
        .opt-btn:hover, .opt-selected { background: var(--gold); color: var(--navy); }

        /* PDF CERTIFICATE - GEOMETRY V390 GOLD */
        #cert-container { width: 1122px; height: 793px; background: white; color: black; position: relative; border: 20px double var(--gold); display: none; box-sizing: border-box; overflow: hidden; }
        #pdf-qr { position: absolute; top: 5mm; right: 5mm; width: 110px; height: 110px; border: 1px solid #eee; }
        #pdf-sig { position: absolute; bottom: 5mm; left: 50%; transform: translateX(-50%); width: 350px; text-align: center; border-top: 2px solid #333; font-family: 'Brush Script MT', cursive; font-size: 1.8rem; padding-top: 5px; }
        .pdf-content { padding: 120px 60px; text-align: center; }
        
        [dir="rtl"] #pdf-qr { left: 5mm; right: auto; }
    </style>
</head>
<body>

<header id="nav-header">
    <div>
        <button class="btn-nav" onclick="KMS.back()"><i class="fas fa-chevron-left"></i> <span data-key="back"></span></button>
        <button class="btn-nav" onclick="KMS.go('p-sectors')"><i class="fas fa-th-large"></i> <span data-key="sectors_nav"></span></button>
    </div>
    <div id="translator-agent">
        <button class="btn-nav" onclick="KMS.setLang('fr')">FR</button>
        <button class="btn-nav" onclick="KMS.setLang('en')">EN</button>
        <button class="btn-nav" onclick="KMS.setLang('ar')">AR</button>
    </div>
</header>

<div id="p-intro" class="page active-page">
    <h1 style="color:var(--gold); font-size: 3.5rem; text-align:center;">V390 TITANIUM OMNI-GENESIS</h1>
    <div class="motivation-box">
        <p id="motive-text"></p>
    </div>
    <button class="card" style="width:100%; font-size: 1.8rem;" onclick="KMS.go('p-sectors')" data-key="start_btn"></button>
</div>

<div id="p-sectors" class="page">
    <h2 data-key="select_sector" style="text-align:center; color:var(--gold);"></h2>
    <div id="sector-grid" class="grid"></div>
</div>

<div id="p-jobs" class="page">
    <h2 id="current-sector-display" style="text-align:center; color:var(--gold);"></h2>
    <div id="job-grid" class="grid"></div>
</div>

<div id="p-audit" class="page">
    <div id="audit-container">
        <div style="display:flex; justify-content:space-between; color:var(--gold); margin-bottom:20px;">
            <span id="audit-step-label"></span>
            <span id="audit-score-live"></span>
        </div>
        <h2 id="question-text" style="line-height:1.4; margin-bottom:30px;"></h2>
        <div id="options-container"></div>
        <div id="delta-area" style="display:none; margin-top:20px;">
            <label style="color:var(--gold); font-weight:bold;" data-key="delta_label"></label>
            <textarea id="delta-input" style="width:100%; height:100px; background:black; color:var(--gold); border:1px solid var(--gold); padding:10px; margin-top:10px;" placeholder="Min 40 chars..."></textarea>
        </div>
        <div style="margin-top:30px; display:flex; gap:10px;">
            <button class="btn-nav" style="flex:1;" onclick="KMS.prevQuestion()" data-key="back_q"></button>
            <button class="btn-nav" style="flex:2; background:var(--gold); color:var(--navy);" onclick="KMS.validateQuestion()" data-key="confirm_q"></button>
        </div>
    </div>
</div>

<div id="p-result" class="page" style="text-align:center;">
    <h1 id="final-score-display" style="font-size:5rem;"></h1>
    <p id="result-msg" style="font-size:1.5rem; margin-bottom:30px;"></p>
    <button class="btn-nav" style="padding:20px 50px; font-size:1.8rem;" onclick="KMS.exportPDF()" data-key="download_btn"></button>
    
    <div id="cert-container">
        <div id="pdf-qr"></div>
        <div class="pdf-content">
            <h1 style="font-size: 48px; color: var(--navy); margin:0;">TITANIUM GOLD ACCREDITATION</h1>
            <p style="font-size: 20px; margin: 25px 0;" data-key="pdf_solemn"></p>
            <h2 id="pdf-name" style="font-size: 42px; border-bottom: 3px solid var(--gold); display: inline-block; padding: 0 40px;"></h2>
            <p style="font-size: 18px; margin: 25px 0;" data-key="pdf_rank_label"></p>
            <h3 id="pdf-job" style="font-size: 32px; color: var(--gold);"></h3>
            <p style="margin-top: 60px; font-size: 14px;">Verification ID: <span id="pdf-id"></span> | Sector: <span id="pdf-sector"></span> | Date: 2027-03-16</p>
        </div>
        <div id="pdf-sig">ELECTRONIC SIGNATURE: VERIFIED EXPERT</div>
    </div>
</div>

<script>
/* BASE DE DONNÉES JSON INTÉGRÉE V390 */
const DATABASE = {
    sectors: {
        "Energie": { icon: "fa-bolt", jobs: ["Architecte Fusion SMR", "Ingénieur Hydrogène Vert", "Expert Grid 2027", "Manager Lithium", "Auditeur Nucléaire", "Analyste BESS", "Designer HVDC", "Manager Thorium", "Expert Géothermie", "Ingénieur Biomasse", "Analyste Transition", "Manager Micro-Grid", "Expert Carb-Capture", "Lead Sûreté", "R&D Solaire"] },
        "Education": { icon: "fa-graduation-cap", jobs: ["Neuro-Pédagogue", "Meta-Campus Designer", "EdTech IA Lead", "Innovation L&D", "Learning Data Analyst", "Serious Games Dev", "Micro-Certifs Expert", "LMS Adaptatif", "E-Learning Mgr", "Digital Psych", "Inclusion Num", "Bootcamp IA", "Flux Scolaire", "IA Education", "EdTech Strat"] },
        "Sante": { icon: "fa-dna", jobs: ["Ingénieur Génomique", "Radiologue IA", "Bio-Informaticien", "Manager Robotique", "Analyste Pharma", "Expert Télémédecine", "Neuro-Tech", "Directeur Innovation", "Expert Lab 4.0", "Med-Device Dev", "Bio-Security", "Oncologie Data", "Manager E-Santé", "Proteomique", "IoT Médical"] },
        "IT & IA": { icon: "fa-microchip", jobs: ["Lead IA Générative", "Architecte Quantique", "Expert Cyber SOC", "Ingénieur ML Ops", "Blockchain Lead", "Edge Dev", "Data Ethics", "Cloud Native", "DevSecOps", "Quantum Alg", "Web3 Architect", "IA Strategist", "Rust Engineer", "Threat Intel", "FullStack AI"] },
        "Commerce": { icon: "fa-shopping-cart", jobs: ["Supply Chain Cog", "Pricing IA Expert", "Omnicanal Lead", "Logistique Auto", "E-com Strategist", "Phygital Mgr", "Achat Durable", "Retail Flux", "Sourcing Bloc", "Marketplace", "Retail Tech", "Growth Head", "Last-Mile Mgr", "Directeur Franchise", "Customer Data"] },
        "Tourisme": { icon: "fa-plane", jobs: ["Tourisme Spatial Mgr", "Hospitality 4.0", "Voyage Durable", "Revenue IA", "Experience Immersive", "Eco-Resort Lead", "Cruise Tech", "Booking Crypto", "Smart Dest", "Transport Vert", "Marketing Dig", "Patrimoine Dig", "MICE IA", "Mobilité Tour", "Travel Strategist"] },
        "Agri-Food": { icon: "fa-seedling", jobs: ["Vertical Farm Expert", "Agro-IA", "FoodTech Protéine", "Bio-Auditeur", "Precision Agri", "R&D Scientist", "Packaging Bio", "Irrigation IA", "Robotique Agri", "Nutrition Digit", "AgTech Lead", "Traceability Mgr", "Microbiologie", "Directeur Ferme", "Supply Agri"] },
        "Finance": { icon: "fa-chart-line", jobs: ["Quantum Risk Analyst", "DeFi Lead", "ESG Strategist", "Algo Trader", "Fraud IA Expert", "CFO Digital", "Treasury Bloc", "Fintech Ops", "M&A Tech", "Asset Manager IA", "Risk Analyst", "Bank Mobile", "Crypto Expert", "Systemic Risk", "BI Finance"] }
    }
};

const DICT = {
    fr: {
        back: "Retour", sectors_nav: "Secteurs", start_btn: "Accéder au KMS Gold", select_sector: "8 Domaines de Haute Expertise",
        delta_label: "ANALYSE STRATÉGIQUE DELTA (Validation IA requise)", back_q: "Question Précédente", confirm_q: "Valider ma réponse",
        download_btn: "Télécharger Certificat Or", pdf_solemn: "Le système KMS V390 certifie solennellement l'expertise de :",
        pdf_rank_label: "Au grade d'Expert Senior dans le métier de :",
        motive: "Propulsez votre carrière vers 2027 avec la V390 TITANIUM GOLD. Atteignez 81% de précision et validez 3 analyses Delta pour obtenir votre accréditation officielle trilingue."
    },
    en: {
        back: "Back", sectors_nav: "Sectors", start_btn: "Access KMS Gold", select_sector: "8 High Expertise Domains",
        delta_label: "DELTA STRATEGIC ANALYSIS (AI Validation Required)", back_q: "Previous Question", confirm_q: "Confirm Answer",
        download_btn: "Download Gold Certificate", pdf_solemn: "The KMS V390 system solemnly certifies the expertise of:",
        pdf_rank_label: "At the rank of Senior Expert for the profession of:",
        motive: "Propel your career towards 2027 with V390 TITANIUM GOLD. Reach 81% accuracy and validate 3 Delta analyses to obtain your official trilingual accreditation."
    },
    ar: {
        back: "رجوع", sectors_nav: "القطاعات", start_btn: "الدخول إلى KMS الذهبي", select_sector: "8 مجالات خبرة عالية",
        delta_label: "التحليل الاستراتيجي DELTA (مطلوب تقييم الذكاء الاصطناعي)", back_q: "السؤال السابق", confirm_q: "تأكيد الإجابة",
        download_btn: "تحميل الشهادة الذهبية", pdf_solemn: "يشهد نظام KMS V390 رسمياً بخبرة:",
        pdf_rank_label: "بدرجة خبير أول في مهنة:",
        motive: "ارتقِ بمسيرتك المهنية نحو عام 2027 مع V390 TITANIUM GOLD. حقق دقة 81% واعتمد 3 تحليلات Delta للحصول على اعتمادك الرسمي ثلاثي اللغات."
    }
};

const KMS = {
    lang: 'fr', currentSector: '', currentJob: '', step: 0, score: 0, deltaApprovals: 0, history: ['p-intro'], answers: [],

    setLang(l) {
        this.lang = l;
        document.dir = (l === 'ar' ? 'rtl' : 'ltr');
        document.getElementById('motive-text').innerText = DICT[l].motive;
        document.querySelectorAll('[data-key]').forEach(el => {
            el.innerText = DICT[l][el.getAttribute('data-key')];
        });
        this.renderSectors();
    },

    go(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(this.history[this.history.length-1] !== id) this.history.push(id);
        window.scrollTo(0,0);
    },

    back() {
        if(this.history.length > 1) {
            this.history.pop();
            this.go(this.history[this.history.length-1]);
        }
    },

    renderSectors() {
        const grid = document.getElementById('sector-grid');
        grid.innerHTML = '';
        Object.keys(DATABASE.sectors).forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<i class="fas ${DATABASE.sectors[s].icon}"></i><h3>${s}</h3>`;
            card.onclick = () => { this.currentSector = s; this.renderJobs(s); this.go('p-jobs'); };
            grid.appendChild(card);
        });
    },

    renderJobs(s) {
        document.getElementById('current-sector-display').innerText = s;
        const grid = document.getElementById('job-grid');
        grid.innerHTML = '';
        DATABASE.sectors[s].jobs.forEach(j => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h4>${j}</h4>`;
            card.onclick = () => { this.currentJob = j; this.startAudit(); };
            grid.appendChild(card);
        });
    },

    startAudit() {
        this.step = 0; this.score = 0; this.deltaApprovals = 0; this.answers = [];
        this.go('p-audit');
        this.loadQuestion();
    },

    loadQuestion() {
        if(this.step >= 5) return this.finalize();
        document.getElementById('audit-step-label').innerText = `AUDIT STEP: ${this.step+1} / 5`;
        document.getElementById('audit-score-live').innerText = `CURRENT SCORE: ${this.score}%`;
        document.getElementById('question-text').innerText = `[TRILINGUAL KMS 2027] Pour le métier de "${this.currentJob}", quelle architecture technologique garantit une conformité maximale dans le secteur "${this.currentSector}" ?`;
        
        const opts = ["Alpha: Intégration IA Quantum-Link 2027", "Beta: Modèle Hybride Prédictif Avancé", "Gamma: Standard Industriel Optimisé", "DELTA: ANALYSE PERSONNALISÉE (EXPERT)"];
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        opts.forEach((o, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn' + (this.answers[this.step] === i ? ' opt-selected' : '');
            btn.innerText = o;
            btn.onclick = () => {
                this.tempSelected = i;
                document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('opt-selected'));
                btn.classList.add('opt-selected');
                document.getElementById('delta-area').style.display = (i === 3) ? 'block' : 'none';
            };
            container.appendChild(btn);
        });
        
        if(this.answers[this.step] === 3) document.getElementById('delta-area').style.display = 'block';
    },

    validateQuestion() {
        if(this.tempSelected === undefined) return alert("Veuillez choisir une option.");
        
        if(this.tempSelected === 3) {
            const txt = document.getElementById('delta-input').value;
            if(txt.length < 40) return alert("L'analyse Delta exige 40 caractères minimum pour validation IA.");
            this.deltaApprovals++;
        }
        
        this.answers[this.step] = this.tempSelected;
        this.calculateScore();
        this.step++;
        this.tempSelected = undefined;
        document.getElementById('delta-input').value = '';
        this.loadQuestion();
    },

    prevQuestion() {
        if(this.step > 0) {
            this.step--;
            this.loadQuestion();
        }
    },

    calculateScore() {
        let total = 0;
        this.answers.forEach(a => {
            if(a === 0 || a === 3) total += 20;
            else if(a === 1) total += 15;
            else total += 10;
        });
        this.score = total;
    },

    finalize() {
        if(this.score > 80 && this.deltaApprovals >= 3) {
            this.go('p-result');
            document.getElementById('final-score-display').innerText = `${this.score}%`;
            document.getElementById('result-msg').innerText = "ACCRÉDITATION GOLD ACCORDÉE";
            document.getElementById('final-score-display').style.color = "var(--gold)";
            
            const name = prompt("Veuillez saisir votre Nom Complet pour le certificat :");
            document.getElementById('pdf-name').innerText = name.toUpperCase();
            document.getElementById('pdf-job').innerText = this.currentJob;
            document.getElementById('pdf-sector').innerText = this.currentSector;
            document.getElementById('pdf-id').innerText = `V390-GOLD-${Math.random().toString(36).substr(2, 9).toUpperCase()}`;
            
            document.getElementById('pdf-qr').innerHTML = '';
            new QRCode(document.getElementById("pdf-qr"), {
                text: `KMS-V390-VERIF-${name}-${this.score}`,
                width: 110, height: 110, colorDark: "#000000", colorLight: "#ffffff"
            });
        } else {
            alert(`ÉCHEC : Score (${this.score}%) ou Approbations IA (${this.deltaApprovals}/3) insuffisants.`);
            this.go('p-intro');
        }
    },

    exportPDF() {
        const cert = document.getElementById('cert-container');
        cert.style.display = 'block';
        const opt = {
            margin: 0,
            filename: `KMS_GOLD_CERTIFICATE_${this.currentJob}.pdf`,
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'px', format: [1122, 793], orientation: 'landscape' }
        };
        html2pdf().set(opt).from(cert).save().then(() => {
            cert.style.display = 'none';
        });
    }
};

KMS.setLang('fr');
</script>
</body>
</html>
