<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V390 TITANIUM OMNI-GENESIS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --navy: #0A1128; --bg: #050A18; --white: #FFFFFF; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); margin: 0; overflow-x: hidden; }
        .page { display: none; min-height: 100vh; padding: 100px 5% 40px; flex-direction: column; align-items: center; }
        .active-page { display: flex; }
        
        /* NAVIGATION SUPÉRIEURE */
        #nav-header { position: fixed; top: 0; left: 0; width: 100%; height: 80px; background: rgba(10,17,40,0.95); border-bottom: 3px solid var(--gold); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 9999; }
        .nav-group { display: flex; gap: 10px; }
        .btn-gold { background: transparent; border: 2px solid var(--gold); color: var(--gold); padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        /* GRID & CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; margin-top: 20px; }
        .card { background: var(--navy); border: 2px solid var(--gold); padding: 25px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--gold); }
        .card i { font-size: 3rem; margin-bottom: 15px; color: var(--gold); }

        /* AUDIT BOX */
        .audit-container { background: white; color: var(--navy); padding: 30px; border-radius: 20px; width: 100%; max-width: 800px; }
        .opt-btn { width: 100%; padding: 15px; margin: 8px 0; border: 2px solid #ddd; border-radius: 10px; text-align: left; font-weight: bold; cursor: pointer; }
        .opt-btn.active { border-color: var(--gold); background: #fff9e6; }
        #delta-area { width: 100%; height: 120px; margin-top: 15px; border: 2px solid var(--gold); padding: 10px; display: none; }

        /* CERTIFICAT PDF - VERROUILLAGE GÉOMÉTRIQUE */
        #cert-container { width: 1122px; height: 793px; background: white; color: black; position: relative; border: 35px double var(--gold); margin: 0 auto; display: none; overflow: hidden; }
        .pdf-qr { position: absolute; top: 5mm; right: 5mm; width: 140px; height: 140px; }
        .pdf-sig { position: absolute; bottom: 5mm; left: 50%; transform: translateX(-50%); width: 400px; border-top: 3px solid black; text-align: center; font-size: 2.2rem; font-family: 'Georgia', serif; }
        .pdf-content { text-align: center; padding-top: 180px; width: 100%; }
        .pdf-logo-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 500px; color: rgba(212,175,55,0.04); z-index: 1; }
    </style>
</head>
<body>

<header id="nav-header">
    <div class="nav-group">
        <button class="btn-gold" onclick="KMS.back()"><i class="fas fa-chevron-left"></i> <span data-key="nav_back">Retour</span></button>
        <button class="btn-gold" onclick="KMS.go('p-sectors')"><span data-key="nav_home">Secteurs</span></button>
    </div>
    <div class="nav-group">
        <button class="btn-gold" onclick="KMS.setLang('fr')">FR</button>
        <button class="btn-gold" onclick="KMS.setLang('en')">EN</button>
        <button class="btn-gold" onclick="KMS.setLang('ar')">AR</button>
    </div>
</header>

<div id="p-start" class="page active-page">
    <div style="text-align:center; max-width: 900px;">
        <h1 style="color:var(--gold); font-size: 3.5rem;">V390 TITANIUM OMNI-GENESIS</h1>
        <p id="motive-desc" style="font-size: 1.4rem; line-height: 1.8; margin: 40px 0;"></p>
        <button class="btn-gold" style="font-size: 2rem; padding: 25px 60px; background: var(--gold); color: var(--navy);" onclick="KMS.go('p-sectors')" data-key="btn_start">Lancer l'Audit Global</button>
    </div>
</div>

<div id="p-sectors" class="page">
    <h1 data-key="title_sectors">ARCHIVES STRATÉGIQUES 2027</h1>
    <div class="grid" id="grid-sectors"></div>
</div>

<div id="p-jobs" class="page">
    <h1 id="sector-title"></h1>
    <div class="grid" id="grid-jobs"></div>
</div>

<div id="p-audit" class="page">
    <div class="audit-container">
        <h3 id="audit-meta" style="color:var(--gold); text-transform:uppercase;"></h3>
        <h2 id="audit-q" style="font-size: 1.8rem; margin: 20px 0;"></h2>
        <div id="audit-opts"></div>
        <textarea id="delta-area" placeholder="DÉVELOPPEZ VOTRE ANALYSE EXPERT (MIN 40 CHARS)..."></textarea>
        <button class="btn-gold" style="width:100%; margin-top:20px; background:var(--navy); color:white;" onclick="KMS.validate()" data-key="btn_next">Valider Étape</button>
    </div>
</div>

<div id="p-finish" class="page">
    <button class="btn-gold" style="font-size: 1.5rem; padding: 20px 40px;" onclick="KMS.downloadPDF()" data-key="btn_pdf">Exporter Certificat Or</button>
    <div id="cert-container">
        <div id="pdf-bg-icon" class="pdf-logo-bg"></div>
        <div id="pdf-qrcode" class="pdf-qr"></div>
        <div class="pdf-content">
            <h1 style="font-size: 4.5rem; letter-spacing: 5px;">CERTIFICATION D'EXCELLENCE</h1>
            <p style="font-size: 2rem; margin: 30px 0;" data-key="pdf_witness">L'Agent KMS atteste le haut niveau de maîtrise de :</p>
            <div id="pdf-name" style="font-size: 5.5rem; font-weight: 900; color: var(--navy); border-bottom: 8px solid var(--gold); display: inline-block; padding: 0 50px;"></div>
            <p style="font-size: 2rem; margin-top: 40px;" data-key="pdf_for">Spécialisation Expertale 2027 :</p>
            <h2 id="pdf-job" style="color:var(--gold); font-size: 4rem;"></h2>
        </div>
        <div class="pdf-sig" id="pdf-sig-name"></div>
    </div>
</div>

<script>
const TRANSLATIONS = {
    fr: {
        motive: "V390 TITANIUM : L'outil d'accréditation ultime pour les leaders de l'industrie. Obtenez votre certificat officiel en validant 81% de précision technique et 3 expertises Delta approuvées par l'IA.",
        nav_back: "Retour", nav_home: "Secteurs", btn_start: "Démarrer", title_sectors: "8 Secteurs Clés", btn_next: "Étape Suivante", btn_pdf: "Télécharger PDF", pdf_witness: "L'Agent KMS atteste la maîtrise de :", pdf_for: "Spécialisation Expertale :"
    },
    en: {
        motive: "V390 TITANIUM: The ultimate accreditation tool for industry leaders. Secure your official certificate by reaching 81% technical accuracy and 3 IA-validated Delta expertises.",
        nav_back: "Back", nav_home: "Sectors", btn_start: "Start", title_sectors: "8 Key Sectors", btn_next: "Next Step", btn_pdf: "Download PDF", pdf_witness: "KMS Agent certifies the mastery of:", pdf_for: "Expert Specialization:"
    },
    ar: {
        motive: "V390 TITANIUM: أداة الاعتماد النهائية لقادة الصناعة. احصل على شهادتك الرسمية من خلال تحقيق دقة تقنية بنسبة 81٪ و3 خبرات دلتا معتمدة من الذكاء الاصطناعي.",
        nav_back: "رجوع", nav_home: "قطاعات", btn_start: "ابدأ الآن", title_sectors: "8 قطاعات استراتيجية", btn_next: "الخطوة التالية", btn_pdf: "تحميل الشهادة", pdf_witness: "يشهد وكيل KMS بكفاءة:", pdf_for: "التخصص الخبير:"
    }
};

const DATA_KMS = {
    "Energie": { icon: "fa-bolt", jobs: ["Architecte Fusion SMR", "Ingénieur Hydrogène Vert", "Lead Grid 2027", "Manager Lithium", "Expert SMR", "Analyste BESS", "Designer HVDC", "Auditeur Eolien", "Manager Thorium", "Expert Géothermie", "Ingénieur Biomasse", "Analyste Transition", "Manager Micro-Grid", "Expert Carb-Capture", "Lead Sûreté Nucléaire"] },
    "IT & IA": { icon: "fa-microchip", jobs: ["Lead IA Générative", "Architecte Quantique", "Expert Cyber SOC", "Ingénieur ML Ops", "Blockchain Lead", "Edge Dev", "Data Ethics", "Cloud Native", "DevSecOps", "Quantum Alg", "Web3 Architect", "IA Strategist", "Rust Engineer", "Threat Intel", "FullStack AI"] },
    "Sante": { icon: "fa-dna", jobs: ["Ingénieur Génomique", "Radiologue IA", "Bio-Informaticien", "Manager Robotique", "Analyste Pharma", "Expert Télémédecine", "Neuro-Tech", "Directeur Innovation", "Expert Lab 4.0", "Med-Device Dev", "Bio-Security", "Oncologie Data", "Manager E-Santé", "Proteomique", "IoT Médical"] },
    "Finance": { icon: "fa-chart-line", jobs: ["Quantum Risk", "DeFi Lead", "ESG Strategist", "Algo Trader", "Fraud IA", "CFO Digital", "Treasury Bloc", "Fintech Ops", "M&A Tech", "Asset Manager IA", "Risk Analyst", "Bank Mobile", "Crypto Expert", "Systemic Risk", "BI Finance"] },
    "Agri-Food": { icon: "fa-seedling", jobs: ["Vertical Farm", "Agro-IA", "FoodTech Prot", "Bio-Auditeur", "Precision Agri", "R&D Scientist", "Packaging Bio", "Irrigation IA", "Robotique Agri", "Nutrition Digit", "AgTech Lead", "Traceability", "Microbiologie", "Directeur Ferme", "Supply Agri"] },
    "Commerce": { icon: "fa-shopping-cart", jobs: ["Supply Chain Cog", "Pricing IA", "Omnicanal", "Logistique Auto", "E-com Strategist", "Phygital", "Achat Durable", "Retail Flux", "Sourcing Bloc", "Marketplace", "Retail Tech", "Growth Head", "Last-Mile", "Directeur Franchise", "Customer Data"] },
    "Education": { icon: "fa-user-graduate", jobs: ["Neuro-Pédagogue", "Meta-Campus", "EdTech IA", "Innovation L&D", "Learning Data", "Serious Games", "Micro-Certifs", "LMS Adaptatif", "E-Learning", "Digital Psych", "Inclusion Num", "Bootcamp IA", "Flux Scolaire", "IA Education", "EdTech Strat"] },
    "Tourisme": { icon: "fa-plane", jobs: ["Tourisme Spatial", "Hospitality 4.0", "Voyage Durable", "Revenue IA", "Experience Immersive", "Eco-Resort", "Cruise Tech", "Booking Crypto", "Smart Dest", "Transport Vert", "Marketing Dig", "Patrimoine Dig", "MICE IA", "Mobilité Tour", "Travel Strategist"] }
};

const KMS = {
    lang: 'fr', sector: '', job: '', step: 0, score: 0, delta: 0, history: ['p-start'],
    
    setLang(l) {
        this.lang = l; document.dir = (l === 'ar' ? 'rtl' : 'ltr');
        document.getElementById('motive-desc').innerText = TRANSLATIONS[l].motive;
        document.querySelectorAll('[data-key]').forEach(el => el.innerText = TRANSLATIONS[l][el.getAttribute('data-key')]);
        if(this.sector) this.renderJobs();
    },

    go(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        this.history.push(id);
    },

    back() { if(this.history.length > 1) { this.history.pop(); this.go(this.history[this.history.length-1]); } },

    renderSectors() {
        const g = document.getElementById('grid-sectors'); g.innerHTML = '';
        Object.keys(DATA_KMS).forEach(s => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<i class="fas ${DATA_KMS[s].icon}"></i><h2>${s}</h2>`;
            d.onclick = () => { this.sector = s; this.renderJobs(); this.go('p-jobs'); };
            g.appendChild(d);
        });
    },

    renderJobs() {
        document.getElementById('sector-title').innerText = this.sector;
        const g = document.getElementById('grid-jobs'); g.innerHTML = '';
        DATA_KMS[this.sector].jobs.forEach(j => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<h3>${j}</h3>`;
            d.onclick = () => { this.job = j; this.step = 0; this.score = 0; this.delta = 0; this.go('p-audit'); this.renderQ(); };
            g.appendChild(d);
        });
    },

    renderQ() {
        if(this.step >= 5) return this.finalize();
        document.getElementById('audit-meta').innerText = `STEP ${this.step+1}/5 | ${this.job}`;
        document.getElementById('audit-q').innerText = `[SCENARIO-2027] Définissez l'approche optimale pour ${this.job} face à une disruption systémique ?`;
        const opts = [
            {t: "Alpha: Intégration IA Predictive-Neural (+10)", p: 10},
            {t: "Beta: Redondance de flux standard (+7)", p: 7},
            {t: "Gamma: Maintenance corrective classique (+4)", p: 4}
        ];
        const oBox = document.getElementById('audit-opts'); oBox.innerHTML = '';
        opts.forEach(o => {
            const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = o.t;
            b.onclick = () => { this.tempScore = o.p; this.isDelta = false; document.getElementById('delta-area').style.display = 'none'; };
            oBox.appendChild(b);
        });
        const dBtn = document.createElement('button'); dBtn.className = 'opt-btn'; dBtn.style.color = "var(--gold)"; dBtn.innerText = "DELTA: ANALYSE PERSONNALISÉE IA";
        dBtn.onclick = () => { this.tempScore = 12; this.isDelta = true; document.getElementById('delta-area').style.display = 'block'; };
        oBox.appendChild(dBtn);
    },

    validate() {
        if(this.isDelta) {
            if(document.getElementById('delta-area').value.length > 40) this.delta++;
            else { alert("Analyse trop courte."); return; }
        }
        if(this.tempScore) { this.score += this.tempScore; this.step++; this.renderQ(); }
    },

    finalize() {
        const finalPercent = Math.round((this.score/55)*100);
        if(finalPercent <= 80 || this.delta < 3) {
            alert(`ÉCHEC: Score ${finalPercent}% insuffisant ou manque d'analyses Delta (Min 3).`);
            location.reload();
        } else {
            const name = prompt("NOM DE L'EXPERT :");
            this.go('p-finish');
            document.getElementById('pdf-name').innerText = name.toUpperCase();
            document.getElementById('pdf-job').innerText = this.job;
            document.getElementById('pdf-sig-name').innerText = name;
            document.getElementById('pdf-bg-icon').className = "pdf-logo-bg fas " + DATA_KMS[this.sector].icon;
            new QRCode(document.getElementById("pdf-qrcode"), { text: `KMS-V390-${name}-${finalPercent}`, width: 140, height: 140 });
        }
    },

    downloadPDF() {
        const el = document.getElementById('cert-container');
        el.style.display = 'block';
        html2pdf().set({ margin:0, filename:'CERT_V390.pdf', jsPDF:{unit:'px', format:[1122, 793], orientation:'landscape'} }).from(el).save().then(() => el.style.display='none');
    }
};

KMS.setLang('fr');
KMS.renderSectors();
</script>
</body>
</html>
