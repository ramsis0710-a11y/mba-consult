<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>V390 TITANIUM OMNI-GENESIS - SCELLÉ GOLD EDITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --navy: #0A1128; --bg: #01040A; --white: #FFFFFF; --glass: rgba(212,175,55,0.05); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; overflow-x: hidden; }
        
        /* NAVIGATION RIGIDE */
        #nav-header { position: fixed; top: 0; width: 100%; height: 80px; background: rgba(1,4,10,0.98); border-bottom: 2px solid var(--gold); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 10000; box-sizing: border-box; }
        .btn-nav { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px 24px; cursor: pointer; border-radius: 2px; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-nav:hover { background: var(--gold); color: var(--navy); }

        .page { display: none; min-height: 100vh; padding: 120px 8% 60px; box-sizing: border-box; }
        .active-page { display: block; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UI STRATÉGIQUE */
        .motivation-box { border-left: 5px solid var(--gold); padding: 30px; background: var(--glass); margin-bottom: 50px; font-size: 1.2rem; line-height: 1.6; color: #ced4da; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #0A1128; border: 1px solid rgba(212,175,55,0.1); padding: 40px; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.4s; }
        .card:hover { border-color: var(--gold); transform: scale(1.02); box-shadow: 0 0 30px rgba(212,175,55,0.2); }

        /* MOTEUR D'AUDIT V390 */
        #audit-container { max-width: 1000px; margin: auto; background: rgba(255,255,255,0.02); padding: 50px; border: 1px solid var(--gold); border-radius: 5px; }
        .opt-btn { width: 100%; text-align: left; padding: 22px; margin: 12px 0; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #FFF; cursor: pointer; font-size: 1.1rem; }
        .opt-btn:hover, .opt-selected { background: var(--gold); color: var(--navy); font-weight: 900; }
        textarea { width: 100%; height: 180px; background: #000; color: var(--gold); border: 1px solid var(--gold); padding: 20px; margin-top: 20px; font-size: 1.1rem; font-family: 'Courier New', monospace; }

        /* CERTIFICAT GÉOMÉTRIE V390 */
        #cert-container { width: 1122px; height: 793px; background: #FFF; color: #000; position: relative; border: 35px double var(--gold); display: none; box-sizing: border-box; }
        #pdf-qr { position: absolute; top: 5mm; right: 5mm; width: 140px; height: 140px; background: #FFF; padding: 5px; border: 1px solid #000; }
        #pdf-sig { position: absolute; bottom: 5mm; left: 50%; transform: translateX(-50%); width: 500px; text-align: center; border-top: 2px solid #000; padding-top: 10px; font-weight: bold; font-size: 1.4rem; }
        .pdf-inner { padding: 120px 100px; text-align: center; z-index: 10; position: relative; }
        .bg-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 500px; color: rgba(0,0,0,0.03); z-index: 0; }
    </style>
</head>
<body>

<header id="nav-header">
    <div>
        <button class="btn-nav" onclick="KMS.back()"><i class="fas fa-arrow-left"></i> <span data-key="nav_back"></span></button>
        <button class="btn-nav" onclick="KMS.go('p-sectors')"><span data-key="nav_home"></span></button>
    </div>
    <div>
        <button class="btn-nav" onclick="KMS.setLang('fr')">FR</button>
        <button class="btn-nav" onclick="KMS.setLang('en')">EN</button>
        <button class="btn-nav" onclick="KMS.setLang('ar')">AR</button>
    </div>
</header>

<div id="p-intro" class="page active-page">
    <h1 style="color:var(--gold); font-size: 5rem; text-align:center;">V390 TITANIUM</h1>
    <div class="motivation-box" id="motive-text"></div>
    <button class="btn-nav" style="width:100%; padding:30px; font-size:2rem;" onclick="KMS.go('p-sectors')" data-key="btn_start"></button>
</div>

<div id="p-sectors" class="page">
    <h2 data-key="title_sectors" style="text-align:center; color:var(--gold); font-size:2.5rem;"></h2>
    <div id="sector-grid" class="grid"></div>
</div>

<div id="p-jobs" class="page">
    <h2 id="sector-display" style="text-align:center; color:var(--gold);"></h2>
    <div id="job-grid" class="grid"></div>
</div>

<div id="p-audit" class="page">
    <div id="audit-container">
        <div style="display:flex; justify-content:space-between; color:var(--gold); font-weight:bold; margin-bottom:20px;">
            <span id="audit-step"></span>
            <span id="audit-score-realtime">SCORE ANALYTIQUE IA: 0%</span>
        </div>
        <h2 id="q-text" style="min-height:120px;"></h2>
        <div id="opt-box"></div>
        <div id="delta-box" style="display:none; margin-top:20px;">
            <p style="color:var(--gold); font-weight:bold;">ANALYSE DE RUPTURE (CONTRÔLE IA EN COURS...)</p>
            <textarea id="delta-input" oninput="KMS.liveAnalyze()"></textarea>
        </div>
        <div style="display:flex; gap:20px; margin-top:40px;">
            <button class="btn-nav" style="flex:1" onclick="KMS.prevQ()" data-key="btn_prev"></button>
            <button class="btn-nav" style="flex:2; background:var(--gold); color:var(--navy);" onclick="KMS.nextQ()" data-key="btn_next"></button>
        </div>
    </div>
</div>

<div id="p-result" class="page" style="text-align:center;">
    <h1 id="res-score" style="font-size:10rem; margin:0;"></h1>
    <h2 id="res-status" style="font-size:3rem;"></h2>
    <p id="res-msg" style="max-width:800px; margin:30px auto; font-size:1.4rem; color:var(--gold);"></p>
    <button id="btn-dl" class="btn-nav" style="display:none; padding:30px 60px;" onclick="KMS.exportPDF()"><span data-key="btn_download"></span></button>

    <div id="cert-container">
        <div id="pdf-bg" class="bg-watermark"></div>
        <div id="pdf-qr"></div>
        <div class="pdf-inner">
            <h1 style="font-size:55px;">EXPERT ACCRÉDITATION V390</h1>
            <p style="font-size:22px;" data-key="pdf_intro"></p>
            <h2 id="pdf-name" style="font-size:50px; border-bottom:5px solid #D4AF37; display:inline-block; padding:0 50px;"></h2>
            <p style="font-size:24px; margin-top:40px;" data-key="pdf_rank"></p>
            <h3 id="pdf-job" style="font-size:40px; color:#D4AF37;"></h3>
            <div style="margin-top:80px; display:flex; justify-content:space-around; font-size:20px; font-weight:bold;">
                <span id="pdf-id"></span>
                <span>DATE: 16 MARS 2026</span>
                <span id="pdf-final-score"></span>
            </div>
        </div>
        <div id="pdf-sig">SIGNATURE DIGITALE SCELLÉE - AGENT IA OMNI-GENESIS</div>
    </div>
</div>

<script>
/** * MOTEUR V390 TITANIUM - AGENT IA DE SCORING SEMANTIQUE */
const DATA = {
    sectors: {
        "Energie": { icon: "fa-bolt", jobs: ["Architecte Fusion SMR", "Expert Hydrogène Vert", "Ingénieur Grid-Edge", "Lead Transition", "Analyste Lithium-Air"] },
        "IT & IA": { icon: "fa-microchip", jobs: ["Lead IA Générative", "Architecte Quantique", "Expert Cyber SOC", "Edge Scientist", "Ethicien IA"] },
        "Sante": { icon: "fa-dna", jobs: ["Bio-Informaticien", "Radiologue IA", "Expert Chirurgie Robotique", "Oncologue Génomique", "Manager Nanomédecine"] },
        "Finance": { icon: "fa-chart-line", jobs: ["Quantum Risk Analyst", "DeFi Architect", "ESG Strategist", "Algo Trader HFT", "Fraud IA Manager"] },
        "Agri-Food": { icon: "fa-seedling", jobs: ["Expert Vertical Farming", "Agro-IA Specialist", "Protein Scientist", "Bio-Auditeur 4.0", "Ingénieur Precision Agri"] },
        "Commerce": { icon: "fa-shopping-cart", jobs: ["Strategist Supply Chain", "Expert Pricing Dynamique", "Manager Omnicanal", "Lead Logistique Drone", "E-com Data Director"] },
        "Tourisme": { icon: "fa-plane", jobs: ["Manager Tourisme Spatial", "Hospitality Designer", "Expert Bas Carbone", "Revenue Manager IA", "Experience Immersive"] },
        "Education": { icon: "fa-graduation-cap", jobs: ["Neuro-Pédagogue", "Architecte Meta-Campus", "Data Scientist EdTech", "Concepteur Adaptive Learning", "Manager VR-Training"] }
    }
};

const DICT = {
    fr: {
        nav_back: "Retour", nav_home: "Accueil", btn_start: "Lancer l'Audit de Rupture",
        title_sectors: "Sélectionnez votre Secteur de Maîtrise",
        btn_next: "Analyser & Suivant", btn_prev: "Modifier / Précédent", btn_download: "Télécharger Certificat Or V390",
        pdf_intro: "Certifie solennellement après audit IA l'expertise de :",
        pdf_rank: "Au grade de Senior Expert International pour le métier de :",
        motive: "V390 TITANIUM : Scoring IA sémantique activé. Vos réponses Delta sont comparées en temps réel à la base de connaissance 2027. Seuil de succès : 81%."
    },
    en: {
        nav_back: "Back", nav_home: "Home", btn_start: "Start Disruptive Audit",
        title_sectors: "Select your Domain of Mastery",
        btn_next: "Analyze & Next", btn_prev: "Modify / Previous", btn_download: "Download V390 Gold Certificate",
        pdf_intro: "Solemnly certifies after AI audit the expertise of:",
        pdf_rank: "At the rank of International Senior Expert for the profession of:",
        motive: "V390 TITANIUM: AI semantic scoring active. Your Delta answers are compared in real-time to the 2027 Knowledge Base. Success threshold: 81%."
    },
    ar: {
        nav_back: "رجوع", nav_home: "الرئيسية", btn_start: "بدء التدقيق",
        title_sectors: "اختر مجال تميزك",
        btn_next: "تحليل والتالي", btn_prev: "تعديل / السابق", btn_download: "تحميل الشهادة الذهبية V390",
        pdf_intro: "يشهد رسمياً بعد تدقيق الذكاء الاصطناعي بخبرة:",
        pdf_rank: "بدرجة خبير أول دولي لمهنة:",
        motive: "V390 TITANIUM: تم تفعيل تقييم الذكاء الاصطناعي الدلالي. تتم مقارنة إجاباتك Delta بقاعدة معرفة 2027. حد النجاح: 81%."
    }
};

const KMS = {
    lang: 'fr', sector: '', job: '', step: 0, score: 0, deltaValid: 0, responses: [], questions: [], history: ['p-intro'],

    setLang(l) {
        this.lang = l; document.dir = (l==='ar'?'rtl':'ltr');
        document.getElementById('motive-text').innerText = DICT[l].motive;
        document.querySelectorAll('[data-key]').forEach(el => el.innerText = DICT[l][el.getAttribute('data-key')]);
        this.renderSectors();
    },

    go(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(this.history[this.history.length-1] !== id) this.history.push(id);
    },

    back() { if(this.history.length > 1) { this.history.pop(); this.go(this.history[this.history.length-1]); } },

    renderSectors() {
        const grid = document.getElementById('sector-grid'); grid.innerHTML = '';
        Object.keys(DATA.sectors).forEach(s => {
            const div = document.createElement('div'); div.className = 'card';
            div.innerHTML = `<i class="fas ${DATA.sectors[s].icon}"></i><h3>${s}</h3>`;
            div.onclick = () => { this.sector = s; this.renderJobs(s); this.go('p-jobs'); };
            grid.appendChild(div);
        });
    },

    renderJobs(s) {
        document.getElementById('sector-display').innerText = s;
        const grid = document.getElementById('job-grid'); grid.innerHTML = '';
        DATA.sectors[s].jobs.forEach(j => {
            const div = document.createElement('div'); div.className = 'card'; div.innerHTML = `<h4>${j}</h4>`;
            div.onclick = () => { this.job = j; this.startAudit(); };
            grid.appendChild(div);
        });
    },

    startAudit() {
        this.step = 0; this.responses = [];
        // Moteur de questions intelligentes avec Clé de Corrélation IA
        this.questions = [
            { q: `[STRATÉGIE] Quelle est la faille systémique majeure du secteur ${this.sector} face à l'automatisation de 2027 ?`, key: "décentration résilience entropie", opts: ["Alpha: Latence de décision", "Beta: Entropie des données", "Gamma: Coût marginal nul", "DELTA: Analyse libre"], correct: 2 },
            { q: `[INGÉNIERIE] Quel protocole Titanium appliquez-vous pour stabiliser la performance de ${this.job} ?`, key: "asynchrone optimisation scalabilité", opts: ["Alpha: Flux asynchrone", "Beta: Redondance active", "Gamma: Framework OMNI", "DELTA: Analyse libre"], correct: 0 },
            { q: `[IA] Comment l'agent IA de ${this.sector} doit-il interpréter une anomalie de niveau 5 ?`, key: "contexte éthique correction", opts: ["Alpha: Reboot automatique", "Beta: Isolation contextuelle", "Gamma: Escalade humaine", "DELTA: Analyse libre"], correct: 1 },
            { q: `[MÉTIER] Quel levier de rupture radicale identifiez-vous pour ${this.job} ?`, key: "innovation rupture paradigme", opts: ["Alpha: Intelligence hybride", "Beta: Standardisation ISO", "Gamma: Agilité radicale", "DELTA: Analyse libre"], correct: 0 },
            { q: `[SYNTHÈSE] Définissez la clé de voûte de l'expertise OMNI-GENESIS.`, key: "convergence holistique titanium", opts: ["Alpha: Précision technique", "Beta: Convergence holistique", "Gamma: Vitesse de scraping", "DELTA: Analyse libre"], correct: 1 }
        ];
        this.go('p-audit'); this.loadQ();
    },

    loadQ() {
        const q = this.questions[this.step];
        document.getElementById('audit-step').innerText = `STEP ${this.step+1} / 5`;
        document.getElementById('q-text').innerText = q.q;
        const box = document.getElementById('opt-box'); box.innerHTML = '';
        q.opts.forEach((o, i) => {
            const b = document.createElement('button'); b.className = 'opt-btn';
            if(this.responses[this.step]?.idx === i) b.classList.add('opt-selected');
            b.innerText = o;
            b.onclick = () => {
                document.querySelectorAll('.opt-btn').forEach(btn => btn.classList.remove('opt-selected'));
                b.classList.add('opt-selected');
                this.tempIdx = i;
                document.getElementById('delta-box').style.display = (i===3?'block':'none');
            };
            box.appendChild(b);
        });
        document.getElementById('delta-input').value = this.responses[this.step]?.txt || '';
    },

    // AGENT DE CORRÉLATION IA : Compare l'analyse libre avec les mots-clés techniques
    analyzeDelta(txt, key) {
        if(!txt) return 0;
        let score = 0;
        const keywords = key.split(' ');
        keywords.forEach(word => {
            if(txt.toLowerCase().includes(word)) score += 33;
        });
        return Math.min(score, 100);
    },

    nextQ() {
        if(this.tempIdx === undefined && !this.responses[this.step]) return;
        const txt = document.getElementById('delta-input').value;
        const q = this.questions[this.step];
        
        let qScore = 0;
        if(this.tempIdx === q.correct) qScore = 20;
        if(this.tempIdx === 3) {
            const aiVal = this.analyzeDelta(txt, q.key);
            qScore = (aiVal / 100) * 20;
            if(aiVal >= 60) this.deltaValid++;
        }

        this.responses[this.step] = { idx: this.tempIdx ?? this.responses[this.step].idx, txt: txt, score: qScore };
        this.updateScore();

        if(this.step < 4) { this.step++; this.tempIdx = undefined; this.loadQ(); }
        else { this.finish(); }
    },

    prevQ() { if(this.step > 0) { this.step--; this.loadQ(); } },

    updateScore() {
        let total = 0;
        this.responses.forEach(r => total += r.score);
        this.score = Math.round(total);
        document.getElementById('audit-score-realtime').innerText = `SCORE ANALYTIQUE IA: ${this.score}%`;
    },

    finish() {
        this.go('p-result');
        const rScore = document.getElementById('res-score');
        const status = document.getElementById('res-status');
        rScore.innerText = `${this.score}%`;

        if(this.score >= 81 && this.deltaValid >= 3) {
            status.innerText = "EXPERT SÉNIOR VALIDÉ"; status.style.color = "var(--gold)";
            document.getElementById('res-msg').innerText = "L'Agent IA confirme une corrélation sémantique élevée (>81%). Votre analyse d'expert est approuvée.";
            document.getElementById('btn-dl').style.display = "inline-block";
            this.prepCert();
        } else {
            status.innerText = "ACCRÉDITATION REFUSÉE"; status.style.color = "#FF4B2B";
            document.getElementById('res-msg').innerText = "Score ou corrélation Delta insuffisants. L'IA n'approuve pas votre vision stratégique pour 2027.";
        }
    },

    prepCert() {
        const name = prompt("NOM DE L'EXPERT :") || "EXPERT V390";
        document.getElementById('pdf-name').innerText = name.toUpperCase();
        document.getElementById('pdf-job').innerText = this.job;
        document.getElementById('pdf-id').innerText = `REF: V390-${Math.random().toString(36).substr(2,9).toUpperCase()}`;
        document.getElementById('pdf-final-score').innerText = `SCORE: ${this.score}%`;
        document.getElementById('pdf-bg').innerHTML = `<i class="fas ${DATA.sectors[this.sector].icon}"></i>`;
        document.getElementById('pdf-qr').innerHTML = '';
        new QRCode(document.getElementById("pdf-qr"), { text: `V390_GOLD|${name}|${this.job}|${this.score}%`, width: 140, height: 140 });
    },

    exportPDF() {
        const el = document.getElementById('cert-container'); el.style.display = 'block';
        html2pdf().set({ margin:0, filename:`V390_CERT_${this.job}.pdf`, jsPDF:{ unit:'px', format:[1122, 793], orientation:'landscape' } })
        .from(el).save().then(() => el.style.display = 'none');
    }
};

KMS.setLang('fr');
</script>
</body>
</html>
