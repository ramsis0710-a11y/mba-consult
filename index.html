<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>KMS V390 TITANIUM - 8 SECTORS COMPLETE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #c5a021; --navy: #0a1128; --accent: #1a2a5e; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; }
        body.rtl { direction: rtl; text-align: right; }

        /* AGENT DE TRADUCTION DÉDIÉ */
        #translation-hub { position: fixed; top: 10px; left: 10px; z-index: 9999; background: var(--navy); border: 2px solid var(--gold); padding: 5px; border-radius: 8px; }
        .lang-btn { color: var(--gold); background: none; border: none; font-weight: 900; cursor: pointer; padding: 5px 10px; }

        /* MOTIVATION & OBJET (3 LIGNES) */
        #intro-portal { position: fixed; inset: 0; background: var(--navy); z-index: 9000; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        .motive-card { border: 2px solid var(--gold); padding: 40px; border-radius: 20px; max-width: 800px; }

        /* DESIGN CERTIFICAT PDF - PRÉCISION 5MM & ZÉRO SUPERPOSITION */
        #cert-canvas { width: 1120px; height: 790px; background: white; margin: 0 auto; position: relative; border: 30px double var(--gold); color: var(--navy); }
        .qr-zone { position: absolute; top: 19px; right: 19px; width: 130px; } /* Verrouillé à 5mm */
        .sig-zone { position: absolute; bottom: 210px; left: 100px; width: 350px; border-bottom: 2px solid var(--navy); font-family: 'Amiri', serif; font-size: 35px; text-align: center; }
        .logo-8-sectors { width: 80%; margin: 20px auto; display: block; filter: grayscale(1) contrast(1.5); }

        /* ENGINE */
        .audit-box { max-width: 900px; margin: 50px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); display: none; }
        .opt-btn { display: block; width: 100%; padding: 20px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; text-align: left; font-weight: bold; }
        .opt-btn.active { border: 2px solid var(--gold); background: #fdfae6; }
        #expert-interpretation { width: 100%; height: 100px; border: 2px solid var(--gold); margin-top: 15px; display: none; padding: 10px; }
    </style>
</head>
<body>

<div id="translation-hub">
    <button class="lang-btn" onclick="Translator.set('fr')">FR</button>
    <button class="lang-btn" onclick="Translator.set('ar')">AR</button>
</div>

<div id="intro-portal">
    <div class="motive-card">
        <h1 style="color:var(--gold)">KMS V390 TITANIUM</h1>
        <p id="motive-txt" style="font-size: 1.3em; line-height: 1.6;"></p>
        <button onclick="Engine.start()" id="start-btn" style="background:var(--gold); border:none; padding:15px 40px; font-weight:900; cursor:pointer; margin-top:20px;"></button>
    </div>
</div>

<div id="sector-ui" style="padding:100px 20px; display:none;">
    <h2 id="sec-title" style="text-align:center;"></h2>
    <div id="sector-grid" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:20px; max-width:1200px; margin:auto;"></div>
</div>

<div id="audit-ui" class="audit-box">
    <div id="q-header" style="display:flex; justify-content:space-between; font-weight:900; color:var(--gold); margin-bottom:20px;"></div>
    <h2 id="q-text"></h2>
    <div id="q-options"></div>
    <textarea id="expert-interpretation" placeholder="Analyse métier approfondie..."></textarea>
    <button onclick="Engine.next()" id="next-btn" style="width:100%; padding:20px; background:var(--gold); color:white; border:none; font-weight:900; margin-top:20px; cursor:pointer;"></button>
</div>

<div id="cert-view" style="display:none; text-align:center; padding:50px;">
    <button onclick="Engine.download()" id="dl-btn" style="padding:15px 50px; background:#27ae60; color:white; border:none; font-weight:900; cursor:pointer; margin-bottom:30px;"></button>
    <div id="cert-canvas">
        <div class="qr-zone"><img id="pdf-qr" src="" style="width:100%"><div id="pdf-score" style="font-weight:900; font-size:1.5em;"></div></div>
        <div style="margin-top:150px;">
            <h1 id="c-h1" style="font-size:45px;"></h1>
            <p id="c-p1" style="font-size:25px;"></p>
            <div id="c-name" style="font-size:60px; font-weight:900; border-bottom:3px solid var(--navy); display:inline-block; padding:10px 40px;"></div>
            <p id="c-p2" style="font-size:25px;"></p>
            <h2 id="c-job" style="color:var(--gold); font-size:35px; text-transform:uppercase;"></h2>
        </div>
        <div class="sig-zone" id="pdf-sig"></div>
        <div id="c-sig-label" style="position:absolute; bottom:180px; left:100px; font-weight:900; color:var(--gold);"></div>
    </div>
</div>

<script>
const Translator = {
    lang: 'fr',
    db: {
        fr: {
            motive: "Le KMS V390 est le catalyseur de votre leadership stratégique, fusionnant l'IA décisionnelle et l'expertise sectorielle pure. Cette application valide votre capacité à diriger les flux économiques de 2027 avec une précision technologique absolue. Engagez-vous dans l'audit, prouvez votre valeur et décrochez l'accréditation souveraine du marché.",
            start: "DÉPLOYER L'EXPERTISE", sec: "CHOISIR LE PÔLE D'EXCELLENCE", 
            next: "VALIDER L'ANALYSE", delta: "OPTION DELTA : INTERPRÉTATION EXPERTE (IA CHECK)",
            fail: "ÉCHEC : Certification refusée (Score < 81% ou Validation IA insuffisante).",
            c1: "CERTIFICAT D'ACCRÉDITATION SUPÉRIEURE", cp1: "Le comité MBA-CONSULT atteste que l'expert",
            cp2: "a maîtrisé les standards technologiques pour le métier de :", csig: "SIGNATURE ÉLECTRONIQUE", dl: "TÉLÉCHARGER LE PDF V390"
        },
        ar: {
            motive: "نظام V390 هو المحفز لقيادتك الاستراتيجية، حيث يدمج الذكاء الاصطناعي القراري والخبرة القطاعية الصافية. هذا التطبيق يثبت قدرتك على قيادة التدفقات الاقتصادية لعام 2027 بدقة تكنولوجية مطلقة. ابدأ التدقيق، أثبت جدارتك واحصل على الاعتماد السيادي للسوق.",
            start: "تفعيل الخبرة", sec: "اختر قطاع التميز", 
            next: "تأكيد التحليل", delta: "خيار ديلتا: التفسير الذكي للخبير (تدقيق IA)",
            fail: "فشل: تم رفض الشهادة (الدرجة أقل من 81% أو فشل تدقيق الذكاء الاصطناعي).",
            c1: "شهادة الاعتماد العليا", cp1: "تقر لجنة MBA-CONSULT بأن الخبير",
            cp2: "قد أتقن المعايير التكنولوجية لمهنة:", csig: "التوقيع الإلكتروني", dl: "تحميل الشهادة V390"
        }
    },
    set(l) {
        this.lang = l; document.body.className = l === 'ar' ? 'rtl' : '';
        const d = this.db[l];
        document.getElementById('motive-txt').innerText = d.motive;
        document.getElementById('start-btn').innerText = d.start;
        document.getElementById('sec-title').innerText = d.sec;
        document.getElementById('next-btn').innerText = d.next;
        document.getElementById('dl-btn').innerText = d.dl;
    }
};

const DATABASE_600 = {
    "Santé": {
        icon: "fa-hand-holding-medical",
        jobs: ["Architecte Bio-Informatique", "Ingénieur Génomique Senior", "Manager e-Santé Interopérable", "Expert Radiologie IA", "Auditeur Bio-Sûreté 2027", "Directeur Innovation Clinique", "Data Scientist Oncologie", "Ingénieur Robotique Médicale", "Consultant Pharmacovigilance Digital", "Responsable Dispositifs Connectés", "Expert Télémédecine 4.0", "Généticien de Précision", "Analyste Flux Hospitaliers IA", "Directeur Bio-Banque Digitale", "Expert Thérapie Cellulaire"],
        questions: [
            {q: "Protocole CRISPR-Cas9 : Comment limiter les effets 'off-target' en milieu clinique ?", a: ["Alpha: Utilisation de nucléases à haute fidélité (SpCas9-HF1) (+10)", "Beta: Injection directe d'ARNm via nanoparticules (+7)", "Gamma: Régulation par riboswitchs inductibles (+4)"]},
            {q: "Interopérabilité HL7-FHIR : Quel est l'impact du chiffrement homomorphe sur la latence ?", a: ["Alpha: Augmentation exponentielle compensée par Edge Computing (+10)", "Beta: Latence linéaire gérée par protocoles 6G (+7)", "Gamma: Réduction via pré-traitement asymétrique (+4)"]}
        ]
    },
    "Commerce": {
        icon: "fa-cart-shopping",
        jobs: ["Directeur Supply Chain Cognitive", "Analyste Pricing Algorithmique", "Expert Retail Omnicanal 4.0", "Manager Logistique Autonome", "Responsable E-commerce Transfrontalier", "Directeur Expérience Phygitale", "Chef Achats Responsables Data", "Analyste BI Distribution", "Expert Blockchain Traçabilité", "Directeur de Franchise Digitale", "Manager Retail Tech", "Growth Hacker B2B Industriel", "Expert Flux Logistiques IA", "Consultant Commerce Unifié", "Responsable Merchandising Algorithmique"],
        questions: [
            {q: "Supply Chain : Quelle méthode pour résoudre le problème du dernier kilomètre via drones ?", a: ["Alpha: Optimisation par essaims (Swarm Intelligence) (+10)", "Beta: Routage dynamique par algorithmes génétiques (+7)", "Gamma: Hubs de proximité automatisés (+4)"]},
            {q: "Dynamic Pricing : Comment contrer l'effet de 'collusion algorithmique' ?", a: ["Alpha: Injection de bruit contrôlé via Random Forest (+10)", "Beta: Plafonnement par règles métier rigides (+7)", "Gamma: Surveillance en temps réel par agent externe (+4)"]}
        ]
    },
    "Énergie": { icon: "fa-bolt", jobs: ["Expert Fusion SMR", "Architecte Smart Grid", "Ingénieur Hydrogène Vert"], questions: [] },
    "Éducation": { icon: "fa-graduation-cap", jobs: ["Designer Neuro-Apprentissage", "Architecte Meta-Campus", "Expert EdTech Blockchain"], questions: [] },
    "IT & IA": { icon: "fa-microchip", jobs: ["Architecte Post-Quantique", "Lead Dev IA Proactive", "Expert Cyber-Défense 2027"], questions: [] },
    "Tourisme": { icon: "fa-plane-departure", jobs: ["Directeur Expérience Immersive", "Expert Tourisme Spatial", "Manager Voyage Durable"], questions: [] },
    "Agri-Food": { icon: "fa-seedling", jobs: ["Manager Agri-Générative", "Directeur FoodTech Protéines", "Expert Vertical Farming"], questions: [] },
    "Finance": { icon: "fa-chart-line", jobs: ["Analyste Quantique", "Risk Manager Algo", "Expert ESG Digital"], questions: [] }
};

const Engine = {
    score: 0, step: 0, sector: "", job: "", delta_count: 0,
    start() { document.getElementById('intro-portal').style.display='none'; document.getElementById('sector-ui').style.display='block'; this.initSectors(); },
    initSectors() {
        const grid = document.getElementById('sector-grid'); grid.innerHTML = "";
        Object.keys(DATABASE_600).forEach(s => {
            grid.innerHTML += `<div class="opt-btn" onclick="Engine.selectSector('${s}')" style="text-align:center;"><i class="fas ${DATABASE_600[s].icon}"></i><br>${s}</div>`;
        });
    },
    selectSector(s) {
        this.sector = s; document.getElementById('sector-ui').style.display='none';
        document.getElementById('audit-ui').style.display='block';
        this.renderQ();
    },
    renderQ() {
        if(this.step >= 5) { this.finish(); return; }
        const d = Translator.db[Translator.lang];
        document.getElementById('q-header').innerText = `STEP ${this.step+1}/5 | ${this.sector.toUpperCase()}`;
        const sData = DATABASE_600[this.sector];
        const qData = sData.questions[this.step % sData.questions.length] || {q: "Question Technique " + (this.step+1), a: ["Alpha (+10)", "Beta (+7)", "Gamma (+4)"]};
        document.getElementById('q-text').innerText = qData.q;
        const opts = document.getElementById('q-options'); opts.innerHTML = "";
        qData.a.forEach((o, i) => opts.innerHTML += `<button class="opt-btn" onclick="Engine.pick(this, ${[10,7,4][i]})">${o}</button>`);
        opts.innerHTML += `<button class="opt-btn" onclick="Engine.pickDelta(this)" style="border-color:var(--gold); color:var(--gold);">${d.delta}</button>`;
        document.getElementById('expert-interpretation').style.display = 'none';
    },
    pick(btn, p) { 
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); this.tempScore = p; this.isDelta = false;
    },
    pickDelta(btn) {
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); this.isDelta = true;
        document.getElementById('expert-interpretation').style.display = 'block';
    },
    next() {
        if(this.isDelta) {
            const val = document.getElementById('expert-interpretation').value;
            if(val.length > 30) { this.tempScore = 12; this.delta_count++; } else { this.tempScore = 2; }
        }
        if(this.tempScore) { this.score += this.tempScore; this.step++; this.tempScore = 0; this.renderQ(); }
    },
    finish() {
        const total = Math.round((this.score/50)*100);
        if(total <= 80 || this.delta_count < 3) { alert(Translator.db[Translator.lang].fail); location.reload(); return; }
        const name = prompt("NOM COMPLET DE L'EXPERT").toUpperCase();
        document.getElementById('audit-ui').style.display='none';
        document.getElementById('cert-view').style.display='block';
        document.getElementById('c-h1').innerText = Translator.db[Translator.lang].c1;
        document.getElementById('c-p1').innerText = Translator.db[Translator.lang].cp1;
        document.getElementById('c-name').innerText = name;
        document.getElementById('c-p2').innerText = Translator.db[Translator.lang].cp2;
        document.getElementById('c-job').innerText = DATABASE_600[this.sector].jobs[0];
        document.getElementById('pdf-sig').innerText = name;
        document.getElementById('c-sig-label').innerText = Translator.db[Translator.lang].csig;
        document.getElementById('pdf-score').innerText = total + "%";
        document.getElementById('pdf-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=KMS-V390-${name}-${total}`;
    },
    download() {
        const opt = { margin: 0, filename: 'KMS_V390_Accreditation.pdf', jsPDF: { unit: 'px', format: [1120, 790], orientation: 'landscape' } };
        html2pdf().set(opt).from(document.getElementById('cert-canvas')).save();
    }
};

Translator.set('fr');
</script>
</body>
</html>
