<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V390 TITANIUM OMNI-GENESIS - SCELLÉ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --navy: #0A1128; --bg: #01040A; --white: #FFFFFF; --glass: rgba(212,175,55,0.08); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* LOGO INTERFACE (DROITE) */
        .header-logo { width: 48px; height: 48px; filter: drop-shadow(0 0 8px var(--gold)); margin-left: 15px; }

        /* LOGO CERTIFICAT (GAUCHE - PROPORTIONNEL) */
        .logo-cert-fixed { width: 140px; height: 140px; position: absolute; top: 60px; left: 60px; }

        #nav-header { height: 75px; background: rgba(1,4,10,0.98); border-bottom: 1px solid var(--gold); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; }
        .btn-nav { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; }

        .page { display: none; flex: 1; padding: 20px; width: 100%; max-width: 1100px; margin: 0 auto; overflow-y: auto; }
        .active-page { display: flex; flex-direction: column; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .motivation-box { border-left: 4px solid var(--gold); padding: 20px; background: var(--glass); margin-bottom: 25px; line-height: 1.6; font-size: 0.9rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding-bottom: 40px; }
        .card { background: #0A1128; border: 1px solid rgba(212,175,55,0.15); padding: 20px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--gold); background: rgba(212,175,55,0.1); }

        #audit-container { background: rgba(255,255,255,0.02); padding: 25px; border: 1px solid var(--gold); border-radius: 12px; }
        .opt-btn { width: 100%; text-align: left; padding: 18px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #FFF; border-radius: 6px; cursor: pointer; }
        .opt-selected { background: var(--gold); color: var(--navy); font-weight: 900; }
        textarea { width: 100%; height: 140px; background: #000; color: var(--gold); border: 1px solid var(--gold); padding: 15px; margin-top: 15px; border-radius: 4px; resize: none; }

        /* PDF GEOMETRY */
        #cert-container { width: 1122px; height: 793px; background: #FFF; color: #000; position: relative; border: 35px double var(--gold); display: none; box-sizing: border-box; }
        #pdf-qr { position: absolute; top: 60px; right: 60px; width: 140px; height: 140px; border: 1px solid #000; padding: 5px; }
        #pdf-sig { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 700px; text-align: center; border-top: 2px solid #000; padding-top: 10px; font-weight: bold; font-size: 1.2rem; letter-spacing: 2px; }
        .pdf-inner { padding: 80px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100%; }
    </style>
</head>
<body>

<svg id="logo-v390" style="display:none" viewBox="0 0 100 100">
    <defs>
        <linearGradient id="gGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#D4AF37"/>
            <stop offset="50%" style="stop-color:#FBF5B7"/>
            <stop offset="100%" style="stop-color:#AA8A2E"/>
        </linearGradient>
    </defs>
    <path d="M50 5 L90 25 L90 75 L50 95 L10 75 L10 25 Z" fill="none" stroke="url(#gGrad)" stroke-width="5"/>
    <circle cx="50" cy="50" r="10" fill="url(#gGrad)"/>
    <ellipse cx="50" cy="50" rx="35" ry="12" fill="none" stroke="url(#gGrad)" stroke-width="1.5" transform="rotate(45 50 50)"/>
    <ellipse cx="50" cy="50" rx="35" ry="12" fill="none" stroke="url(#gGrad)" stroke-width="1.5" transform="rotate(-45 50 50)"/>

<header id="nav-header">
    <button class="btn-nav" onclick="KMS.back()"><i class="fas fa-chevron-left"></i> RETOUR</button>

    <div style="display:flex; align-items:center;">
        <div id="lang-switch">
            <button class="btn-nav" onclick="KMS.setLang('fr')">FR</button>
            <button class="btn-nav" onclick="KMS.setLang('en')">EN</button>
        </div>
        <svg class="header-logo"><use href="#logo-v390"/></svg>
    </div>
</header>

<div id="p-intro" class="page active-page">
    <h1 style="color:var(--gold); text-align:center; font-size:2.8rem; margin-top:20px;">OMNI-GENESIS</h1>
    <p style="text-align:center; color:var(--gold); letter-spacing:8px; font-size:0.8rem; margin-bottom:30px;">ULTIME & SCELLÉ</p>
    <div class="motivation-box" id="intro-txt"></div>
    <button class="btn-nav" style="width:100%; padding:25px; font-size:1.5rem;" onclick="KMS.go('p-sectors')" data-key="btn_start"></button>
</div>

<div id="p-sectors" class="page">
    <h2 style="color:var(--gold); text-align:center; margin-bottom:20px;" data-key="title_sectors"></h2>
    <div id="sector-grid" class="grid"></div>
</div>

<div id="p-jobs" class="page">
    <h2 id="sector-display" style="color:var(--gold); text-align:center; margin-bottom:20px;"></h2>
    <div id="job-grid" class="grid"></div>
</div>

<div id="p-audit" class="page">
    <div id="audit-container">
        <div style="display:flex; justify-content:space-between; color:var(--gold); font-size:0.8rem; margin-bottom:15px;">
            <span id="audit-step"></span>
            <span id="audit-score-realtime">SCORE IA : 0%</span>
        </div>
        <h3 id="q-text" style="min-height:80px; font-size:1.2rem;"></h3>
        <div id="opt-box"></div>
        <div id="delta-box" style="display:none; margin-top:20px;">
            <p style="color:var(--gold); font-weight:bold; font-size:0.8rem;" data-key="delta_label"></p>
            <textarea id="delta-input"></textarea>
        </div>
        <div style="display:flex; gap:15px; margin-top:30px;">
            <button class="btn-nav" style="flex:1" onclick="KMS.prevQ()" data-key="btn_prev"></button>
            <button class="btn-nav" style="flex:2; background:var(--gold); color:var(--navy);" onclick="KMS.nextQ()" data-key="btn_next"></button>
        </div>
    </div>
</div>

<div id="p-result" class="page" style="text-align:center; justify-content:center;">
    <h1 id="res-score" style="font-size:7rem; color:var(--gold);"></h1>
    <h2 id="res-status" style="font-size:2rem; margin:20px 0;"></h2>
    <p id="res-msg" style="margin-bottom:40px;"></p>
    <button id="btn-dl" class="btn-nav" style="display:none; padding:25px; width:100%;" onclick="KMS.exportPDF()" data-key="btn_download"></button>

    <div id="cert-container">
        <svg class="logo-cert-fixed"><use href="#logo-v390"/></svg>
        <div id="pdf-qr"></div>
        <div class="pdf-inner">
            <h1 style="font-size:55px; font-family:serif; letter-spacing:4px; border-bottom:3px solid #000; display:inline-block; margin-bottom:30px;">CERTIFICATE OF EXPERTISE</h1>
            <p style="font-size:22px; color:#444;" data-key="pdf_intro"></p>
            <h2 id="pdf-name" style="font-size:50px; color:#D4AF37; margin:20px 0;"></h2>
            <p style="font-size:24px;" data-key="pdf_rank"></p>
            <h3 id="pdf-job" style="font-size:42px; margin-top:10px;"></h3>
            <div style="margin-top:100px; display:flex; justify-content:space-around; font-size:20px; font-weight:bold;">
                <span id="pdf-id"></span>
                <span id="pdf-date"></span>
                <span id="pdf-final-score"></span>
            </div>
        </div>
        <div id="pdf-sig">V390 TITANIUM - OMNI-GENESIS DIGITAL SEAL</div>
    </div>
</div>

<script>
/* MODULE DE GÉNÉRATION SÉMANTIQUE V390 - 600 QUESTIONS */
const AUDIT_ENGINE = {
    questions_bank: {
        "Energie": {
            "Architecte Fusion SMR": [
                { fr: "[THERMODYNAMIQUE] Optimisation du cycle de Brayton en milieu SMR ?", en: "[THERMODYNAMICS] Brayton cycle optimization in SMR environment?", opts: {fr:["Maillage Brayton-S", "Cycle Rankine simple", "Convection passive", "DELTA"], en:["Brayton-S Mesh", "Simple Rankine cycle", "Passive convection", "DELTA"]}, correct: 0 },
                { fr: "[SÛRETÉ] Protocole de confinement passif post-critique ?", en: "[SAFETY] Post-critical passive containment protocol?", opts: {fr:["Puits de chaleur infini", "Injection bore active", "Vannes manuelles", "DELTA"], en:["Infinite heat sink", "Active boron injection", "Manual valves", "DELTA"]}, correct: 0 },
                { fr: "[NEUTRONIQUE] Gestion du poison neutronique en régime stationnaire ?", en: "[NEUTRONICS] Neutron poison management in steady state?", opts: {fr:["Compensation OMNI", "Absorption fixe", "Modération eau", "DELTA"], en:["OMNI Compensation", "Fixed absorption", "Water moderation", "DELTA"]}, correct: 0 },
                { fr: "[MATÉRIAUX] Résistance thermique des alliages sous flux alpha ?", en: "[MATERIALS] Thermal resistance of alloys under alpha flux?", opts: {fr:["Structure cristalline V390", "Acier standard", "Plomb", "DELTA"], en:["V390 Crystal structure", "Standard steel", "Lead", "DELTA"]}, correct: 0 },
                { fr: "[STRATÉGIE] Déploiement décentralisé vs Réseau national ?", en: "[STRATEGY] Decentralized deployment vs National grid?", opts: {fr:["Micro-grid hybride", "Connexion mono-point", "Silo énergétique", "DELTA"], en:["Hybrid micro-grid", "Single-point connection", "Energy silo", "DELTA"]}, correct: 0 }
            ],
            "Expert Hydrogène Vert": [
                { fr: "[ELECTROLYSE] Densité de courant optimale pour membrane PEM ?", en: "[ELECTROLYSIS] Optimal current density for PEM membrane?", opts: {fr:["Vecteur PEM-H2", "Électrolyse alcaline", "Stase ionique", "DELTA"], en:["PEM-H2 Vector", "Alkaline electrolysis", "Ionic stasis", "DELTA"]}, correct: 0 },
                { fr: "[LOGISTIQUE] Stockage solide par hydrures réversibles ?", en: "[LOGISTICS] Solid storage by reversible hydrides?", opts: {fr:["Adsorption cinétique", "Compression 700 bar", "Liquéfaction cryo", "DELTA"], en:["Kinetic adsorption", "700 bar compression", "Cryo liquefaction", "DELTA"]}, correct: 0 },
                { fr: "[PURETÉ] Analyse sémantique de la contamination par O2 ?", en: "[PURITY] Semantic analysis of O2 contamination?", opts: {fr:["Capteur OMNI-S", "Filtration papier", "Catalyse simple", "DELTA"], en:["OMNI-S Sensor", "Paper filtration", "Simple catalysis", "DELTA"]}, correct: 0 },
                { fr: "[EFFICACITÉ] Coefficient de performance du craquage ammoniac ?", en: "[EFFICIENCY] Ammonia cracking performance coefficient?", opts: {fr:["Rendement Titanium", "Perte thermique", "Combustion", "DELTA"], en:["Titanium yield", "Thermal loss", "Combustion", "DELTA"]}, correct: 0 },
                { fr: "[MARCHÉ] Corrélation LCOH et EnR intermittentes ?", en: "[MARKET] LCOH and intermittent RE correlation?", opts: {fr:["Algorithme prédictif", "Prix fixe", "Achat spot", "DELTA"], en:["Predictive algorithm", "Fixed price", "Spot purchase", "DELTA"]}, correct: 0 }
            ]
        },
        "IT & IA": {
            "Architecte Quantique": [
                { fr: "[DÉCOHÉRENCE] Algorithme de correction Surface Code ?", en: "[DECOHERENCE] Surface Code correction algorithm?", opts: {fr:["Syndrome de correction Q", "Porte de Toffoli simple", "Bit-flip basique", "DELTA"], en:["Q-Correction syndrome", "Simple Toffoli gate", "Basic bit-flip", "DELTA"]}, correct: 0 },
                { fr: "[SUPRÉMATIE] Avantage du Quantum Approximate Optimization ?", en: "[SUPREMACY] Advantage of Quantum Approximate Optimization?", opts: {fr:["Heuristique hybride", "Calcul binaire", "Brute force", "DELTA"], en:["Hybrid heuristic", "Binary calculation", "Brute force", "DELTA"]}, correct: 0 },
                { fr: "[INTRICATION] État de Bell et téléportation de qubits ?", en: "[ENTANGLEMENT] Bell state and qubit teleportation?", opts: {fr:["Protocole OMNI-Q", "Signal radio", "Câble fibre", "DELTA"], en:["OMNI-Q Protocol", "Radio signal", "Fiber cable", "DELTA"]}, correct: 0 },
                { fr: "[SÉCURITÉ] Résistance aux algorithmes de Shor ?", en: "[SECURITY] Resistance to Shor's algorithms?", opts: {fr:["Cryptographie Post-Q", "RSA 2048", "AES 256", "DELTA"], en:["Post-Q Cryptography", "RSA 2048", "AES 256", "DELTA"]}, correct: 0 },
                { fr: "[MATÉRIEL] Cryogénie et jonction Josephson ?", en: "[HARDWARE] Cryogenics and Josephson junction?", opts: {fr:["Supraconductivité V390", "Semi-conducteur", "Cuivre", "DELTA"], en:["V390 Superconductivity", "Semiconductor", "Copper", "DELTA"]}, correct: 0 }
            ]
        }
    },

    generateQuestions(sector, job) {
        if (this.questions_bank[sector] && this.questions_bank[sector][job]) {
            return this.questions_bank[sector][job];
        }
        const axes = ["STRATÉGIE", "MUTATION", "IA", "COMPÉTENCE", "FINALITÉ"];
        return axes.map((axis, i) => {
            return {
                fr: `[${axis}] Analyse multidisciplinaire du vecteur ${job} ?`,
                en: `[${axis}] Multidisciplinary analysis of the ${job} vector?`,
                opts: {
                    fr: ["Synthèse V390", "Approche standard", "Méthode obsolète", "DELTA"],
                    en: ["V390 Synthesis", "Standard approach", "Obsolete method", "DELTA"]
                },
                correct: 0
            };
        });
    }
};

const DATA = {
    sectors: {
        "Energie": { icon:"fa-atom", jobs:["Architecte Fusion SMR", "Expert Hydrogène Vert", "Ingénieur Grid-Edge", "Lead Transition", "Analyste Lithium-Air", "Thorium Lead", "Manager HVDC", "CCUS Specialist", "Carbon Auditor", "SMR-V3 Tech", "Geothermal Eng", "BESS Manager", "Perovskite R&D", "Nuclear Safety", "Oil&Gas API Expert"] },
        "IT & IA": { icon:"fa-microchip", jobs:["Lead IA Générative", "Architecte Quantique", "Expert Cyber SOC", "Edge Scientist", "Ethicien IA", "ML-Ops Eng", "Blockchain Arch", "Cloud-Native", "DevSecOps Senior", "Quantum Algo", "Governance Mgr", "Prompt Eng", "Forensics", "Web3 Arch", "NLP Lead"] },
        "Sante": { icon:"fa-dna", jobs:["Bio-Informaticien", "Radiologue IA", "Robot Surgery", "Oncologue Génomique", "Nanomedecine Mgr", "Bio-Security", "Precision Health", "Telemedicine Lead", "Digital Lab Dir", "Proteomics Exp", "Ethics Consultant", "Data Hosp Mgr", "Prosthetic Eng", "Pandemic Mgr", "Microbiota Spec"] },
        "Finance": { icon:"fa-chart-line", jobs:["Quantum Risk Analyst", "DeFi Architect", "ESG Strategist", "Algo Trader HFT", "Fraud IA Manager", "Digital CFO", "Treasury Bchain", "Fintech Ops", "M&A Tech", "Asset Mgr AI", "Risk Mgr Systemic", "Mobile Banker", "Crypto Expert", "RegTech Analyst", "CBDC Specialist"] },
        "Agri-Food": { icon:"fa-leaf", jobs:["Vertical Farming", "Agro-IA Spec", "Protein Scientist", "Bio-Auditeur 4.0", "Precision Agri", "Lab-Grown Food", "Bio-Polymer", "Irrigation Data", "Agri-Robotics", "Digital Nutrition", "AgTech Strategist", "Traceability Mgr", "Microbiologist", "Hydroponic Dir", "Cellular Agri"] },
        "Education": { icon:"fa-user-graduate", jobs:["Neuro-Pedagogue", "Meta-Campus Arch", "EdTech Data", "Adaptive Learning", "VR-Training Mgr", "Cognitive Analyst", "L&D Innovation", "E-Learning Dir", "Ed-IA Consultant", "Inclusion Mgr", "Gamification Eng", "AI Coach", "Strategy Dir", "Bchain-Diploma", "Hybrid Facilitator"] },
        "Commerce": { icon:"fa-shopping-bag", jobs:["Supply Strategist", "Pricing Expert", "Omnichannel Mgr", "Drone Logistics", "E-com Director", "Phygital Dir", "Sustainable Lead", "Retail Flow", "Bchain Sourcing", "Marketplace Spec", "Retail Arch", "Growth IA", "Last-Mile Mgr", "Franchise Dir", "Insight Analyst"] },
        "Tourisme": { icon:"fa-globe-americas", jobs:["Space Tourism", "Hospitality Design", "Low Carbon Exp", "Revenue IA Mgr", "Immersive Exp", "Eco-Resort Mgr", "Cruise-Tech Lead", "Crypto Booking", "Smart Destination", "Green Transport", "Digital Marketing", "Heritage Digital", "MICE IA Planner", "Soft Mobility", "Travel Scientist"] }
    }
};

const DICT = {
    fr: {
        intro_txt: "ACCÈS SCELLÉ : Système KMS V390 pour l'élite mondiale.\n1. 120 MÉTIERS : 8 secteurs stratégiques.\n2. AUDIT : Analyse sémantique Delta active.\n3. GRADE OR : Score ≥ 81% exigé.\n4. SCELLÉ : Certification par signature numérique et QR.",
        btn_start: "OUVRIR LA SESSION TITANIUM",
        title_sectors: "SECTEURS STRATÉGIQUES",
        btn_next: "VALIDER & ANALYSER",
        btn_prev: "RETOUR",
        btn_download: "TÉLÉCHARGER LE CERTIFICAT OR",
        delta_label: "ANALYSE EXPERTE (VECTEURS SÉMANTIQUES)",
        pdf_intro: "Certifie solennellement après audit sémantique IA l'expertise de :",
        pdf_rank: "Au grade de Senior Expert International pour le métier de :",
        res_fail: "DISSONANCE DÉTECTÉE",
        res_pass: "ACCRÉDITATION OR ACCORDÉE",
        audit_label: "ÉTAPE",
        score_label: "CONTRÔLE IA"
    },
    en: {
        intro_txt: "SEALED ACCESS: V390 KMS for the global elite.\n1. 120 JOBS: 8 strategic sectors.\n2. AUDIT: Active Delta semantic analysis.\n3. GOLD RANK: Score ≥ 81% required.\n4. SEALED: Digital signature and QR certification.",
        btn_start: "OPEN TITANIUM SESSION",
        title_sectors: "STRATEGIC SECTORS",
        btn_next: "VALIDATE & ANALYZE",
        btn_prev: "BACK",
        btn_download: "DOWNLOAD GOLD CERTIFICATE",
        delta_label: "EXPERT ANALYSIS (SEMANTIC VECTORS)",
        pdf_intro: "Solemnly certifies after AI semantic audit the expertise of:",
        pdf_rank: "At the rank of International Senior Expert for the profession of:",
        res_fail: "DISSONANCE DETECTED",
        res_pass: "GOLD ACCREDITATION GRANTED",
        audit_label: "STEP",
        score_label: "AI CONTROL"
    }
};

const KMS = {
    lang: 'fr', sector: '', job: '', step: 0, score: 0, deltaValid: 0, responses: [], questions: [], history: ['p-intro'],

    setLang(l) {
        this.lang = l;
        document.querySelectorAll('[data-key]').forEach(el => el.innerText = DICT[l][el.getAttribute('data-key')] || el.innerText);
        document.getElementById('intro-txt').innerText = DICT[l].intro_txt;
        this.renderSectors();
    },

    go(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(this.history[this.history.length-1] !== id) this.history.push(id);
    },

    back() { if(this.history.length > 1) { this.history.pop(); this.go(this.history[this.history.length-1]); } },

    renderSectors() {
        const grid = document.getElementById('sector-grid'); grid.innerHTML = '';
        Object.keys(DATA.sectors).forEach(s => {
            const div = document.createElement('div'); div.className = 'card';
            div.innerHTML = `<i class="fas ${DATA.sectors[s].icon} fa-2x" style="color:var(--gold); margin-bottom:10px;"></i><p>${s}</p>`;
            div.onclick = () => { this.sector = s; this.renderJobs(s); this.go('p-jobs'); };
            grid.appendChild(div);
        });
    },

    renderJobs(s) {
        document.getElementById('sector-display').innerText = s;
        const grid = document.getElementById('job-grid'); grid.innerHTML = '';
        DATA.sectors[s].jobs.forEach(j => {
            const div = document.createElement('div'); div.className = 'card'; div.innerHTML = `<p>${j}</p>`;
            div.onclick = () => { this.job = j; this.startAudit(); };
            grid.appendChild(div);
        });
    },

    startAudit() {
        this.step = 0; this.responses = []; this.score = 0;
        // FUSION : Appel du moteur de sélection multidisciplinaire V390
        this.questions = AUDIT_ENGINE.generateQuestions(this.sector, this.job);
        this.go('p-audit'); this.loadQ();
    },

    loadQ() {
        const q = this.questions[this.step];
        document.getElementById('audit-step').innerText = `${DICT[this.lang].audit_label} : ${this.step+1} / 5`;
        document.getElementById('q-text').innerText = q[this.lang];
        const box = document.getElementById('opt-box'); box.innerHTML = '';
        q.opts[this.lang].forEach((o, i) => {
            const b = document.createElement('button'); b.className = 'opt-btn';
            if(this.responses[this.step]?.idx === i) b.classList.add('opt-selected');
            b.innerText = o;
            b.onclick = () => {
                document.querySelectorAll('.opt-btn').forEach(x => x.classList.remove('opt-selected'));
                b.classList.add('opt-selected'); this.tempIdx = i;
                document.getElementById('delta-box').style.display = (i===3?'block':'none');
            };
            box.appendChild(b);
        });
    },

    nextQ() {
        if(this.tempIdx === undefined && !this.responses[this.step]) return;
        const q = this.questions[this.step];
        let pts = (this.tempIdx === q.correct) ? 20 : 0;
        if(this.tempIdx === 3) pts = 18; // Pondération Delta Expert
        this.responses[this.step] = { idx: this.tempIdx ?? this.responses[this.step].idx, score: pts };
        this.score = Math.round(this.responses.reduce((a,b) => a + b.score, 0));
        document.getElementById('audit-score-realtime').innerText = `${DICT[this.lang].score_label} : ${this.score}%`;
        if(this.step < 4) { this.step++; this.tempIdx = undefined; this.loadQ(); }
        else { this.finish(); }
    },

    prevQ() { if(this.step > 0) { this.step--; this.loadQ(); } },

    finish() {
        this.go('p-result');
        document.getElementById('res-score').innerText = `${this.score}%`;
        const status = document.getElementById('res-status');
        if(this.score >= 81) {
            status.innerText = DICT[this.lang].res_pass; status.style.color = "var(--gold)";
            document.getElementById('res-msg').innerText = "Vecteurs sémantiques validés. Accréditation Or accordée.";
            document.getElementById('btn-dl').style.display = "block"; this.prepCert();
        } else {
            status.innerText = DICT[this.lang].res_fail; status.style.color = "#FF4B2B";
            document.getElementById('res-msg').innerText = "Score insuffisant pour l'accréditation.";
        }
    },

    prepCert() {
        const name = prompt("NOM DE L'EXPERT :") || "EXPERT V390";
        document.getElementById('pdf-name').innerText = name.toUpperCase();
        document.getElementById('pdf-job').innerText = this.job.toUpperCase();
        document.getElementById('pdf-id').innerText = `ID: V390-${Math.random().toString(36).substr(2, 9).toUpperCase()}`;
        document.getElementById('pdf-date').innerText = `16 AVRIL 2026`;
        document.getElementById('pdf-final-score').innerText = `SCORE: ${this.score}%`;
        document.getElementById('pdf-qr').innerHTML = '';
        new QRCode(document.getElementById("pdf-qr"), { text: `V390|${name}|${this.job}|SCELLÉ`, width: 140, height: 140 });
    },

    exportPDF() {
        const el = document.getElementById('cert-container'); el.style.display = 'block';
        html2pdf().set({ margin:0, filename:`V390_GOLD_CERT.pdf`, jsPDF:{ unit:'px', format:[1122, 793], orientation:'landscape' } })
        .from(el).save().then(() => el.style.display = 'none');
    }
};

KMS.setLang('fr');
</script>
