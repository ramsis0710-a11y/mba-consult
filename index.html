<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>MBA-CONSULT KMS V390 ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #c5a021; --navy: #0a1128; --accent: #1a2a5e; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; margin: 0; transition: 0.4s; }
        body.rtl { direction: rtl; font-family: 'Amiri', serif; }

        /* TRANSLATION AGENT HUB */
        #translation-agent { position: fixed; top: 15px; left: 15px; z-index: 10000; background: var(--navy); border: 1px solid var(--gold); padding: 5px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .lang-btn { background: none; border: 1px solid transparent; color: var(--gold); padding: 8px 15px; cursor: pointer; font-weight: 900; transition: 0.2s; }
        .lang-btn.active { border-color: var(--gold); background: var(--accent); }

        /* HERO MOTIVATION V390 */
        #hero-portal { position: fixed; inset: 0; background: var(--navy); z-index: 9000; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        .promo-container { border: 2px solid var(--gold); padding: 50px; border-radius: 20px; max-width: 800px; background: rgba(10, 17, 40, 0.9); }

        /* CERTIFICAT V390 - PRECISION 5MM */
        #cert-canvas { width: 1120px; height: 790px; background: white; margin: 0 auto; position: relative; border: 30px double var(--gold); color: var(--navy); overflow: hidden; }
        .qr-anchor { position: absolute; top: 19px; right: 19px; width: 140px; text-align: center; } /* 19px = 5mm approx */
        .qr-anchor img { width: 120px; border: 1px solid #f0f0f0; }

        /* SIGNATURES REHAUSSÉES */
        .signature-row { position: absolute; bottom: 180px; left: 80px; right: 80px; display: flex; justify-content: space-between; align-items: flex-end; }
        .sig-line { border-bottom: 2px solid var(--navy); width: 250px; font-family: 'Amiri'; font-size: 26px; text-align: center; padding-bottom: 5px; }

        /* AUDIT INTERFACE */
        .audit-container { max-width: 900px; margin: 40px auto; background: white; padding: 45px; border-radius: 12px; box-shadow: 0 25px 60px rgba(0,0,0,0.1); display: none; }
        .q-option { display: block; width: 100%; padding: 20px; margin: 12px 0; border: 1px solid #ddd; border-radius: 8px; text-align: left; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .q-option.selected { border-color: var(--gold); background: #fffdf2; border-width: 2px; }
        #delta-expert-input { width: 100%; height: 130px; margin-top: 20px; border: 2px solid var(--gold); border-radius: 8px; padding: 15px; display: none; font-family: 'Inter'; }
    </style>
</head>
<body>

<div id="translation-agent">
    <button class="lang-btn" onclick="KmsTranslator.apply('fr')">FR</button>
    <button class="lang-btn" onclick="KmsTranslator.apply('ar')">AR</button>
    <button class="lang-btn" onclick="KmsTranslator.apply('en')">EN</button>
</div>

<div id="hero-portal">
    <div class="promo-container">
        <h1 style="font-family:'Cinzel'; color:var(--gold); font-size: 4em; margin:0;">V390 FINALE</h1>
        <p id="motto-box" style="font-size: 1.4em; line-height: 1.8; margin: 30px 0; font-weight: 300;"></p>
        <button onclick="document.getElementById('hero-portal').style.display='none'" id="launch-btn" style="background:var(--gold); color:var(--navy); border:none; padding:20px 60px; font-weight:900; cursor:pointer; font-size: 1.2em; border-radius: 5px;"></button>
    </div>
</div>

<div id="sector-view" style="padding:60px 20px;">
    <h2 id="sec-head" style="text-align:center; font-family:'Cinzel'; color:var(--navy); font-size: 2.5em; margin-bottom:40px;"></h2>
    <div id="sector-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:25px; max-width:1200px; margin:0 auto;"></div>
</div>

<div id="job-view" style="display:none; padding:60px 20px;">
    <h2 id="job-head" style="text-align:center; font-family:'Cinzel'; color:var(--navy);"></h2>
    <div id="job-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap:15px; max-width:1200px; margin:0 auto;"></div>
</div>

<div id="audit-engine" class="audit-container">
    <div style="display:flex; justify-content:space-between; color:var(--gold); font-weight:900; font-size:1.2em; margin-bottom:30px;">
        <span id="step-indicator"></span>
        <span id="job-badge" style="text-transform:uppercase; letter-spacing:1px;"></span>
    </div>
    <h2 id="question-text" style="line-height:1.5; font-size:1.7em;"></h2>
    <div id="options-v390"></div>
    <textarea id="delta-expert-input"></textarea>
    <button id="submit-btn" onclick="KmsEngine.validateStep()" style="width:100%; padding:22px; background:var(--gold); color:white; border:none; margin-top:25px; font-weight:900; cursor:pointer; font-size:1.1em; border-radius:6px;"></button>
</div>

<div id="result-view" style="display:none; text-align:center; padding:50px 0;">
    <button onclick="KmsEngine.generatePDF()" id="pdf-trigger" style="padding:18px 50px; background:#27ae60; color:white; border:none; font-weight:900; cursor:pointer; margin-bottom:30px; border-radius:5px;"></button>
    <div id="cert-canvas">
        <div class="qr-anchor">
            <img id="final-qr" src="">
            <div id="final-score-tag" style="font-weight:900; font-size:1.8em; margin-top:8px; color:var(--navy);"></div>
        </div>
        <div style="margin-top:110px; text-align:center; font-family:'Cinzel';">
            <h1 id="c-title" style="font-size:48px; margin:0;"></h1>
            <div id="c-subtitle" style="letter-spacing:12px; color:var(--gold); font-weight:bold; font-size:14px; margin-top:5px;"></div>
            <p id="c-intro" style="font-size:24px; margin-top:50px;"></p>
            <div id="c-expert-name" style="font-family:'Amiri'; font-size:55px; border-bottom:4px solid var(--navy); display:inline-block; padding:0 40px; margin:25px 0;"></div>
            <p id="c-desc" style="font-size:24px;"></p>
            <div id="c-final-job" style="color:var(--gold); font-size:34px; font-weight:900; text-transform:uppercase;"></div>
        </div>
        <div class="signature-row">
            <div>
                <div class="sig-line" id="sig-expert-val"></div>
                <div id="sig-label-expert" style="color:var(--gold); font-weight:900; font-size:14px; margin-top:10px;"></div>
            </div>
            <div style="text-align:right;">
                <div id="sig-board-val" style="color:var(--gold); font-weight:900; font-family:'Cinzel'; font-size:18px;"></div>
                <div style="border-bottom:2px solid var(--navy); width:250px; margin-top:10px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
const KmsTranslator = {
    current: 'fr',
    map: {
        fr: {
            motto: "MBA-CONSULT V390 : L'outil de certification souverain conçu pour l'élite mondiale. Transformez vos acquis techniques en une accréditation stratégique certifiée par IA. Relevez le défi des 8 secteurs et validez votre expertise pour 2027.",
            launch: "DÉPLOYER L'AUDIT", secH: "PÔLES D'EXCELLENCE", jobH: "MÉTIER CIBLE",
            btn: "VALIDER L'ÉTAPE TECHNIQUE", step: "PHASE", delta: "Option Delta : Analyse de l'Expert (Interprétation IA)",
            cTitle: "CERTIFICAT D'ACCRÉDITATION STRATÉGIQUE", cSub: "WORLDWIDE TECHNICAL STANDARD V390", cIntro: "Le Conseil certifie officiellement que l'expert",
            cDesc: "A validé avec distinction les compétences requises pour le poste de :", cSig: "SIGNATURE ÉLECTRONIQUE SÉCURISÉE",
            cBoard: "CHAIRMAN MBA-CONSULT", pdf: "GÉNÉRER LE CERTIFICAT OFFICIEL", fail: "CERTIFICATION ÉCHOUÉE : Score ≤ 80% ou validation IA Delta (3/5) non atteinte."
        },
        ar: {
            motto: "MBA-CONSULT V390: أداة الاعتماد السيادية المصممة للنخبة العالمية. حول مهاراتك التقنية إلى اعتماد استراتيجي معتمد من الذكاء الاصطناعي. واجه تحدي القطاعات الثمانية ووثق خبرتك لعام 2027.",
            launch: "بدء التدقيق الاستراتيجي", secH: "أقطاب التميز المهني", jobH: "التخصص المستهدف",
            btn: "تأكيد الخطوة التقنية", step: "مرحلة", delta: "خيار ديلتا: تحليل الخبير (تدقيق الذكاء الاصطناعي)",
            cTitle: "شهادة الاعتماد الاستراتيجي", cSub: "المعيار التقني العالمي V390", cIntro: "يقر المجلس رسمياً بأن الخبير",
            cDesc: "قد اجتاز بامتياز الكفاءات المطلوبة لمهنة:", cSig: "التوقيع الإلكتروني المؤمن",
            cBoard: "رئيس مجلس MBA-CONSULT", pdf: "تحميل الشهادة الرسمية V390", fail: "فشل الاعتماد: الدرجة أقل من 81% أو فشل تدقيق الذكاء الاصطناعي."
        }
    },
    apply(l) {
        this.current = l; document.body.className = (l==='ar'?'rtl':'');
        const d = this.map[l] || this.map['fr'];
        document.getElementById('motto-box').innerText = d.motto;
        document.getElementById('launch-btn').innerText = d.launch;
        document.getElementById('sec-head').innerText = d.secH;
        document.getElementById('job-head').innerText = d.jobH;
        document.getElementById('submit-btn').innerText = d.btn;
        document.getElementById('pdf-trigger').innerText = d.pdf;
        KmsEngine.renderSectors();
    }
};

const SECTOR_DATA = {
    "Santé": { icon: "fa-vial-circle-check", jobs: ["Architecte Bio-Informatique", "Directeur Innovation Clinique", "Expert Télémédecine 2027", "Data Scientist Oncologie", "Auditeur Cyber-Santé", "Manager de Bio-Banque", "Ingénieur Prothèse Bionique", "Pharmacien Industriel 4.0", "Chef de Projet e-Santé", "Spécialiste IA Radiologique", "Consultant Épidémiologie", "Directeur Opérationnel Hôpital", "Expert Pharmacovigilance", "Généticien de Précision", "Responsable Dispositifs Médicaux"] },
    "Commerce": { icon: "fa-cart-flatbed-suitcases", jobs: ["Directeur Supply Chain IA", "Expert Retail Omnicanal", "Analyste Pricing Dynamique", "Directeur Expérience Client", "Trade Marketing Manager", "Responsable Logistique Durable", "Category Manager Data", "Directeur Franchise Global", "Consultant E-commerce", "Growth Hacker B2B", "Manager Flux Internationaux", "Chef Achats Responsables", "Analyste BI Commerce", "Expert Blockchain Retail", "Directeur de Réseau Vente"] },
    "Énergie": { icon: "fa-atom", jobs: ["Ingénieur Fusion Nucléaire", "Architecte Smart Grid", "Expert Hydrogène Vert", "Directeur SMR (Small Modular Reactors)", "Analyste Marché Carbone", "Ingénieur Stockage Énergie", "Consultant Décarbonation", "Expert Photovoltaïque 3.0", "Manager Éolien Offshore", "Auditeur Efficacité Énergétique", "Ingénieur Forage Géothermique", "Responsable HSE Énergie", "Directeur Infrastructures H2", "Analyste Réseaux Haute Tension", "Expert Économie Circulaire Énergie"] },
    "Agri-Food": { icon: "fa-wheat-awn-circle-check", jobs: ["Ingénieur Agriculture Régénérative", "Directeur Vertical Farming", "Expert FoodTech Protéines", "Manager Agro-écologie", "Auditeur Sécurité Alimentaire", "Directeur R&D Nutrition", "Chef de Culture Précision", "Expert Packaging Bio-sourcé", "Analyste Supply Chain Agri", "Oenologue Conseil Digital", "Microbiologiste Industriel", "Technicien Agronome Senior", "Consultant AgTech 2027", "Directeur Usine Agro-Alimentaire", "Expert Traçabilité Blockchain Agri"] },
    "Finance": { icon: "fa-money-bill-trend-up", jobs: ["Analyste M&A Quantitatif", "Risk Manager Actuariat", "Trader Algorithmique", "Directeur Financier CFO", "Auditeur Fraude IA", "Expert DeFi & Blockchain", "Trésorier de Groupe", "Analyste ESG Senior", "Conseiller Fiscalité Numérique", "Manager Asset Management"] },
    "IT & IA": { icon: "fa-microchip", jobs: ["Architecte Solutions LLM", "Ingénieur ML Ops", "Expert Cyber SOC", "Lead Dev Rust/Go", "Data Architect Cloud", "Consultant Transformation IA", "Ingénieur Quantum Computing", "Product Owner GenAI", "Architecte Infrastructure Edge", "Responsable Gouvernance Data"] }
};

const SCRAPED_QUESTIONS = {
    "Énergie": [
        { q: "Comment l'IA de bord (Edge) optimise-t-elle la stabilité des micro-grids face à l'intermittence renouvelable ?", a: ["Alpha: Équilibrage de charge par prédiction neurale temps-réel (+10)", "Beta: Stockage massif sur batteries stationnaires (+7)", "Gamma: Délestage sélectif manuel des charges non prioritaires (+4)"] },
        { q: "Quel est le verrou technologique majeur pour le déploiement des réacteurs SMR en 2027 ?", a: ["Alpha: Standardisation de la fabrication modulaire en usine (+10)", "Beta: Gestion thermique des cœurs haute densité (+7)", "Gamma: Recyclage intégral des combustibles usagés (+4)"] }
    ],
    "Agri-Food": [
        { q: "Optimisation du microbiote des sols : quel vecteur pour l'agriculture régénérative ?", a: ["Alpha: Bio-inoculants ciblés par analyse métagénomique (+10)", "Beta: Épandage massif de compost enrichi (+7)", "Gamma: Rotation triennale classique des cultures (+4)"] },
        { q: "Architecture Vertical Farming : comment réduire l'OPEX énergétique de 40% ?", a: ["Alpha: Spectroscopie LED dynamique asservie à la croissance (+10)", "Beta: Isolation thermique par matériaux à changement de phase (+7)", "Gamma: Recouvrement par panneaux solaires en toiture (+4)"] }
    ]
};

const KmsEngine = {
    pts: 0, step: 0, sector: "", job: "", deltaWins: 0, currentTemp: 0,
    renderSectors() {
        const g = document.getElementById('sector-grid'); g.innerHTML = "";
        Object.keys(SECTOR_DATA).forEach(s => {
            g.innerHTML += `<div class="card" onclick="KmsEngine.pickSec('${s}')" style="background:white; padding:35px; border-radius:15px; text-align:center; cursor:pointer; border:1px solid #eee; transition:0.3s;"><i class="fas ${SECTOR_DATA[s].icon}" style="font-size:3.5em; color:var(--gold);"></i><h3 style="margin-top:20px;">${s}</h3></div>`;
        });
    },
    pickSec(s) {
        this.sector = s; document.getElementById('sector-view').style.display='none';
        document.getElementById('job-view').style.display='block';
        const g = document.getElementById('job-grid'); g.innerHTML = "";
        SECTOR_DATA[s].jobs.forEach(j => g.innerHTML += `<div onclick="KmsEngine.startAudit('${j}')" style="background:white; padding:18px; border-radius:8px; border:1px solid #ddd; cursor:pointer; font-weight:bold; transition:0.2s;">${j}</div>`);
    },
    startAudit(j) {
        this.job = j; document.getElementById('job-view').style.display='none';
        document.getElementById('audit-engine').style.display='block';
        document.getElementById('job-badge').innerText = j; this.drawQ();
    },
    drawQ() {
        if(this.step >= 5) { this.finalize(); return; }
        const d = KmsTranslator.map[KmsTranslator.current];
        document.getElementById('step-indicator').innerText = `${d.step} ${this.step+1}/5`;
        const qBank = SCRAPED_QUESTIONS[this.sector] || [{q:`Analyse stratégique ${this.sector} 2027`, a:["Alpha (+10)","Beta (+7)","Gamma (+4)"]}];
        const qData = qBank[this.step % qBank.length];
        document.getElementById('question-text').innerText = qData.q;
        const optBox = document.getElementById('options-v390'); optBox.innerHTML = "";
        qData.a.forEach((o, i) => optBox.innerHTML += `<button class="q-option" onclick="KmsEngine.selectOpt(this, ${[10,7,4][i]})">${o}</button>`);
        optBox.innerHTML += `<button class="q-option" onclick="KmsEngine.toggleDelta(this)">${d.delta}</button>`;
        document.getElementById('delta-expert-input').style.display = 'none';
    },
    selectOpt(btn, p) {
        document.querySelectorAll('.q-option').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); this.currentTemp = p; this.isDelta = false;
        document.getElementById('delta-expert-input').style.display = 'none';
    },
    toggleDelta(btn) {
        document.querySelectorAll('.q-option').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); this.isDelta = true;
        document.getElementById('delta-expert-input').style.display = 'block';
    },
    validateStep() {
        if(this.isDelta) {
            const val = document.getElementById('delta-expert-input').value;
            if(val.length > 60) { this.currentTemp = 12; this.deltaWins++; } else { this.currentTemp = 3; }
            document.getElementById('delta-expert-input').value = "";
        }
        if(this.currentTemp) { this.pts += this.currentTemp; this.step++; this.currentTemp = 0; this.drawQ(); }
    },
    finalize() {
        const score = Math.round((this.pts/50)*100);
        const d = KmsTranslator.map[KmsTranslator.current];
        if(score <= 80 || this.deltaWins < 3) { alert(d.fail); location.reload(); return; }

        document.getElementById('audit-engine').style.display = 'none';
        const name = prompt("FULL NAME / الاسم الكامل") || "EXPERT";
        document.getElementById('result-view').style.display = 'block';
        document.getElementById('c-title').innerText = d.cTitle;
        document.getElementById('c-subtitle').innerText = d.cSub;
        document.getElementById('c-intro').innerText = d.cIntro;
        document.getElementById('c-expert-name').innerText = name.toUpperCase();
        document.getElementById('c-desc').innerText = d.cDesc;
        document.getElementById('c-final-job').innerText = this.job;
        document.getElementById('final-score-tag').innerText = score + "%";
        document.getElementById('sig-expert-val').innerText = name;
        document.getElementById('sig-label-expert').innerText = d.cSig;
        document.getElementById('sig-board-val').innerText = d.cBoard;
        document.getElementById('final-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=MBA-V390-SECURE-${score}-${name}`;
    },
    generatePDF() {
        const opt = { margin: 0, filename: 'MBA-V390-FINAL.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'px', format: [1120, 790], orientation: 'landscape' } };
        html2pdf().set(opt).from(document.getElementById('cert-canvas')).save();
    }
};

KmsTranslator.apply('fr');
</script>
</body>
</html>
