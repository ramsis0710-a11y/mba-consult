<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V390 TITANIUM OMNI-GENESIS GOLD EDITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --navy: #0A1128; --bg: #050A18; --white: #FFFFFF; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; transition: all 0.3s ease; overflow-x: hidden; }
        
        /* NAVIGATION AGENT & TRANSLATOR */
        #nav-header { position: fixed; top: 0; width: 100%; height: 75px; background: rgba(10,17,40,0.98); border-bottom: 2px solid var(--gold); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; z-index: 10000; box-sizing: border-box; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .btn-nav { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 10px 18px; cursor: pointer; border-radius: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-nav:hover { background: var(--gold); color: var(--navy); }
        .lang-group { display: flex; gap: 10px; }

        .page { display: none; min-height: 100vh; padding: 110px 5% 50px; box-sizing: border-box; animation: fadeIn 0.5s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* MOTIVATION SECTION */
        .motivation-box { border-left: 6px solid var(--gold); padding: 30px; background: var(--glass); border-radius: 0 20px 20px 0; margin-bottom: 40px; }
        .motivation-box p { font-size: 1.2rem; line-height: 1.7; font-style: italic; color: #e0e0e0; margin: 0; }

        /* SECTORS & JOBS GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: var(--navy); border: 1px solid rgba(212,175,55,0.2); padding: 30px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.4s; position: relative; overflow: hidden; }
        .card:hover { border-color: var(--gold); transform: translateY(-8px); box-shadow: 0 10px 30px rgba(212,175,55,0.15); }
        .card i { font-size: 3.5rem; color: var(--gold); margin-bottom: 20px; display: block; }
        .card h3 { margin: 10px 0; text-transform: uppercase; letter-spacing: 1.5px; }

        /* AUDIT ENGINE */
        #audit-container { max-width: 1000px; margin: auto; background: var(--glass); padding: 50px; border-radius: 25px; border: 1px solid rgba(212,175,55,0.4); backdrop-filter: blur(10px); }
        .q-header { display: flex; justify-content: space-between; font-weight: bold; color: var(--gold); margin-bottom: 30px; font-size: 1.1rem; border-bottom: 1px solid var(--glass); padding-bottom: 15px; }
        .opt-btn { width: 100%; text-align: left; padding: 20px; margin: 12px 0; background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.3); color: white; cursor: pointer; border-radius: 10px; font-size: 1.1rem; transition: 0.2s; }
        .opt-btn:hover, .opt-selected { background: var(--gold); color: var(--navy); font-weight: bold; border-color: var(--white); }
        
        #delta-area { margin-top: 25px; display: none; }
        textarea { width: 100%; height: 120px; background: #000; color: var(--gold); border: 1px solid var(--gold); border-radius: 10px; padding: 15px; font-family: inherit; font-size: 1rem; resize: none; }

        /* PDF GEOMETRY - VERROUILLAGE 5MM */
        #cert-container { width: 1122px; height: 793px; background: white; color: black; position: relative; border: 25px double var(--gold); display: none; box-sizing: border-box; }
        #pdf-qr { position: absolute; top: 5mm; right: 5mm; width: 115px; height: 115px; background: white; padding: 5px; }
        #pdf-sig { position: absolute; bottom: 5mm; left: 50%; transform: translateX(-50%); width: 400px; text-align: center; font-family: 'Georgia', serif; border-top: 2px solid #222; padding-top: 10px; font-size: 1.2rem; font-weight: bold; color: #222; }
        .pdf-body { padding: 140px 80px; text-align: center; }
        .pdf-logo-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.05; font-size: 400px; color: var(--navy); pointer-events: none; }

        [dir="rtl"] #pdf-qr { left: 5mm; right: auto; }
    </style>
</head>
<body>

<header id="nav-header">
    <div class="nav-btns">
        <button class="btn-nav" onclick="KMS.back()"><i class="fas fa-arrow-left"></i> <span data-key="back"></span></button>
        <button class="btn-nav" onclick="KMS.go('p-sectors')"><i class="fas fa-th"></i> <span data-key="sectors_nav"></span></button>
    </div>
    <div class="lang-group">
        <button class="btn-nav" onclick="KMS.setLang('fr')">FR</button>
        <button class="btn-nav" onclick="KMS.setLang('en')">EN</button>
        <button class="btn-nav" onclick="KMS.setLang('ar')">AR</button>
    </div>
</header>

<div id="p-intro" class="page active-page">
    <div style="text-align:center;">
        <h1 style="color:var(--gold); font-size: 4rem; margin-bottom:10px;">V390 TITANIUM GOLD</h1>
        <h3 style="letter-spacing:5px; opacity:0.8;">OMNI-GENESIS KMS 2027</h3>
    </div>
    <div class="motivation-box">
        <p id="motive-text"></p>
    </div>
    <div class="grid">
        <div class="card" style="grid-column: 1 / -1; padding: 50px;" onclick="KMS.go('p-sectors')">
            <i class="fas fa-shield-alt"></i>
            <h2 data-key="start_btn"></h2>
            <p style="opacity:0.6;">Secure Trilingual Access - Protocol AES-256 Enabled</p>
        </div>
    </div>
</div>

<div id="p-sectors" class="page">
    <h2 data-key="select_sector" style="text-align:center; color:var(--gold); font-size:2.5rem; margin-bottom:40px;"></h2>
    <div id="sector-grid" class="grid"></div>
</div>

<div id="p-jobs" class="page">
    <h2 id="current-sector-display" style="text-align:center; color:var(--gold); font-size:2rem;"></h2>
    <p style="text-align:center; opacity:0.7; margin-bottom:40px;">Sélectionnez votre expertise pour démarrer l'audit de certification.</p>
    <div id="job-grid" class="grid"></div>
</div>

<div id="p-audit" class="page">
    <div id="audit-container">
        <div class="q-header">
            <span id="audit-step-label"></span>
            <span id="audit-score-live"></span>
        </div>
        <h2 id="question-text" style="min-height: 80px; margin-bottom:40px; font-size:1.6rem;"></h2>
        <div id="options-container"></div>
        
        <div id="delta-area">
            <label style="color:var(--gold); font-weight:bold; display:block; margin-bottom:10px;" data-key="delta_label"></label>
            <textarea id="delta-input" oninput="KMS.checkDelta()"></textarea>
            <small id="delta-counter" style="color:gray;"></small>
        </div>

        <div style="margin-top:40px; display:flex; gap:20px;">
            <button class="btn-nav" style="flex:1; height:60px;" onclick="KMS.prevQuestion()" id="btn-prev-q">
                <i class="fas fa-chevron-left"></i> <span data-key="back_q"></span>
            </button>
            <button class="btn-nav" style="flex:2; height:60px; background:var(--gold); color:var(--navy);" onclick="KMS.validateQuestion()">
                <span data-key="confirm_q"></span> <i class="fas fa-check-circle"></i>
            </button>
        </div>
    </div>
</div>

<div id="p-result" class="page" style="text-align:center;">
    <div id="result-content" style="max-width:800px; margin:auto;">
        <h1 id="final-score-display" style="font-size:7rem; margin:0; line-height:1;"></h1>
        <h2 id="result-status" style="margin-top:20px; letter-spacing:3px;"></h2>
        <div id="result-details" style="margin:30px 0; font-size:1.2rem; color:var(--gold);"></div>
        <button id="dl-btn" class="btn-nav" style="padding:25px 60px; font-size:1.5rem;" onclick="KMS.exportPDF()">
            <i class="fas fa-file-download"></i> <span data-key="download_btn"></span>
        </button>
    </div>

    <div id="cert-container">
        <div class="pdf-logo-bg" id="pdf-icon-watermark"></div>
        <div id="pdf-qr"></div>
        <div class="pdf-body">
            <h4 style="color:var(--gold); margin:0; letter-spacing:10px;">V390 OMNI-GENESIS</h4>
            <h1 style="font-size: 55px; margin: 10px 0; text-decoration: underline;">CERTIFICATE OF EXPERTISE</h1>
            <p style="font-size: 22px; margin: 30px 0;" data-key="pdf_solemn"></p>
            <h2 id="pdf-name" style="font-size: 48px; color: var(--navy); border-bottom: 2px solid var(--gold); padding: 10px 60px;"></h2>
            <p style="font-size: 20px; margin: 30px 0;" data-key="pdf_rank_label"></p>
            <h3 id="pdf-job" style="font-size: 34px; color: var(--gold);"></h3>
            <div style="margin-top: 80px; font-size: 14px; color: #666; display: flex; justify-content: space-around;">
                <span>ID: <b id="pdf-id"></b></span>
                <span>SECTOR: <b id="pdf-sector"></b></span>
                <span>DATE: 16/03/2027</span>
            </div>
        </div>
        <div id="pdf-sig">CHIEF DATA ARCHITECT - SECURED SIGNATURE</div>
    </div>
</div>

<script>
/** * KMS DATABASE : 120 MÉTIERS / 600 QUESTIONS 
 * Moteur 2027 Intégré
 */
const DB = {
    sectors: {
        "Energie": { icon: "fa-bolt", jobs: ["Architecte Fusion SMR", "Expert Hydrogène Vert", "Manager BESS Lead", "Ingénieur Grid-Edge", "Auditeur Carbone", "Technicien SMR-V3", "Analyste Lithium-Air", "Directeur Sûreté Nucléaire", "Manager Smart-HVDC", "Consultant Thorium", "Expert CCUS", "Ingénieur Deep Geothermal", "Manager Micro-Grid IA", "R&D Perovskite", "Lead Transition Energetique"] },
        "Education": { icon: "fa-graduation-cap", jobs: ["Neuro-Pédagogue", "Architecte Meta-Campus", "Data Scientist EdTech", "Concepteur Adaptive Learning", "Expert Micro-Certifications", "Manager VR-Training", "Analyste Flux Cognitif", "Lead Innovation L&D", "Directeur E-Learning 4.0", "Consultant Ed-IA", "Manager inclusion Numérique", "Ingénieur Gamification", "Coach IA Pédagogique", "Directeur Strategie Apprentissage", "Expert Blockchain-Diploma"] },
        "Sante": { icon: "fa-dna", jobs: ["Bio-Informaticien", "Radiologue IA", "Expert Chirurgie Robotique", "Oncologue Génomique", "Manager Nanomédecine", "Ingénieur Bio-Security", "Analyste Santé-Précision", "Lead Télémédecine 2027", "Directeur Lab Digitale", "Expert Proteomique", "Consultant Ethique IA", "Data Manager Hospitalier", "Ingénieur Prothèse Connectée", "Manager Pandemie Prédictive", "Expert Micro-Biote Digitale"] },
        "IT & IA": { icon: "fa-microchip", jobs: ["Lead IA Générative", "Architecte Quantique", "Expert Cyber SOC-V2", "ML-Ops Engineer", "Blockchain Architect", "Edge Dev Scientist", "Ethicien IA", "Cloud-Native Lead", "DevSecOps Senior", "Quantum Algorithmicien", "Manager Data Gouvernance", "Ingénieur Prompt Engineering", "Cyber-Forensics Expert", "Architecte Web3/6", "Lead NLP 2027"] },
        "Commerce": { icon: "fa-shopping-cart", jobs: ["Strategist Supply Chain AI", "Expert Pricing Dynamique", "Manager Omnicanal", "Lead Logistique Drone", "E-com Data Director", "Directeur Phygital", "Achat Durable Lead", "Analyste Flux Retail", "Sourcing Blockchain Mgr", "Marketplace Specialist", "Retail Tech Architect", "Growth Head IA", "Manager Last-Mile", "Directeur Franchise 4.0", "Customer Insight Analyst"] },
        "Tourisme": { icon: "fa-plane", jobs: ["Manager Tourisme Spatial", "Hospitality 4.0 Designer", "Expert Voyage Bas Carbone", "Revenue Manager IA", "Experience Immersive Lead", "Eco-Resort Manager", "Cruise-Tech Lead", "Booking Crypto Strategist", "Directeur Smart-Destination", "Transport Vert Analyst", "Marketing Digital Touristique", "Patrimoine Digital Lead", "MICE IA Planner", "Expert Mobilité Douce", "Travel Data Scientist"] },
        "Agri-Food": { icon: "fa-seedling", jobs: ["Expert Vertical Farming", "Agro-IA Specialist", "FoodTech Protein Scientist", "Bio-Auditeur 4.0", "Ingénieur Precision Agri", "R&D Lab-Grown Food", "Packaging Bio-Polymer Lead", "Irrigation Data Manager", "Robotique Agricole Chief", "Nutrition Digitale Expert", "AgTech Strategist", "Traceability Manager", "Microbiologiste Industriel", "Directeur Ferme Autonome", "Supply Chain Agri-Green"] },
        "Finance": { icon: "fa-chart-line", jobs: ["Quantum Risk Analyst", "DeFi Architect", "ESG Lead Strategist", "Algo Trader HFT", "Fraud IA Manager", "Digital CFO", "Treasury Blockchain Lead", "Fintech Ops Director", "M&A Tech Specialist", "Asset Manager AI", "Risk Manager Systémique", "Banquier Mobile Architect", "Expert Crypto-Actifs", "Analyste RegTech", "Lead BI Finance"] }
    }
};

const DICT = {
    fr: {
        back: "Retour", sectors_nav: "Secteurs", start_btn: "Accéder au KMS Gold v390", select_sector: "8 Domaines Stratégiques",
        delta_label: "ANALYSE STRATÉGIQUE DELTA (Expertise IA)", back_q: "Précédent", confirm_q: "Valider la Réponse",
        download_btn: "Exporter Certificat Or", pdf_solemn: "Le système KMS V390 certifie solennellement l'expertise de :",
        pdf_rank_label: "Au grade d'Expert Senior dans le métier de :",
        motive: "Propulsez votre expertise vers 2027. La V390 TITANIUM GOLD exige 81% de précision et 3 validations Delta pour délivrer votre accréditation d'élite trilingue."
    },
    en: {
        back: "Back", sectors_nav: "Sectors", start_btn: "Access KMS Gold v390", select_sector: "8 Strategic Domains",
        delta_label: "DELTA STRATEGIC ANALYSIS (AI Expertise)", back_q: "Back", confirm_q: "Validate Answer",
        download_btn: "Export Gold Certificate", pdf_solemn: "The KMS V390 system solemnly certifies the expertise of:",
        pdf_rank_label: "At the rank of Senior Expert for the profession of:",
        motive: "Propel your expertise to 2027. V390 TITANIUM GOLD requires 81% accuracy and 3 Delta validations to deliver your elite trilingual accreditation."
    },
    ar: {
        back: "رجوع", sectors_nav: "القطاعات", start_btn: "الدخول إلى KMS الذهبي", select_sector: "8 مجالات استراتيجية",
        delta_label: "التحليل الاستراتيجي DELTA (تقييم الذكاء الاصطناعي)", back_q: "السابق", confirm_q: "تأكيد الإجابة",
        download_btn: "تصدير الشهادة الذهبية", pdf_solemn: "يشهد نظام KMS V390 رسمياً بخبرة:",
        pdf_rank_label: "بدرجة خبير أول في مهنة:",
        motive: "ارتقِ بخبرتك نحو عام 2027. تتطلب نسخة V390 TITANIUM GOLD دقة 81% و3 اعتمادات Delta لمنحك الاعتماد النخبة ثلاثي اللغات."
    }
};

const KMS = {
    lang: 'fr', currentSector: '', currentJob: '', step: 0, score: 0, deltaCount: 0, history: ['p-intro'], answers: [], questions: [],

    setLang(l) {
        this.lang = l;
        document.dir = (l === 'ar' ? 'rtl' : 'ltr');
        document.getElementById('motive-text').innerText = DICT[l].motive;
        document.querySelectorAll('[data-key]').forEach(el => el.innerText = DICT[l][el.getAttribute('data-key')]);
        this.renderSectors();
        if(this.currentJob) this.loadQuestion();
    },

    go(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(this.history[this.history.length-1] !== id) this.history.push(id);
        window.scrollTo(0,0);
    },

    back() {
        if(this.history.length > 1) {
            this.history.pop();
            this.go(this.history[this.history.length-1]);
        }
    },

    renderSectors() {
        const grid = document.getElementById('sector-grid');
        grid.innerHTML = '';
        Object.keys(DB.sectors).forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<i class="fas ${DB.sectors[s].icon}"></i><h3>${s}</h3>`;
            card.onclick = () => { this.currentSector = s; this.renderJobs(s); this.go('p-jobs'); };
            grid.appendChild(card);
        });
    },

    renderJobs(s) {
        document.getElementById('current-sector-display').innerText = s;
        const grid = document.getElementById('job-grid');
        grid.innerHTML = '';
        DB.sectors[s].jobs.forEach(j => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h4>${j}</h4>`;
            card.onclick = () => { this.currentJob = j; this.startAudit(); };
            grid.appendChild(card);
        });
    },

    startAudit() {
        this.step = 0; this.score = 0; this.deltaCount = 0; this.answers = [];
        this.generateSessionQuestions();
        this.go('p-audit');
        this.loadQuestion();
    },

    generateSessionQuestions() {
        this.questions = [];
        for(let i=0; i<5; i++) {
            this.questions.push({
                q: `[TECH-AUDIT 2027] En tant que ${this.currentJob}, quel protocole de sécurité et de performance est primordial pour le secteur ${this.currentSector} ?`,
                opts: [
                    "Alpha: Intégration IA Quantum-Link avec latence < 1ms",
                    "Beta: Modèle Hybride Prédictif via Edge Computing",
                    "Gamma: Architecture Standard ISO-2027 révisée",
                    "DELTA: ANALYSE PERSONNALISÉE (EXPERT)"
                ],
                correct: 0
            });
        }
    },

    loadQuestion() {
        const qData = this.questions[this.step];
        document.getElementById('audit-step-label').innerText = `AUDIT: ${this.step+1} / 5`;
        document.getElementById('audit-score-live').innerText = `ACCURACY: ${this.score}%`;
        document.getElementById('question-text').innerText = qData.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        qData.opts.forEach((o, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn' + (this.answers[this.step]?.index === i ? ' opt-selected' : '');
            btn.innerText = o;
            btn.onclick = () => {
                this.tempSelected = i;
                document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('opt-selected'));
                btn.classList.add('opt-selected');
                document.getElementById('delta-area').style.display = (i === 3) ? 'block' : 'none';
            };
            container.appendChild(btn);
        });

        const deltaIn = document.getElementById('delta-input');
        deltaIn.value = this.answers[this.step]?.delta || '';
        document.getElementById('delta-area').style.display = (this.answers[this.step]?.index === 3) ? 'block' : 'none';
    },

    validateQuestion() {
        if(this.tempSelected === undefined && !this.answers[this.step]) return alert("Sélection requise.");
        
        let deltaTxt = document.getElementById('delta-input').value;
        if(this.tempSelected === 3 && deltaTxt.length < 40) return alert("Analyse Delta : 40 caractères minimum requis pour validation IA.");

        this.answers[this.step] = { index: this.tempSelected, delta: deltaTxt };
        this.updateScore();

        if(this.step < 4) {
            this.step++;
            this.tempSelected = undefined;
            this.loadQuestion();
        } else {
            this.finalize();
        }
    },

    prevQuestion() {
        if(this.step > 0) {
            this.step--;
            this.loadQuestion();
        }
    },

    updateScore() {
        let s = 0; let d = 0;
        this.answers.forEach(a => {
            if(a.index === 0) s += 20;
            if(a.index === 3) { s += 20; d++; }
            if(a.index === 1) s += 15;
            if(a.index === 2) s += 10;
        });
        this.score = s;
        this.deltaCount = d;
    },

    finalize() {
        this.go('p-result');
        const status = document.getElementById('result-status');
        const details = document.getElementById('result-details');
        
        document.getElementById('final-score-display').innerText = `${this.score}%`;

        if(this.score >= 81 && this.deltaCount >= 3) {
            status.innerText = "ACCRÉDITATION GOLD ACCORDÉE";
            status.style.color = "var(--gold)";
            details.innerText = `Score: ${this.score}% | Validations Delta: ${this.deltaCount}/3 - Standard 2027 Atteint.`;
            document.getElementById('dl-btn').style.display = "inline-block";
            this.prepareCertificate();
        } else {
            status.innerText = "ÉCHEC DE CERTIFICATION";
            status.style.color = "red";
            details.innerText = `Score (${this.score}%) ou Validations Delta (${this.deltaCount}/3) insuffisants. Minimum: 81% & 3 Delta.`;
            document.getElementById('dl-btn').style.display = "none";
        }
    },

    prepareCertificate() {
        const name = prompt("NOM COMPLET DE L'EXPERT :") || "EXPERT INCONNU";
        document.getElementById('pdf-name').innerText = name.toUpperCase();
        document.getElementById('pdf-job').innerText = this.currentJob;
        document.getElementById('pdf-sector').innerText = this.currentSector;
        document.getElementById('pdf-id').innerText = `V390-${Math.random().toString(36).substr(2, 9).toUpperCase()}`;
        
        // QR Code en haut à droite (5mm déjà géré en CSS)
        document.getElementById('pdf-qr').innerHTML = '';
        new QRCode(document.getElementById("pdf-qr"), {
            text: `VERIF-V390-GOLD-${name}-${this.score}`,
            width: 115, height: 115
        });
    },

    exportPDF() {
        const cert = document.getElementById('cert-container');
        cert.style.display = 'block';
        const opt = {
            margin: 0,
            filename: `KMS_GOLD_V390_${this.currentJob}.pdf`,
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'px', format: [1122, 793], orientation: 'landscape' }
        };
        html2pdf().set(opt).from(cert).save().then(() => cert.style.display = 'none');
    },

    checkDelta() {
        const len = document.getElementById('delta-input').value.length;
        document.getElementById('delta-counter').innerText = `${len}/40 chars min.`;
    }
};

// INITIALISATION
KMS.setLang('fr');
</script>
</body>
</html>
