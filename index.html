<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>V390 TITANIUM OMNI-GENESIS GOLD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --navy: #0A1128; --bg: #050A18; --white: #FFFFFF; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; }
        
        /* NAVIGATION ET AGENT DE TRADUCTION */
        #nav-header { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(10,17,40,0.95); border-bottom: 2px solid var(--gold); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; }
        .btn-nav { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; cursor: pointer; margin: 0 5px; border-radius: 4px; transition: 0.3s; font-weight: bold; }
        .btn-nav:hover { background: var(--gold); color: var(--navy); }

        .page { display: none; min-height: 100vh; padding: 100px 5%; box-sizing: border-box; }
        .active-page { display: block; }
        
        .motivation-box { border-left: 5px solid var(--gold); padding: 20px; background: rgba(255,255,255,0.05); margin: 20px 0; border-radius: 0 10px 10px 0; }

        /* GRID SECTEURS & MÉTIERS */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--navy); border: 1px solid rgba(212,175,55,0.3); padding: 25px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--gold); transform: scale(1.02); }
        .card i { font-size: 3rem; color: var(--gold); margin-bottom: 15px; }

        /* CERTIFICAT PDF - GÉOMÉTRIE V390 GOLD */
        #cert-container { width: 1122px; height: 793px; background: white; color: black; position: relative; border: 20px double var(--gold); display: none; }
        #pdf-qr { position: absolute; top: 5mm; right: 5mm; width: 100px; height: 100px; }
        #pdf-sig { position: absolute; bottom: 5mm; left: 50%; transform: translateX(-50%); border-top: 1px solid black; width: 300px; text-align: center; font-size: 14px; font-weight: bold; padding-top: 5px; }
        .pdf-content { text-align: center; padding: 100px 50px; }
        
        [dir="rtl"] #pdf-qr { left: 5mm; right: auto; }
    </style>
</head>
<body>

<header id="nav-header">
    <div id="nav-controls">
        <button class="btn-nav" onclick="KMS.back()"><i class="fas fa-arrow-left"></i> <span data-key="back"></span></button>
        <button class="btn-nav" onclick="KMS.next()"><span data-key="next"></span> <i class="fas fa-arrow-right"></i></button>
    </div>
    <div id="lang-agent">
        <button class="btn-nav" onclick="KMS.translate('fr')">FR</button>
        <button class="btn-nav" onclick="KMS.translate('en')">EN</button>
        <button class="btn-nav" onclick="KMS.translate('ar')">AR</button>
    </div>
</header>

<div id="p-intro" class="page active-page">
    <h1 style="color:var(--gold); font-size: 3rem;">V390 TITANIUM GOLD EDITION</h1>
    <div class="motivation-box">
        <p id="motive-text" style="font-size: 1.2rem;"></p>
    </div>
    <button class="card" style="width:100%; font-size: 1.5rem;" onclick="KMS.go('p-sectors')" data-key="start"></button>
</div>

<div id="p-sectors" class="page">
    <h2 data-key="select_sector" style="text-align:center; color:var(--gold);"></h2>
    <div id="sector-grid" class="grid"></div>
</div>

<div id="p-jobs" class="page">
    <h2 id="current-sector-title" style="text-align:center; color:var(--gold);"></h2>
    <div id="job-grid" class="grid"></div>
</div>

<div id="p-audit" class="page">
    <div id="audit-container" style="max-width:800px; margin:auto; background:rgba(255,255,255,0.03); padding:30px; border-radius:15px; border:1px solid var(--gold);">
        <h4 id="audit-progress" style="color:var(--gold)"></h4>
        <h2 id="q-text"></h2>
        <div id="options-box"></div>
        <div id="delta-box" style="display:none; margin-top:20px;">
            <p style="color:var(--gold)" data-key="delta_req"></p>
            <textarea id="delta-input" style="width:100%; height:100px; background:#000; color:var(--gold); border:1px solid var(--gold); padding:10px;"></textarea>
        </div>
        <button class="btn-nav" style="width:100%; margin-top:20px; background:var(--gold); color:var(--navy);" onclick="KMS.validateStep()" data-key="confirm"></button>
    </div>
</div>

<div id="p-result" class="page" style="text-align:center;">
    <h1 id="score-display" style="font-size:4rem;"></h1>
    <button class="btn-nav" style="padding:20px 40px; font-size:1.5rem;" onclick="KMS.generatePDF()" data-key="download"></button>
    
    <div id="cert-container">
        <div id="pdf-qr"></div>
        <div class="pdf-content">
            <h1 style="font-size: 40px; margin-bottom: 10px;">TITANIUM GOLD ACCREDITATION</h1>
            <p data-key="pdf_certifies"></p>
            <h2 id="pdf-user-name" style="font-size: 35px; color: var(--navy); border-bottom: 2px solid var(--gold); display: inline-block;"></h2>
            <p data-key="pdf_rank"></p>
            <h3 id="pdf-job-name" style="font-size: 28px; color: var(--gold);"></h3>
            <p style="margin-top: 40px;">Verification ID: <span id="pdf-vid"></span> | Date: 2027-03-16</p>
        </div>
        <div id="pdf-sig">ELECTRONIC EXPERT SIGNATURE</div>
    </div>
</div>

<script>
const DICT = {
    fr: { back: "Précédent", next: "Suivant", start: "Démarrer l'Audit Or", select_sector: "Choisissez votre Secteur d'Expertise", delta_req: "ANALYSE DELTA : Expliquez votre choix technologique (Min 40 chars)", confirm: "Valider la Réponse", download: "Télécharger Certificat Or", pdf_certifies: "Le système V390 certifie l'expertise de :", pdf_rank: "Au grade d'Expert Senior pour le métier de :",
          motive: "Bienvenue dans l'interface TITANIUM GOLD. Cette application utilise un moteur de scraping simulé pour valider vos compétences selon les standards industriels de 2027. Atteignez 81% et validez vos analyses Delta pour obtenir votre accréditation officielle." },
    en: { back: "Previous", next: "Next", start: "Start Gold Audit", select_sector: "Choose your Sector of Expertise", delta_req: "DELTA ANALYSIS: Explain your technical choice (Min 40 chars)", confirm: "Confirm Answer", download: "Download Gold Certificate", pdf_certifies: "The V390 system certifies the expertise of:", pdf_rank: "At the rank of Senior Expert for the job of:",
          motive: "Welcome to the TITANIUM GOLD interface. This application uses a simulated scraping engine to validate your skills according to 2027 industrial standards. Reach 81% and validate your Delta analyses to obtain your official accreditation." },
    ar: { back: "السابق", next: "التالي", start: "بدء التدقيق الذهبي", select_sector: "اختر قطاع خبرتك", delta_req: "تحليل دلتا: اشرح خيارك التقني (40 حرفًا على الأقل)", confirm: "تأكيد الإجابة", download: "تحميل الشهادة الذهبية", pdf_certifies: "يشهد نظام V390 بخبرة:", pdf_rank: "بدرجة خبير أول لمهنة:",
          motive: "مرحبًا بكم في واجهة TITANIUM GOLD. يستخدم هذا التطبيق محرك مسح محاكى للتحقق من مهاراتك وفقًا للمعايير الصناعية لعام 2027. حقق 81% وقم بتأكيد تحليلات دلتا الخاصة بك للحصول على اعتمادك الرسمي." }
};

const DATA = {
    "Energie": ["Architecte Fusion SMR", "Ingénieur Hydrogène Vert", "Expert Grid 2027", "Manager Lithium", "Auditeur Nucléaire", "Analyste BESS", "Designer HVDC", "Manager Thorium", "Expert Géothermie", "Ingénieur Biomasse", "Analyste Transition", "Manager Micro-Grid", "Expert Carb-Capture", "Lead Sûreté", "R&D Solaire"],
    "Education": ["Neuro-Pédagogue", "Meta-Campus Designer", "EdTech IA Lead", "Innovation L&D", "Learning Data Analyst", "Serious Games Dev", "Micro-Certifs Expert", "LMS Adaptatif", "E-Learning Mgr", "Digital Psych", "Inclusion Num", "Bootcamp IA", "Flux Scolaire", "IA Education", "EdTech Strat"],
    "Sante": ["Ingénieur Génomique", "Radiologue IA", "Bio-Informaticien", "Manager Robotique", "Analyste Pharma", "Expert Télémédecine", "Neuro-Tech", "Directeur Innovation", "Expert Lab 4.0", "Med-Device Dev", "Bio-Security", "Oncologie Data", "Manager E-Santé", "Proteomique", "IoT Médical"],
    "IT & IA": ["Lead IA Générative", "Architecte Quantique", "Expert Cyber SOC", "Ingénieur ML Ops", "Blockchain Lead", "Edge Dev", "Data Ethics", "Cloud Native", "DevSecOps", "Quantum Alg", "Web3 Architect", "IA Strategist", "Rust Engineer", "Threat Intel", "FullStack AI"],
    "Commerce": ["Supply Chain Cog", "Pricing IA Expert", "Omnicanal Lead", "Logistique Auto", "E-com Strategist", "Phygital Mgr", "Achat Durable", "Retail Flux", "Sourcing Bloc", "Marketplace", "Retail Tech", "Growth Head", "Last-Mile Mgr", "Directeur Franchise", "Customer Data"],
    "Tourisme": ["Tourisme Spatial Mgr", "Hospitality 4.0", "Voyage Durable", "Revenue IA", "Experience Immersive", "Eco-Resort Lead", "Cruise Tech", "Booking Crypto", "Smart Dest", "Transport Vert", "Marketing Dig", "Patrimoine Dig", "MICE IA", "Mobilité Tour", "Travel Strategist"],
    "Agri-Food": ["Vertical Farm Expert", "Agro-IA", "FoodTech Protéine", "Bio-Auditeur", "Precision Agri", "R&D Scientist", "Packaging Bio", "Irrigation IA", "Robotique Agri", "Nutrition Digit", "AgTech Lead", "Traceability Mgr", "Microbiologie", "Directeur Ferme", "Supply Agri"],
    "Finance": ["Quantum Risk Analyst", "DeFi Lead", "ESG Strategist", "Algo Trader", "Fraud IA Expert", "CFO Digital", "Treasury Bloc", "Fintech Ops", "M&A Tech", "Asset Manager IA", "Risk Analyst", "Bank Mobile", "Crypto Expert", "Systemic Risk", "BI Finance"]
};

const KMS = {
    lang: 'fr', currentSector: '', currentJob: '', step: 0, score: 0, deltaCount: 0, history: ['p-intro'],
    
    translate(l) {
        this.lang = l;
        document.dir = (l === 'ar' ? 'rtl' : 'ltr');
        document.getElementById('motive-text').innerText = DICT[l].motive;
        document.querySelectorAll('[data-key]').forEach(el => el.innerText = DICT[l][el.getAttribute('data-key')]);
        this.renderSectors();
    },

    go(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(this.history[this.history.length-1] !== id) this.history.push(id);
    },

    back() {
        if(this.history.length > 1) {
            this.history.pop();
            this.go(this.history[this.history.length-1]);
        }
    },

    next() {
        // Logique simplifiée pour naviguer vers l'avant si déjà visité
    },

    renderSectors() {
        const grid = document.getElementById('sector-grid');
        grid.innerHTML = '';
        const icons = ["fa-bolt", "fa-graduation-cap", "fa-dna", "fa-microchip", "fa-shopping-cart", "fa-plane", "fa-seedling", "fa-chart-line"];
        Object.keys(DATA).forEach((s, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<i class="fas ${icons[i]}"></i><h3>${s}</h3>`;
            card.onclick = () => { this.currentSector = s; this.renderJobs(s); this.go('p-jobs'); };
            grid.appendChild(card);
        });
    },

    renderJobs(s) {
        document.getElementById('current-sector-title').innerText = s;
        const grid = document.getElementById('job-grid');
        grid.innerHTML = '';
        DATA[s].forEach(j => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<h4>${j}</h4>`;
            card.onclick = () => { this.currentJob = j; this.startAudit(); };
            grid.appendChild(card);
        });
    },

    startAudit() {
        this.step = 0; this.score = 0; this.deltaCount = 0;
        this.go('p-audit');
        this.loadQuestion();
    },

    loadQuestion() {
        if(this.step >= 5) return this.finalize();
        document.getElementById('audit-progress').innerText = `STEP ${this.step+1} / 5`;
        document.getElementById('q-text').innerText = `[Tech-Audit 2027] Pour ${this.currentJob}, quel protocole de sécurité ou d'efficience est préconisé ?`;
        
        const opts = ["Alpha: Intégration IA Quantum-Link", "Beta: Modèle Hybride Prédictif", "Gamma: Standard Industriel Optimisé", "DELTA: ANALYSE PERSONNALISÉE (EXPERT)"];
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        opts.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = 'btn-nav'; b.style.width = '100%'; b.style.margin = '10px 0'; b.style.textAlign = 'left';
            b.innerText = o;
            b.onclick = () => {
                this.selected = i;
                document.getElementById('delta-box').style.display = (i === 3) ? 'block' : 'none';
            };
            box.appendChild(b);
        });
    },

    validateStep() {
        if(this.selected === 3) {
            if(document.getElementById('delta-input').value.length < 40) return alert("Analyse trop courte.");
            this.deltaCount++; this.score += 20;
        } else if(this.selected === 0) this.score += 20;
        else if(this.selected === 1) this.score += 15;
        else this.score += 10;
        
        this.step++;
        this.loadQuestion();
    },

    finalize() {
        if(this.score > 80 && this.deltaCount >= 3) {
            this.go('p-result');
            document.getElementById('score-display').innerText = `ADMIS : ${this.score}%`;
            const name = prompt("NOM DE L'EXPERT :");
            document.getElementById('pdf-user-name').innerText = name.toUpperCase();
            document.getElementById('pdf-job-name').innerText = this.currentJob;
            document.getElementById('pdf-vid').innerText = `V390-${Math.random().toString(36).substr(2, 9).toUpperCase()}`;
            new QRCode(document.getElementById("pdf-qr"), { text: `VERIF-V390-GOLD-${name}`, width: 100, height: 100 });
        } else {
            alert(`ÉCHEC: Score (${this.score}%) ou Approbations Delta (${this.deltaCount}/3) insuffisants.`);
            this.go('p-intro');
        }
    },

    generatePDF() {
        const cert = document.getElementById('cert-container');
        cert.style.display = 'block';
        html2pdf().set({ margin: 0, filename: 'CERTIFICAT_GOLD_V390.pdf', jsPDF: { unit: 'px', format: [1122, 793], orientation: 'landscape' } })
            .from(cert).save().then(() => cert.style.display = 'none');
    }
};

KMS.translate('fr');
</script>
</body>
</html>
