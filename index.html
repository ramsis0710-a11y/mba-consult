<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V390 TITANIUM OMNI-GENESIS - GOLD EDITION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #D4AF37; --navy: #0A1128; --silver: #E1E8ED; --bg: #050A18; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        .rtl { direction: rtl; text-align: right; }

        /* AGENT DE TRADUCTION & HEADER */
        #header-agent { position: fixed; top: 0; width: 100%; background: rgba(10, 17, 40, 0.9); border-bottom: 2px solid var(--gold); z-index: 1000; display: flex; justify-content: space-around; padding: 10px 0; backdrop-filter: blur(10px); }
        .btn-lang { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 5px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        .btn-lang:hover { background: var(--gold); color: var(--navy); }

        /* PORTAL & MOTIVATION */
        #portal { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 20px; }
        .motive-card { border: 2px solid var(--gold); padding: 40px; border-radius: 20px; background: rgba(10, 17, 40, 0.6); max-width: 900px; box-shadow: 0 0 50px rgba(212, 175, 55, 0.2); }
        
        /* GRID SECTEURS */
        #sector-hub { display: none; padding: 120px 20px 50px; text-align: center; }
        .sector-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 40px auto; }
        .sector-card { background: var(--navy); border: 1px solid var(--gold); padding: 25px; border-radius: 15px; cursor: pointer; transition: 0.4s; }
        .sector-card:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--gold); }
        .sector-card i { font-size: 2.5em; color: var(--gold); margin-bottom: 15px; }

        /* MOTEUR QCM */
        #audit-engine { display: none; max-width: 850px; margin: 150px auto; background: white; color: var(--navy); padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .q-meta { color: var(--gold); font-weight: 900; letter-spacing: 1px; margin-bottom: 10px; }
        .option-box { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; text-align: left; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .option-box.active { border-color: var(--gold); background: #fffcf0; }
        #delta-area { width: 100%; height: 100px; margin-top: 15px; border: 2px solid var(--gold); border-radius: 10px; padding: 10px; display: none; }

        /* PDF CANVAS - PRÉCISION 5MM */
        #cert-wrap { display: none; text-align: center; padding: 50px; }
        #cert-canvas { width: 1120px; height: 790px; background: white; margin: 0 auto; position: relative; border: 25px double var(--gold); color: #000; overflow: hidden; }
        .qr-zone { position: absolute; top: 19px; right: 19px; width: 140px; height: 140px; border: 1px solid #eee; }
        .logo-sector { position: absolute; top: 25px; left: 25px; width: 100px; filter: grayscale(1); opacity: 0.3; }
        .signature-zone { position: absolute; bottom: 230px; left: 100px; width: 350px; border-bottom: 3px solid var(--navy); font-size: 2.5em; font-weight: bold; font-family: 'Georgia', serif; }
        .score-overlay { position: absolute; bottom: 40px; right: 40px; font-size: 5em; font-weight: 900; color: rgba(10, 17, 40, 0.08); }
    </style>
</head>
<body>

<div id="header-agent">
    <button class="btn-lang" onclick="KMS.setLang('fr')">FRANÇAIS</button>
    <button class="btn-lang" onclick="KMS.setLang('en')">ENGLISH</button>
    <button class="btn-lang" onclick="KMS.setLang('ar')">العربية</button>
</div>

<section id="portal">
    <div class="motive-card">
        <h1 id="txt-h1" style="color:var(--gold); font-size: 3em;"></h1>
        <p id="txt-motive" style="font-size: 1.3em; line-height: 1.6; margin: 30px 0;"></p>
        <button onclick="KMS.start()" id="btn-start" style="background:var(--gold); border:none; padding:20px 60px; font-weight:bold; cursor:pointer; font-size:1.2em; border-radius:50px;"></button>
    </div>
</section>

<section id="sector-hub">
    <h2 id="txt-hub-title"></h2>
    <div class="sector-grid" id="grid-main"></div>
</section>

<section id="audit-engine">
    <div id="q-step" class="q-meta"></div>
    <h2 id="q-text"></h2>
    <div id="q-options"></div>
    <textarea id="delta-area" placeholder="Expert analysis (Min 40 chars)..."></textarea>
    <button onclick="KMS.next()" id="btn-next" style="width:100%; padding:20px; background:var(--navy); color:white; border:none; margin-top:25px; cursor:pointer; font-weight:bold; border-radius:10px;"></button>
</section>

<section id="cert-wrap">
    <button onclick="KMS.download()" id="btn-dl" style="background:var(--gold); color:var(--navy); padding:15px 40px; border:none; margin-bottom:30px; cursor:pointer; font-weight:bold; border-radius:5px;"></button>
    <div id="cert-canvas">
        <i id="sector-icon-bg" class="fas logo-sector" style="font-size: 80px;"></i>
        <div class="qr-zone"><img id="pdf-qr" style="width:100%;"></div>
        <div style="margin-top:160px;">
            <h1 id="pdf-title" style="font-size:3.5em; margin:0; letter-spacing:2px;"></h1>
            <p id="pdf-l1" style="font-size:1.6em; margin:20px 0;"></p>
            <div id="pdf-name" style="font-size:4.5em; font-weight:900; border-bottom:6px solid var(--navy); display:inline-block; padding:0 60px; margin:20px 0;"></div>
            <p id="pdf-l2" style="font-size:1.6em;"></p>
            <h2 id="pdf-job" style="color:var(--gold); font-size:3em; text-transform:uppercase; margin-top:10px;"></h2>
        </div>
        <div class="signature-zone" id="pdf-sig"></div>
        <div id="pdf-sig-label" style="position:absolute; bottom:200px; left:100px; font-weight:bold; color:var(--gold); text-transform:uppercase;"></div>
        <div id="pdf-score" class="score-overlay"></div>
    </div>
</section>

<script>
/**
 * DATABASE JSON GOLD EDITION - INTÉGRÉE (120 Métiers / 8 Secteurs)
 */
const DATA_KMS = {
    "Energie": { icon: "fa-bolt", jobs: ["Expert Fusion SMR", "Architecte Smart Grid", "Ingénieur Hydrogène Vert", "Analyste Carbone Senior", "Manager Stockage Lithium+", "Ingénieur Réseaux HVDC", "Directeur Fermes Offshore", "Expert Micro-Grid Industriel", "Consultant Décarbonation", "Ingénieur SMR 2027", "Auditeur Efficacité 4.0", "Expert Solaire Thermique", "Manager Nucléaire Civil", "Analyste Énergie Circulaire", "Ingénieur Maintenance IA"] },
    "Education": { icon: "fa-brain", jobs: ["Designer Neuro-Apprentissage", "Architecte Meta-Campus", "Expert EdTech Blockchain", "Directeur Innovation Pédago", "Data Scientist Education", "Spécialiste IA Tutorielle", "Psychométricien Digital", "Chef de Projet Serious Games", "Designer de Micro-Certifs", "Directeur Université Numérique", "Auditeur Qualité Hybride", "Ingénieur LMS Adaptatif", "Expert Inclusion Digital", "Analyste Data Scolaire", "Chercheur IA Appliquée"] },
    "Sante": { icon: "fa-dna", jobs: ["Architecte Bio-Informatique", "Ingénieur Génomique Senior", "Expert IA Radiologique", "Auditeur Bio-Sûreté 2027", "Directeur Innovation Clinique", "Manager e-Santé Interopérable", "Data Scientist Oncologie", "Ingénieur Robotique Médicale", "Consultant Pharmacovigilance", "Responsable Dispositifs Connectés", "Expert Télémédecine 4.0", "Généticien de Précision", "Analyste Flux Hospitaliers", "Directeur Bio-Banque Digitale", "Expert Thérapies Cellulaires"] },
    "IT_IA": { icon: "fa-microchip", jobs: ["Architecte Post-Quantique", "Lead Dev IA Proactive", "Expert Cyber SOC 2027", "Ingénieur ML Ops Senior", "Architecte Cloud Souverain", "Expert Blockchain Interop", "Quantum Data Scientist", "Responsable Éthique IA", "Ingénieur Edge Computing", "Architecte Systèmes Distribués", "Expert Pentest Automatisé", "Manager Data Gouvernance", "Ingénieur Langage Rust", "Architecte Micro-Services", "Analyste Menaces Cyber"] },
    "Commerce": { icon: "fa-cart-shopping", jobs: ["Directeur Supply Chain Cognitive", "Analyste Pricing Algorithmique", "Expert Retail Omnicanal", "Manager Logistique Autonome", "Responsable E-commerce Global", "Directeur Expérience Phygitale", "Chef Achats Responsables", "Analyste BI Distribution", "Expert Blockchain Traçabilité", "Directeur de Franchise Digitale", "Manager Retail Tech", "Growth Hacker B2B", "Expert Flux Logistiques IA", "Consultant Commerce Unifié", "Responsable Merchandising"] },
    "Tourisme": { icon: "fa-shuttle-space", jobs: ["Directeur Expérience Immersive", "Expert Tourisme Spatial", "Manager Voyage Durable", "Analyste Revenue Management IA", "Architecte Robotique Hôtelière", "Consultant Éco-Tourisme", "Chef de Produit Expérientiel", "Directeur Cruise Tech", "Expert Blockchain Booking", "Manager Smart Destination", "Directeur Marketing Territorial", "Auditeur Sécurité Transport", "Analyste Comportemental", "Responsable Patrimoine 3D", "Expert Tourisme Médical"] },
    "Agri_Food": { icon: "fa-seedling", jobs: ["Manager Agri-Générative", "Directeur Vertical Farming", "Expert FoodTech Protéines", "Ingénieur Agro-IA", "Auditeur Sécurité Sanitaire", "Directeur R&D Food", "Chef de Culture Précision", "Expert Packaging Bio", "Microbiologiste Industriel", "Ingénieur Irrigation Smart", "Consultant AgTech", "Analyste Supply Agri-Global", "Directeur Agro-Industrie", "Expert Traçabilité Bloc", "Ingénieur Robotique Agri"] },
    "Finance": { icon: "fa-chart-line", jobs: ["Analyste Quantique", "Risk Manager Algo", "Expert DeFi Web3", "CFO Digital Transformation", "Auditeur Fraude IA", "Analyste ESG Stratégique", "Trésorier Global Data", "Conseiller Fiscalité Numérique", "Manager Asset Management IA", "Expert Modélisation Risque", "Analyste M&A Tech", "Spécialiste Crypto-Actifs", "Contrôleur de Gestion BI", "Directeur Banque Digitale", "Analyste Risques Systémiques"] }
};

const i18n = {
    fr: {
        h1: "KMS V390 TITANIUM",
        motive: "Le KMS V390 catalyse votre leadership stratégique en fusionnant l'IA décisionnelle et l'expertise sectorielle 2027. Cette application valide votre capacité à piloter les flux mondiaux avec une rigueur technologique absolue. Engagez-vous maintenant pour transformer votre expertise en accréditation souveraine.",
        start: "DÉPLOYER L'EXPERTISE",
        hub: "PÔLES D'EXCELLENCE TECHNOLOGIQUE",
        next: "VALIDER L'ÉTAPE TECHNIQUE",
        dl: "TÉLÉCHARGER LE CERTIFICAT V390 GOLD",
        pdf_title: "ACCRÉDITATION TECHNIQUE SUPÉRIEURE",
        pdf_l1: "Le jury MBA-CONSULT atteste que l'expert",
        pdf_l2: "a maîtrisé les standards technologiques pour le métier de :",
        pdf_sig: "SIGNATURE ÉLECTRONIQUE",
        fail: "ÉCHEC : Score ≤ 80% ou validation IA (Delta) insuffisante."
    },
    en: {
        h1: "KMS V390 TITANIUM",
        motive: "KMS V390 catalyzes strategic leadership by merging decisional AI and 2027 sector expertise. This application validates your ability to drive global flows with absolute technological rigor. Commit now to transform your expertise into sovereign accreditation.",
        start: "DEPLOY EXPERTISE",
        hub: "TECHNOLOGICAL EXCELLENCE HUBS",
        next: "VALIDATE TECHNICAL STEP",
        dl: "DOWNLOAD V390 GOLD CERTIFICATE",
        pdf_title: "SUPERIOR TECHNICAL ACCREDITATION",
        pdf_l1: "The MBA-CONSULT board certifies that the expert",
        pdf_l2: "has mastered the technological standards for the role of:",
        pdf_sig: "ELECTRONIC SIGNATURE",
        fail: "FAILED: Score ≤ 80% or insufficient AI (Delta) validation."
    },
    ar: {
        h1: "نظام V390 تيتانيوم",
        motive: "نظام V390 يحفز قيادتك الاستراتيجية من خلال دمج الذكاء الاصطناعي القراري وخبرة القطاعات لعام 2027. هذا التطبيق يثبت قدرتك على قيادة التدفقات العالمية بدقة تكنولوجية مطلقة. ابدأ الآن لتحويل خبرتك إلى اعتماد سيادي.",
        start: "تفعيل الخبرة",
        hub: "أقطاب التميز التكنولوجي",
        next: "تأكيد الخطوة التقنية",
        dl: "تحميل الشهادة الذهبية V390",
        pdf_title: "شهادة الاعتماد التقني العليا",
        pdf_l1: "تقر لجنة MBA-CONSULT بأن الخبير",
        pdf_l2: "قد أتقن المعايير التكنولوجية لمهنة:",
        pdf_sig: "التوقيع الإلكتروني",
        fail: "فشل: الدرجة أقل من 81% أو فشل تدقيق الذكاء الاصطناعي."
    }
};

const KMS = {
    lang: 'fr', sector: '', job: '', step: 0, score: 0, delta: 0, pts: 0,
    setLang(l) {
        this.lang = l; document.body.className = l === 'ar' ? 'rtl' : '';
        const d = i18n[l];
        document.getElementById('txt-h1').innerText = d.h1;
        document.getElementById('txt-motive').innerText = d.motive;
        document.getElementById('btn-start').innerText = d.start;
        document.getElementById('txt-hub-title').innerText = d.hub;
        document.getElementById('btn-next').innerText = d.next;
        document.getElementById('btn-dl').innerText = d.dl;
    },
    start() { document.getElementById('portal').style.display='none'; document.getElementById('sector-hub').style.display='block'; this.initHub(); },
    initHub() {
        const grid = document.getElementById('grid-main'); grid.innerHTML = '';
        Object.keys(DATA_KMS).forEach(s => {
            const card = document.createElement('div'); card.className = 'sector-card';
            card.innerHTML = `<i class="fas ${DATA_KMS[s].icon}"></i><h3>${s.replace('_',' & ')}</h3>`;
            card.onclick = () => this.initAudit(s);
            grid.appendChild(card);
        });
    },
    initAudit(s) {
        this.sector = s; this.job = DATA_KMS[s].jobs[Math.floor(Math.random()*15)];
        document.getElementById('sector-hub').style.display='none';
        document.getElementById('audit-engine').style.display='block';
        this.renderQ();
    },
    renderQ() {
        if(this.step >= 5) return this.finish();
        const questions = [
            {q: `[TECH 2027] Quel protocole de résilience ${this.sector} garantit une intégrité absolue ?`, a: ["Alpha: Isolation par Hyperviseur Type 1 (+10)", "Beta: Segmentation Micro-services (+7)", "Gamma: Analyse heuristique (+4)"]},
            {q: `Comment optimiser la latence critique pour le métier de ${this.job} ?`, a: ["Alpha: Directed Acyclic Graph (DAG) (+10)", "Beta: Proof of Stake (+7)", "Gamma: Cloud Standard (+4)"]},
            {q: `Quelle méthode de chiffrement post-quantique préconisez-vous ?`, a: ["Alpha: Crystal-Dilithium (+10)", "Beta: Falcon (+7)", "Gamma: RSA 4096 (+4)"]},
            {q: `Comment neutraliser un biais algorithmique en temps réel ?`, a: ["Alpha: Neural Capsule Networks (+10)", "Beta: Random Forest (+7)", "Gamma: Linear Regression (+4)"]},
            {q: `Scalabilité : Quelle architecture supporte +800% de charge ?`, a: ["Alpha: Sharding Dynamique (+10)", "Beta: Load Balancing (+7)", "Gamma: Vertical Scaling (+4)"]}
        ];
        const d = questions[this.step];
        document.getElementById('q-step').innerText = `STEP ${this.step+1}/5 | JOB: ${this.job.toUpperCase()}`;
        document.getElementById('q-text').innerText = d.q;
        const opts = document.getElementById('q-options'); opts.innerHTML = '';
        d.a.forEach((o, i) => {
            const b = document.createElement('div'); b.className='option-box'; b.innerText = o;
            b.onclick = () => { document.querySelectorAll('.option-box').forEach(x=>x.classList.remove('active')); b.classList.add('active'); this.pts = [10,7,4][i]; document.getElementById('delta-area').style.display='none'; };
            opts.appendChild(b);
        });
        const deltaBtn = document.createElement('div'); deltaBtn.className='option-box'; deltaBtn.innerText = "DELTA: EXPERT INTERPRETATION (AI)";
        deltaBtn.style.color = 'var(--gold)';
        deltaBtn.onclick = () => { document.querySelectorAll('.option-box').forEach(x=>x.classList.remove('active')); deltaBtn.classList.add('active'); document.getElementById('delta-area').style.display='block'; this.pts = 12; };
        opts.appendChild(deltaBtn);
    },
    next() {
        if(this.pts === 12) { const v = document.getElementById('delta-area').value; if(v.length > 40) this.delta++; else this.pts = 2; }
        if(this.pts > 0) { this.score += this.pts; this.step++; this.pts = 0; document.getElementById('delta-area').value=''; this.renderQ(); }
    },
    finish() {
        const total = Math.round((this.score/50)*100);
        if(total <= 80 || this.delta < 3) { alert(i18n[this.lang].fail); location.reload(); return; }
        const name = prompt("NOM COMPLET / FULL NAME").toUpperCase();
        document.getElementById('audit-engine').style.display='none'; document.getElementById('cert-wrap').style.display='block';
        const d = i18n[this.lang];
        document.getElementById('pdf-title').innerText = d.pdf_title;
        document.getElementById('pdf-l1').innerText = d.pdf_l1;
        document.getElementById('pdf-l2').innerText = d.pdf_l2;
        document.getElementById('pdf-sig-label').innerText = d.pdf_sig;
        document.getElementById('pdf-name').innerText = name;
        document.getElementById('pdf-job').innerText = this.job;
        document.getElementById('pdf-sig').innerText = name;
        document.getElementById('pdf-score').innerText = total + "%";
        document.getElementById('sector-icon-bg').className = "fas logo-sector " + DATA_KMS[this.sector].icon;
        document.getElementById('pdf-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=KMS-V390-GOLD-${name}-${total}`;
    },
    download() {
        const opt = { margin: 0, filename: 'KMS_V390_GOLD.pdf', jsPDF: { unit: 'px', format: [1120, 790], orientation: 'landscape' } };
        html2pdf().set(opt).from(document.getElementById('cert-canvas')).save();
    }
};
KMS.setLang('fr');
</script>
</body>
</html>
