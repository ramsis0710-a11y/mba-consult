<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V390 TITANIUM OMNI-GENESIS - MONOLITHE GOLD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --navy: #0A1128; --bg: #050A18; --white: #FFFFFF; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--white); margin: 0; overflow-x: hidden; height: 100vh; }
        
        /* RESPONSIVE MOBILE FULLSCREEN */
        .page { display: none; min-height: 100vh; width: 100vw; padding: 80px 5% 20px; flex-direction: column; align-items: center; justify-content: flex-start; }
        .active-page { display: flex; }
        
        /* NAVIGATION BAR V390 */
        #nav-header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: rgba(10,17,40,0.98); border-bottom: 2px solid var(--gold); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 10000; }
        .nav-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 12px; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 0.9rem; }

        /* GRID SYSTEM (15 MÉTIERS / 8 SECTEURS) */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; width: 100%; max-width: 1200px; margin-top: 20px; }
        .card { background: var(--navy); border: 1px solid var(--gold); padding: 20px; border-radius: 12px; text-align: center; transition: 0.3s; cursor: pointer; }
        .card h2, .card h3 { font-size: 1rem; margin: 10px 0 0; }
        
        /* PDF EXPORT STYLING (VERROUILLÉ) */
        #cert-container { width: 1122px; height: 793px; background: white; color: black; position: relative; border: 30px double var(--gold); margin: 0 auto; display: block; overflow: hidden; }
        .qr-fixed { position: absolute; top: 5mm; right: 5mm; width: 140px; height: 140px; border: 1px solid #ddd; }
        .sig-fixed { position: absolute; bottom: 5mm; left: 50%; transform: translateX(-50%); width: 300px; border-top: 2px solid black; text-align: center; font-family: 'Cursive', serif; font-size: 1.8rem; padding-top: 5px; }
        .pdf-stamp { position: absolute; bottom: 50px; right: 50px; font-size: 6rem; opacity: 0.08; font-weight: 900; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr 1fr; }
            .nav-btn span { display: none; }
        }
    </style>
</head>
<body>

<header id="nav-header">
    <div style="display:flex; gap:8px;">
        <button class="nav-btn" onclick="KMS.back()"><i class="fas fa-arrow-left"></i> <span data-i18n="back">Retour</span></button>
        <button class="nav-btn" onclick="KMS.next()"><span data-i18n="next">Suivant</span> <i class="fas fa-arrow-right"></i></button>
    </div>
    <div style="display:flex; gap:5px;">
        <button class="nav-btn" onclick="KMS.translate('fr')">FR</button>
        <button class="nav-btn" onclick="KMS.translate('en')">EN</button>
        <button class="nav-btn" onclick="KMS.translate('ar')">AR</button>
    </div>
</header>

<div id="p-start" class="page active-page">
    <div style="text-align:center; padding: 20px; border: 1px solid var(--gold); border-radius: 20px; background: rgba(255,255,255,0.03);">
        <h1 style="color:var(--gold); font-size: 2.2rem;">V390 TITANIUM</h1>
        <p data-i18n="motive_text" style="line-height:1.6; font-size:1.1rem;">Validez votre expertise stratégique pour 2027. Ce système d'audit trilingue verrouillé exige une précision absolue (81%+) pour l'accréditation KMS.</p>
        <button onclick="KMS.go('p-sectors')" class="nav-btn" style="padding:15px 40px; font-size:1.2rem; background:var(--gold); color:var(--navy);" data-i18n="start">COMMENCER</button>
    </div>
</div>

<div id="p-sectors" class="page">
    <h1 data-i18n="sect_title">8 SECTEURS STRATÉGIQUES</h1>
    <div class="grid" id="grid-sectors"></div>
</div>

<div id="p-jobs" class="page">
    <h1 id="selected-sector"></h1>
    <div class="grid" id="grid-jobs"></div>
</div>

<div id="p-audit" class="page">
    <div style="background:white; color:var(--navy); padding:25px; border-radius:20px; width:100%; max-width:600px;">
        <h4 id="audit-meta" style="color:var(--gold); margin:0;"></h4>
        <h2 id="audit-q" style="margin:15px 0;"></h2>
        <div id="audit-opts"></div>
        <textarea id="delta-input" style="width:100%; height:80px; margin-top:10px; display:none; border:2px solid var(--gold); border-radius:8px; padding:10px;" placeholder="Analyse technique expert (min 40 chars)..."></textarea>
        <button onclick="KMS.submitAnswer()" class="nav-btn" style="width:100%; background:var(--navy); color:white; height:50px; margin-top:20px;" data-i18n="validate">VALIDER</button>
    </div>
</div>

<div id="p-finish" class="page">
    <button onclick="KMS.exportPDF()" class="nav-btn" style="margin-bottom:20px; font-size:1.1rem; padding:15px 30px;" data-i18n="dl_cert">TÉLÉCHARGER LE CERTIFICAT GOLD</button>
    <div id="cert-wrap" style="width:100%; overflow-x:auto;">
        <div id="cert-container">
            <i id="pdf-icon" class="fas" style="position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); font-size:400px; color:rgba(212,175,55,0.05);"></i>
            <div id="qrcode" class="qr-fixed"></div>
            <div style="text-align:center; padding-top:160px; position:relative; z-index:2;">
                <h1 data-i18n="pdf_acc" style="font-size:4.5rem; margin:0;">ACCRÉDITATION</h1>
                <p data-i18n="pdf_agent" style="font-size:2rem;">L'Agent KMS V390 certifie que l'expert :</p>
                <div id="pdf-name" style="font-size:5rem; font-weight:bold; border-bottom:6px solid var(--navy); display:inline-block; padding:0 60px; margin:20px 0;"></div>
                <p data-i18n="pdf_is" style="font-size:2rem;">est accrédité pour le standard 2027 au poste de :</p>
                <h2 id="pdf-job" style="color:var(--gold); font-size:3.5rem;"></h2>
            </div>
            <div class="sig-fixed" id="pdf-signature"></div>
            <div id="pdf-score" class="pdf-stamp"></div>
        </div>
    </div>
</div>

<script>
/* DATABASE_KMS_2027 - 600 QUESTIONS SCELLÉES */
const DATABASE = {
    "Energie": { icon: "fa-bolt", jobs: ["Architecte Fusion SMR", "Ingénieur Hydrogène Vert", "Analyste Smart-Grid", "Expert Lithium Sourcing", "Manager VPP (Virtual Power Plant)", "Lead Dev Nucléaire 4.0", "Directeur Eolien Offshore", "Ingénieur Réseaux HVDC", "Auditeur Efficacité BESS", "Designer Bio-Masse", "Expert Sûreté Thorium", "Analyste Stockage Gravitaire", "Ingénieur Géothermie Profonde", "Manager Transition Carb", "Expert Micro-Grid IA"] },
    "IT & IA": { icon: "fa-microchip", jobs: ["Architecte Post-Quantique", "Lead Dev IA Générative", "Expert Cyber SOC 2027", "Ingénieur ML Ops", "Architecte Cloud Native", "Blockchain Strategist", "Data Ethics Officer", "Quantum Algorithm Dev", "Edge Computing Architect", "Analyste Threat Intelligence", "DevSecOps Senior", "Expert IA Proactive", "Architecte Web3/DeFi", "Manager Gouvernance Data", "Ingénieur Rust Systems"] },
    "Sante": { icon: "fa-dna", jobs: ["Ingénieur Génomique", "Expert IA Radiologie", "Auditeur Bio-Sécurité", "Chef Clinique Numérique", "Data Scientist Oncologie", "Expert Télémédecine", "Bio-Informaticien", "Manager Robotique Chirurgie", "Analyste Pharmacovigilance", "Expert IoT Médical", "Neuro-Technologue", "Directeur Innovation Med", "Expert Protéomique", "Manager E-Santé", "Analyste Lab 4.0"] },
    "Finance": { icon: "fa-chart-line", jobs: ["Quantum Risk Analyst", "DeFi Protocol Architect", "ESG Lead Strategist", "Algorithmic Trader", "Auditeur Fraude IA", "CFO Digital", "Blockchain Treasury Manager", "Manager Fintech Ops", "Analyste M&A Tech", "Expert Modélisation Risque", "Spécialiste Actifs Num", "Directeur Banque Mobile", "Asset Manager IA", "Analyste Risque Systémique", "Contrôleur BI Finance"] },
    "Agri-Food": { icon: "fa-seedling", jobs: ["Manager Vertical Farming", "Ingénieur Agro-IA", "Expert FoodTech Protéine", "Auditeur Bio-Food", "Manager Précision Agri", "R&D Food Scientist", "Expert Packaging Bio", "Ingénieur Irrigation IA", "Microbiologiste Indus", "Analyste Supply Agri", "Directeur Ferme 4.0", "Consultant AgTech", "Expert Traçabilité Bloc", "Ingénieur Robotique Agri", "Manager Nutrition Digitale"] },
    "Commerce": { icon: "fa-shopping-cart", jobs: ["Directeur Supply Chain Cognitive", "Analyste Pricing IA", "Expert Omnicanal", "Manager Logistique Auto", "E-commerce Strategist", "Directeur Phygital", "Expert Achats Durables", "Analyste Flux Retail", "Blockchain Sourcing", "Manager Marketplace", "Auditeur Retail Tech", "Growth Head B2B", "Expert Last-Mile", "Directeur Franchise", "Analyste Customer Data"] },
    "Education": { icon: "fa-user-graduate", jobs: ["Neuro-Pédagogue Digital", "Architecte Meta-Campus", "Expert EdTech IA", "Directeur Innovation L&D", "Analyste Learning Data", "Designer Serious Games", "Expert Micro-Certifs", "Manager LMS Adaptatif", "Directeur E-Learning", "Psychométricien Digital", "Expert Inclusion Numérique", "Designer Bootcamp IA", "Analyste Flux Scolaire", "Conseiller IA Education", "Manager EdTech Strategy"] },
    "Tourisme": { icon: "fa-plane", jobs: ["Expert Tourisme Spatial", "Manager Hospitality 4.0", "Directeur Voyage Durable", "Revenue Manager IA", "Architecte Expérience Immersive", "Expert Eco-Resort", "Chef Produit Voyage Immersif", "Manager Cruise Tech", "Expert Booking Crypto", "Analyste Smart Destination", "Directeur Marketing Digital", "Auditeur Transport Vert", "Expert Patrimoine Digital", "Manager MICE IA", "Analyste Mobilité Touristique"] }
};

const i18n = {
    fr: { back: "RETOUR", next: "SUIVANT", start: "LANCER L'AUDIT", sect_title: "8 SECTEURS STRATÉGIQUES", validate: "VALIDER", dl_cert: "TÉLÉCHARGER LE CERTIFICAT GOLD", pdf_acc: "ACCRÉDITATION", pdf_agent: "L'Agent KMS V390 certifie que l'expert :", pdf_is: "est accrédité pour le standard 2027 au poste de :" },
    en: { back: "BACK", next: "NEXT", start: "START AUDIT", sect_title: "8 STRATEGIC SECTORS", validate: "VALIDATE", dl_cert: "DOWNLOAD GOLD CERTIFICATE", pdf_acc: "ACCREDITATION", pdf_agent: "KMS V390 Agent certifies that expert:", pdf_is: "is accredited for 2027 standard as:" },
    ar: { back: "رجوع", next: "التالي", start: "بدء التدقيق", sect_title: "8 قطاعات استراتيجية", validate: "تأكيد", dl_cert: "تحميل الشهادة الذهبية", pdf_acc: "شهادة اعتماد", pdf_agent: "يشهد وكيل KMS V390 أن الخبير:", pdf_is: "معتمد لمعايير 2027 في منصب:" }
};

const KMS = {
    lang: 'fr', current: 'p-start', history: ['p-start'], sector: '', job: '', step: 0, score: 0, delta: 0,
    translate(l) {
        this.lang = l; document.dir = (l === 'ar' ? 'rtl' : 'ltr');
        document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = i18n[l][el.getAttribute('data-i18n')]);
        if(this.current === 'p-audit') this.renderQ();
    },
    go(id) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        this.current = id; this.history.push(id);
        if(id === 'p-sectors') this.renderSectors();
    },
    back() { if(this.history.length > 1) { this.history.pop(); this.go(this.history[this.history.length-1]); } },
    renderSectors() {
        const g = document.getElementById('grid-sectors'); g.innerHTML = '';
        Object.keys(DATABASE).forEach(s => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<i class="fas ${DATABASE[s].icon} fa-2x" style="color:var(--gold)"></i><h2>${s}</h2>`;
            d.onclick = () => { this.sector = s; this.go('p-jobs'); this.renderJobs(); };
            g.appendChild(d);
        });
    },
    renderJobs() {
        document.getElementById('selected-sector').innerText = this.sector;
        const g = document.getElementById('grid-jobs'); g.innerHTML = '';
        DATABASE[this.sector].jobs.forEach(j => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<h3>${j}</h3>`;
            d.onclick = () => { this.job = j; this.step = 0; this.score = 0; this.delta = 0; this.go('p-audit'); this.renderQ(); };
            g.appendChild(d);
        });
    },
    renderQ() {
        if(this.step >= 5) return this.finalize();
        const templates = [
            {q: `[STRAT-2027] Optimisation du flux pour ${this.job} ?`, a: ["Alpha: Solution IA Neural-Link (+10)", "Beta: Processus Hybride (+7)", "Gamma: Système Legacy (+4)"]},
            {q: `Gestion critique des risques en ${this.sector} ?`, a: ["Alpha: Antidote Quantum-Safe (+10)", "Beta: Protocole Standard (+7)", "Gamma: Audit manuel (+4)"]}
        ];
        const qData = templates[this.step % 2];
        document.getElementById('audit-meta').innerText = `STEP ${this.step+1}/5 | ${this.job}`;
        document.getElementById('audit-q').innerText = qData.q;
        const o = document.getElementById('audit-opts'); o.innerHTML = '';
        qData.a.forEach((t, i) => {
            const b = document.createElement('button'); b.className = 'card'; b.style.width="100%"; b.style.margin="5px 0"; b.innerText = t;
            b.onclick = () => { this.tempPts = [10,7,4][i]; document.getElementById('delta-input').style.display='none'; b.style.borderColor="white"; };
            o.appendChild(b);
        });
        const dBtn = document.createElement('button'); dBtn.className = 'card'; dBtn.style.width="100%"; dBtn.innerText = "DELTA: INTERPRÉTATION EXPERT"; dBtn.style.color="var(--gold)";
        dBtn.onclick = () => { this.tempPts = 12; document.getElementById('delta-input').style.display='block'; };
        o.appendChild(dBtn);
    },
    submitAnswer() {
        if(this.tempPts === 12) {
            if(document.getElementById('delta-input').value.length > 40) this.delta++;
            else { alert("L'analyse expert doit dépasser 40 caractères."); return; }
        }
        if(this.tempPts) { this.score += this.tempPts; this.step++; this.tempPts = 0; this.renderQ(); }
    },
    finalize() {
        const total = Math.round((this.score/50)*100);
        if(total <= 80 || this.delta < 3) { alert("AUDIT ÉCHOUÉ : Score " + total + "% insuffisant ou manque d'approbations Delta."); location.reload(); return; }
        const name = prompt("ENTREZ VOTRE NOM POUR LE CERTIFICAT :").toUpperCase();
        this.go('p-finish');
        document.getElementById('pdf-name').innerText = name;
        document.getElementById('pdf-job').innerText = this.job;
        document.getElementById('pdf-signature').innerText = name;
        document.getElementById('pdf-score').innerText = total + "%";
        document.getElementById('pdf-icon').className = "fas " + DATABASE[this.sector].icon;
        new QRCode(document.getElementById("qrcode"), { text: `KMS-V390-${name}-${total}`, width: 140, height: 140 });
    },
    exportPDF() {
        const el = document.getElementById('cert-container');
        html2pdf().set({ margin:0, filename:'V390_TITANIUM_CERT.pdf', jsPDF:{unit:'px', format:[1122, 793], orientation:'landscape'} }).from(el).save();
    }
};

KMS.translate('fr');
</script>
</body>
</html>
