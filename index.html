<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MBA-CONSULT | GLOBAL KMS V390 ULTIME</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;600;800&family=Amiri:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #c5a021; --navy: #0a1128; --white: #ffffff; --bg: #f4f7f9; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--navy); overflow-x: hidden; }
        
        body.rtl { direction: rtl; font-family: 'Amiri', serif; }
        body.rtl .cert-validation-block { left: auto; right: 60px; text-align: right; }
        body.rtl .cert-footer { flex-direction: row-reverse; }
        body.rtl #lang-switcher { right: auto; left: 20px; }

        #lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 40000; display: flex; gap: 8px; background: rgba(10,17,40,0.95); padding: 10px; border-radius: 8px; border: 1px solid var(--gold); }
        .lang-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 6px 14px; cursor: pointer; font-weight: 800; border-radius: 4px; }
        .lang-btn.active { background: var(--gold); color: var(--navy); }

        #vision-portal { position: fixed; inset: 0; background: var(--navy); z-index: 30000; display: flex; justify-content: center; align-items: center; color: white; padding: 20px; text-align: center; }
        .welcome-box { background: rgba(15, 25, 55, 0.98); border: 2px solid var(--gold); padding: 40px; border-radius: 15px; max-width: 1000px; width: 100%; }
        .speech-text { font-size: 1.5em; line-height: 1.6; margin: 30px 0; font-weight: 300; font-style: italic; color: #e0e0e0; }
        
        header { background: var(--navy); color: var(--gold); padding: 25px; text-align: center; border-bottom: 5px solid var(--gold); font-family: 'Cinzel'; font-size: 1.8em; letter-spacing: 6px; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; padding: 30px; max-width: 1400px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; border: 2px solid #eee; cursor: pointer; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .card i { font-size: 2.5em; color: var(--gold); margin-bottom: 15px; display: block; }
        .card h3 { font-family: 'Cinzel'; margin: 10px 0; font-size: 1.1em; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); background: #fffcf0; }

        #audit-interface { display: none; max-width: 900px; width: 95%; margin: 40px auto; background: white; padding: 40px; border-radius: 15px; border-left: 10px solid var(--gold); }
        .opt-button { display: block; width: 100%; padding: 18px; margin: 10px 0; border: 2px solid #eee; cursor: pointer; background: white; text-align: inherit; border-radius: 8px; font-size: 1em; }
        .opt-button.selected { border-color: var(--gold); background: #fdfaf0; border-width: 3px; font-weight: 800; }

        /* CERTIFICAT V390 - FIX SUPERPOSITION */
        #certificat-wrapper { display: none; padding: 40px 0; text-align: center; }
        .scroll-box { width: 100%; overflow-x: auto; padding: 20px 0; }
        #cert-area { width: 1100px; height: 800px; background: white; margin: 0 auto; padding: 60px; position: relative; border: 35px double var(--gold); overflow: hidden; }
        .cert-validation-block { position: absolute; top: 60px; left: 70px; text-align: left; z-index: 10; }
        .cert-qr { width: 130px; border: 1px solid #ddd; margin-bottom: 10px; }
        .cert-footer { position: absolute; bottom: 70px; left: 70px; right: 70px; display: flex; justify-content: space-between; align-items: flex-end; z-index: 10; }
        
        #c-name-container { margin: 40px 0; min-height: 80px; }
        #c-job-container { margin: 20px 0; min-height: 60px; }
    </style>
</head>
<body>

<div id="lang-switcher">
    <button class="lang-btn" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('ar')">AR</button>
</div>

<div id="vision-portal">
    <div class="welcome-box">
        <h1 style="font-family: 'Cinzel'; font-size: 3em; color: var(--gold);">MBA-CONSULT</h1>
        <div class="speech-text" id="v-speech"></div>
        <button class="lang-btn active" id="v-btn" onclick="document.getElementById('vision-portal').style.display='none'"></button>
    </div>
</div>

<header id="h-main">MBA-CONSULT | GLOBAL KMS V390</header>

<div id="selection-interface">
    <h2 id="s-title" style="text-align:center; font-family: 'Cinzel';"></h2>
    <div class="grid-container" id="sector-grid"></div>
</div>

<div id="job-interface" style="display:none;">
    <h2 id="j-title" style="text-align:center; font-family: 'Cinzel';"></h2>
    <div class="grid-container" id="job-grid"></div>
</div>

<div id="audit-interface">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <span id="audit-step" style="font-weight: 800; color: var(--gold);"></span>
        <span id="job-badge" style="background: var(--navy); color: white; padding: 5px 15px; border-radius: 15px; font-size: 0.8em;"></span>
    </div>
    <h2 id="q-text"></h2>
    <div id="options-stack"></div>
    <button id="q-submit" onclick="submitStep()" style="background: var(--gold); color: var(--navy); border: none; padding: 20px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 20px; border-radius: 8px;"></button>
</div>

<div id="certificat-wrapper">
    <button onclick="generatePDF()" style="padding:15px 30px; background:#27ae60; color:white; border:none; cursor:pointer; font-weight:800; margin-bottom:20px; border-radius: 5px;">DOWNLOAD ACCREDITATION PDF</button>
    <div class="scroll-box">
        <div id="cert-area">
            <div class="cert-validation-block">
                <img id="c-qr" class="cert-qr" src="">
                <div id="c-score-pct" style="font-size: 2.2em; font-weight: 900; color: var(--navy);"></div>
                <div style="color: var(--gold); font-weight: 800;">WORLD RANK: #1 TOP TIER</div>
            </div>
            
            <div id="c-cert-title" style="font-family: 'Cinzel'; font-size: 45px; margin-top: 40px;"></div>
            <div id="c-sub" style="letter-spacing: 10px; font-weight: 800; color: var(--gold); font-size: 15px;"></div>
            
            <p id="c-confirm" style="font-size: 1.6em; margin-top: 60px; color: #444;"></p>
            
            <div id="c-name-container">
                <div id="c-name" style="font-family: 'Amiri'; font-size: 52px; border-bottom: 3px solid var(--navy); display: inline-block; padding: 0 40px; color: var(--navy);"></div>
            </div>

            <p id="c-expert-text" style="font-size: 1.6em; color: #444;"></p>
            
            <div id="c-job-container">
                <div id="c-job" style="font-size: 38px; font-weight: 900; color: var(--gold); text-transform: uppercase;"></div>
            </div>

            <div class="cert-footer">
                <div style="text-align:left;">
                    <div id="c-sig" style="font-family: 'Amiri'; font-size: 28px; border-bottom: 2px solid #333; width: 250px; font-style: italic;"></div>
                    <small id="c-sig-label" style="font-weight: 800; display: block; margin-top: 5px; color: var(--gold);"></small>
                </div>
                <div style="text-align:right;">
                    <div style="color: var(--gold); font-weight: 900;">MBA-CONSULT GLOBAL BOARD</div>
                    <div style="font-family: 'Cinzel'; font-size: 20px; border-bottom: 2px solid #333; width: 280px; margin-top: 10px; color: var(--navy);">OFFICIAL ACCREDITATION</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SECTORS_DATA = {
        "Finance": { icon: "fa-chart-line", jobs: ["Trader HFT", "Directeur M&A", "Analyste ESG", "Risk Manager", "CFO", "Banquier Privé", "Actuaire", "Fiscaliste Int.", "Auditeur Senior", "Trésorier Group", "Analyste Quant", "Compliance Officer", "Asset Manager", "Directeur Crédit", "Expert Crypto-Finance"] },
        "IT & AI": { icon: "fa-robot", jobs: ["AI Architect", "Cyber-Expert", "Cloud Engineer", "Data Scientist", "CTO", "DevSecOps", "ML Engineer", "Prompt Engineer", "Blockchain Dev", "Product Owner", "UX Strategist", "IT Auditor", "Fullstack Expert", "Solutions Architect", "SOC Analyst"] },
        "Energie": { icon: "fa-bolt", jobs: ["Ingénieur Solaire", "Expert Éolien", "Nucléaire Tech", "Carbone Consultant", "Energy Trader", "Smart Grid Eng.", "Hydrogène Spec.", "Drilling Engineer", "HSE Manager", "Project Manager", "Bio-Energy Spec.", "Geologist", "Offshore Expert", "Storage Scientist", "Grid Operator"] },
        "Agri-Food": { icon: "fa-leaf", jobs: ["Ing. Agronome", "Qualité Senior", "Food Tech Spec.", "Supply Chain Mgr", "Plant Manager", "R&D Scientist", "Export Manager", "Farm Manager", "Nutrition Expert", "Logistics Mgr", "Bio-Tech Spec.", "Audit Certif.", "Packaging Eng.", "Safety Officer", "Procurement Spec."] },
        "Tourisme": { icon: "fa-plane", jobs: ["Directeur Hôtel", "Yield Manager", "E-Reputation Mgr", "Revenue Mgr", "Event Planner", "Resort Director", "Cruise Manager", "MICE Expert", "Travel Tech Spec", "Luxury Planner", "Experience Mgr", "Airport Director", "F&B Manager", "Marketing Mgr", "Destination Spec."] },
        "Education": { icon: "fa-graduation-cap", jobs: ["Doyen Académique", "EdTech Designer", "Chercheur IA", "L&D Manager", "E-learning Dir.", "School Principal", "Coach Exécutif", "Career Counselor", "Inclusion Spec.", "Admissions Dir.", "Curriculum Dev.", "Policy Analyst", "Student Success Mgr", "Training Dir.", "Academic Dean"] }
    };

    // Moteur de génération de questions techniques ultra-précises
    function generateTechnicalQs(job, sector) {
        return [
            { q: `Sur le métier de ${job}, comment optimisez-vous la résilience face à un choc systémique ?`, a: [`Alpha: Stratégie prédictive par modèles stochastiques (+10)`, `Beta: Diversification granulaire des flux (+7)`, `Gamma: Maintien d'un buffer de sécurité standard (+4)`] },
            { q: `Quelle est votre approche de l'intégration des normes ISO/Compliance spécifiques au secteur ${sector} ?`, a: [`Alpha: Automatisation du monitoring via API temps-réel (+10)`, `Beta: Audits périodiques par tiers certifiés (+7)`, `Gamma: Veille réglementaire manuelle (+4)`] },
            { q: `Comment gérez-vous l'arbitrage entre innovation radicale et stabilité opérationnelle ?`, a: [`Alpha: Pilotage par POC en environnements isolés (Sandboxing) (+10)`, `Beta: Déploiement incrémental (Agile) (+7)`, `Gamma: Mise à jour après validation globale (+4)`] },
            { q: `Dans une situation de crise majeure, quel KPI priorisez-vous pour ${job} ?`, a: [`Alpha: Le taux de rétention des actifs critiques (+10)`, `Beta: La marge opérationnelle nette (+7)`, `Gamma: Le volume de production/service (+4)`] },
            { q: `Quelle technologie de rupture aura le plus d'impact sur votre rôle de ${job} d'ici 2030 ?`, a: [`Alpha: L'Intelligence Artificielle Générative & Quantique (+10)`, `Beta: L'automatisation robotisée des processus (RPA) (+7)`, `Gamma: La numérisation des supports physiques (+4)`] }
        ];
    }

    const UI = {
        fr: { vSpeech: "Rejoignez l'élite décisionnelle mondiale.\nL'expertise est le seul capital inaltérable.", vBtn: "DÉPLOYER L'AUDIT V390", sTitle: "UNITÉS D'ACCRÉDITATION MBA", jTitle: "SÉLECTIONNEZ VOTRE EXPERTISE", qSubmit: "VALIDER LA DÉCISION", promptName: "NOM COMPLET :", cTitle: "CERTIFICAT D'EXCELLENCE", cSub: "ACCRÉDITATION MONDIALE MBA", cConfirm: "Ce document atteste solennellement que", cExpert: "A validé son accréditation pour le métier de :", cSig: "SIGNATURE VÉRIFIÉE" },
        en: { vSpeech: "Join the global elite.\nExpertise is the only unalterable capital.", vBtn: "DEPLOY AUDIT V390", sTitle: "MBA ACCREDITATION UNITS", jTitle: "SELECT YOUR EXPERTISE", qSubmit: "VALIDATE DECISION", promptName: "FULL NAME:", cTitle: "CERTIFICATE OF EXCELLENCE", cSub: "GLOBAL MBA ACCREDITATION", cConfirm: "This document solemnly certifies that", cExpert: "Has validated accreditation for the profession of:", cSig: "VERIFIED SIGNATURE" },
        ar: { vSpeech: "انضم إلى نخبة الخبراء في العالم.\nالخبرة هي الأصل الوحيد الذي لا يتغير.", vBtn: "بدء التدقيق V390", sTitle: "وحدات الاعتماد المهني MBA", jTitle: "اختر تخصصك الدقيق", qSubmit: "تأكيد القرار", promptName: "الاسم الكامل:", cTitle: "شهادة التميـــــــــز", cSub: "الاعتماد المهنـي العالمـي", cConfirm: "تشهد هذه الوثيقة رسمياً وبكل فخر بأن", cExpert: "قد اجتاز بنجاح الاعتماد لمهنة:", cSig: "توقيع معتمد" }
    };

    let curL = 'fr', score = 0, step = 0, selSec = "", selJob = "", tempPts = 0, activeQs = [];

    function setLang(l) {
        curL = l; document.body.className = (l === 'ar' ? 'rtl' : '');
        const d = UI[l];
        document.getElementById('v-speech').innerText = d.vSpeech;
        document.getElementById('v-btn').innerText = d.vBtn;
        document.getElementById('s-title').innerText = d.sTitle;
        document.getElementById('j-title').innerText = d.jTitle;
        document.getElementById('q-submit').innerText = d.qSubmit;
        initSectors();
    }

    function initSectors() {
        const grid = document.getElementById('sector-grid'); grid.innerHTML = "";
        Object.keys(SECTORS_DATA).forEach(s => {
            grid.innerHTML += `<div class="card" onclick="openJobs('${s}')"><i class="fas ${SECTORS_DATA[s].icon}"></i><h3>${s}</h3></div>`;
        });
    }

    function openJobs(s) {
        selSec = s; document.getElementById('selection-interface').style.display = 'none';
        document.getElementById('job-interface').style.display = 'block';
        const grid = document.getElementById('job-grid'); grid.innerHTML = "";
        SECTORS_DATA[s].jobs.forEach(j => {
            grid.innerHTML += `<div class="card" onclick="startAudit('${j}')" style="padding:15px; font-size:0.9em;">${j}</div>`;
        });
    }

    function startAudit(j) {
        selJob = j; activeQs = generateTechnicalQs(j, selSec);
        document.getElementById('job-interface').style.display = 'none';
        document.getElementById('audit-interface').style.display = 'block';
        document.getElementById('job-badge').innerText = j;
        loadQ();
    }

    function loadQ() {
        if(step >= 5) { conclude(); return; }
        document.getElementById('audit-step').innerText = `ETAPE ${step+1}/5`;
        const qs = activeQs[step];
        document.getElementById('q-text').innerText = qs.q;
        const stack = document.getElementById('options-stack'); stack.innerHTML = "";
        qs.a.forEach((o, i) => { stack.innerHTML += `<button class="opt-button" onclick="sel(this, ${[10,7,4][i]})">${o}</button>`; });
    }

    function sel(btn, p) {
        document.querySelectorAll('.opt-button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); tempPts = p;
    }

    function submitStep() { if(tempPts) { score += tempPts; step++; tempPts=0; loadQ(); } }

    function conclude() {
        document.getElementById('audit-interface').style.display = 'none';
        if(score < 35) { alert("SCORE INSUFFISANT"); location.reload(); }
        else {
            const name = prompt(UI[curL].promptName) || "EXPERT";
            const d = UI[curL];
            document.getElementById('certificat-wrapper').style.display = 'block';
            document.getElementById('c-cert-title').innerText = d.cTitle;
            document.getElementById('c-sub').innerText = d.cSub;
            document.getElementById('c-confirm').innerText = d.cConfirm;
            document.getElementById('c-expert-text').innerText = d.cExpert;
            document.getElementById('c-sig-label').innerText = d.cSig;
            document.getElementById('c-name').innerText = name.toUpperCase();
            document.getElementById('c-job').innerText = selJob;
            document.getElementById('c-score-pct').innerText = (score/50*100) + "%";
            document.getElementById('c-sig').innerText = name;
            document.getElementById('c-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=MBA-V390-${name}`;
        }
    }

    function generatePDF() {
        const opt = { 
            margin: 0, 
            filename: 'MBA-ACCREDITATION-V390.pdf', 
            html2canvas: { scale: 2, useCORS: true }, 
            jsPDF: { unit: 'px', format: [1100, 800], orientation: 'landscape' } 
        };
        html2pdf().set(opt).from(document.getElementById('cert-area')).save();
    }

    setLang('fr');
</script>
</body>
</html>
