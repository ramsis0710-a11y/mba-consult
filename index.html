<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA-CONSULT | GLOBAL KMS V390</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;600;800&family=Amiri:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #c5a021; --navy: #0a1128; --white: #ffffff; --bg: #f4f7f9; --linkedin: #0077b5; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--navy); }
        body.rtl { direction: rtl; font-family: 'Amiri', serif; }
        body.rtl .cert-validation-block { left: auto; right: 60px; text-align: right; }
        body.rtl .cert-footer { flex-direction: row-reverse; }

        /* INTERFACE UTILISATEUR */
        #lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 40000; display: flex; gap: 8px; background: rgba(10,17,40,0.95); padding: 10px; border-radius: 8px; border: 1px solid var(--gold); }
        .lang-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 6px 14px; cursor: pointer; font-weight: 800; border-radius: 4px; }
        .lang-btn.active { background: var(--gold); color: var(--navy); }

        #vision-portal { position: fixed; inset: 0; background: var(--navy); z-index: 30000; display: flex; justify-content: center; align-items: center; color: white; padding: 20px; text-align: center; }
        .welcome-box { background: rgba(15, 25, 55, 0.98); border: 2px solid var(--gold); padding: 60px; border-radius: 15px; max-width: 1000px; }
        .speech-text { font-size: 1.5em; line-height: 1.6; margin: 30px 0; font-weight: 300; font-style: italic; color: #e0e0e0; white-space: pre-line; }
        
        header { background: var(--navy); color: var(--gold); padding: 25px; text-align: center; border-bottom: 5px solid var(--gold); font-family: 'Cinzel'; font-size: 1.8em; letter-spacing: 6px; }

        .sector-grid, .job-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 40px; max-width: 1400px; margin: 0 auto; }
        .sector-card, .job-item { background: white; padding: 40px; border-radius: 15px; border: 2px solid #eee; cursor: pointer; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .sector-card:hover, .job-item:hover { border-color: var(--gold); transform: translateY(-10px); }
        .job-item { padding: 20px; font-weight: 700; color: var(--navy); border-left: 5px solid var(--gold); text-align: left; }
        body.rtl .job-item { text-align: right; border-left: none; border-right: 5px solid var(--gold); }

        #audit-interface { display: none; max-width: 950px; margin: 40px auto; background: white; padding: 50px; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border-left: 10px solid var(--gold); }
        .opt-button { display: block; width: 100%; padding: 22px; margin: 12px 0; border: 2px solid #eee; cursor: pointer; background: white; text-align: inherit; border-radius: 8px; font-size: 1.1em; }
        .opt-button.selected { border-color: var(--gold); background: #fdfaf0; font-weight: 800; border-width: 3px; }

        /* CERTIFICAT V390 PRESTIGE */
        #certificat-wrapper { display: none; padding: 40px 0; text-align: center; }
        #cert-area { width: 1050px; height: 740px; background: white; margin: 0 auto; padding: 50px; position: relative; border: 30px double var(--gold); overflow: hidden; }
        
        .cert-validation-block { position: absolute; top: 60px; left: 60px; text-align: left; width: 180px; }
        .cert-qr { width: 130px; border: 1px solid #eee; margin-bottom: 10px; }
        .cert-score-pct { font-size: 1.8em; font-weight: 900; color: var(--navy); margin: 5px 0; }
        .cert-rank { font-size: 0.9em; font-weight: 800; color: var(--gold); text-transform: uppercase; }

        .cert-footer { position: absolute; bottom: 50px; left: 60px; right: 60px; display: flex; justify-content: space-between; align-items: flex-end; }
        .btn-action { padding: 15px 30px; border: none; font-weight: 800; cursor: pointer; border-radius: 5px; font-size: 1.1em; display: inline-flex; align-items: center; gap: 10px; color: white; margin: 0 10px; }
    </style>
</head>
<body>

<div id="lang-switcher">
    <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-ar" onclick="setLang('ar')">AR</button>
</div>

<div id="vision-portal">
    <div class="welcome-box">
        <h1 style="font-family: 'Cinzel'; font-size: 3.5em; margin: 0; color: var(--gold);">MBA-CONSULT</h1>
        <div class="speech-text" id="v-speech"></div>
        <div id="v-vigilance" style="color:#ff4d4d; font-weight:800; letter-spacing:2px; font-size: 1.1em;"></div>
        <button class="lang-btn active" id="v-btn" onclick="document.getElementById('vision-portal').style.display='none'" style="margin-top: 30px; padding: 18px 50px; font-size: 1.1em;"></button>
    </div>
</div>

<header id="h-main">MBA-CONSULT | GLOBAL KMS V390</header>

<div class="container" style="max-width: 1300px; margin: auto;">
    <div id="selection-interface">
        <h2 id="s-title" style="text-align:center; font-family: 'Cinzel'; margin-top: 40px;"></h2>
        <div class="sector-grid" id="sector-grid"></div>
    </div>

    <div id="job-selection-interface" style="display:none;">
        <h2 id="j-title" style="text-align:center; font-family: 'Cinzel'; margin-top: 40px;"></h2>
        <div class="job-grid" id="job-grid"></div>
    </div>

    <div id="audit-interface">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <span id="audit-step" style="font-weight: 800; color: var(--gold); font-size: 1.2em;"></span>
            <span id="job-badge" style="background: var(--navy); color: white; padding: 10px 25px; border-radius: 30px; font-weight: bold;"></span>
        </div>
        <h2 id="q-text" style="font-size: 1.7em; line-height: 1.4; color: var(--navy); margin-bottom: 20px;"></h2>
        <div id="options-stack"></div>
        
        <div id="user-comment-box" style="margin-top:20px;">
            <label id="l-comment" style="font-weight:bold; display:block; margin-bottom:10px;"></label>
            <textarea id="q-comment" style="width:100%; height:80px; padding:15px; border:1px solid #ccc; border-radius:8px; font-family:inherit;"></textarea>
        </div>

        <button id="q-submit" onclick="submitStep()" style="background: var(--gold); color: var(--navy); border: none; padding: 20px 60px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 20px; text-transform: uppercase;"></button>
    </div>

    <div id="certificat-wrapper">
        <div style="margin-bottom: 30px;">
            <button class="btn-action" style="background: #27ae60;" onclick="generatePDF()"><i class="fa-solid fa-file-pdf"></i> PDF</button>
            <button class="btn-action" style="background: #0077b5;" onclick="shareLinkedIn()"><i class="fa-brands fa-linkedin"></i> SHARE</button>
        </div>
        <div id="cert-area">
            <div class="cert-validation-block">
                <img id="c-qr" class="cert-qr" src="">
                <div class="cert-score-pct" id="c-score-pct"></div>
                <div class="cert-rank" id="c-rank"></div>
            </div>
            <div id="c-title-main" style="font-family: 'Cinzel'; font-size: 45px; margin-top: 50px; margin-left: 150px;"></div>
            <div id="c-subtitle" style="letter-spacing: 10px; font-weight: 800; color: var(--gold); margin-top: 10px; margin-left: 150px;"></div>
            <p id="c-confirm" style="font-size: 1.6em; margin-top: 80px;"></p>
            <div id="c-name" style="font-family: 'Amiri', serif; font-size: 60px; border-bottom: 3px solid #333; display: inline-block; padding: 0 50px; margin: 10px 0;"></div>
            <p id="c-expert-text" style="font-size: 1.6em; margin-top: 15px;"></p>
            <div id="c-job" style="font-size: 42px; font-weight: 900; color: var(--gold); text-transform: uppercase;"></div>
            <div class="cert-footer">
                <div style="text-align:left;">
                    <div id="c-sig" style="font-family: 'Amiri'; font-size: 32px; border-bottom: 2px solid #333; width: 300px; padding-bottom: 5px;"></div>
                    <small id="c-sig-label" style="font-weight: 800; display: block; margin-top: 5px;"></small>
                </div>
                <div style="text-align:right;">
                    <div id="c-hash" style="color: var(--gold); font-weight: bold; font-size: 1.1em;"></div>
                    <div id="c-board" style="font-family: 'Cinzel'; font-size: 20px; border-bottom: 2px solid #333; width: 300px; padding-bottom: 5px; margin-top: 10px;">MBA BOARD ALPHA</div>
                    <small id="c-acc-label" style="font-weight: 800; display: block; margin-top: 5px;"></small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // LISTE DES 20 MÉTIERS PAR SECTEUR
    const JOBS_DB = {
        Finance: ["Trader Haute Fréquence", "Analyste M&A", "Auditeur Financier", "Risk Manager", "Directeur Trésorerie", "Banquier d'Affaires", "Fiscaliste International", "Actuaire", "Gestionnaire de Fortune", "Analyste ESG", "Compliance Officer", "Broker", "Contrôleur de Gestion", "Analyste Quantitatif", "Gérant de Portefeuille", "Expert Comptable", "Credit Analyst", "Spécialiste Blockchain", "Directeur Financier", "Consultant Restructuration"],
        IT_AI: ["Data Scientist", "Architecte Cloud", "Expert Cybersécurité", "Prompt Engineer", "ML Ops Engineer", "Pentester", "Data Architect", "Scrum Master", "Analyste SOC", "Ingénieur Réalité Virtuelle", "DevSecOps", "UX Designer", "Product Owner AI", "Big Data Expert", "Manager IT", "Architecte Réseaux", "Développeur Fullstack", "Ingénieur Blockchain", "Consultant ERP", "Ingénieur Robotique"],
        Energie: ["Ingénieur Forage", "Expert Solaire", "Analyste Smart-Grid", "Géologue", "Manager Éolien", "Ingénieur Nucléaire", "Consultant Hydrogène", "Responsable HSE", "Directeur de Centrale", "Analyste Marchés Énergie", "Technicien Réseaux", "Auditeur Énergétique", "Manager Biomasse", "Géophysicien", "Planificateur Infra", "Expert Off-shore", "Spécialiste Transport Énergie", "Ingénieur Thermique", "Foreur Puits", "Consultant Décarbonation"],
        Agri_Food: ["Ingénieur Agronome", "Responsable Qualité", "Manager Supply Chain", "Généticien Végétal", "Auditeur Bio", "Oenologue", "Nutritionniste", "Expert Irrigation", "Acheteur Matières Premières", "Manager Production", "Expert des Sols", "Responsable RSE", "Ingénieur Agro-industrie", "Logistique Froid", "Manager Coopérative", "Phytopathologiste", "Expert Semences", "Chef de Culture", "Analyste Terroir", "Horticulteur"],
        Tourism: ["Revenue Manager", "Directeur de Resort", "Yield Analyst", "Expert E-reputation", "Concepteur Expériences", "Manager Écotourisme", "Chef de Réception", "Directeur Croisière", "Guide Haute Montagne", "Concierge Clés d'Or", "Manager Destination", "Analyste de Flux", "Directeur de Parc", "Event Planner", "Responsable Loisirs", "Auditeur Hôtelier", "Expert Mobilité", "Manager Incentive", "Chef de Produit", "Directeur Hôtelier"],
        Education: ["Ingénieur Pédagogique", "Directeur Académique", "Chercheur EdTech", "Directeur Campus", "Andragogue", "Coach Dirigeants", "Spécialiste LMS", "Analyste Compétences", "Manager Innovation", "Expert VAE", "Consultant Orientation", "Directeur Recherche", "Manager Faculté", "Médiateur Éducatif", "Expert Inclusion", "Concepteur E-learning", "Formateur Expert", "Auditeur Qualité", "Planificateur Académique", "Directeur d'École"]
    };

    const DATA_TRILINGUAL = {
        fr: {
            vSpeech: "Franchissez les frontières du savoir conventionnel pour intégrer l'élite décisionnelle mondiale.\nVotre expertise est votre actif le plus précieux, cet audit est sa validation ultime.",
            vVigilance: "⚠ SEUIL CRITIQUE : 80% (40/50 pts). L'ÉLITE NE CONNAÎT PAS L'APPROXIMATION.",
            vBtn: "DÉPLOYER L'AUDIT STRATÉGIQUE",
            sTitle: "UNITÉS D'ACCRÉDITATION MBA",
            jTitle: "SÉLECTIONNEZ VOTRE MÉTIER D'EXPERTISE",
            qSubmit: "VALIDER LA DÉCISION",
            lComment: "VOTRE AVIS D'EXPERT (FACULTATIF) :",
            promptName: "NOM COMPLET DE L'EXPERT :",
            cConfirm: "Ce document atteste solennellement que",
            cExpert: "A validé son accréditation mondiale pour le métier de :",
            cRank: "CLASSEMENT MONDIAL : #1 TOP TIER",
            cCertTitle: "CERTIFICAT D'EXCELLENCE",
            cSub: "ACCRÉDITATION PROFESSIONNELLE MONDIALE",
            cSigLabel: "SIGNATURE ÉLECTRONIQUE VÉRIFIÉE",
            cAccLabel: "ACCRÉDITATION MBA-CONSULT",
            sectors: { Finance: "FINANCE & MARCHÉS", Energie: "ÉNERGIE & INFRA", IT_AI: "IT & IA AVANCÉE", Agri_Food: "AGRO-ALIMENTAIRE", Tourism: "TOURISME DE LUXE", Education: "ÉDUCATION & EDTECH" }
        },
        en: {
            vSpeech: "Cross the boundaries of conventional knowledge to join the world's decision-making elite.",
            vVigilance: "⚠ CRITICAL THRESHOLD: 80% (40/50 pts). EXCELLENCE IS NON-NEGOTIABLE.",
            vBtn: "DEPLOY STRATEGIC AUDIT",
            sTitle: "MBA ACCREDITATION UNITS",
            jTitle: "SELECT YOUR FIELD OF EXPERTISE",
            qSubmit: "VALIDATE DECISION",
            lComment: "EXPERT OPINION (OPTIONAL):",
            promptName: "EXPERT FULL NAME:",
            cConfirm: "This document solemnly certifies that",
            cExpert: "Has validated global accreditation for the profession of:",
            cRank: "WORLD RANK: #1 TOP TIER",
            cCertTitle: "CERTIFICATE OF EXCELLENCE",
            cSub: "GLOBAL PROFESSIONAL ACCREDITATION",
            cSigLabel: "VERIFIED ELECTRONIC SIGNATURE",
            cAccLabel: "MBA-CONSULT ACCREDITATION",
            sectors: { Finance: "FINANCE & MARKETS", Energie: "ENERGY & INFRA", IT_AI: "IT & ADVANCED AI", Agri_Food: "AGRI-FOOD", Tourism: "LUXURY TOURISM", Education: "EDUCATION & EDTECH" }
        },
        ar: {
            vSpeech: "تجاوز حدود المعرفة التقليدية لتنضم إلى نخبة صناع القرار في العالم.",
            vVigilance: "⚠ عتبة حرجة: 80٪. التميز لا يعرف التقريب.",
            vBtn: "نشر التدقيق الاستراتيجي",
            sTitle: "وحدات الاعتماد المهني",
            jTitle: "اختر مهنة الخبرة الخاصة بك",
            qSubmit: "تأكيد القرار",
            lComment: "رأي الخبير (اختياري):",
            promptName: "اسم الخبير الكامل:",
            cConfirm: "تشهد هذه الوثيقة رسمياً بأن",
            cExpert: "قد اجتاز الاعتماد العالمي لمهنة:",
            cRank: "التصنيف العالمي: المركز الأول",
            cCertTitle: "شهادة التميز",
            cSub: "الاعتماد المهني العالمي",
            cSigLabel: "توقيع إلكتروني معتمد",
            cAccLabel: "اعتماد MBA-CONSULT",
            sectors: { Finance: "المالية والأسواق", Energie: "الطاقة والبنية التحتية", IT_AI: "التكنولوجيا والذكاء الاصطناعي", Agri_Food: "الصناعات الغذائية", Tourism: "السياحة الفaخرة", Education: "التعليم والتكنولوجيا" }
        }
    };

    let curL = 'fr', score = 0, step = 0, selectedJob = "", currentSector = "", tempPts = 0;

    function setLang(l) {
        curL = l;
        document.body.className = l === 'ar' ? 'rtl' : '';
        const d = DATA_TRILINGUAL[l];
        document.getElementById('v-speech').innerText = d.vSpeech;
        document.getElementById('v-vigilance').innerText = d.vVigilance;
        document.getElementById('v-btn').innerText = d.vBtn;
        document.getElementById('s-title').innerText = d.sTitle;
        document.getElementById('j-title').innerText = d.jTitle;
        document.getElementById('q-submit').innerText = d.qSubmit;
        document.getElementById('l-comment').innerText = d.lComment;
        initSectors();
    }

    function initSectors() {
        const grid = document.getElementById('sector-grid'); grid.innerHTML = "";
        const icons = { Finance: "🏦", Energie: "⚡", IT_AI: "🤖", Agri_Food: "🌾", Tourism: "🌍", Education: "🎓" };
        for (const [id, label] of Object.entries(DATA_TRILINGUAL[curL].sectors)) {
            grid.innerHTML += `<div class="sector-card" onclick="selectSector('${id}')"><span style="font-size:4em;">${icons[id]}</span><h3>${label}</h3></div>`;
        }
    }

    function selectSector(id) {
        currentSector = id;
        document.getElementById('selection-interface').style.display = 'none';
        document.getElementById('job-selection-interface').style.display = 'block';
        
        const grid = document.getElementById('job-grid'); grid.innerHTML = "";
        JOBS_DB[id].forEach(job => {
            grid.innerHTML += `<div class="job-item" onclick="startAudit('${job}')">${job}</div>`;
        });
    }

    function startAudit(job) {
        selectedJob = job;
        document.getElementById('job-selection-interface').style.display = 'none';
        document.getElementById('audit-interface').style.display = 'block';
        document.getElementById('job-badge').innerText = selectedJob;
        loadQ();
    }

    function loadQ() {
        if(step >= 5) { conclude(); return; }
        document.getElementById('audit-step').innerText = `STEP ${step+1}/5`;
        document.getElementById('q-text').innerText = (curL === 'ar') ? "ما هو القرار الاستراتيجي الصحيح لهذا الموقف؟" : "Quelle décision stratégique garantit l'avantage compétitif ?";
        const stack = document.getElementById('options-stack'); stack.innerHTML = "";
        ["Alpha Decision (+10)", "Beta Decision (+7)", "Gamma Decision (+4)"].forEach((o, i) => {
            let pts = [10, 7, 4][i];
            stack.innerHTML += `<button class="opt-button" onclick="sel(this, ${pts})">${o}</button>`;
        });
        tempPts = 0;
    }

    function sel(btn, p) {
        document.querySelectorAll('.opt-button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); tempPts = p;
    }

    function submitStep() { if(tempPts) { score += tempPts; step++; loadQ(); } }

    function conclude() {
        document.getElementById('audit-interface').style.display = 'none';
        if(score < 40) { alert("SCORE INSUFFISANT (Min 80%)"); location.reload(); }
        else {
            const name = prompt(DATA_TRILINGUAL[curL].promptName) || "EXPERT";
            const d = DATA_TRILINGUAL[curL];
            document.getElementById('certificat-wrapper').style.display = 'block';
            document.getElementById('c-title-main').innerText = d.cCertTitle;
            document.getElementById('c-subtitle').innerText = d.cSub;
            document.getElementById('c-confirm').innerText = d.cConfirm;
            document.getElementById('c-expert-text').innerText = d.cExpert;
            document.getElementById('c-rank').innerText = d.cRank;
            document.getElementById('c-sig-label').innerText = d.cSigLabel;
            document.getElementById('c-acc-label').innerText = d.cAccLabel;
            document.getElementById('c-name').innerText = name.toUpperCase();
            document.getElementById('c-job').innerText = selectedJob;
            document.getElementById('c-score-pct').innerText = (score / 50 * 100) + "%";
            document.getElementById('c-sig').innerText = name;
            const hash = "MBA-" + Math.random().toString(36).substr(2, 9).toUpperCase();
            document.getElementById('c-hash').innerText = hash;
            document.getElementById('c-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${hash}`;
        }
    }

    function generatePDF() {
        html2pdf().set({ margin: 0, filename: 'MBA-CERT.pdf', jsPDF: { format: 'a4', orientation: 'landscape' } }).from(document.getElementById('cert-area')).save();
    }

    function shareLinkedIn() { window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${window.location.href}`, '_blank'); }

    setLang('fr');
</script>
</body>
</html>
