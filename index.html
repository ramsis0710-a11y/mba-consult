<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA-CONSULT | GLOBAL KMS V340</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;600;800&family=Amiri:ital,wght@1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --gold: #c5a021; --navy: #0a1128; --white: #ffffff; --bg: #f4f7f9; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--navy); overflow-x: hidden; }
        body.rtl { direction: rtl; font-family: 'Amiri', serif; }

        /* UI ELEMENTS */
        #lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 40000; display: flex; gap: 8px; background: rgba(10,17,40,0.95); padding: 10px; border-radius: 8px; border: 1px solid var(--gold); }
        .lang-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 6px 14px; cursor: pointer; font-weight: 800; border-radius: 4px; font-size: 0.8em; }
        .lang-btn.active { background: var(--gold); color: var(--navy); }

        /* PORTAL */
        #vision-portal { position: fixed; inset: 0; background: var(--navy); z-index: 30000; display: flex; justify-content: center; align-items: center; color: white; padding: 20px; text-align: center; }
        .welcome-box { background: rgba(15, 25, 55, 0.98); border: 2px solid var(--gold); padding: 50px; border-radius: 15px; max-width: 900px; }
        
        /* HEADER AVEC LOGO OFFICIEL */
        header { background: var(--navy); color: var(--gold); padding: 15px; text-align: center; border-bottom: 5px solid var(--gold); display: flex; align-items: center; justify-content: center; gap: 20px; }
        .main-logo { height: 60px; filter: drop-shadow(0 0 5px rgba(197,160,33,0.5)); }

        /* GRANDE GRILLE DES SECTEURS (Répartition Proportionnelle) */
        .sector-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; padding: 40px; max-width: 1400px; margin: 0 auto; }
        .sector-card { background: white; padding: 60px 40px; border-radius: 20px; border: 2px solid #eee; cursor: pointer; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        .sector-card:hover { border-color: var(--gold); transform: translateY(-10px); box-shadow: 0 15px 50px rgba(197,160,33,0.2); }
        .sector-icon { font-size: 5em; color: var(--navy); margin-bottom: 25px; display: block; }
        .sector-card h3 { font-family: 'Cinzel'; font-size: 1.5em; margin: 0; color: var(--navy); }
        .sector-card::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 8px; background: var(--gold); transform: scaleX(0); transition: transform 0.3s; }
        .sector-card:hover::after { transform: scaleX(1); }

        /* AUDIT INTERFACE */
        #audit-interface { display: none; max-width: 1000px; margin: 40px auto; background: white; padding: 50px; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border-left: 10px solid var(--gold); }
        .opt-button { display: block; width: 100%; padding: 22px; margin: 12px 0; border: 2px solid #eee; cursor: pointer; background: white; text-align: inherit; border-radius: 8px; font-size: 1.1em; line-height: 1.5; }
        .opt-button:hover { border-color: var(--gold); background: #fdfaf0; }
        .opt-button.selected { border-color: var(--gold); background: #fdfaf0; font-weight: 800; border-width: 3px; }

        /* CERTIFICAT - MISE EN PAGE CORRIGÉE & VERROUILLÉE */
        #cert-container { display: none; padding: 40px 0; text-align: center; }
        #cert-area { 
            width: 1100px; height: 770px; /* Dimensions fixes A4 Paysage optimisées */
            background: white; margin: 0 auto; 
            padding: 50px; position: relative; 
            border: 35px double var(--gold); 
            box-shadow: 0 0 60px rgba(0,0,0,0.2);
            overflow: hidden; /* Verrouille tout contenu à l'intérieur */
        }
        
        /* Filigrane Logo Officiel */
        .cert-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.03; height: 400px; pointer-events: none; }
        
        #download-btn { background: #27ae60; color: white; padding: 18px 45px; border: none; font-weight: 800; cursor: pointer; border-radius: 5px; margin-bottom: 30px; font-size: 1.2em; gap: 10px; display: inline-flex; align-items: center; }
        #download-btn:hover { background: #219150; transform: scale(1.05); }
        
        /* Pied de page du certificat verrouillé */
        .cert-footer { 
            position: absolute; 
            bottom: 50px; /* Distance fixe du bas du cadre */
            left: 50px; 
            right: 50px; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
        }

        /* Responsive pour la grille */
        @media (max-width: 1000px) { .sector-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .sector-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="lang-switcher">
    <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-ar" onclick="setLang('ar')">AR</button>
</div>

<div id="vision-portal">
    <div class="welcome-box">
        <img src="https://i.ibb.co/vz4444T/logo-mba.png" alt="MBA-CONSULT" class="main-logo" style="height: 100px; margin-bottom: 20px;">
        <h1 style="font-family: 'Cinzel'; font-size: 2.5em; margin: 0; color: var(--gold);">GLOBAL KMS</h1>
        <div id="v-msg" style="font-size: 1.4em; line-height: 1.8; margin: 30px 0;"></div>
        <div id="v-vigilance" style="color:#ff4d4d; font-weight:800; letter-spacing:1px; text-transform: uppercase;"></div>
        <button class="lang-btn active" id="v-btn" onclick="document.getElementById('vision-portal').style.display='none'" style="margin-top: 30px; padding: 15px 40px; font-size: 1em;"></button>
    </div>
</div>

<header>
    <img src="https://i.ibb.co/vz4444T/logo-mba.png" alt="MBA-CONSULT Logo" class="main-logo">
    <div style="font-family: 'Cinzel';">MBA-CONSULT | GLOBAL KMS V340</div>
</header>

<div class="container">
    <div id="selection-interface">
        <h2 id="s-title" style="text-align:center; font-family: 'Cinzel'; margin: 40px 0; color: var(--navy); letter-spacing: 2px;"></h2>
        <div class="sector-grid" id="sector-grid">
            </div>
    </div>

    <div id="audit-interface">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <span id="audit-step" style="font-weight: 800; color: var(--gold); font-size: 1.2em;"></span>
            <span id="job-badge" style="background: var(--navy); color: white; padding: 10px 25px; border-radius: 30px; font-weight: bold;"></span>
        </div>
        <h2 id="q-text" style="font-size: 1.8em; line-height: 1.4; color: var(--navy); margin-bottom: 40px;"></h2>
        <div id="options-stack"></div>
        <button id="q-submit" onclick="submitStep()" style="background: var(--gold); color: var(--navy); border: none; padding: 20px 60px; font-weight: 800; cursor: pointer; border-radius: 5px; width: 100%; margin-top: 30px; text-transform: uppercase; font-size: 1.1em;"></button>
    </div>

    <div id="cert-container">
        <button id="download-btn" onclick="generatePDF()">
            <i class="fas fa-file-pdf"></i> TÉLÉCHARGER LE CERTIFICAT OFFICIEL (PDF)
        </button>
        
        <div id="cert-area">
            <img src="https://i.ibb.co/vz4444T/logo-mba.png" alt="Watermark" class="cert-watermark">
            
            <div style="font-family: 'Cinzel'; font-size: 45px; margin-top: 30px; color: var(--navy);">CERTIFICATE OF EXCELLENCE</div>
            <div style="letter-spacing: 8px; font-weight: 800; color: var(--gold); margin-top: 5px; font-size: 1.1em;">GLOBAL PROFESSIONAL ACCREDITATION</div>
            
            <div style="margin-top: 60px; font-size: 1.6em; font-style: italic; color: #555;" id="c-confirm"></div>
            <div id="c-name" style="font-family: 'Amiri', serif; font-size: 65px; border-bottom: 3px solid var(--navy); display: inline-block; min-width: 600px; margin: 15px 0; padding: 0 30px; color: var(--navy);"></div>
            
            <div style="font-size: 1.6em; margin-top: 10px; color: #555;" id="c-expert-text"></div>
            <div id="c-job" style="font-size: 45px; font-weight: 900; color: var(--gold); text-transform: uppercase; margin-top: 10px;"></div>
            
            <div style="background: var(--navy); color: white; padding: 20px 70px; font-size: 2.2em; font-weight: 800; width: fit-content; margin: 50px auto; border: 3px solid var(--gold); box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
                SCORE: <span id="c-score"></span>/50
            </div>

            <div class="cert-footer">
                <div style="text-align:left;">
                    <div id="c-sig" style="font-family: 'Amiri'; font-size: 35px; border-bottom: 2px solid #333; width: 320px; padding-bottom: 5px; color: var(--navy);"></div>
                    <small style="font-weight: 800; display: block; margin-top: 5px; color: #555;">SIGNATURE ÉLECTRONIQUE MBA-CONSULT</small>
                </div>
                
                <div style="text-align: center;">
                    <img id="c-qr" src="" style="width: 125px; border: 2px solid #eee; padding: 5px; background: white;">
                    <br><small id="c-hash" style="color: var(--gold); font-weight: bold; margin-top: 5px; display: block;"></small>
                </div>

                <div style="text-align:right;">
                    <div style="font-family: 'Cinzel'; font-size: 22px; border-bottom: 2px solid #333; width: 320px; padding-bottom: 5px; color: var(--navy);">MBA BOARD ALPHA</div>
                    <small style="font-weight: 800; display: block; margin-top: 5px; color: #555;">VERIFIED DIGITAL ACCREDITATION</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- DONNÉES & TRADUCTIONS (Fusion V320/V330) ---
    const TRANSLATIONS = {
        fr: {
            vMsg: "L'excellence mondiale exige une capacité de décision sous pression. Bienvenue dans l'unité d'élite MBA-Consult.",
            vVigilance: "⚠ SEUIL CRITIQUE : 80% (40/50 pts). L'échec est éliminatoire.",
            vBtn: "DÉMARRER L'AUDIT ÉLITE",
            sTitle: "SÉLECTIONNEZ VOTRE UNITÉ D'ACCRÉDITATION",
            qSubmit: "VALIDER LA STRATÉGIE",
            promptJob: "SAISISSEZ VOTRE MÉTIER PRÉCIS :",
            promptName: "NOM COMPLET POUR LE REGISTRE :",
            cConfirm: "Ce document atteste solennellement que",
            cExpert: "a démontré une expertise métier supérieure en qualité de :",
            audit: "AUDIT STRATÉGIQUE",
            fail: "CERTIFICATION REFUSÉE. SCORE INSUFFISANT (INFÉRIEUR À 80%).",
            scenarios: [
                { q: "Face à une crise systémique imminente, quel est votre protocole de sécurisation ?", r: ["Alpha: Hedging global et isolation immédiate des actifs critiques.", "Beta: Optimisation des flux de trésorerie et réduction des coûts variables.", "Gamma: Analyse d'impact approfondie et observation des mouvements de marché."] },
                { q: "Une technologie de rupture menace votre cœur de métier. Comment pilotez-vous la transition ?", r: ["Alpha: Pivot disruptif immédiat vers le nouveau modèle sémantique.", "Beta: Intégration hybride progressive et formation accélérée des cadres.", "Gamma: Veille technologique accrue et audit de faisabilité externe."] },
                { q: "Un conflit éthique ou réglementaire majeur surgit. Quelle est votre posture ?", r: ["Alpha: Mise en conformité radicale avec transparence totale et publique.", "Beta: Négociation tactique et ajustement discret des procédures internes.", "Gamma: Analyse juridique approfondie et temporisation stratégique."] },
                { q: "La performance globale chute brutalement de 15%. Quel levier actionnez-vous ?", r: ["Alpha: Restructuration complète du modèle de valeur et agilité accrue.", "Beta: Renforcement immédiat des KPIs et management de proximité.", "Gamma: Audit externe de performance et réduction budgétaire ciblée."] },
                { q: "Une opportunité d'acquisition complexe et risquée se présente. Votre décision ?", r: ["Alpha: Intégration verticale totale pour domination rapide du marché.", "Beta: Partenariat stratégique et co-entreprise pour partage des risques.", "Gamma: Étude de marché exploratoire avant tout engagement financier."] }
            ]
        },
        en: {
            vMsg: "Global excellence requires decision-making under pressure. Welcome to the MBA-Consult elite unit.",
            vVigilance: "⚠ CRITICAL THRESHOLD: 80% (40/50 pts). Failure is final.",
            vBtn: "START ELITE AUDIT",
            sTitle: "SELECT YOUR ACCREDITATION UNIT",
            qSubmit: "VALIDATE STRATEGY",
            promptJob: "ENTER YOUR PRECISE PROFESSION:",
            promptName: "FULL NAME FOR THE REGISTER:",
            cConfirm: "This document solemnly certifies that",
            cExpert: "has demonstrated superior professional expertise as:",
            audit: "STRATEGIC AUDIT",
            fail: "CERTIFICATION DENIED. INSUFFICIENT SCORE (BELOW 80%).",
            scenarios: [
                { q: "Facing an imminent systemic crisis, what is your security protocol?", r: ["Alpha: Global hedging and immediate isolation of critical assets.", "Beta: Cash-flow optimization and variable cost reduction.", "Gamma: In-depth impact analysis and market observation."] },
                { q: "A disruptive technology threatens your core business. How do you lead the transition?", r: ["Alpha: Immediate disruptive pivot to the new semantic model.", "Beta: Progressive hybrid integration and accelerated executive training.", "Gamma: Increased tech watch and external feasibility audit."] },
                { q: "A major ethical or regulatory conflict arises. What is your stance?", r: ["Alpha: Radical compliance with total and public transparency.", "Beta: Tactical negotiation and discreet adjustment of internal procedures.", "Gamma: In-depth legal analysis and strategic delay."] },
                { q: "Global performance drops brutally by 15%. What lever do you pull?", r: ["Alpha: Complete value model restructuring and increased agility.", "Beta: Immediate KPI reinforcement and proximity management.", "Gamma: External performance audit and targeted budget cuts."] },
                { q: "A complex and risky acquisition opportunity arises. Your decision?", r: ["Alpha: Total vertical integration for rapid market dominance.", "Beta: Strategic partnership and joint venture for risk sharing.", "Gamma: Exploratory market study before any financial commitment."] }
            ]
        },
        ar: {
            vMsg: "تتطلب الخبرة العالمية القدرة على اتخاذ القرار تحت الضغط. مرحباً بكم في وحدة النخبة بمؤسسة MBA-Consult.",
            vVigilance: "⚠ عتبة حرجة: 80٪ (40/50 نقطة). الفشل نهائي.",
            vBtn: "بدء التدقيق المهني",
            sTitle: "اختر وحدة الاعتماد الخاصة بك",
            qSubmit: "تأكيد الاستراتيجية",
            promptJob: "أدخل مهنتك الدقيقة:",
            promptName: "الاسم الكامل للسجل:",
            cConfirm: "تشهد هذه الوثيقة رسمياً بأن",
            cExpert: "قد أظهر تميزاً مهنيا استثنائياً بصفته:",
            audit: "التدقيق الاستراتيجي",
            fail: "تم رفض الشهادة. النتيجة غير كافية (أقل من 80٪).",
            scenarios: [
                { q: "في مواجهة أزمة نظامية وشيكة، ما هو بروتوكول التأمين لديك؟", r: ["ألفا: التحوط العالمي والعزل الفوري للأصول الحرجة.", "بيتا: تحسين التدفقات النقدية وخفض التكاليف المتغيرة.", "غاما: تحليل الأثر المتعمق ومراقبة تحركات السوق."] },
                { q: "تقنية خارقة تهدد عملك الأساسي. كيف تقود مرحلة الانتقال؟", r: ["ألفا: التحول الجذري الفوري نحو النموذج الدلالي الجديد.", "بيتا: التكامل الهجين التدريجي والتدريب المكثف للتنفيذيين.", "غاما: زيادة المراقبة التقنية وتدقيق الجدوى الخارجية."] },
                { q: "نشوب صراع أخلاقي أو تنظيمي كبير. ما هو موقفك؟", r: ["ألفا: الامتثال الجذري مع الشفافية الكاملة والعامة.", "بيتا: التفاوض التكتيكي والتعديل الحذر للإجراءات الداخلية.", "غاما: التحليل القانوني المتعمق والتريث الاستراتيجي."] },
                { q: "انخفاض الأداء العالمي فجأة بنسبة 15٪. ما هو المحرك الذي ستستخدمه؟", r: ["ألفا: إعادة هيكلة نموذج القيمة بالكامل وزيادة المرونة.", "بيتا: تعزيز مؤشرات الأداء الرئيسية فوراً والإدارة المباشرة.", "غاما: تدقيق خارجي للأداء وخفض الميزانية المستهدف."] },
                { q: "فرصة استحواذ معقدة ومحفوفة بالخاطر تلوح في الأفق. ما هو قرارك؟", r: ["ألفا: التكامل العمودي الكامل للهيمنة السريعة على السوق.", "بيتا: الشراكة الاستراتيجية والمشروع المشترك لتقاسم المخاطر.", "غاما: دراسة سوقية استكشافية قبل أي التزام مالي."] }
            ]
        }
    };

    const DATABASE = {
        Finance: { logo: "fa-solid fa-building-columns", fr: ["Trader", "Analyste M&A", "Auditeur Risk", "Directeur Financier"] },
        Energie: { logo: "fa-solid fa-bolt", fr: ["Ingénieur Forage", "Expert Solaire", "Ingénieur Nucléaire", "Manager HSE"] },
        IT_AI: { logo: "fa-solid fa-robot", fr: ["Data Scientist", "Architecte Cloud", "Cyber Expert", "ML Ops"] },
        Agri_Food: { logo: "fa-solid fa-wheat-awn", fr: ["Agronome", "Responsable Qualité", "Généticien Agro", "Oenologue"] },
        Tourism: { logo: "fa-solid fa-earth-americas", fr: ["Revenue Manager", "Directeur Resort", "Directeur Hôtelier"] },
        Education: { logo: "fa-solid fa-graduation-cap", fr: ["Directeur Académique", "Chercheur EdTech", "Innovation Manager"] }
    };

    // --- LOGIQUE CORE SYSTÈME ---
    let curL = 'fr', score = 0, step = 0, selectedJob = "";

    function setLang(l) {
        curL = l;
        document.body.className = l === 'ar' ? 'rtl' : '';
        const d = TRANSLATIONS[l];
        document.getElementById('v-msg').innerText = d.vMsg;
        document.getElementById('v-vigilance').innerText = d.vVigilance;
        document.getElementById('v-btn').innerText = d.vBtn;
        document.getElementById('s-title').innerText = d.sTitle;
        document.getElementById('q-submit').innerText = d.qSubmit;
        initSectors();
    }

    function initSectors() {
        const grid = document.getElementById('sector-grid'); grid.innerHTML = "";
        for (const [id, data] of Object.entries(DATABASE)) {
            // Reprise du design "Grands Logos proportionnels"
            grid.innerHTML += `
                <div class="sector-card" onclick="selectSector('${id}')">
                    <i class="${data.logo} sector-icon"></i>
                    <h3>${id.replace('_',' & ')}</h3>
                </div>
            `;
        }
    }

    function selectSector(id) {
        const jobsFr = DATABASE[id].fr; // Liste de référence en FR
        selectedJob = prompt(`${TRANSLATIONS[curL].promptJob}\n\n${jobsFr.join(" | ")}`) || jobsFr[0];
        document.getElementById('selection-interface').style.display = 'none';
        document.getElementById('audit-interface').style.display = 'block';
        document.getElementById('job-badge').innerText = selectedJob.toUpperCase();
        loadQ();
    }

    function loadQ() {
        if(step >= 5) { conclude(); return; } // Logique V320: 5 questions
        const scenario = TRANSLATIONS[curL].scenarios[step];
        document.getElementById('audit-step').innerText = `${TRANSLATIONS[curL].audit} ${step+1}/5`;
        document.getElementById('q-text').innerText = scenario.q;
        const stack = document.getElementById('options-stack'); stack.innerHTML = "";
        
        // Mélange aléatoire des options
        const shuffledOpts = [...scenario.r].sort(() => Math.random() - 0.5);
        
        shuffledOpts.forEach((o) => {
            let pts = o.includes("Alpha") ? 10 : (o.includes("Beta") ? 7 : 4);
            stack.innerHTML += `<button class="opt-button" onclick="sel(this, ${pts})">${o}</button>`;
        });
        tempPts = 0;
    }

    let tempPts = 0;
    function sel(btn, p) {
        document.querySelectorAll('.opt-button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); tempPts = p;
    }

    function submitStep() { if(tempPts) { score += tempPts; step++; loadQ(); } }

    function conclude() {
        document.getElementById('audit-interface').style.display = 'none';
        if(score < 40) { // Seuil V320: 80% de 50 pts = 40 pts
            alert(TRANSLATIONS[curL].fail); location.reload();
        } else {
            const name = prompt(TRANSLATIONS[curL].promptName) || "EXPERT";
            document.getElementById('cert-container').style.display = 'block';
            document.getElementById('c-name').innerText = name.toUpperCase();
            document.getElementById('c-job').innerText = selectedJob;
            document.getElementById('c-score').innerText = score;
            document.getElementById('c-sig').innerText = name;
            
            // Textes statiques du certificat localisés
            document.getElementById('c-confirm').innerText = TRANSLATIONS[curL].cConfirm;
            document.getElementById('c-expert-text').innerText = TRANSLATIONS[curL].cExpert;
            document.getElementById('c-cert-title').innerText = curL === 'ar' ? 'شهادة التميز المهني' : 'CERTIFICATE OF EXCELLENCE';

            // Sécurité
            const hash = "KMS-" + Math.random().toString(36).substr(2, 9).toUpperCase();
            document.getElementById('c-hash').innerText = hash;
            document.getElementById('c-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=125x125&data=MBA-VERIFIED-${hash}-${name}-${score}`;
            
            window.scrollTo(0, 500); // Scroll vers le certificat
        }
    }

    // --- GÉNÉRATION PDF OFFICIELLE ( html2pdf.js ) ---
    function generatePDF() {
        const element = document.getElementById('cert-area');
        const opt = {
            margin: 0,
            filename: `MBA-CONSULT-ACCREDITATION-${document.getElementById('c-hash').innerText}.pdf`,
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2, useCORS: true, letterRendering: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' } // Verrouillage A4 Paysage
        };
        html2pdf().set(opt).from(element).save();
    }

    // Démarrage par défaut
    setLang('fr');
</script>
</body>
</html>
