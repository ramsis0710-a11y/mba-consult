<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MBA-CONSULT | GLOBAL KMS V390</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;600;800&family=Amiri:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --gold: #c5a021; --navy: #0a1128; --white: #ffffff; --bg: #f4f7f9; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--navy); overflow-x: hidden; }
        
        /* RTL & MOBILE OPTIMIZATION */
        body.rtl { direction: rtl; font-family: 'Amiri', serif; }
        body.rtl .cert-validation-block { left: auto; right: 60px; text-align: right; }
        body.rtl .cert-footer { flex-direction: row-reverse; }
        body.rtl #lang-switcher { right: auto; left: 20px; }

        #lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 40000; display: flex; gap: 8px; background: rgba(10,17,40,0.95); padding: 10px; border-radius: 8px; border: 1px solid var(--gold); }
        .lang-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 6px 14px; cursor: pointer; font-weight: 800; border-radius: 4px; }
        .lang-btn.active { background: var(--gold); color: var(--navy); }

        #vision-portal { position: fixed; inset: 0; background: var(--navy); z-index: 30000; display: flex; justify-content: center; align-items: center; color: white; padding: 20px; text-align: center; }
        .welcome-box { background: rgba(15, 25, 55, 0.98); border: 2px solid var(--gold); padding: 40px; border-radius: 15px; max-width: 1000px; width: 100%; }
        .speech-text { font-size: 1.5em; line-height: 1.6; margin: 30px 0; font-weight: 300; font-style: italic; color: #e0e0e0; }
        
        header { background: var(--navy); color: var(--gold); padding: 25px; text-align: center; border-bottom: 5px solid var(--gold); font-family: 'Cinzel'; font-size: 1.8em; letter-spacing: 6px; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; padding: 30px; max-width: 1400px; margin: 0 auto; }
        .card { background: white; padding: 30px; border-radius: 12px; border: 2px solid #eee; cursor: pointer; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.05); font-weight: 600; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); background: #fffdf5; }

        #audit-interface { display: none; max-width: 900px; width: 95%; margin: 40px auto; background: white; padding: 40px; border-radius: 15px; border-left: 10px solid var(--gold); box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .opt-button { display: block; width: 100%; padding: 20px; margin: 10px 0; border: 2px solid #eee; cursor: pointer; background: white; text-align: inherit; border-radius: 8px; }
        .opt-button.selected { border-color: var(--gold); background: #fdfaf0; border-width: 3px; font-weight: 800; }

        /* CERTIFICAT PRESTIGE */
        #certificat-wrapper { display: none; padding: 40px 0; text-align: center; }
        .scroll-box { width: 100%; overflow-x: auto; padding: 20px 0; }
        #cert-area { width: 1050px; height: 740px; background: white; margin: 0 auto; padding: 50px; position: relative; border: 30px double var(--gold); }
        .cert-validation-block { position: absolute; top: 60px; left: 60px; text-align: left; }
        .cert-qr { width: 130px; border: 1px solid #eee; }
        .cert-footer { position: absolute; bottom: 50px; left: 60px; right: 60px; display: flex; justify-content: space-between; align-items: flex-end; }

        @media (max-width: 768px) {
            header { font-size: 1.2em; letter-spacing: 2px; }
            .grid-container { grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
            .card { padding: 15px; font-size: 0.9em; }
        }
    </style>
</head>
<body>

<div id="lang-switcher">
    <button class="lang-btn" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('ar')">AR</button>
</div>

<div id="vision-portal">
    <div class="welcome-box">
        <h1 style="font-family: 'Cinzel'; font-size: clamp(1.5em, 5vw, 3.5em); margin: 0; color: var(--gold);">MBA-CONSULT</h1>
        <div class="speech-text" id="v-speech"></div>
        <button class="lang-btn active" id="v-btn" onclick="document.getElementById('vision-portal').style.display='none'"></button>
    </div>
</div>

<header id="h-main">MBA-CONSULT | GLOBAL KMS V390</header>

<div id="selection-interface">
    <h2 id="s-title" style="text-align:center; font-family: 'Cinzel'; margin-top: 30px;"></h2>
    <div class="grid-container" id="sector-grid"></div>
</div>

<div id="job-interface" style="display:none;">
    <h2 id="j-title" style="text-align:center; font-family: 'Cinzel'; margin-top: 30px;"></h2>
    <div class="grid-container" id="job-grid"></div>
</div>

<div id="audit-interface">
    <div id="audit-step" style="font-weight: 800; color: var(--gold); margin-bottom: 20px;"></div>
    <h2 id="q-text" style="font-size: 1.5em; color: var(--navy);"></h2>
    <div id="options-stack"></div>
    <button id="q-submit" onclick="submitStep()" style="background: var(--gold); color: var(--navy); border: none; padding: 20px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 30px;"></button>
</div>

<div id="certificat-wrapper">
    <button onclick="generatePDF()" style="padding:15px 30px; background:#27ae60; color:white; border:none; cursor:pointer; font-weight:800; border-radius: 5px;">EXPORT PDF</button>
    <div class="scroll-box">
        <div id="cert-area">
            <div class="cert-validation-block">
                <img id="c-qr" class="cert-qr" src="">
                <div id="c-score-pct" style="font-size: 2em; font-weight: 900;"></div>
                <div style="color: var(--gold); font-weight: 800;">WORLD RANK: #1 TOP TIER</div>
            </div>
            <div id="c-cert-title" style="font-family: 'Cinzel'; font-size: 40px; margin-top: 50px;"></div>
            <div id="c-sub" style="letter-spacing: 10px; font-weight: 800; color: var(--gold); font-size: 14px;"></div>
            <p id="c-confirm" style="font-size: 1.6em; margin-top: 80px;"></p>
            <div id="c-name" style="font-family: 'Amiri'; font-size: 50px; border-bottom: 3px solid #333; display: inline-block; padding: 0 40px; min-width: 450px;"></div>
            <p id="c-expert-text" style="font-size: 1.6em; margin-top: 15px;"></p>
            <div id="c-job" style="font-size: 35px; font-weight: 900; color: var(--gold); text-transform: uppercase;"></div>
            <div class="cert-footer">
                <div style="text-align:left;">
                    <div id="c-sig" style="font-family: 'Amiri'; font-size: 30px; border-bottom: 2px solid #333; width: 280px;"></div>
                    <small id="c-sig-label" style="font-weight: 800; display: block; margin-top: 5px;"></small>
                </div>
                <div style="text-align:right;">
                    <div style="color: var(--gold); font-weight: bold;">HASH-MBA-ACCREDITED</div>
                    <div style="font-family: 'Cinzel'; font-size: 20px; border-bottom: 2px solid #333; width: 280px; margin-top: 10px;">MBA BOARD ALPHA</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const DATA = {
        "Finance": ["Trader", "Analyste M&A", "Auditeur Senior", "Risk Manager", "Trésorier Group", "Banquier Privé", "Fiscaliste", "Actuaire", "Gestionnaire de Fortune", "Analyste ESG", "Compliance Officer", "Broker", "Contrôleur de Gestion", "Analyste Quant", "Gestionnaire de Fonds", "Expert Comptable", "Credit Analyst", "Spécialiste Blockchain", "CFO / DAF", "Consultant M&A"],
        "IT & AI": ["Data Scientist", "Architecte Cloud", "Expert Cybersécurité", "Ingénieur Prompt", "Développeur Fullstack", "ML Engineer", "Product Owner", "DevOps Engineer", "Analyste SOC", "Architecte Big Data", "Consultant IA", "Blockchain Dev", "Ethical Hacker", "Ingénieur IoT", "UX Designer", "SysAdmin", "Data Engineer", "Scrum Master", "Directeur IT", "Ingénieur QA"],
        "Energie": ["Ingénieur Solaire", "Expert Éolien", "Analyste Smart Grid", "Ingénieur Nucléaire", "Consultant Carbone", "Ingénieur Forage", "Géologue Énergie", "Chef Projet Hydrogène", "Technicien Réseau", "Analyste Marché Énergie", "Audit Énergétique", "Ingénieur Biomasse", "Expert Offshore", "Maintenance Éolienne", "Responsable HSE", "Ingénieur Pipeline", "Energy Trader", "Spécialiste Photovoltaïque", "Directeur Énergie", "R&D Stockage"],
        "Agri-Food": ["Ingénieur Agronome", "Responsable Qualité", "Technologue Alimentaire", "Directeur Production", "Expert Supply Chain", "Acheteur Matières", "Chef de Culture", "Analyste Sanitaire", "R&D Food Tech", "Manager Logistique", "Viticulteur Expert", "Responsable Export", "Auditeur Certification", "Nutritionniste", "Spécialiste Élevage", "Directeur Usine", "Brand Manager Food", "Expert Packaging", "Spécialiste Hydroponie", "Contrôleur Fraude"],
        "Tourisme": ["Directeur Hôtel", "Yield Manager", "Expert E-Réputation", "Chef Projet Événement", "Manager Agence", "Consultant Patrimoine", "Responsable Croisière", "Directeur Resort", "Expert Écotourisme", "Guest Relation", "Spécialiste MICE", "Travel Planner", "Directeur Marketing", "Revenue Manager", "Expert Gastronomie", "Manager Loisirs", "Chef Concierge", "Analyste Destinations", "Responsable Spa", "Directeur Aéroport"],
        "Education": ["Directeur Académique", "Concepteur Pédago", "Expert EdTech", "Enseignant Chercheur", "Coach Professionnel", "Spécialiste Inclusion", "Responsable Formation", "Analyste Éducation", "Doyen de Faculté", "Coordinateur Scolaire", "Expert Orientation", "Linguiste", "Mentor Startup", "Directeur E-learning", "Responsable RH Éduc", "Psychopédagogue", "Manager Centre Langue", "Directeur Admissions", "Expert Évaluation", "Chercheur IA Éduc"]
    };

    const QUESTIONS = {
        "Finance": ["Optimisation levier financier?", "Analyse risque systémique?", "Valorisation actifs illiquides?", "Stratégie arbitrage HFT?", "Conformité Bâle III?"],
        "IT & AI": ["Optimisation latence modèle?", "Sécurisation API REST?", "Architecture micro-services?", "Entraînement modèle LLM?", "Gestion dette technique?"],
        "Energie": ["Stabilité réseau renouvelable?", "Efficacité turbine hydrogène?", "Gestion déchets nucléaires?", "Optimisation cycle combiné?", "Stockage thermique avancé?"],
        "Agri-Food": ["Traçabilité blockchain bio?", "Optimisation chaîne froid?", "Réduction empreinte eau?", "Sécurité microbiologique?", "Innovation protéines alternatives?"],
        "Tourisme": ["Optimisation RevPAR?", "Expérience client immersive?", "Tourisme régénératif?", "Digitisation parcours client?", "Gestion crise réputation?"],
        "Education": ["Pédagogie inversée hybride?", "Mesure impact apprentissage?", "Éthique IA en classe?", "Gamification programmes?", "Management talents académiques?"]
    };

    const UI = {
        fr: {
            vSpeech: "Intégrez l'élite mondiale.\nVotre expertise est votre actif précieux.",
            vBtn: "DÉPLOYER L'AUDIT", sTitle: "UNITÉS D'ACCRÉDITATION MBA", jTitle: "SÉLECTIONNEZ VOTRE MÉTIER",
            qSubmit: "VALIDER LA DÉCISION", promptName: "NOM COMPLET :", cTitle: "CERTIFICAT D'EXCELLENCE", 
            cSub: "ACCRÉDITATION MONDIALE", cConfirm: "Ce document atteste solennellement que", 
            cExpert: "A validé son accréditation pour le métier de :", cSig: "SIGNATURE ÉLECTRONIQUE"
        },
        en: {
            vSpeech: "Join the global elite.\nYour expertise is your most valuable asset.",
            vBtn: "DEPLOY AUDIT", sTitle: "MBA ACCREDITATION UNITS", jTitle: "SELECT YOUR PROFESSION",
            qSubmit: "VALIDATE DECISION", promptName: "FULL NAME:", cTitle: "CERTIFICATE OF EXCELLENCE",
            cSub: "GLOBAL ACCREDITATION", cConfirm: "This document solemnly certifies that",
            cExpert: "Has validated accreditation for the profession of:", cSig: "ELECTRONIC SIGNATURE"
        },
        ar: {
            vSpeech: "تجاوز حدود المعرفة التقليدية لتنضم إلى نخبة صناع القرار في العالم.",
            vBtn: "بدء التدقيق الاستراتيجي", sTitle: "وحدات الاعتماد المهني MBA", jTitle: "اختر تخصصك المهني",
            qSubmit: "تأكيد القرار", promptName: "الاسم الكامل للخبير:", cTitle: "شهادة التميـــــــــز",
            cSub: "الاعتماد المهنـي العالمـي", cConfirm: "تشهد هذه الوثيقة رسمياً وبكل فخر بأن",
            cExpert: "قد اجتاز بنجاح الاعتماد العالمي لمهنة:", cSig: "توقيع إلكتروني معتمد"
        }
    };

    let curL = 'fr', score = 0, step = 0, selSec = "", selJob = "", tempPts = 0;

    function setLang(l) {
        curL = l;
        document.body.className = (l === 'ar' ? 'rtl' : '');
        const d = UI[l];
        document.getElementById('v-speech').innerText = d.vSpeech;
        document.getElementById('v-btn').innerText = d.vBtn;
        document.getElementById('s-title').innerText = d.sTitle;
        document.getElementById('j-title').innerText = d.jTitle;
        document.getElementById('q-submit').innerText = d.qSubmit;
        initSectors();
    }

    function initSectors() {
        const grid = document.getElementById('sector-grid'); grid.innerHTML = "";
        Object.keys(DATA).forEach(s => {
            grid.innerHTML += `<div class="card" onclick="openJobs('${s}')">${s}</div>`;
        });
    }

    function openJobs(s) {
        selSec = s;
        document.getElementById('selection-interface').style.display = 'none';
        document.getElementById('job-interface').style.display = 'block';
        const grid = document.getElementById('job-grid'); grid.innerHTML = "";
        DATA[s].forEach(j => {
            grid.innerHTML += `<div class="card" onclick="startAudit('${j}')">${j}</div>`;
        });
    }

    function startAudit(j) {
        selJob = j;
        document.getElementById('job-interface').style.display = 'none';
        document.getElementById('audit-interface').style.display = 'block';
        loadQ();
    }

    function loadQ() {
        if(step >= 5) { conclude(); return; }
        document.getElementById('audit-step').innerText = `STEP ${step+1}/5`;
        const qs = QUESTIONS[selSec];
        document.getElementById('q-text').innerText = (curL === 'ar' ? "القرار المطلوب: " : "") + qs[step];
        const stack = document.getElementById('options-stack'); stack.innerHTML = "";
        ["Alpha Decision (+10)", "Beta Decision (+7)", "Gamma Decision (+4)"].forEach((o, i) => {
            stack.innerHTML += `<button class="opt-button" onclick="sel(this, ${[10,7,4][i]})">${o}</button>`;
        });
    }

    function sel(btn, p) {
        document.querySelectorAll('.opt-button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); tempPts = p;
    }

    function submitStep() { if(tempPts) { score += tempPts; step++; tempPts=0; loadQ(); } }

    function conclude() {
        document.getElementById('audit-interface').style.display = 'none';
        if(score < 40) { alert("SCORE INSUFFISANT / درجة غير كافية"); location.reload(); }
        else {
            const name = prompt(UI[curL].promptName) || "EXPERT";
            const d = UI[curL];
            document.getElementById('certificat-wrapper').style.display = 'block';
            document.getElementById('c-cert-title').innerText = d.cTitle;
            document.getElementById('c-sub').innerText = d.cSub;
            document.getElementById('c-confirm').innerText = d.cConfirm;
            document.getElementById('c-expert-text').innerText = d.cExpert;
            document.getElementById('c-sig-label').innerText = d.cSig;
            document.getElementById('c-name').innerText = name.toUpperCase();
            document.getElementById('c-job').innerText = selJob;
            document.getElementById('c-score-pct').innerText = (score/50*100) + "%";
            document.getElementById('c-sig').innerText = name;
            document.getElementById('c-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=MBA-${name}`;
        }
    }

    function generatePDF() {
        html2pdf().set({ margin:0, filename:'MBA-V390.pdf', jsPDF:{format:'a4', orientation:'landscape'} }).from(document.getElementById('cert-area')).save();
    }

    setLang('fr');
</script>
</body>
</html>
