<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MBA-CONSULT | GLOBAL KMS V390 ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;600;800&family=Amiri:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #c5a021; --navy: #0a1128; --white: #ffffff; --bg: #f4f7f9; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--navy); overflow-x: hidden; }
        body.rtl { direction: rtl; font-family: 'Amiri', serif; }

        /* AGENT DE TRADUCTION UI */
        #lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 40000; display: flex; gap: 8px; background: rgba(10,17,40,0.95); padding: 10px; border-radius: 8px; border: 1px solid var(--gold); }
        .lang-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 6px 14px; cursor: pointer; font-weight: 800; border-radius: 4px; }
        .lang-btn.active { background: var(--gold); color: var(--navy); }

        /* PORTAIL DE MOTIVATION */
        #vision-portal { position: fixed; inset: 0; background: var(--navy); z-index: 30000; display: flex; justify-content: center; align-items: center; color: white; padding: 20px; text-align: center; }
        .welcome-box { background: rgba(15, 25, 55, 0.98); border: 2px solid var(--gold); padding: 40px; border-radius: 15px; max-width: 1000px; width: 100%; }
        .speech-text { font-size: 1.3em; line-height: 1.6; margin: 25px 0; font-weight: 300; color: #e0e0e0; }
        
        header { background: var(--navy); color: var(--gold); padding: 25px; text-align: center; border-bottom: 5px solid var(--gold); font-family: 'Cinzel'; font-size: 1.8em; letter-spacing: 6px; }

        /* GRID DYNAMIQUE */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; padding: 30px; max-width: 1400px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; border: 2px solid #eee; cursor: pointer; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .card i { font-size: 3.5em; color: var(--gold); margin-bottom: 12px; display: block; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); background: #fffcf0; }

        /* INTERFACE AUDIT */
        #audit-interface { display: none; max-width: 900px; width: 95%; margin: 40px auto; background: white; padding: 40px; border-radius: 15px; border-left: 10px solid var(--gold); }
        .opt-button { display: block; width: 100%; padding: 18px; margin: 10px 0; border: 2px solid #eee; cursor: pointer; background: white; text-align: inherit; border-radius: 8px; }
        .opt-button.selected { border-color: var(--gold); background: #fdfaf0; border-width: 3px; font-weight: 800; }
        #custom-input { width: 100%; height: 110px; padding: 15px; border: 2px solid var(--gold); border-radius: 8px; margin-top: 10px; display: none; }

        /* CERTIFICAT V390 FINAL ARCHITECTURE */
        #certificat-wrapper { display: none; padding: 40px 0; text-align: center; }
        #cert-area { 
            width: 1120px; height: 790px; background: white; margin: 0 auto; padding: 60px; 
            position: relative; border: 35px double var(--gold); overflow: hidden;
            background-image: radial-gradient(circle, #fff 70%, #fdfaf0 100%);
        }

        /* QR CODE À DROITE (CORRIGÉ) */
        .cert-validation-block { position: absolute; top: 70px; right: 70px; text-align: right; width: 160px; }
        .cert-qr { width: 150px; border: 1px solid #ddd; }
        #c-score-pct { font-size: 2.2em; font-weight: 900; color: var(--navy); margin-top: 5px; }

        .rank-badge { position: absolute; top: 70px; left: 70px; border: 2px solid var(--gold); padding: 12px; font-weight: 900; color: var(--gold); }
        
        .cert-main-content { margin-top: 60px; text-align: center; }
        #c-cert-title { font-family: 'Cinzel'; font-size: 44px; color: var(--navy); }
        #c-sub { letter-spacing: 10px; font-weight: 800; color: var(--gold); font-size: 14px; margin-bottom: 35px; }
        
        /* PROTECTION CONTRE SUPERPOSITION */
        #c-name { font-family: 'Amiri', serif; font-size: 50px; border-bottom: 3px solid var(--navy); display: inline-block; padding: 0 30px; min-height: 75px; max-width: 800px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #c-job { font-size: 32px; font-weight: 900; color: var(--gold); text-transform: uppercase; margin-top: 20px; line-height: 1.1; max-width: 900px; margin-left: auto; margin-right: auto; }

        /* SIGNATURE REHAUSSÉE (CORRIGÉ) */
        .cert-footer { position: absolute; bottom: 110px; left: 80px; right: 80px; display: flex; justify-content: space-between; align-items: flex-end; }
        #c-sig { font-family: 'Amiri'; font-size: 34px; border-bottom: 2px solid #333; width: 280px; font-style: italic; }
    </style>
</head>
<body>

<div id="lang-switcher">
    <button class="lang-btn" onclick="GlobalAgent.switch('fr')">FR</button>
    <button class="lang-btn" onclick="GlobalAgent.switch('en')">EN</button>
    <button class="lang-btn" onclick="GlobalAgent.switch('ar')">AR</button>
</div>

<div id="vision-portal">
    <div class="welcome-box">
        <h1 style="font-family: 'Cinzel'; font-size: 3.5em; color: var(--gold);">MBA-CONSULT</h1>
        <div class="speech-text" id="v-speech"></div>
        <button class="lang-btn active" id="v-btn" onclick="document.getElementById('vision-portal').style.display='none'" style="padding:15px 40px; font-size: 1.2em;"></button>
    </div>
</div>

<header id="h-main">MBA-CONSULT | GLOBAL KMS V390 ULTIMATE</header>

<div id="selection-interface">
    <h2 id="s-title" style="text-align:center; font-family: 'Cinzel';"></h2>
    <div class="grid-container" id="sector-grid"></div>
</div>

<div id="job-interface" style="display:none;">
    <h2 id="j-title" style="text-align:center; font-family: 'Cinzel';"></h2>
    <div class="grid-container" id="job-grid"></div>
</div>

<div id="audit-interface">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <span id="audit-step" style="font-weight: 800; color: var(--gold);"></span>
        <span id="job-badge" style="background: var(--navy); color: white; padding: 8px 15px; border-radius: 20px;"></span>
    </div>
    <h2 id="q-text" style="font-size: 1.4em;"></h2>
    <div id="options-stack"></div>
    <textarea id="custom-input"></textarea>
    <button id="q-submit" onclick="submitStep()" style="background: var(--gold); color: var(--navy); border: none; padding: 22px; font-weight: 800; width: 100%; margin-top: 20px; border-radius: 8px; cursor: pointer;"></button>
</div>

<div id="certificat-wrapper">
    <button id="btn-pdf" onclick="generatePDF()" style="padding:18px 40px; background:#27ae60; color:white; border:none; cursor:pointer; font-weight:800; margin-bottom:20px; border-radius: 5px;"></button>
    <div id="cert-area">
        <div class="rank-badge" id="c-rank"></div>
        <div class="cert-validation-block">
            <img id="c-qr" class="cert-qr" src="">
            <div id="c-score-pct"></div>
        </div>
        <div class="cert-main-content">
            <div id="c-cert-title"></div>
            <div id="c-sub"></div>
            <p id="c-confirm" style="font-size: 1.6em; color: #444; margin: 0;"></p>
            <div id="c-name"></div>
            <p id="c-expert-text" style="font-size: 1.6em; color: #444; margin: 10px 0;"></p>
            <div id="c-job"></div>
        </div>
        <div class="cert-footer">
            <div style="text-align:left;">
                <div id="c-sig"></div>
                <small id="c-sig-label" style="font-weight: 800; color: var(--gold); display: block; margin-top: 5px;"></small>
            </div>
            <div style="text-align:right;">
                <div id="c-auth-label" style="color: var(--gold); font-weight: 900;"></div>
                <div id="c-board-label" style="font-family: 'Cinzel'; font-size: 18px; border-bottom: 2px solid #333; width: 280px; margin-top: 8px; color: var(--navy);"></div>
            </div>
        </div>
    </div>
</div>

<script>
/* AGENT DE TRADUCTION & SCRAPING ENGINE V390 */
const GlobalAgent = {
    lang: 'fr',
    db: {
        fr: {
            vSpeech: "Optimisez votre trajectoire stratégique avec le KMS MBA-CONSULT. Cette interface d'audit de haute précision certifie votre capacité à diriger au sein d'environnements complexes.\n\nProuvez votre excellence dès maintenant et rejoignez l'élite décisionnelle mondiale.",
            vBtn: "DÉPLOYER L'EXPERTISE", sTitle: "UNITÉS D'ACCRÉDITATION MBA", jTitle: "SÉLECTIONNEZ VOTRE MÉTIER", qSubmit: "VALIDER LA DÉCISION",
            promptName: "NOM COMPLET :", cTitle: "CERTIFICAT D'EXCELLENCE", cSub: "ACCRÉDITATION MONDIALE MBA",
            cConfirm: "Ce document atteste solennellement que", cExpert: "A validé son accréditation pour le métier de :",
            cSig: "SIGNATURE ÉLECTRONIQUE VÉRIFIÉE", btnPdf: "GÉNÉRER LE PDF SÉCURISÉ",
            rank: "RANG MONDIAL: #1 TOP TIER", auth: "MBA-CONSULT GLOBAL ACCREDITATION", board: "OFFICIAL BOARD ALPHA",
            delta: "Delta: Soumettre une analyse personnalisée (IA Expert)", inputPlace: "Analyse technique approfondie..."
        },
        en: {
            vSpeech: "Propel your leadership to excellence with MBA-CONSULT KMS. This precision audit validates your strategic skills and certifies your ability to lead global changes.\n\nTake the challenge now and obtain your official high-level accreditation.",
            vBtn: "DEPLOY EXPERTISE", sTitle: "MBA ACCREDITATION UNITS", jTitle: "SELECT YOUR PROFESSION", qSubmit: "VALIDATE DECISION",
            promptName: "FULL NAME:", cTitle: "CERTIFICATE OF EXCELLENCE", cSub: "GLOBAL MBA ACCREDITATION",
            cConfirm: "This document solemnly certifies that", cExpert: "Has validated accreditation for the profession of:",
            cSig: "VERIFIED ELECTRONIC SIGNATURE", btnPdf: "GENERATE SECURE PDF",
            rank: "WORLD RANK: #1 TOP TIER", auth: "MBA-CONSULT GLOBAL ACCREDITATION", board: "OFFICIAL BOARD ALPHA",
            delta: "Delta: Submit customized analysis (AI Expert)", inputPlace: "Deep technical analysis..."
        },
        ar: {
            vSpeech: "ادفع قيادتك نحو التميز مع نظام إدارة المعرفة MBA-CONSULT. هذا التدقيق الدقيق يعتمد مهاراتك الاستراتيجية ويوثق قدرتك على قيادة التحولات العالمية.\n\nاقبل التحدي الآن واحصل على اعتمادك الرسمي رفيع المستوى.",
            vBtn: "بدء التقييم المهني", sTitle: "وحدات الاعتماد المهني MBA", jTitle: "اختر تخصصك المهني الدقيق", qSubmit: "تأكيد القرار التقني",
            promptName: "الاسم الكامل:", cTitle: "شهادة التميـــــــــز", cSub: "الاعتماد المهنـي العالمـي",
            cConfirm: "تشهد هذه الوثيقة رسمياً بأن", cExpert: "اجتاز بنجاح الاعتماد لمهنة:",
            cSig: "توقيع إلكتروني معتمد", btnPdf: "تحميل الشهادة PDF",
            rank: "التصنيف العالمي: الفئة الأولى", auth: "اعتماد MBA-CONSULT العالمي", board: "المجلس الرسمي ألفا",
            delta: "ديلتا: تقديم حل مخصص (تحليل خبير)", inputPlace: "تحليل تقني معمق..."
        }
    },
    switch(l) {
        this.lang = l; document.body.className = (l === 'ar' ? 'rtl' : '');
        const d = this.db[l];
        document.getElementById('v-speech').innerText = d.vSpeech;
        document.getElementById('v-btn').innerText = d.vBtn;
        document.getElementById('s-title').innerText = d.sTitle;
        document.getElementById('j-title').innerText = d.jTitle;
        document.getElementById('q-submit').innerText = d.qSubmit;
        document.getElementById('btn-pdf').innerText = d.btnPdf;
        document.getElementById('custom-input').placeholder = d.inputPlace;
        UI_Engine.renderSectors();
        if(document.getElementById('audit-interface').style.display === 'block') UI_Engine.renderQuestion();
    }
};

/* DATASET 160 MÉTIERS (Scraping Simulation Standards 2026) */
const DATA_KMS = {
    "Santé": { icon: "fa-user-md", jobs: ["Directeur Clinique", "Data Health Scientist", "Expert FHIR/HL7", "Chef de Service Chirurgical", "Pharmacien Industriel", "Ingénieur Biomédical", "Épidémiologiste Senior", "Bio-informaticien", "Gestionnaire Risques Médicaux", "Directeur EHPAD", "Radiologue Chef", "Coordonnateur Soins", "Expert Compliance Pharma", "Généticien", "Directeur R&D Santé", "Audit Qualité Soins", "HSE Médical", "Logisticien Santé", "Responsable DPI", "Expert Télémédecine"] },
    "Commerce": { icon: "fa-shopping-bag", jobs: ["Directeur Retail", "Key Account Manager", "E-commerce Architect", "Supply Chain Director", "Analyste Pricing Dynamique", "Category Manager", "Visual Merchandiser Chef", "Directeur Export", "Trade Marketing Mgr", "Responsable Franchise", "Business Dev Senior", "Directeur Commercial", "Analyste CRM", "Growth Hacker B2B", "Expert Logistique Urbaine", "Directeur Magasin", "Acheteur International", "Responsable Omnicanal", "Expert Customer Experience", "Directeur Merchandising"] },
    "Finance": { icon: "fa-chart-line", jobs: Array.from({length: 20}, (_, i) => "Expert Finance Lvl " + (i+1)) },
    "IT & AI": { icon: "fa-microchip", jobs: Array.from({length: 20}, (_, i) => "AI Engineer Lvl " + (i+1)) },
    "Energie": { icon: "fa-solar-panel", jobs: Array.from({length: 20}, (_, i) => "Ingénieur Energie Lvl " + (i+1)) },
    "Agri-Food": { icon: "fa-seedling", jobs: Array.from({length: 20}, (_, i) => "Expert Agri Lvl " + (i+1)) },
    "Tourisme": { icon: "fa-globe-europe", jobs: Array.from({length: 20}, (_, i) => "Directeur Tourisme Lvl " + (i+1)) },
    "Education": { icon: "fa-university", jobs: Array.from({length: 20}, (_, i) => "Doyen Académique Lvl " + (i+1)) }
};

/* LOGIQUE TECHNIQUE SANTÉ & COMMERCE (V390) */
const QUESTIONS_DB = {
    "Santé": [
        { q: "Comment assurez-vous l'intégrité sémantique lors d'un mapping FHIR R5 ?", a: ["Alpha: Validation par profils StructureDefinition et ontologies SNOMED (+10)", "Beta: Utilisation de serveurs de terminologie avec API REST (+7)", "Gamma: Scripting de conversion XML vers JSON propriétaire (+4)"] },
        { q: "Optimisation DMS : Quelle méthode pour le flux patient en ambulatoire ?", a: ["Alpha: Lean Healthcare avec cartographie VSM temps-réel (+10)", "Beta: Digitalisation du parcours patient via DPI (+7)", "Gamma: Augmentation de la capacité d'accueil post-op (+4)"] }
    ],
    "Commerce": [
        { q: "Stagflation : Comment protéger la marge sans perdre l'élasticité-prix ?", a: ["Alpha: Dynamic Pricing assisté par IA et micro-segmentation comportementale (+10)", "Beta: Réorganisation du mix-produit vers des marques propres (+7)", "Gamma: Réduction drastique des frais de structure logistique (+4)"] },
        { q: "Logistique urbaine : Quel levier pour le coût du dernier kilomètre ?", a: ["Alpha: Déploiement de micro-hubs automatisés et routage prédictif (+10)", "Beta: Externalisation vers des prestataires spécialisés 3PL (+7)", "Gamma: Massification des livraisons en points relais (+4)"] }
    ]
};

const UI_Engine = {
    score: 0, step: 0, sector: "", job: "", temp: 0, isDelta: false,
    renderSectors() {
        const g = document.getElementById('sector-grid'); g.innerHTML = "";
        Object.keys(DATA_KMS).forEach(s => {
            g.innerHTML += `<div class="card" onclick="UI_Engine.selSec('${s}')"><i class="fas ${DATA_KMS[s].icon}"></i><h3>${s}</h3></div>`;
        });
    },
    selSec(s) {
        this.sector = s; document.getElementById('selection-interface').style.display = 'none';
        document.getElementById('job-interface').style.display = 'block';
        const g = document.getElementById('job-grid'); g.innerHTML = "";
        DATA_KMS[s].jobs.forEach(j => { g.innerHTML += `<div class="card" onclick="UI_Engine.start('${j}')" style="padding:10px; font-size:0.8em;">${j}</div>`; });
    },
    start(j) {
        this.job = j; document.getElementById('job-interface').style.display = 'none';
        document.getElementById('audit-interface').style.display = 'block';
        document.getElementById('job-badge').innerText = j; this.renderQuestion();
    },
    renderQuestion() {
        if(this.step >= 5) { this.finish(); return; }
        document.getElementById('audit-step').innerText = `STEP ${this.step+1}/5`;
        const qData = (QUESTIONS_DB[this.sector] && QUESTIONS_DB[this.sector][this.step % 2]) || { q: `Audit Stratégique ${this.sector} : Quelle solution pour ${this.job} ?`, a: ["Alpha: Modélisation systémique et résilience (+10)", "Beta: Optimisation opérationnelle incrémentale (+7)", "Gamma: Veille technologique et conformité (+4)"] };
        document.getElementById('q-text').innerText = qData.q;
        const stack = document.getElementById('options-stack'); stack.innerHTML = "";
        qData.a.forEach((o, i) => stack.innerHTML += `<button class="opt-button" onclick="UI_Engine.selOpt(this, ${[10,7,4][i]})">${o}</button>`);
        stack.innerHTML += `<button class="opt-button" onclick="UI_Engine.actDelta(this)">${GlobalAgent.db[GlobalAgent.lang].delta}</button>`;
        document.getElementById('custom-input').style.display = 'none';
    },
    selOpt(btn, p) {
        document.querySelectorAll('.opt-button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); this.temp = p; this.isDelta = false;
        document.getElementById('custom-input').style.display = 'none';
    },
    actDelta(btn) {
        document.querySelectorAll('.opt-button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); this.isDelta = true;
        document.getElementById('custom-input').style.display = 'block';
    },
    finish() {
        document.getElementById('audit-interface').style.display = 'none';
        const name = prompt(GlobalAgent.db[GlobalAgent.lang].promptName) || "EXPERT";
        document.getElementById('certificat-wrapper').style.display = 'block';
        const d = GlobalAgent.db[GlobalAgent.lang];
        document.getElementById('c-cert-title').innerText = d.cTitle;
        document.getElementById('c-sub').innerText = d.cSub;
        document.getElementById('c-confirm').innerText = d.cConfirm;
        document.getElementById('c-name').innerText = name.toUpperCase();
        document.getElementById('c-expert-text').innerText = d.cExpert;
        document.getElementById('c-job').innerText = this.job;
        document.getElementById('c-score-pct').innerText = Math.min(100, Math.round((this.score/50)*100)) + "%";
        document.getElementById('c-rank').innerText = d.rank;
        document.getElementById('c-sig-label').innerText = d.cSig;
        document.getElementById('c-auth-label').innerText = d.auth;
        document.getElementById('c-board-label').innerText = d.board;
        document.getElementById('c-sig').innerText = name;
        document.getElementById('c-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=MBA-V390-${name}-${this.job}`;
    }
};

function submitStep() {
    if(UI_Engine.isDelta) {
        const val = document.getElementById('custom-input').value;
        UI_Engine.temp = (val.length > 60) ? 12 : 5;
    }
    if(UI_Engine.temp) {
        UI_Engine.score += UI_Engine.temp; UI_Engine.step++; UI_Engine.temp = 0; UI_Engine.renderQuestion();
    }
}

function generatePDF() {
    const opt = { 
        margin: 0, filename: `MBA-V390-CERTIFICATE.pdf`, 
        html2canvas: { scale: 2 }, jsPDF: { unit: 'px', format: [1120, 790], orientation: 'landscape' } 
    };
    html2pdf().set(opt).from(document.getElementById('cert-area')).save();
}

GlobalAgent.switch('fr');
</script>
</body>
</html>
