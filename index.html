            "Optimisation du WACC en environnement volatil ?", "Hedging du risque de change marchés émergents ?", "Tests de résistance (Stress Tests) en ALM ?", "Évaluation M&A avec actifs immatériels ?", "Conformité IFRS 17 ou Bâle III/IV ?", "Restructuration de dette sous-performance ?", "Audit reporting extra-financier (ESG) ?", "Optimisation du BFR opérationnel ?", "Risque de liquidité en crise systémique ?", "Architecture contrôle interne anti-fraude ?", "Coût du capital projet haut risque ?", "Stratégie dividendes vs réinvestissement ?", "Fiscalité internationale multi-filiales ?", "Impact Tokenisation marchés capitaux ?", "Arbitrage profitabilité vs solvabilité ?", "Valorisation en période d'inflation ?", "Cybersécurité flux trésorerie ?", "Stratégie Green Bonds ?", "Risque crédit contreparties non notées ?", "Disruption FinTech modèle d'affaires ?"
        ],

            "Gestion intermittence mix EnR ?", "Décarbonation profonde actifs industriels ?", "Optimisation LCOE des projets ?", "Sécurité infrastructures critiques ?", "Impact taxe carbone rentabilité ?", "Stockage énergie grande échelle ?", "Conflits d'usage sols EnR ?", "Nucléaire SMR dans la transition ?", "Rendement via Smart Grid ?", "Maintenance prédictive Offshore ?", "Volatilité prix marché électricité ?", "Capture et séquestration carbone (CCUS) ?", "Approvisionnement métaux critiques ?", "Transformation en bio-raffinerie ?", "Acceptabilité sociale grands projets ?", "Audit efficacité parc immobilier ?", "IA et optimisation flux gaz/élec ?", "Démantèlement actifs fin de vie ?", "Hydrogène vert vs bleu ?", "Innovation transport d'énergie ?"

            "Drift (dérive) données modèle LLM ?", "Architecture RAG sans hallucinations ?", "Coût inférence clusters GPU H100 ?", "Fine-Tuning vs SLM ?", "Sécurité API injections prompts ?", "Alignement éthique algorithmes ?", "Latence IA Edge Computing ?", "Souveraineté données Cloud hybride ?", "Human-in-the-loop pipelines ?", "Quantification taille modèles ?", "Open-Source vs Propriétaire ?", "IA Agentique et flux métiers ?", "Explicabilité (XAI) Black Box ?", "Cybersécurité DevSecOps ?", "Dette technique générée par IA ?", "Interopérabilité multi-agents ?", "Neutralité données (Bias Mitigation) ?", "Entraînement distribué grande échelle ?", "Impact informatique quantique ?", "Fiabilité systèmes autonomes ?"
        ],
        "Tourisme": [
            "Yield Management en haute saison ?", "Stratégie résilience post-crise ?", "Digitalisation parcours client luxe ?", "Durabilité et écotourisme massif ?", "Impact IA sur réservations ?", "Marketing destination émergente ?", "Optimisation taux occupation resort ?", "Gestion crise sanitaire hospitalité ?", "Valorisation patrimoine immatériel ?", "Nouveaux business models hôteliers ?", "Gestion expérience client VIP ?", "Sécurisation données voyageurs ?", "Impact surtourisme sites classés ?", "Ressources Humaines et saisonnalité ?", "Partenariats plateformes (OTA) ?", "Développement tourisme d'affaires ?", "Standardisation vs Personnalisation ?", "Infrastructures transport touristique ?", "Analyse data comportement voyageur ?", "Innovation concept hôtelier 2026 ?"

        "Agroalimentaire": [
            "Sécurité sanitaire et traçabilité ?", "Optimisation supply chain froid ?", "Innovation packaging durable ?", "Réduction gaspillage industriel ?", "Impact Nutri-score sur R&D ?", "Gestion volatilité matières premières ?", "Certification Bio et labels qualité ?", "Automatisation lignes production ?", "Stratégie export marchés Asie ?", "Développement protéines végétales ?", "Audit conformité hygiène ?", "Efficacité énergétique usines ?", "Gestion déchets organiques ?", "Relation producteur et grande distrib ?", "Analyse sensorielle et marketing ?", "Intelligence artificielle et recettes ?", "Logistique dernier kilomètre ?", "Nouveaux modes conservation ?", "Résilience face aux aléas climatiques ?", "Tendances consommation saine ?"
        ],
        "Éducation": [
            "Hybrid learning et engagement ?", "IA générative dans les cursus ?", "Stratégie recrutement international ?", "Certification et accréditation MBA ?", "Financement recherche académique ?", "Digitalisation services étudiants ?", "Adéquation formation et emploi ?", "Gestion réputation campus ?", "Inclusion et diversité académique ?", "Apprentissage tout au long de la vie ?", "Gouvernance établissements privés ?", "Innovation pédagogique active ?", "Partenariats entreprises et écoles ?", "Analyse data réussite étudiante ?", "Sécurité campus et cyber-risques ?", "Développement soft skills ?", "Modernisation infrastructures ?", "E-learning et taux d'abandon ?", "Orientation et coaching carrière ?", "Impact EdTech sur le marché mondial ?"
        ]
    };

    let currentJob = "", currentSector = "", step = 0, score = 0;

    function renderMenu() {
        const container = document.getElementById('sectors-container');
        container.innerHTML = "";
        for (let s in SECTEURS) {
            let html = `<div class="sector-title">${s}</div><div class="grid">`;
            SECTEURS[s].forEach(j => {
                html += `<div class="card" onclick="startAudit('${j}', '${s}')">${j}</div>`;
            });
            container.innerHTML += html + `</div>`;
        }
    }

    function startAudit(job, sector) {
        currentJob = job; currentSector = sector; step = 0; score = 0;
        document.getElementById('menu-area').style.display = 'none';
        document.getElementById('exam-ui').style.display = 'block';
        loadStep();
    }

    function loadStep() {
        if (step >= 20) { 
            const finalScore = Math.round((score / 20) * 100);
            document.getElementById('exam-ui').style.display = 'none';
            if(finalScore < 80) {
                document.getElementById('fail-ui').style.display = 'block';
            } else {
                document.getElementById('id-final').style.display = 'block';
            }
            return; 
        }
        document.getElementById('q-count').innerText = "PHASE D'AUDIT " + (step + 1) + " / 20";
        document.getElementById('q-text').innerText = QUESTIONS_DB[currentSector][step];
        document.getElementById('options').innerHTML = `
            <button class="opt" onclick="processStep(true)">A) Approche Systémique & Efficience</button>
            <button class="opt" onclick="processStep(true)">B) Agilité Opérationnelle & Rentabilité</button>
            <button class="opt" onclick="processStep(true)">C) Mitigations des Risques & Gouvernance</button>
        `;
    }

    function processStep(correct) { if(correct) score++; step++; loadStep(); }

    function generateCert() {
        const name = document.getElementById('u-name').value || "EXPERT ANONYME";
        document.getElementById('id-final').style.display = 'none';
        document.getElementById('certificat').style.display = 'block';
        document.getElementById('disp-name').innerText = name.toUpperCase();
        document.getElementById('sig-user').innerText = name;
        document.getElementById('disp-job').innerText = currentJob;
        document.getElementById('disp-score').innerText = "EXPERTISE SCORE: " + Math.round((score/20)*100) + "%";
        document.getElementById('cert-id').innerText = "MBA-" + Math.random().toString(36).substr(2, 9).toUpperCase();
        document.getElementById('cert-date').innerText = new Date().toLocaleDateString();
    }
    renderMenu();
</script>
