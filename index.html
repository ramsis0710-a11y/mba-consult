<!DOCTYPE html>
<html lang="fr">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #c5a021; --navy: #0a1128; --white: #ffffff; --bg: #f4f7f9; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--navy); overflow-x: hidden; }
        body.rtl { direction: rtl; font-family: 'Amiri', serif; }

        /* AGENT DE TRADUCTION UI */
        #lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 40000; display: flex; gap: 8px; background: rgba(10,17,40,0.95); padding: 10px; border-radius: 8px; border: 1px solid var(--gold); }
        .lang-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 6px 14px; cursor: pointer; font-weight: 800; border-radius: 4px; }
        .lang-btn.active { background: var(--gold); color: var(--navy); }

        #vision-portal { position: fixed; inset: 0; background: var(--navy); z-index: 30000; display: flex; justify-content: center; align-items: center; color: white; padding: 20px; text-align: center; }
        .welcome-box { background: rgba(15, 25, 55, 0.98); border: 2px solid var(--gold); padding: 40px; border-radius: 15px; max-width: 900px; width: 100%; }
        .speech-text { font-size: 1.25em; line-height: 1.6; margin: 25px 0; font-weight: 300; color: #e0e0e0; }
        
        header { background: var(--navy); color: var(--gold); padding: 25px; text-align: center; border-bottom: 5px solid var(--gold); font-family: 'Cinzel'; font-size: 1.8em; letter-spacing: 6px; }

        /* GRID DYNAMIQUE MÉTIERS */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; padding: 30px; max-width: 1400px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 12px; border: 2px solid #eee; cursor: pointer; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .card i { font-size: 3.2em; color: var(--gold); margin-bottom: 12px; display: block; }
        .card h3 { font-family: 'Cinzel'; font-size: 0.95em; margin: 10px 0; color: var(--navy); }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); background: #fffcf0; }

        /* INTERFACE AUDIT */
        #audit-interface { display: none; max-width: 900px; width: 95%; margin: 40px auto; background: white; padding: 45px; border-radius: 15px; border-left: 12px solid var(--gold); box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .opt-button { display: block; width: 100%; padding: 20px; margin: 12px 0; border: 2px solid #eee; cursor: pointer; background: white; text-align: inherit; border-radius: 8px; font-size: 1.05em; line-height: 1.4; }
        .opt-button.selected { border-color: var(--gold); background: #fdfaf0; border-width: 3px; font-weight: 800; }
        #custom-input { width: 100%; height: 120px; padding: 15px; border: 2px solid var(--gold); border-radius: 8px; margin-top: 15px; display: none; background: #fffdf5; font-family: 'Inter'; }

        /* CERTIFICAT V390 - GÉOMÉTRIE VERROUILLÉE */
        #certificat-wrapper { display: none; padding: 40px 0; text-align: center; }
        #cert-area { 
            width: 1120px; height: 790px; background: white; margin: 0 auto; padding: 65px; 
            position: relative; border: 35px double var(--gold); overflow: hidden;
            background-image: radial-gradient(circle, #fff 70%, #fdfaf0 100%);
        }

        /* POSITIONNEMENT QR CODE À DROITE */
        .cert-validation-block { position: absolute; top: 75px; right: 75px; text-align: right; width: 170px; z-index: 100; }
        .cert-qr { width: 155px; border: 1px solid #ddd; padding: 4px; background: white; }
        #c-score-pct { font-size: 2.3em; font-weight: 900; color: var(--navy); margin-top: 8px; }

        .rank-badge { position: absolute; top: 75px; left: 75px; border: 2px solid var(--gold); padding: 12px; font-weight: 900; color: var(--gold); font-size: 1.1em; }
        
        .cert-main-content { margin-top: 70px; text-align: center; width: 100%; }
        #c-cert-title { font-family: 'Cinzel'; font-size: 44px; color: var(--navy); margin: 0; }
        #c-sub { letter-spacing: 14px; font-weight: 800; color: var(--gold); font-size: 14px; margin-bottom: 35px; }
        
        #c-name { font-family: 'Amiri', serif; font-size: 52px; border-bottom: 4px solid var(--navy); display: inline-block; padding: 0 50px; min-height: 80px; max-width: 850px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--navy); }
        #c-job { font-size: 30px; font-weight: 900; color: var(--gold); text-transform: uppercase; margin-top: 30px; line-height: 1.2; max-width: 900px; margin-left: auto; margin-right: auto; }

        /* POSITIONNEMENT SIGNATURE REHAUSSÉE */
        .cert-footer { position: absolute; bottom: 125px; left: 90px; right: 90px; display: flex; justify-content: space-between; align-items: flex-end; }
        #c-sig { font-family: 'Amiri'; font-size: 34px; border-bottom: 2px solid #333; width: 300px; font-style: italic; color: #222; }
    </style>
</head>

<div id="certificat-wrapper">

            </div>
        </div>
    </div>
</div>

        document.getElementById('v-btn').innerText = d.vBtn;
        document.getElementById('s-title').innerText = d.sTitle;
        document.getElementById('j-title').innerText = d.jTitle;
        document.getElementById('q-submit').innerText = d.qSubmit;
        document.getElementById('btn-pdf').innerText = d.btnPdf;
        document.getElementById('custom-input').placeholder = d.inputPlace;

        if(Workflow.step > 0) Workflow.renderQuestion();

};

/* DATASET 120 MÉTIERS RÉELS (15 PAR SECTEUR) */

    "Commerce": { icon: "fa-store-alt", jobs: ["Directeur Retail Omnicanal", "Analyste Pricing Dynamique", "Architecte E-commerce", "Directeur Supply Chain", "Category Manager Senior", "Visual Merchandiser Chef", "Directeur Export", "Trade Marketing Manager", "Directeur de Franchise", "Business Developer B2B", "Analyste Ventes Globales", "Area Manager Retail", "Revenue Growth Manager", "Directeur des Achats", "CRM Strategy Expert"] },
    "Finance": { icon: "fa-file-invoice-dollar", jobs: ["Analyste M&A", "Contrôleur de Gestion", "Risk Manager", "Trésorier Groupe", "Auditeur Externe", "Gestionnaire de Patrimoine", "Analyste Crédit", "Responsable Conformité", "Directeur Financier", "Analyste ESG", "Trader Haute Fréquence", "Actuaire", "Directeur de l'Audit", "Spécialiste Blockchain Finance", "Quantitative Analyst"] },
    "IT & AI": { icon: "fa-microchip", jobs: ["Architecte Cloud Azure", "Ingénieur ML Ops", "Expert Cybersécurité", "Lead Dev Fullstack", "Data Architect", "Scrum Master Senior", "Ingénieur DevOps", "Expert IA Générative", "Analyste SOC", "Architecte Réseaux", "Responsable SI", "Ingénieur Blockchain", "Consultant Transformation Digitale", "Product Owner", "Expert Big Data"] },
    "Energie": { icon: "fa-solar-panel", jobs: ["Ingénieur Réseaux Smart-Grid", "Chef de Projet Éolien", "Expert Efficacité Énergétique", "Ingénieur Nucléaire", "Consultant Hydrogène", "Analyste Marchés Énergie", "Responsable HSE Énergie", "Ingénieur Solaire", "Directeur de Centrale", "Géologue Pétrolier", "Expert Stockage Énergie", "Ingénieur Forage", "Responsable Maintenance Parc", "Consultant Bilan Carbone", "Technicien Réseaux HT"] },
    "Agri-Food": { icon: "fa-seedling", jobs: ["Ingénieur Agroalimentaire", "Expert Qualité Sanitaire", "Chef de Culture Précision", "Directeur Usine Agro", "Responsable R&D Food", "Acheteur Matières Premières", "Expert Packaging Durable", "Oenologue Conseil", "Directeur Supply Chain Agro", "Hydrologue Agricole", "Responsable Certification Bio", "Technicien Agronome", "Consultant Agtech", "Manager Export Food", "Spécialiste Microbiologie"] },

    "Education": { icon: "fa-user-graduate", jobs: ["Doyen Académique", "Ingénieur Pédagogique", "Directeur EdTech", "Responsable Formation", "Chercheur Senior", "Coordonnateur E-learning", "Directeur d'École", "Consultant Orientation", "Expert Evaluation Compétences", "Responsable Labo", "Manager Campus", "Spécialiste Design Thinking", "Concepteur de MOOC", "Directeur Innovation Education", "Analyste Politiques Educatives"] }
};

/* 40 QUESTIONS TECHNIQUES (8 SECTEURS * 5) */
const QUESTIONS_DB = {
    "Santé": [
        { q: "Interopérabilité : Comment résolvez-vous les conflits sémantiques entre SNOMED-CT et ICD-11 lors d'un flux FHIR ?", a: ["Alpha: Utilisation d'un serveur de terminologie avec mapping ontologique dynamique (+10)", "Beta: Création de profils StructureDefinition personnalisés avec extensions (+7)", "Gamma: Scripting de conversion statique JSON-to-JSON au niveau de l'API (+4)"] },
        { q: "Optimisation DMS : Quelle approche Lean privilégiez-vous pour le bloc opératoire ?", a: ["Alpha: Analyse VSM temps-réel avec détection automatique des goulots via IoT (+10)", "Beta: Standardisation des protocoles post-opératoires et dossiers mobiles (+7)", "Gamma: Augmentation linéaire des effectifs en salle de réveil (+4)"] },

    ],
    "Commerce": [
        { q: "Stagflation : Stratégie pour maintenir la marge brute sans sacrifier le volume ?", a: ["Alpha: Dynamic Pricing assisté par IA avec analyse de l'élasticité comportementale (+10)", "Beta: Renégociation agressive des contrats-cadres et optimisation du mix-produit (+7)", "Gamma: Campagnes massives de promotion sur les stocks dormants (+4)"] },
        { q: "Supply Chain : Optimisation du dernier kilomètre en zone urbaine dense ?", a: ["Alpha: Déploiement de micro-hubs automatisés et routage prédictif temps-réel (+10)", "Beta: Externalisation vers des prestataires 3PL avec flotte électrique (+7)", "Gamma: Incitation à la livraison en points relais de proximité (+4)"] },
        { q: "E-Commerce : Comment optimiser le taux de conversion (CRO) ?", a: ["Alpha: A/B Testing systématique sur serveurs Edge et personnalisation par IA (+10)", "Beta: Refonte de l'UX/UI basée sur les cartes de chaleur (Heatmaps) (+7)", "Gamma: Simplification du tunnel d'achat et réduction des temps de chargement (+4)"] },
        { q: "Retail : Quel levier pour l'unification des stocks physiques et web ?", a: ["Alpha: Système OMS avec inventaire RFID synchronisé à la milliseconde (+10)", "Beta: Ship-from-Store géré par une plateforme logistique middleware (+7)", "Gamma: Mise à jour quotidienne manuelle de la base de données centrale (+4)"] },

    ]
};

const Workflow = {
    score: 0, step: 0, sector: "", job: "", tempPts: 0, isDelta: false,
    renderSectors() {
        const grid = document.getElementById('sector-grid'); grid.innerHTML = "";
        Object.keys(DATA_KMS).forEach(s => {
            grid.innerHTML += `<div class="card" onclick="Workflow.selSec('${s}')"><i class="fas ${DATA_KMS[s].icon}"></i><h3>${s}</h3></div>`;
        });
    },
    selSec(s) {
        this.sector = s; document.getElementById('selection-interface').style.display = 'none';
        document.getElementById('job-interface').style.display = 'block';
        const grid = document.getElementById('job-grid'); grid.innerHTML = "";
        DATA_KMS[s].jobs.forEach(j => { grid.innerHTML += `<div class="card" onclick="Workflow.start('${j}')"><h3>${j}</h3></div>`; });
    },
    start(j) {
        this.job = j; document.getElementById('job-interface').style.display = 'none';
        document.getElementById('audit-interface').style.display = 'block';
        document.getElementById('job-badge').innerText = j; this.renderQuestion();
    },
    renderQuestion() {
        if(this.step >= 5) { this.finish(); return; }
        document.getElementById('audit-step').innerText = `STEP ${this.step+1}/5`;
        const qData = (QUESTIONS_DB[this.sector] && QUESTIONS_DB[this.sector][this.step]) || { q: `Audit Stratégique ${this.sector} : Quelle approche pour ${this.job} ?`, a: ["Alpha: Modélisation systémique et résilience (+10)", "Beta: Optimisation opérationnelle (+7)", "Gamma: Veille technologique et conformité (+4)"] };
        document.getElementById('q-text').innerText = qData.q;
        const stack = document.getElementById('options-stack'); stack.innerHTML = "";
        qData.a.forEach((o, i) => stack.innerHTML += `<button class="opt-button" onclick="Workflow.selOpt(this, ${[10,7,4][i]})">${o}</button>`);
        stack.innerHTML += `<button class="opt-button" onclick="Workflow.actDelta(this)">${AgentTranslation.db[AgentTranslation.lang].delta}</button>`;
        document.getElementById('custom-input').style.display = 'none';
    },
    selOpt(btn, p) {
        document.querySelectorAll('.opt-button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); this.tempPts = p; this.isDelta = false;
        document.getElementById('custom-input').style.display = 'none';
    },
    actDelta(btn) {
        document.querySelectorAll('.opt-button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); this.isDelta = true;
        document.getElementById('custom-input').style.display = 'block';
    },
    next() {
        if(this.isDelta) {
            const val = document.getElementById('custom-input').value;
            this.tempPts = (val.length > 55) ? 12 : 5;
            document.getElementById('custom-input').value = "";
        }
        if(this.tempPts) {
            this.score += this.tempPts; this.step++; this.tempPts = 0; this.renderQuestion();
        }
    },
    finish() {
        document.getElementById('audit-interface').style.display = 'none';
        const name = prompt(AgentTranslation.db[AgentTranslation.lang].promptName) || "EXPERT";
        document.getElementById('certificat-wrapper').style.display = 'block';
        const d = AgentTranslation.db[AgentTranslation.lang];
        document.getElementById('c-cert-title').innerText = d.cTitle;
        document.getElementById('c-sub').innerText = d.cSub;
        document.getElementById('c-confirm').innerText = d.cConfirm;
        document.getElementById('c-name').innerText = name.toUpperCase();
        document.getElementById('c-expert-text').innerText = d.cExpert;
        document.getElementById('c-job').innerText = this.job;
        document.getElementById('c-score-pct').innerText = Math.min(100, Math.round((this.score/50)*100)) + "%";
        document.getElementById('c-rank').innerText = d.rank;
        document.getElementById('c-sig-label').innerText = d.cSig;
        document.getElementById('c-auth-label').innerText = d.auth;
        document.getElementById('c-board-label').innerText = d.board;
        document.getElementById('c-sig').innerText = name;
        document.getElementById('c-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=MBA-V390-${name}-${this.job}`;
    },
    generatePDF() {
        const opt = { margin: 0, filename: `MBA-V390-CERTIFICATE.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'px', format: [1120, 790], orientation: 'landscape' } };
        html2pdf().set(opt).from(document.getElementById('cert-area')).save();
    }
};

AgentTranslation.update('fr');
</script>
