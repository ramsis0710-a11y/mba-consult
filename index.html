<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA-CONSULT | GLOBAL KMS V300</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;600;800&family=Amiri:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a021; --navy: #0a1128; --white: #ffffff; --bg: #f4f7f9; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--navy); overflow-x: hidden; }
        body.rtl { direction: rtl; font-family: 'Amiri', serif; }

        /* MULTI-LANGUE UI */
        #lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 40000; display: flex; gap: 8px; background: rgba(10,17,40,0.95); padding: 10px; border-radius: 8px; border: 1px solid var(--gold); }
        .lang-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 6px 14px; cursor: pointer; font-weight: 800; border-radius: 4px; font-size: 0.8em; }
        .lang-btn.active { background: var(--gold); color: var(--navy); }

        /* PORTAIL DE VIGILANCE */
        #vision-portal { position: fixed; inset: 0; background: var(--navy); z-index: 30000; display: flex; justify-content: center; align-items: center; color: white; padding: 20px; text-align: center; }
        .welcome-box { background: rgba(15, 25, 55, 0.98); border: 2px solid var(--gold); padding: 50px; border-radius: 15px; max-width: 900px; box-shadow: 0 0 100px rgba(0,0,0,0.9); }
        .vigilance-text { color: #ff4d4d; font-weight: 800; text-transform: uppercase; margin-top: 25px; font-size: 0.9em; letter-spacing: 2px; }

        /* HEADER */
        header { background: var(--navy); color: var(--gold); padding: 25px; text-align: center; border-bottom: 5px solid var(--gold); font-family: 'Cinzel'; font-size: 1.8em; letter-spacing: 6px; }

        /* GRILLE DES SECTEURS */
        .sector-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; padding: 20px; }
        .sector-card { background: white; padding: 40px; border-radius: 12px; border: 2px solid #eee; cursor: pointer; text-align: center; }
        .sector-card:hover { border-color: var(--gold); transform: translateY(-10px); background: #fdfaf0; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .sector-logo { font-size: 3.5em; margin-bottom: 15px; display: block; }

        /* INTERFACE D'AUDIT */
        #audit-interface { display: none; max-width: 1000px; margin: 40px auto; background: white; padding: 50px; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .opt-button { display: block; width: 100%; padding: 22px; margin: 12px 0; border: 2px solid #eee; cursor: pointer; background: white; text-align: inherit; border-radius: 8px; font-size: 1.1em; }
        .opt-button:hover { background: #fdfaf0; border-color: var(--gold); }
        .opt-button.selected { border-color: var(--gold); background: #fdfaf0; font-weight: 800; border-width: 3px; }

        /* CERTIFICAT PAYSAGE */
        #certificat-final { display: none; width: 1120px; height: 790px; border: 40px double var(--gold); background: white; margin: 20px auto; padding: 60px; position: relative; text-align: center; }
        @media print {
            @page { size: A4 landscape; margin: 0; }
            body * { display: none; }
            #certificat-final { display: block !important; position: absolute; inset: 0; }
        }
    </style>
</head>
<body>

<div id="lang-switcher">
    <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-ar" onclick="setLang('ar')">AR</button>
</div>

<div id="vision-portal">
    <div class="welcome-box">
        <h1 style="font-family: 'Cinzel'; font-size: 3em; margin: 0;">MBA-CONSULT</h1>
        <div id="v-msg" style="font-size: 1.4em; line-height: 1.8; margin: 30px 0;"></div>
        <div id="v-vigilance" class="vigilance-text"></div>
        <button class="lang-btn active" id="v-btn" onclick="document.getElementById('vision-portal').style.display='none'" style="margin-top: 30px; padding: 15px 40px; font-size: 1.1em;"></button>
    </div>
</div>

<header>MBA-CONSULT | GLOBAL KMS V300</header>

    <div id="selection-interface">
        <h2 id="s-title" style="text-align:center; font-family: 'Cinzel'; margin-top: 40px;"></h2>
        <div class="sector-grid" id="sector-grid"></div>
    </div>

    <div id="audit-interface">

            <span id="job-badge" style="background: var(--navy); color: white; padding: 10px 25px; border-radius: 30px; font-weight: bold; font-size: 0.9em;"></span>
        </div>
        <h2 id="q-text" style="font-size: 1.8em; line-height: 1.4; color: var(--navy); margin-bottom: 40px;"></h2>
        <div id="options-stack"></div>
        <div style="text-align:right; margin-top: 40px;">
            <button id="q-submit" onclick="submitStep()" style="background: var(--gold); color: var(--navy); border: none; padding: 20px 60px; font-weight: 800; cursor: pointer; border-radius: 5px; text-transform: uppercase;"></button>
        </div>
    </div>

    <div id="certificat-final">
        <div style="position: absolute; top: 40px; right: 60px; text-align: right;">
            <div style="font-family: 'Cinzel'; font-size: 22px; color: var(--gold);">MBA BOARD ALPHA</div>
            <small>ID: <span id="c-hash"></span></small>
        </div>
        <div id="c-cert-title" style="font-family: 'Cinzel'; font-size: 45px; margin-top: 60px;">CERTIFICATE OF EXCELLENCE</div>
        <p style="letter-spacing: 10px; font-weight: 800; color: var(--gold); margin-top: 10px;">GLOBAL PROFESSIONAL ACCREDITATION</p>
        <p id="c-confirm" style="font-size: 1.4em; margin-top: 40px;"></p>
        <div id="c-name" style="font-family: 'Amiri', serif; font-size: 55px; border-bottom: 3px solid #333; display: inline-block; margin: 15px 0; padding: 0 60px;"></div>
        <p id="c-expert-text" style="font-size: 1.4em;"></p>
        <div id="c-job" style="font-size: 38px; font-weight: 900; color: var(--gold); text-transform: uppercase; margin: 20px 0;"></div>
        
        <div style="display: flex; justify-content: center; gap: 40px; margin: 40px 0;">
            <div style="background: var(--navy); color: white; padding: 20px 50px; border: 2px solid var(--gold); font-size: 1.5em; font-weight: 800;">SCORE: <span id="c-score"></span>%</div>
        </div>

        <div style="margin-top: 60px; display: flex; justify-content: space-between; align-items: flex-end; padding: 0 40px;">
            <div style="text-align:left;">
                <div id="c-sig" style="font-family: 'Amiri'; font-size: 30px; border-top: 2px solid #333; width: 350px; padding-top: 10px;"></div>
                <small>E-Signature : MBA-CONSULT KMS VERIFIED</small>
            </div>
            <img id="c-qr" src="" style="width: 130px;">
        </div>
    </div>
</div>

<script>

        Energie: { logo: "⚡", fr: ["Ingénieur Forage", "Expert Solaire", "Analyste Smart-Grid", "Géologue", "Manager Éolien", "Ingénieur Nucléaire", "Consultant Hydrogène", "Responsable HSE", "Directeur de centrale", "Analyste Marchés", "Technicien Réseaux", "Audit Énergétique", "Manager Biomasse", "Géophysicien", "Planificateur", "Expert Off-shore", "Spécialiste GRID", "Ingénieur Thermique", "Foreur", "Consultant Carbone"], en: ["Drilling Engineer", "Solar Expert", "Smart-Grid Analyst", "Geologist", "Wind Manager", "Nuclear Engineer", "Hydrogen Consultant", "HSE Manager", "Plant Director", "Market Analyst", "Network Technician", "Energy Auditor", "Biomass Manager", "Geophysicist", "Planner", "Off-shore Expert", "GRID Specialist", "Thermal Engineer", "Driller", "Carbon Consultant"], ar: ["مهندس حفر", "خبير شمسي", "محلل شبكات ذكية", "جيولوجي", "مدير طاقة رياح", "مهندس نووي", "مستشار هيدروجين", "مسؤول سلامة", "مدير محطة", "محلل أسواق", "تقني شبكات", "مدقق طاقة", "مدير طاقة حيوية", "جيوفيزيائي", "مخطط طاقة", "خبير أوفشور", "خبير شبكات", "مهندس حراري", "حفار", "مستشار كربون"] },
        IT_AI: { logo: "🤖", fr: ["Data Scientist", "Architecte Cloud", "Cyber Expert", "Prompt Engineer", "ML Ops", "Pentester", "Data Architect", "Scrum Master", "Analyste SOC", "Ingénieur VR", "DevSecOps", "UX Designer", "Product Owner", "Expert Big Data", "Manager IT", "Architecte Réseaux", "Fullstack Dev", "Expert Blockchain", "Consultant ERP", "Ingénieur Robotique"], en: ["Data Scientist", "Cloud Architect", "Cyber Expert", "Prompt Engineer", "ML Ops", "Pentester", "Data Architect", "Scrum Master", "SOC Analyst", "VR Engineer", "DevSecOps", "UX Designer", "Product Owner", "Big Data Expert", "IT Manager", "Network Architect", "Fullstack Dev", "Blockchain Expert", "ERP Consultant", "Robotics Engineer"], ar: ["عالم بيانات", "معماري سحابي", "خبير سيبراني", "مهندس أوامر", "مهندس ML", "مختبر اختراق", "معماري بيانات", "سكرم ماستر", "محلل SOC", "مهندس واقع افتراضي", "مهندس DevSecOps", "مصمم UX", "مالك منتج", "خبير بيانات ضخمة", "مدير تكنولوجيا", "معماري شبكات", "مطور شامل", "خبير بلوكشين", "مستشار ERP", "مهندس روبوتات"] },
        Agri_Food: { logo: "🌾", fr: ["Agronome", "Responsable Qualité", "Manager Supply", "Généticien", "Audit Bio", "Oenologue", "Nutritionniste", "Irrigologue", "Acheteur", "Manager de prod", "Expert Sols", "Responsable RSE", "Ingénieur Agro", "Logistique Froid", "Manager Coop", "Pathologiste", "Expert Semences", "Chef de culture", "Analyste Terroir", "Horticulteur"], en: ["Agronomist", "Quality Manager", "Supply Manager", "Geneticist", "Bio Auditor", "Oenologist", "Nutritionist", "Irrigation Expert", "Buyer", "Production Manager", "Soil Expert", "CSR Manager", "Agro Engineer", "Cold Logistics", "Coop Manager", "Pathologist", "Seed Expert", "Culture Lead", "Terroir Analyst", "Horticulturist"], ar: ["مهندس زراعي", "مسؤول جودة", "مدير توريد", "خبير جينات", "مدقق عضوي", "خبير خمور", "خبير تغذية", "خبير ري", "مشتري زراعي", "مدير إنتاج", "خبير تربة", "مدير مسؤولية", "مهندس أغذية", "لوجستيك بارد", "مدير تعاونية", "خبير أمراض", "خبير بذور", "مدير زراعة", "محلل أراضي", "بستاني"] },
        Tourism: { logo: "🌍", fr: ["Revenue Manager", "Directeur Resort", "Yield Analyst", "E-reputation", "Conceptrice Exp", "Manager Éco", "Chef Réception", "Directeur Croisière", "Guide Montagne", "Concierge Clés d'Or", "Manager Desti", "Analyste Flux", "Directeur de Parc", "Event Planner", "Responsable Loisirs", "Audit Hôtelier", "Expert Mobilité", "Manager Incentive", "Chef de produit", "Directeur Hôtelier"], en: ["Revenue Manager", "Resort Director", "Yield Analyst", "E-reputation", "Exp Designer", "Eco Manager", "Reception Head", "Cruise Director", "Mountain Guide", "Clefs d'Or Concierge", "Desti Manager", "Flow Analyst", "Park Director", "Event Planner", "Leisure Manager", "Hotel Auditor", "Mobility Expert", "Incentive Manager", "Product Lead", "Hotel Director"], ar: ["مدير إيرادات", "مدير منتجع", "محلل Yield", "مدير سمعة", "مصمم تجارب", "مدير سياحة بيئية", "رئيس استقبال", "مدير كروز", "دليل جبال", "كونسيرج ذهبي", "مدير وجهة", "محلل تدفقات", "مدير منتزه", "مخطط فعاليات", "مسؤول ترفيه", "مدقق فندقي", "خبير تنقل", "مدير حوافز", "مدير منتج", "مدير فندق"] },
        Education: { logo: "🎓", fr: ["Ingénieur Pédago", "Directeur Académique", "Chercheur EdTech", "Directeur Campus", "Andragogue", "Coach Dirigeant", "Spécialiste LMS", "Analyste Compétences", "Innovation Manager", "Expert VAE", "Consultant Orient", "Directeur Recherche", "Manager Faculté", "Médiateur", "Inclusion Expert", "Concepteur E-learn", "Formateur Expert", "Audit Qualité Ed", "Planificateur", "Directeur École"], en: ["Instructional Designer", "Academic Director", "EdTech Researcher", "Campus Director", "Andragogue", "Executive Coach", "LMS Specialist", "Skills Analyst", "Innovation Manager", "VAE Expert", "Guidance Consultant", "Research Director", "Faculty Manager", "Mediator", "Inclusion Expert", "E-learn Designer", "Expert Trainer", "Ed Quality Auditor", "Planner", "School Director"], ar: ["مصمم تعليمي", "مدير أكاديمي", "باحث EdTech", "مدير كامبوس", "خبير أندراغوجيا", "مدرب تنفيذيين", "خبير LMS", "محلل مهارات", "مدير ابتكار", "خبير VAE", "مستشار توجيه", "مدير بحث", "مدير كلية", "وسيط تعليمي", "خبير دمج", "مصمم تعلم رقمي", "مدرب خبير", "مدقق جودة تعليم", "مخطط", "مدير مدرسة"] }
    };

    let curL = 'fr', score = 0, step = 0, currentSec = "", selectedJob = "";

    function setLang(l) {
        curL = l;
        document.body.className = l === 'ar' ? 'rtl' : '';
        const d = TRANSLATIONS[l];
        document.getElementById('v-msg').innerText = d.vMsg;
        document.getElementById('v-vigilance').innerText = d.vVigilance;
        document.getElementById('v-btn').innerText = d.vBtn;
        document.getElementById('s-title').innerText = d.sTitle;
        document.getElementById('q-submit').innerText = d.qSubmit;
        initSectors();
    }

    function initSectors() {
        const grid = document.getElementById('sector-grid');
        grid.innerHTML = "";
        for (const [id, data] of Object.entries(DATABASE)) {
            grid.innerHTML += `
                <div class="sector-card" onclick="selectSector('${id}')">
                    <span class="sector-logo">${data.logo}</span>
                    <h3 style="font-family:'Cinzel';">${id.replace('_',' ')}</h3>
                </div>
            `;
        }
    }

    function selectSector(id) {
        currentSec = id;
        const jobs = DATABASE[id][curL];
        selectedJob = prompt(`${TRANSLATIONS[curL].promptJob}\n\n${jobs.join(" | ")}`) || jobs[0];
        document.getElementById('selection-interface').style.display = 'none';
        document.getElementById('audit-interface').style.display = 'block';
        document.getElementById('job-badge').innerText = selectedJob.toUpperCase();
        loadQ();
    }

    function loadQ() {
        if(step >= 10) { conclude(); return; }
        const contexts = {
            fr: ["Crise de liquidité", "Cyber-attaque", "Défaillance technique", "Obsolescence", "Rupture de stock"],
            en: ["Liquidity crisis", "Cyber-attack", "Technical failure", "Obsolescence", "Out of stock"],
            ar: ["أزمة سيولة", "هجوم سيبراني", "فشل تقني", "تقادم", "نفاد المخزون"]
        };
        const ctx = contexts[curL][step % 5];
        document.getElementById('audit-step').innerText = `${TRANSLATIONS[curL].audit} ${step+1}/10`;
        document.getElementById('q-text').innerText = `[${ctx}] - En tant que ${selectedJob}, quelle est votre stratégie de cœur de métier face à cette situation critique ?`;
        
        const stack = document.getElementById('options-stack');
        stack.innerHTML = "";
        TRANSLATIONS[curL].strategies.forEach((s, i) => {
            stack.innerHTML += `<button class="opt-button" onclick="sel(this, ${10-i*3})">${s}</button>`;
        });
        tempPts = 0;
    }

    let tempPts = 0;
    function sel(btn, p) {
        document.querySelectorAll('.opt-button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        tempPts = p;
    }

    function submitStep() {
        if(!tempPts) return;
        score += tempPts; step++; loadQ();
    }

    function conclude() {
        document.getElementById('audit-interface').style.display = 'none';
        if(score < 80) {
            alert(TRANSLATIONS[curL].fail);
            location.reload();
        } else {
            const name = prompt(TRANSLATIONS[curL].promptName);
            document.getElementById('certificat-final').style.display = 'block';
            document.getElementById('c-name').innerText = name.toUpperCase();
            document.getElementById('c-job').innerText = selectedJob;
            document.getElementById('c-score').innerText = score;
            document.getElementById('c-hash').innerText = Math.random().toString(36).substr(2, 10).toUpperCase();
            document.getElementById('c-sig').innerText = name;
            document.getElementById('c-confirm').innerText = TRANSLATIONS[curL].cConfirm;
            document.getElementById('c-expert-text').innerText = TRANSLATIONS[curL].cExpert;
            document.getElementById('c-cert-title').innerText = curL === 'ar' ? 'شهادة التميز المهني' : 'CERTIFICATE OF EXCELLENCE';
            document.getElementById('c-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=130x130&data=MBA-KMS-VERIFIED-${score}-${name}`;
            window.scrollTo(0,0);
        }
    }

    setLang('fr');
</script>
</body>
</html>
