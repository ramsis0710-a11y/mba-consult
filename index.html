<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA-CONSULT | GLOBAL KMS A385</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;600;800&family=Amiri:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #c5a021; --navy: #0a1128; --white: #ffffff; --bg: #f4f7f9; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--navy); }
        
        /* GESTION RTL POUR L'ARABE */
        body.rtl { direction: rtl; font-family: 'Amiri', serif; }
        body.rtl .cert-validation-block { left: auto; right: 60px; text-align: right; }
        body.rtl .cert-footer { flex-direction: row-reverse; }
        body.rtl #lang-switcher { right: auto; left: 20px; }

        #lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 40000; display: flex; gap: 8px; background: rgba(10,17,40,0.95); padding: 10px; border-radius: 8px; border: 1px solid var(--gold); }
        .lang-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 6px 14px; cursor: pointer; font-weight: 800; border-radius: 4px; }
        .lang-btn.active { background: var(--gold); color: var(--navy); }

        #vision-portal { position: fixed; inset: 0; background: var(--navy); z-index: 30000; display: flex; justify-content: center; align-items: center; color: white; padding: 20px; text-align: center; }
        .welcome-box { background: rgba(15, 25, 55, 0.98); border: 2px solid var(--gold); padding: 60px; border-radius: 15px; max-width: 1000px; }
        .speech-text { font-size: 1.5em; line-height: 1.6; margin: 30px 0; font-weight: 300; font-style: italic; color: #e0e0e0; white-space: pre-line; }
        
        header { background: var(--navy); color: var(--gold); padding: 25px; text-align: center; border-bottom: 5px solid var(--gold); font-family: 'Cinzel'; font-size: 1.8em; letter-spacing: 6px; }

        .sector-grid, .job-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 40px; max-width: 1400px; margin: 0 auto; }
        .sector-card, .job-item { background: white; padding: 40px; border-radius: 15px; border: 2px solid #eee; cursor: pointer; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .sector-card:hover, .job-item:hover { border-color: var(--gold); transform: translateY(-8px); }

        #audit-interface { display: none; max-width: 950px; margin: 40px auto; background: white; padding: 50px; border-radius: 15px; border-left: 10px solid var(--gold); box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .opt-button { display: block; width: 100%; padding: 22px; margin: 12px 0; border: 2px solid #eee; cursor: pointer; background: white; text-align: inherit; border-radius: 8px; font-size: 1.1em; }

        /* CERTIFICAT A385 */
        #certificat-wrapper { display: none; padding: 40px 0; text-align: center; }
        #cert-area { width: 1050px; height: 740px; background: white; margin: 0 auto; padding: 50px; position: relative; border: 30px double var(--gold); }
        .cert-validation-block { position: absolute; top: 60px; left: 60px; text-align: left; }
        .cert-qr { width: 130px; border: 1px solid #eee; }
        .cert-footer { position: absolute; bottom: 50px; left: 60px; right: 60px; display: flex; justify-content: space-between; align-items: flex-end; }
    </style>
</head>
<body>

<div id="lang-switcher">
    <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-ar" onclick="setLang('ar')">AR</button>
</div>

<div id="vision-portal">
    <div class="welcome-box">
        <h1 style="font-family: 'Cinzel'; font-size: 3.5em; margin: 0; color: var(--gold);">MBA-CONSULT</h1>
        <div class="speech-text" id="v-speech"></div>
        <button class="lang-btn active" id="v-btn" onclick="document.getElementById('vision-portal').style.display='none'" style="padding:15px 40px;"></button>
    </div>
</div>

<header id="h-main">MBA-CONSULT | GLOBAL KMS A385</header>

<div id="selection-interface">
    <h2 id="s-title" style="text-align:center; font-family: 'Cinzel'; margin-top: 40px;"></h2>
    <div class="sector-grid" id="sector-grid"></div>
</div>

<div id="job-selection-interface" style="display:none; text-align:center; padding-top:40px;">
    <h2 id="j-title" style="font-family: 'Cinzel';"></h2>
    <div class="job-grid" id="job-grid"></div>
</div>

<div id="audit-interface">
    <div id="audit-step" style="font-weight: 800; color: var(--gold); margin-bottom: 20px;"></div>
    <h2 id="q-text" style="font-size: 1.7em; color: var(--navy);"></h2>
    <div id="options-stack"></div>
    <button id="q-submit" onclick="submitStep()" style="background: var(--gold); color: var(--navy); border: none; padding: 20px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 30px; text-transform: uppercase;"></button>
</div>

<div id="certificat-wrapper">
    <button onclick="generatePDF()" style="padding:15px 30px; background:#27ae60; color:white; border:none; cursor:pointer; font-weight:800; margin-bottom:20px;">PDF EXPORT</button>
    <div id="cert-area">
        <div class="cert-validation-block">
            <img id="c-qr" class="cert-qr" src="">
            <div id="c-score-pct" style="font-size: 2em; font-weight: 900;"></div>
            <div style="color: var(--gold); font-weight: 800;">WORLD RANK: #1 TOP TIER</div>
        </div>
        <div id="c-cert-title" style="font-family: 'Cinzel'; font-size: 40px; margin-top: 50px; margin-left: 150px;"></div>
        <div id="c-sub" style="letter-spacing: 10px; font-weight: 800; color: var(--gold); margin-left: 150px;"></div>
        <p id="c-confirm" style="font-size: 1.6em; margin-top: 80px;"></p>
        <div id="c-name" style="font-family: 'Amiri'; font-size: 55px; border-bottom: 3px solid #333; display: inline-block; padding: 0 40px;"></div>
        <p id="c-expert-text" style="font-size: 1.6em; margin-top: 15px;"></p>
        <div id="c-job" style="font-size: 38px; font-weight: 900; color: var(--gold); text-transform: uppercase;"></div>
        <div class="cert-footer">
            <div style="text-align:left;">
                <div id="c-sig" style="font-family: 'Amiri'; font-size: 30px; border-bottom: 2px solid #333; width: 280px;"></div>
                <small id="c-sig-label" style="font-weight: 800; display: block; margin-top: 5px;"></small>
            </div>
            <div style="text-align:right;">
                <div style="color: var(--gold); font-weight: bold;">HASH-MBA-ACCREDITED</div>
                <div style="font-family: 'Cinzel'; font-size: 20px; border-bottom: 2px solid #333; width: 280px; margin-top: 10px;">MBA BOARD ALPHA</div>
            </div>
        </div>
    </div>
</div>

<script>
    const JOBS = {
        Finance: ["Trader Haute Fréquence", "Analyste M&A", "Auditeur Financier", "Risk Manager", "Directeur de Trésorerie", "Banquier d'Affaires", "Fiscaliste International", "Actuaire", "Gestionnaire de Fortune", "Analyste ESG", "Compliance Officer", "Broker", "Contrôleur de Gestion", "Analyste Quantitatif", "Gestionnaire de Fonds", "Expert Comptable", "Credit Analyst", "Spécialiste Blockchain", "Directeur Financier", "Consultant Restructuration"]
    };

    const TEXTS = {
        fr: {
            vSpeech: "Franchissez les frontières du savoir conventionnel pour intégrer l'élite mondiale.",
            vBtn: "DÉPLOYER L'AUDIT", sTitle: "UNITÉS D'ACCRÉDITATION MBA", jTitle: "SÉLECTIONNEZ VOTRE MÉTIER",
            qSubmit: "VALIDER", promptName: "NOM COMPLET :", cTitle: "CERTIFICAT D'EXCELLENCE", 
            cSub: "ACCRÉDITATION MONDIALE", cConfirm: "Ce document atteste solennellement que", 
            cExpert: "A validé son accréditation pour le métier de :", cSig: "SIGNATURE ÉLECTRONIQUE"
        },
        en: {
            vSpeech: "Cross the boundaries of conventional knowledge to join the global elite.",
            vBtn: "DEPLOY AUDIT", sTitle: "MBA ACCREDITATION UNITS", jTitle: "SELECT YOUR PROFESSION",
            qSubmit: "VALIDATE", promptName: "FULL NAME:", cTitle: "CERTIFICATE OF EXCELLENCE",
            cSub: "GLOBAL ACCREDITATION", cConfirm: "This document solemnly certifies that",
            cExpert: "Has validated accreditation for the profession of:", cSig: "ELECTRONIC SIGNATURE"
        },
        ar: {
            vSpeech: "تجاوز حدود المعرفة التقليدية لتنضم إلى نخبة صناع القرار في العالم.",
            vBtn: "بدء التدقيق الاستراتيجي", sTitle: "وحدات الاعتماد المهني MBA", jTitle: "اختر مهنة الخبرة الخاصة بك",
            qSubmit: "تأكيد القرار", promptName: "الاسم الكامل للـخبير:", cTitle: "شهادة التميـــــــــز",
            cSub: "الاعتماد المهنـي العالمـي", cConfirm: "تشهد هذه الوثيقة رسمياً وبكل فخر بأن",
            cExpert: "قد اجتاز بنجاح الاعتماد العالمي لمهنة:", cSig: "توقيع إلكتروني معتمد"
        }
    };

    let curL = 'fr', score = 0, step = 0, selectedJob = "", tempPts = 0;

    function setLang(l) {
        curL = l;
        document.body.className = (l === 'ar' ? 'rtl' : '');
        const d = TEXTS[l];
        document.getElementById('v-speech').innerText = d.vSpeech;
        document.getElementById('v-btn').innerText = d.vBtn;
        document.getElementById('s-title').innerText = d.sTitle;
        document.getElementById('j-title').innerText = d.jTitle;
        document.getElementById('q-submit').innerText = d.qSubmit;
        initSectors();
    }

    function initSectors() {
        const grid = document.getElementById('sector-grid'); grid.innerHTML = "";
        ["Finance", "IT_AI", "Energie", "Agri_Food", "Tourism", "Education"].forEach(s => {
            grid.innerHTML += `<div class="sector-card" onclick="showJobs('${s}')"><h3>${s}</h3></div>`;
        });
    }

    function showJobs(s) {
        document.getElementById('selection-interface').style.display = 'none';
        document.getElementById('job-selection-interface').style.display = 'block';
        const grid = document.getElementById('job-grid'); grid.innerHTML = "";
        (JOBS[s] || JOBS["Finance"]).forEach(j => {
            grid.innerHTML += `<div class="job-item" onclick="startAudit('${j}')">${j}</div>`;
        });
    }

    function startAudit(j) {
        selectedJob = j;
        document.getElementById('job-selection-interface').style.display = 'none';
        document.getElementById('audit-interface').style.display = 'block';
        loadQ();
    }

    function loadQ() {
        if(step >= 5) { conclude(); return; }
        document.getElementById('audit-step').innerText = `STEP ${step+1}/5`;
        document.getElementById('q-text').innerText = (curL === 'ar' ? "ما هو القرار الاستراتيجي الأمثل لهذا الموقف؟" : "Quelle décision stratégique garantit l'avantage compétitif ?");
        const stack = document.getElementById('options-stack'); stack.innerHTML = "";
        ["Alpha Decision (+10)", "Beta Decision (+7)", "Gamma Decision (+4)"].forEach((o, i) => {
            stack.innerHTML += `<button class="opt-button" onclick="tempPts=${[10,7,4][i]}">${o}</button>`;
        });
    }

    function submitStep() { if(tempPts) { score += tempPts; step++; tempPts=0; loadQ(); } }

    function conclude() {
        document.getElementById('audit-interface').style.display = 'none';
        if(score < 40) { alert("SCORE INSUFFISANT / درجة غير كافية"); location.reload(); }
        else {
            const name = prompt(TEXTS[curL].promptName) || "EXPERT";
            const d = TEXTS[curL];
            document.getElementById('certificat-wrapper').style.display = 'block';
            document.getElementById('c-cert-title').innerText = d.cTitle;
            document.getElementById('c-sub').innerText = d.cSub;
            document.getElementById('c-confirm').innerText = d.cConfirm;
            document.getElementById('c-expert-text').innerText = d.cExpert;
            document.getElementById('c-sig-label').innerText = d.cSig;
            document.getElementById('c-name').innerText = name.toUpperCase();
            document.getElementById('c-job').innerText = selectedJob;
            document.getElementById('c-score-pct').innerText = (score/50*100) + "%";
            document.getElementById('c-sig').innerText = name;
            document.getElementById('c-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=MBA-${name}`;
        }
    }

    function generatePDF() {
        html2pdf().set({ margin:0, filename:'MBA-CERT.pdf', jsPDF:{format:'a4', orientation:'landscape'} }).from(document.getElementById('cert-area')).save();
    }

    setLang('fr');
</script>
</body>
</html>
