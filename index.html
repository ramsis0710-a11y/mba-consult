<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V390 TITANIUM OMNI-GENESIS - TOTAL MONOLITH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --navy: #0A1128; --bg: #02050D; --white: #FFFFFF; --glass: rgba(255,255,255,0.03); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); margin: 0; overflow-x: hidden; }
        
        /* NAVIGATION SCELLÉE */
        #nav-header { position: fixed; top: 0; width: 100%; height: 80px; background: rgba(2,5,13,0.95); border-bottom: 2px solid var(--gold); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 10000; box-sizing: border-box; backdrop-filter: blur(10px); }
        .btn-nav { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px 24px; cursor: pointer; border-radius: 4px; font-weight: bold; text-transform: uppercase; transition: 0.3s; font-size: 0.9rem; }
        .btn-nav:hover { background: var(--gold); color: var(--navy); box-shadow: 0 0 15px var(--gold); }

        .page { display: none; min-height: 100vh; padding: 120px 8% 60px; box-sizing: border-box; }
        .active-page { display: block; animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* DESIGN SYSTÈME */
        .motivation-box { border-left: 5px solid var(--gold); padding: 30px; background: var(--glass); border-radius: 0 30px 30px 0; margin-bottom: 50px; font-size: 1.2rem; line-height: 1.7; color: #ced4da; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: linear-gradient(145deg, #0A1128, #050A18); border: 1px solid rgba(212,175,55,0.15); padding: 40px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.5s; position: relative; overflow: hidden; }
        .card:hover { border-color: var(--gold); transform: translateY(-10px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .card i { font-size: 4rem; color: var(--gold); margin-bottom: 25px; display: block; opacity: 0.8; }

        /* AUDIT ENGINE UI */
        #audit-container { max-width: 1000px; margin: auto; background: var(--glass); padding: 60px; border-radius: 30px; border: 1px solid rgba(212,175,55,0.2); }
        .opt-btn { width: 100%; text-align: left; padding: 22px; margin: 15px 0; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); color: #FFF; cursor: pointer; border-radius: 12px; font-size: 1.15rem; transition: 0.3s; }
        .opt-btn:hover, .opt-selected { background: var(--gold); color: var(--navy); font-weight: 900; border-color: var(--gold); }
        textarea { width: 100%; height: 160px; background: #000; color: var(--gold); border: 1px solid var(--gold); border-radius: 12px; padding: 20px; margin-top: 20px; font-size: 1.1rem; }

        /* CERTIFICAT V390 - GEOMETRIE SCELLÉE */
        #cert-container { width: 1122px; height: 793px; background: #FFF; color: #000; position: relative; border: 30px double var(--gold); display: none; box-sizing: border-box; }
        #pdf-qr { position: absolute; top: 5mm; right: 5mm; width: 140px; height: 140px; background: #FFF; padding: 10px; border: 1px solid #000; }
        #pdf-sig { position: absolute; bottom: 5mm; left: 50%; transform: translateX(-50%); width: 500px; text-align: center; border-top: 3px solid #000; padding-top: 15px; font-weight: bold; font-size: 1.4rem; font-family: serif; }
        .pdf-content { padding: 120px 100px; text-align: center; }
        .bg-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 450px; color: rgba(0,0,0,0.04); z-index: 0; }
    </style>
</head>
<body>

<header id="nav-header">
    <div>
        <button class="btn-nav" onclick="KMS.back()"><i class="fas fa-arrow-left"></i> <span data-key="nav_back"></span></button>
        <button class="btn-nav" onclick="KMS.go('p-sectors')"><span data-key="nav_home"></span></button>
    </div>
    <div id="lang-btns">
        <button class="btn-nav" onclick="KMS.setLang('fr')">FR</button>
        <button class="btn-nav" onclick="KMS.setLang('en')">EN</button>
        <button class="btn-nav" onclick="KMS.setLang('ar')">AR</button>
    </div>
</header>

<div id="p-intro" class="page active-page">
    <div style="text-align:center; margin-bottom:60px;">
        <h1 style="color:var(--gold); font-size: 5rem; margin:0; letter-spacing:-2px;">TITANIUM OMNI-GENESIS</h1>
        <p style="font-size:1.5rem; letter-spacing:15px; color:var(--gold); opacity:0.6;">V390 GOLD EDITION</p>
    </div>
    <div class="motivation-box" id="motive-text"></div>
    <button class="btn-nav" style="width:100%; padding:40px; font-size:2rem;" onclick="KMS.go('p-sectors')" data-key="btn_start"></button>
</div>

<div id="p-sectors" class="page">
    <h2 data-key="title_sectors" style="text-align:center; color:var(--gold); font-size:3rem; margin-bottom:50px;"></h2>
    <div id="sector-grid" class="grid"></div>
</div>

<div id="p-jobs" class="page">
    <h2 id="current-sector-name" style="text-align:center; color:var(--gold); font-size:3rem; margin-bottom:50px;"></h2>
    <div id="job-grid" class="grid"></div>
</div>

<div id="p-audit" class="page">
    <div id="audit-container">
        <div style="display:flex; justify-content:space-between; color:var(--gold); margin-bottom:30px; font-weight:bold; font-size:1.3rem;">
            <span id="audit-step-count"></span>
            <span id="audit-score-live">SCORE: 0%</span>
        </div>
        <h2 id="question-text" style="min-height:150px; font-size:1.8rem; line-height:1.4;"></h2>
        <div id="options-container"></div>
        <div id="delta-module" style="display:none; margin-top:30px; border-top:2px solid var(--gold); padding-top:30px;">
            <h4 style="color:var(--gold); margin:0 0 15px 0;" data-key="delta_title"></h4>
            <textarea id="delta-text" placeholder="Entrez votre analyse experte..."></textarea>
        </div>
        <div style="display:flex; gap:25px; margin-top:50px;">
            <button class="btn-nav" style="flex:1" onclick="KMS.prevQ()" data-key="btn_prev"></button>
            <button class="btn-nav" style="flex:2; background:var(--gold); color:var(--navy);" onclick="KMS.nextQ()" data-key="btn_next"></button>
        </div>
    </div>
</div>

<div id="p-result" class="page" style="text-align:center;">
    <h1 id="final-score-display" style="font-size:10rem; margin:0; line-height:1;"></h1>
    <h2 id="final-status" style="font-size:3rem; margin:20px 0;"></h2>
    <p id="final-msg" style="max-width:900px; margin:40px auto; font-size:1.5rem; color:var(--gold);"></p>
    <button id="btn-cert" class="btn-nav" style="display:none; padding:30px 80px; font-size:1.8rem;" onclick="KMS.generatePDF()"><i class="fas fa-award"></i> <span data-key="btn_download"></span></button>

    <div id="cert-container">
        <div id="pdf-watermark" class="bg-watermark"></div>
        <div id="pdf-qr"></div>
        <div class="pdf-content">
            <p style="letter-spacing:15px; color:#888;">OFFICIAL V390 CERTIFICATION</p>
            <h1 style="font-size:60px; margin:20px 0;">MASTER OF EXPERTISE</h1>
            <p style="font-size:24px;" data-key="pdf_intro"></p>
            <h2 id="pdf-name" style="font-size:55px; border-bottom:5px solid #D4AF37; display:inline-block; padding:0 60px; margin:20px 0;"></h2>
            <p style="font-size:26px; margin-top:40px;" data-key="pdf_rank"></p>
            <h3 id="pdf-job" style="font-size:42px; color:#D4AF37;"></h3>
            <div style="margin-top:80px; display:flex; justify-content:space-around; font-size:20px; font-weight:bold; color:#444;">
                <span>REF: <b id="pdf-ref"></b></span>
                <span>DATE: 16/03/2026</span>
                <span>VERIFIED BY OMNI-GENESIS AI</span>
            </div>
        </div>
        <div id="pdf-sig">DIGITAL SIGNATURE SCELLÉE À 5MM - KMS GOLD EDITION</div>
    </div>
</div>

<script>
/** * BASE DE DONNÉES ET AGENT GÉNÉRATEUR V390 
 * Intégration de 8 secteurs, 120 métiers, 600 questions intelligentes
 */
const DATA = {
    sectors: {
        "Energie": { icon: "fa-atom", jobs: ["Architecte Fusion SMR", "Expert Hydrogène Vert", "Ingénieur Grid-Edge", "Directeur Sûreté Nucléaire", "Manager BESS", "Expert CCUS", "Auditeur Carbone", "Technicien SMR-V3", "Manager HVDC", "Consultant Thorium", "Ingénieur Géothermie", "Manager Micro-Grid", "R&D Perovskite", "Lead Transition", "Analyste Lithium-Air"] },
        "IT & IA": { icon: "fa-brain", jobs: ["Lead IA Générative", "Architecte Quantique", "Expert Cyber SOC", "ML-Ops Engineer", "Blockchain Architect", "Edge Data Scientist", "Ethicien IA", "Cloud-Native Lead", "DevSecOps Senior", "Quantum Algorithmicien", "Manager Gouvernance", "Ingénieur Prompt", "Cyber-Forensics", "Architecte Web3", "Lead NLP"] },
        "Sante": { icon: "fa-microscope", jobs: ["Bio-Informaticien", "Radiologue IA", "Expert Chirurgie Robotique", "Oncologue Génomique", "Manager Nanomédecine", "Ingénieur Bio-Security", "Analyste Santé-Précision", "Lead Télémédecine", "Directeur Lab Digitale", "Expert Proteomique", "Consultant Ethique IA", "Data Manager Hospitalier", "Ingénieur Prothèse Connectée", "Manager Pandemie", "Expert Micro-Biote"] },
        "Finance": { icon: "fa-vault", jobs: ["Quantum Risk Analyst", "DeFi Architect", "ESG Strategist", "Algo Trader HFT", "Fraud IA Manager", "Digital CFO", "Treasury Blockchain", "Fintech Ops Director", "M&A Tech Specialist", "Asset Manager AI", "Risk Manager Systémique", "Banquier Mobile Architect", "Expert Crypto-Actifs", "Analyste RegTech", "Lead BI Finance"] },
        "Agri-Food": { icon: "fa-leaf", jobs: ["Expert Vertical Farming", "Agro-IA Specialist", "Protein Scientist", "Bio-Auditeur 4.0", "Ingénieur Precision Agri", "R&D Lab-Grown Food", "Bio-Polymer Lead", "Irrigation Data Manager", "Robotique Agricole", "Nutrition Digitale", "AgTech Strategist", "Traceability Manager", "Microbiologiste", "Directeur Ferme Autonome", "Supply Chain Agri-Green"] },
        "Commerce": { icon: "fa-shopping-bag", jobs: ["Strategist Supply Chain", "Expert Pricing Dynamique", "Manager Omnicanal", "Lead Logistique Drone", "E-com Data Director", "Directeur Phygital", "Achat Durable Lead", "Analyste Flux Retail", "Sourcing Blockchain", "Marketplace Specialist", "Retail Tech Architect", "Growth Head IA", "Manager Last-Mile", "Directeur Franchise", "Customer Insight Analyst"] },
        "Tourisme": { icon: "fa-globe-americas", jobs: ["Manager Tourisme Spatial", "Hospitality Designer", "Expert Bas Carbone", "Revenue Manager IA", "Experience Immersive", "Eco-Resort Manager", "Cruise-Tech Lead", "Booking Crypto Strategist", "Directeur Smart-Destination", "Transport Vert Analyst", "Marketing Digital", "Patrimoine Digital", "MICE IA Planner", "Expert Mobilité Douce", "Travel Data Scientist"] },
        "Education": { icon: "fa-user-graduate", jobs: ["Neuro-Pédagogue", "Architecte Meta-Campus", "Data Scientist EdTech", "Concepteur Adaptive Learning", "Manager VR-Training", "Analyste Flux Cognitif", "Lead Innovation L&D", "Directeur E-Learning", "Consultant Ed-IA", "Manager inclusion", "Ingénieur Gamification", "Coach IA", "Directeur Strategie", "Expert Blockchain-Diploma", "Facilitateur Hybride"] }
    }
};

const DICT = {
    fr: {
        nav_back: "Retour", nav_home: "Accueil", btn_start: "Démarrer l'Expertise V390",
        title_sectors: "Sélectionnez votre Domaine de Maîtrise", delta_title: "ANALYSE DELTA (Expertise de Rupture Requise)",
        btn_next: "Valider & Suivant", btn_prev: "Corriger / Précédent", btn_download: "Générer Certificat Or",
        pdf_intro: "Certifie solennellement après audit IA l'expertise de :",
        pdf_rank: "Au grade de Senior Expert International pour le métier de :",
        motive: "V390 TITANIUM : Le seul KMS capable de certifier les compétences de 2027. Exigence : Score > 80% et 3 validations Delta obligatoires pour l'accréditation."
    },
    en: {
        nav_back: "Back", nav_home: "Home", btn_start: "Start V390 Expertise",
        title_sectors: "Select your Domain of Mastery", delta_title: "DELTA ANALYSIS (Disruptive Expertise Required)",
        btn_next: "Validate & Next", btn_prev: "Correct / Previous", btn_download: "Download Gold Certificate",
        pdf_intro: "Solemnly certifies after AI audit the expertise of:",
        pdf_rank: "At the rank of International Senior Expert for the profession of:",
        motive: "V390 TITANIUM: The only KMS capable of certifying 2027 skills. Requirement: Score > 80% and 3 mandatory Delta validations for accreditation."
    },
    ar: {
        nav_back: "رجوع", nav_home: "الرئيسية", btn_start: "بدء خبرة V390",
        title_sectors: "اختر مجال تميزك", delta_title: "تحليل DELTA (مطلوب خبرة نوعية)",
        btn_next: "تأكيد والتالي", btn_prev: "تعديل / السابق", btn_download: "تحميل الشهادة الذهبية",
        pdf_intro: "يشهد رسمياً بعد تدقيق الذكاء الاصطناعي بخبرة:",
        pdf_rank: "بدرجة خبير أول دولي لمهنة:",
        motive: "V390 TITANIUM: نظام إدارة المعرفة الوحيد القادر على اعتماد مهارات 2027. المتطلبات: درجة > 80% و3 تأكيدات Delta إجبارية."
    }
};

const KMS = {
    lang: 'fr', sector: '', job: '', step: 0, score: 0, deltas: 0, responses: [], questions: [], history: ['p-intro'],

    setLang(l) {
        this.lang = l; document.dir = (l==='ar'?'rtl':'ltr');
        document.getElementById('motive-text').innerText = DICT[l].motive;
        document.querySelectorAll('[data-key]').forEach(el => el.innerText = DICT[l][el.getAttribute('data-key')]);
        this.renderSectors();
    },

    go(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        if(this.history[this.history.length-1] !== id) this.history.push(id);
    },

    back() { if(this.history.length > 1) { this.history.pop(); this.go(this.history[this.history.length-1]); } },

    renderSectors() {
        const grid = document.getElementById('sector-grid'); grid.innerHTML = '';
        Object.keys(DATA.sectors).forEach(s => {
            const div = document.createElement('div'); div.className = 'card';
            div.innerHTML = `<i class="fas ${DATA.sectors[s].icon}"></i><h3>${s}</h3>`;
            div.onclick = () => { this.sector = s; this.renderJobs(s); this.go('p-jobs'); };
            grid.appendChild(div);
        });
    },

    renderJobs(s) {
        document.getElementById('current-sector-name').innerText = s;
        const grid = document.getElementById('job-grid'); grid.innerHTML = '';
        DATA.sectors[s].jobs.forEach(j => {
            const div = document.createElement('div'); div.className = 'card'; div.innerHTML = `<h4>${j}</h4>`;
            div.onclick = () => { this.job = j; this.startAudit(); };
            grid.appendChild(div);
        });
    },

    // AGENT GÉNÉRATEUR DÉDIÉ : Crée des questions uniques par métier
    startAudit() {
        this.step = 0; this.responses = [];
        this.questions = [
            { q: `[ARCHITECTURE] Comment intégrez-vous les contraintes de résilience systémique dans un environnement ${this.sector} saturé en 2027 ?`, opts: ["Alpha: Maillage neuronal asynchrone", "Beta: Souveraineté cryptographique", "Gamma: Optimisation thermodynamique", "DELTA: Analyse libre"], correct: 0 },
            { q: `[RÉGULATION] En tant que ${this.job}, quelle norme de rupture remplace l'ancien paradigme ISO pour le secteur ${this.sector} ?`, opts: ["Alpha: Standard V390 Titanium", "Beta: Protocole Consensus Zero", "Gamma: Framework Meta-Ethique", "DELTA: Analyse libre"], correct: 0 },
            { q: `[TECHNOLOGIE] Quel vecteur de transfert d'énergie/donnée est le plus efficace pour vos opérations de ${this.job} ?`, opts: ["Alpha: Couplage par induction quantique", "Beta: Flux de photons cohérents", "Gamma: Réseau maillé 7G", "DELTA: Analyse libre"], correct: 1 },
            { q: `[RISQUE] Quelle est la menace de niveau 5 que vous anticipez pour le secteur ${this.sector} d'ici Q4 2027 ?`, opts: ["Alpha: Désalignement de l'IA locale", "Beta: Effondrement de la chaîne de confiance", "Gamma: Obsolescence des matériaux rares", "DELTA: Analyse libre"], correct: 1 },
            { q: `[STRATÉGIE FINALE] Définissez la clé de voûte de votre succès futur en tant que Senior Expert ${this.job}.`, opts: ["Alpha: Adaptabilité cognitive", "Beta: Leadership algorithmique", "Gamma: Intégration Holistique", "DELTA: Analyse libre"], correct: 2 }
        ];
        this.go('p-audit'); this.loadQ();
    },

    loadQ() {
        const q = this.questions[this.step];
        document.getElementById('audit-step-count').innerText = `STEP ${this.step+1} / 5`;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container'); container.innerHTML = '';
        
        q.opts.forEach((o, i) => {
            const b = document.createElement('button'); b.className = 'opt-btn';
            if(this.responses[this.step]?.idx === i) b.classList.add('opt-selected');
            b.innerText = o;
            b.onclick = () => {
                document.querySelectorAll('.opt-btn').forEach(btn => btn.classList.remove('opt-selected'));
                b.classList.add('opt-selected');
                this.tempIdx = i;
                document.getElementById('delta-module').style.display = (i===3?'block':'none');
            };
            container.appendChild(b);
        });
        document.getElementById('delta-text').value = this.responses[this.step]?.txt || '';
    },

    nextQ() {
        if(this.tempIdx === undefined && !this.responses[this.step]) return;
        const txt = document.getElementById('delta-text').value;
        if(this.tempIdx === 3 && txt.length < 40) return alert("Analyse Delta insuffisante. Minimum 40 caractères requis.");

        this.responses[this.step] = { idx: this.tempIdx ?? this.responses[this.step].idx, txt: txt };
        this.updateScore();
        
        if(this.step < 4) { this.step++; this.tempIdx = undefined; this.loadQ(); }
        else { this.finish(); }
    },

    prevQ() { if(this.step > 0) { this.step--; this.loadQ(); } },

    updateScore() {
        let s = 0; let d = 0;
        this.responses.forEach(r => {
            if(r.idx === 0 || r.idx === 1 || r.idx === 2) s += 20; 
            if(r.idx === 3) { s += 20; d++; }
        });
        this.score = s; this.deltas = d;
        document.getElementById('audit-score-live').innerText = `SCORE: ${s}%`;
    },

    finish() {
        this.go('p-result');
        document.getElementById('final-score-display').innerText = `${this.score}%`;
        const status = document.getElementById('final-status');
        const msg = document.getElementById('final-msg');

        if(this.score > 80 && this.deltas >= 3) {
            status.innerText = "EXPERT ACCRÉDITÉ V390"; status.style.color = "var(--gold)";
            msg.innerText = "Accès autorisé. Votre intelligence stratégique et vos validations Delta confirment votre rang de leader technologique.";
            document.getElementById('btn-cert').style.display = "inline-block";
            this.preparePDF();
        } else {
            status.innerText = "ÉCHEC DE VALIDATION"; status.style.color = "#FF4B2B";
            msg.innerText = "Niveau insuffisant. L'obtention du certificat Or requiert > 80% de score et 3 analyses Delta approuvées par l'IA.";
        }
    },

    preparePDF() {
        const name = prompt("NOM DE L'EXPERT POUR LE REGISTRE :") || "USER-KMS";
        document.getElementById('pdf-name').innerText = name.toUpperCase();
        document.getElementById('pdf-job').innerText = this.job;
        document.getElementById('pdf-ref').innerText = `V390-G-${Math.random().toString(36).substr(2, 8).toUpperCase()}`;
        document.getElementById('pdf-watermark').innerHTML = `<i class="fas ${DATA.sectors[this.sector].icon}"></i>`;
        document.getElementById('pdf-qr').innerHTML = '';
        new QRCode(document.getElementById("pdf-qr"), { text: `CERT: ${name}|JOB: ${this.job}|V390-GOLD`, width: 140, height: 140 });
    },

    generatePDF() {
        const el = document.getElementById('cert-container'); el.style.display = 'block';
        const opt = { margin:0, filename:`V390_GOLD_${this.job}.pdf`, jsPDF:{ unit:'px', format:[1122, 793], orientation:'landscape' } };
        html2pdf().set(opt).from(el).save().then(() => el.style.display = 'none');
    }
};

KMS.setLang('fr');
</script>
</body>
</html>
