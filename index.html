<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA-CONSULT | GLOBAL KMS V385</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;600;800&family=Amiri:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #c5a021; --navy: #0a1128; --white: #ffffff; --bg: #f4f7f9; --linkedin: #0077b5; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--navy); }
        body.rtl { direction: rtl; font-family: 'Amiri', serif; }

        /* UI ELEMENTS */
        #lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 40000; display: flex; gap: 8px; background: rgba(10,17,40,0.95); padding: 10px; border-radius: 8px; border: 1px solid var(--gold); }
        .lang-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 6px 14px; cursor: pointer; font-weight: 800; border-radius: 4px; font-size: 0.8em; }
        .lang-btn.active { background: var(--gold); color: var(--navy); }

        #vision-portal { position: fixed; inset: 0; background: var(--navy); z-index: 30000; display: flex; justify-content: center; align-items: center; color: white; padding: 20px; text-align: center; }
        .welcome-box { background: rgba(15, 25, 55, 0.98); border: 2px solid var(--gold); padding: 60px; border-radius: 15px; max-width: 1000px; }
        .speech-text { font-size: 1.5em; line-height: 1.6; margin: 30px 0; font-weight: 300; font-style: italic; color: #e0e0e0; }
        
        header { background: var(--navy); color: var(--gold); padding: 25px; text-align: center; border-bottom: 5px solid var(--gold); font-family: 'Cinzel'; font-size: 1.8em; letter-spacing: 6px; }

        .sector-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; padding: 40px; max-width: 1400px; margin: 0 auto; }
        .sector-card { background: white; padding: 50px; border-radius: 15px; border: 2px solid #eee; cursor: pointer; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .sector-card:hover { border-color: var(--gold); transform: translateY(-10px); }

        #audit-interface { display: none; max-width: 950px; margin: 40px auto; background: white; padding: 50px; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border-left: 10px solid var(--gold); }
        .opt-button { display: block; width: 100%; padding: 22px; margin: 12px 0; border: 2px solid #eee; cursor: pointer; background: white; text-align: inherit; border-radius: 8px; font-size: 1.1em; }
        .opt-button.selected { border-color: var(--gold); background: #fdfaf0; font-weight: 800; border-width: 3px; }

        #certificat-wrapper { display: none; padding: 40px 0; text-align: center; }
        #cert-area { width: 1050px; height: 740px; background: white; margin: 0 auto; padding: 50px; position: relative; border: 30px double var(--gold); overflow: hidden; }
        
        .cert-validation-block { position: absolute; top: 60px; left: 60px; text-align: left; width: 180px; }
        .cert-qr { width: 130px; border: 1px solid #eee; margin-bottom: 10px; }
        .cert-score-pct { font-size: 1.8em; font-weight: 900; color: var(--navy); margin: 5px 0; }
        .cert-rank { font-size: 0.9em; font-weight: 800; color: var(--gold); text-transform: uppercase; }

        .cert-footer { position: absolute; bottom: 50px; left: 60px; right: 60px; display: flex; justify-content: space-between; align-items: flex-end; }
        .btn-action { padding: 15px 30px; border: none; font-weight: 800; cursor: pointer; border-radius: 5px; font-size: 1.1em; display: inline-flex; align-items: center; gap: 10px; color: white; margin: 0 10px; }
    </style>
</head>
<body>

<div id="lang-switcher">
    <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-ar" onclick="setLang('ar')">AR</button>
</div>

<div id="vision-portal">
    <div class="welcome-box">
        <h1 style="font-family: 'Cinzel'; font-size: 3.5em; margin: 0; color: var(--gold);">MBA-CONSULT</h1>
        <div class="speech-text" id="v-speech"></div>
        <div id="v-vigilance" style="color:#ff4d4d; font-weight:800; letter-spacing:2px; font-size: 1.1em;"></div>
        <button class="lang-btn active" id="v-btn" onclick="document.getElementById('vision-portal').style.display='none'" style="margin-top: 30px; padding: 18px 50px; font-size: 1.1em;"></button>
    </div>
</div>

<header>MBA-CONSULT | GLOBAL KMS V385</header>

<div class="container" style="max-width: 1300px; margin: auto;">
    <div id="selection-interface">
        <h2 id="s-title" style="text-align:center; font-family: 'Cinzel'; margin-top: 40px;"></h2>
        <div class="sector-grid" id="sector-grid"></div>
    </div>

    <div id="audit-interface">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <span id="audit-step" style="font-weight: 800; color: var(--gold); font-size: 1.2em;"></span>
            <span id="job-badge" style="background: var(--navy); color: white; padding: 10px 25px; border-radius: 30px; font-weight: bold;"></span>
        </div>
        <h2 id="q-text" style="font-size: 1.7em; line-height: 1.4; color: var(--navy); margin-bottom: 20px;"></h2>
        <div id="options-stack"></div>
        
        <div id="user-comment-box" style="margin-top:20px;">
            <label id="l-comment" style="font-weight:bold; display:block; margin-bottom:10px;"></label>
            <textarea id="q-comment" style="width:100%; height:80px; padding:15px; border:1px solid #ccc; border-radius:8px; font-family:inherit;" placeholder="Expert opinion..."></textarea>
        </div>

        <button id="q-submit" onclick="submitStep()" style="background: var(--gold); color: var(--navy); border: none; padding: 20px 60px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 20px; text-transform: uppercase;"></button>
    </div>

    <div id="certificat-wrapper">
        <div style="margin-bottom: 30px;">
            <button class="btn-action" style="background: #27ae60;" onclick="generatePDF()"><i class="fa-solid fa-file-pdf"></i> PDF OFFICIEL</button>
            <button class="btn-action" style="background: #0077b5;" onclick="shareLinkedIn()"><i class="fa-brands fa-linkedin"></i> PARTAGER</button>
        </div>
        <div id="cert-area">
            <div class="cert-validation-block">
                <img id="c-qr" class="cert-qr" src="">
                <div class="cert-score-pct" id="c-score-pct"></div>
                <div class="cert-rank" id="c-rank">WORLD RANK: #1 TOP TIER</div>
            </div>
            <div style="font-family: 'Cinzel'; font-size: 45px; margin-top: 50px; margin-left: 150px;">CERTIFICATE OF EXCELLENCE</div>
            <div style="letter-spacing: 10px; font-weight: 800; color: var(--gold); margin-top: 10px; margin-left: 150px;">GLOBAL PROFESSIONAL ACCREDITATION</div>
            <p id="c-confirm" style="font-size: 1.6em; margin-top: 80px;"></p>
            <div id="c-name" style="font-family: 'Amiri', serif; font-size: 60px; border-bottom: 3px solid #333; display: inline-block; padding: 0 50px; margin: 10px 0;"></div>
            <p id="c-expert-text" style="font-size: 1.6em; margin-top: 15px;"></p>
            <div id="c-job" style="font-size: 42px; font-weight: 900; color: var(--gold); text-transform: uppercase;"></div>
            <div class="cert-footer">
                <div style="text-align:left;">
                    <div id="c-sig" style="font-family: 'Amiri'; font-size: 32px; border-bottom: 2px solid #333; width: 300px; padding-bottom: 5px;"></div>
                    <small style="font-weight: 800; display: block; margin-top: 5px;">SIGNATURE ÉLECTRONIQUE VÉRIFIÉE</small>
                </div>
                <div style="text-align:right;">
                    <div id="c-hash" style="color: var(--gold); font-weight: bold; font-size: 1.1em;"></div>
                    <div style="font-family: 'Cinzel'; font-size: 20px; border-bottom: 2px solid #333; width: 300px; padding-bottom: 5px; margin-top: 10px;">MBA BOARD ALPHA</div>
                    <small style="font-weight: 800; display: block; margin-top: 5px;">ACCRÉDITATION MBA-CONSULT</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const DATABASE = {
        Finance: { logo: "🏦", list: ["Trader", "Analyste M&A", "Auditeur", "Risk Manager", "Trésorier", "Banquier d'Affaires", "Fiscaliste", "Actuaire", "Gestionnaire de Fortune", "Analyste ESG", "Compliance", "Broker", "Contrôleur de Gestion", "Analyste Quant", "Gérant de Fonds", "Expert Comptable", "Credit Analyst", "Blockchain Expert", "CFO", "Consultant Restructuration"] },
        Energie: { logo: "⚡", list: ["Ingénieur Forage", "Expert Solaire", "Smart-Grid Manager", "Géologue", "Manager Éolien", "Ingénieur Nucléaire", "Consultant Hydrogène", "HSE Manager", "Directeur Centrale", "Market Analyst", "Technicien Réseau", "Auditeur Énergie", "Biomasse Manager", "Géophysicien", "Infrastructures Lead", "Expert Off-shore", "Grid Specialist", "Thermologue", "Deep Drilling Lead", "Carbon Consultant"] },
        IT_AI: { logo: "🤖", list: ["Data Scientist", "Cloud Architect", "Cyber Specialist", "Prompt Engineer", "ML Ops", "Pentester", "Data Architect", "Scrum Master", "SOC Analyst", "VR Engineer", "DevSecOps", "UX Senior", "Product Owner AI", "Big Data Expert", "IT Manager", "Network Architect", "Fullstack Dev", "Blockchain Lead", "ERP Consultant", "Robotics Lead"] },
        Agri_Food: { logo: "🌾", list: ["Agronome", "Qualité Lead", "Supply Chain", "Généticien", "Auditeur Bio", "Oenologue", "Nutritionniste", "Irrigation Expert", "Acheteur MP", "Production Lead", "Soil Specialist", "CSR Manager", "Agro Engineer", "Cold Chain Lead", "Coop Manager", "Phytopatho", "Seed Expert", "Culture Lead", "Terroir Analyst", "Horticulteur"] },
        Tourism: { logo: "🌍", list: ["Revenue Manager", "Resort Director", "Yield Analyst", "E-reputation Expert", "Expérience Designer", "Ecotourisme Manager", "Front Office Manager", "Cruise Director", "Mountain Guide", "Clefs d'Or", "Destination Manager", "Flow Analyst", "Park Director", "Event Planner", "Leisure Manager", "Hotel Auditor", "Mobility Expert", "Incentive Manager", "Product Manager", "General Manager"] },
        Education: { logo: "🎓", list: ["Ingénieur Pédago", "Directeur Académique", "EdTech Researcher", "Campus Director", "Andragogue", "Executive Coach", "LMS Specialist", "Skills Analyst", "Innovation Manager", "VAE Expert", "Orientation Lead", "Research Director", "Faculty Manager", "Mediator", "Inclusion Expert", "E-learning Designer", "Master Trainer", "Quality Auditor", "Academic Planner", "School Principal"] }
    };

    const SECTOR_QUESTIONS = {
        Finance: [
            { q: "Risque de liquidité : Quelle stratégie Alpha garantit la solvabilité lors d'un 'Bank Run' numérique ?", r: ["Alpha: Activation immédiate des lignes de crédit contingentes et Repo bilatéral.", "Beta: Vente massive d'actifs liquides (T-Bills) pour restaurer le cash-flow.", "Gamma: Demande de facilités de prêt d'urgence auprès de la Banque Centrale."] },
            { q: "Arbitrage Arbitraire : Face à un déséquilibre de base (Basis Trade), quel levier Alpha utilisez-vous ?", r: ["Alpha: Exploitation par algorithme de convergence à haute fréquence (HFT).", "Beta: Couverture par contrats Futures à échéance longue.", "Gamma: Observation du spread et ajustement manuel du portefeuille."] },
            { q: "Finance Durable : Comment intégrer l'impact carbone dans un modèle de valorisation Alpha ?", r: ["Alpha: Ajustement du WACC via une prime de risque ESG dynamique.", "Beta: Exclusion simple des secteurs à haute empreinte carbone.", "Gamma: Reporting extra-financier sans impact direct sur le pricing."] },
            { q: "M&A Cross-Border : Quel est l'outil Alpha pour sécuriser le risque de change post-fusion ?", r: ["Alpha: Swap de devises long terme combiné à des options 'Barrier'.", "Beta: Forward direct sur la valeur totale de la transaction.", "Gamma: Couverture naturelle par endettement dans la monnaie cible."] },
            { q: "Cryptofinance : Comment sécuriser la détention institutionnelle d'actifs numériques ?", r: ["Alpha: Architecture Multi-Party Computation (MPC) et Cold Storage certifié.", "Beta: Utilisation de plateformes de garde tierces assurées.", "Gamma: Hot Wallet avec limites de retrait journalières strictes."] }
        ],
        Energie: [
            { q: "Mix Énergétique : Quelle approche Alpha stabilise un réseau saturé d'EnR intermittentes ?", r: ["Alpha: Virtual Power Plant (VPP) coordonnant production, stockage et effacement.", "Beta: Renforcement massif des interconnexions physiques transfrontalières.", "Gamma: Utilisation de centrales à gaz en back-up pour réguler la charge."] },
            { q: "Hydrogène Vert : Quel est le verrou Alpha pour une production à échelle industrielle ?", r: ["Alpha: Optimisation du stack d'électrolyse par matériaux nanostructurés.", "Beta: Réduction du coût de l'électricité renouvelable en amont.", "Gamma: Subventions étatiques massives pour compenser le CAPEX."] },
            { q: "Smart City : Comment optimiser l'autoconsommation collective dans un quartier Alpha ?", r: ["Alpha: Blockchain pour le trading d'énergie Peer-to-Peer en temps réel.", "Beta: Installation de batteries de stockage centralisées par bâtiment.", "Gamma: Tarification incitative selon les pics de production solaire."] }
        ],
        IT_AI: [
            { q: "Cyber-Résilience : Quel protocole Alpha contre une attaque par Ransomware sophistiquée ?", r: ["Alpha: Isolation 'Air-Gap' logique et restauration automatisée par IA.", "Beta: Sauvegardes immuables hors site avec tests de reprise hebdomadaires.", "Gamma: Paiement de la rançon sous contrôle cyber-assurance (dernier recours)."] },
            { q: "IA Souveraine : Comment entraîner un modèle Alpha sans fuite de données confidentielles ?", r: ["Alpha: Federated Learning sur infrastructures décentralisées cryptées.", "Beta: Anonymisation par Differential Privacy avant entraînement centralisé.", "Gamma: Utilisation stricte de données synthétiques générées en interne."] }
        ],
        Agri_Food: [
            { q: "Sécurité Alimentaire : Quelle technologie Alpha garantit la traçabilité 'de la ferme à la table' ?", r: ["Alpha: Ledger distribué (Blockchain) avec capteurs IoT de température.", "Beta: Certification par audits tiers fréquents et labels de qualité.", "Gamma: Étiquetage QR code renvoyant vers une base de données PDF."] }
        ],
        Tourism: [
            { q: "Tourisme de Luxe : Comment créer une hyper-personnalisation Alpha sans intrusion ?", r: ["Alpha: Analyse prédictive non-intrusive des préférences via signaux faibles.", "Beta: Majordome dédié disponible 24/7 pour anticiper chaque demande.", "Gamma: Questionnaire de satisfaction détaillé envoyé avant l'arrivée."] }
        ],
        Education: [
            { q: "Neuro-Éducation : Quel levier Alpha maximise la rétention de l'information long terme ?", r: ["Alpha: Algorithmes de répétition espacée basés sur les courbes d'oubli individuelles.", "Beta: Utilisation intensive de la réalité virtuelle pour l'apprentissage immersif.", "Gamma: Méthodes pédagogiques actives privilégiant le projet collaboratif."] }
        ]
    };

    const TRANSLATIONS = {
        fr: {
            vSpeech: "Franchissez les frontières du savoir conventionnel pour intégrer l'élite décisionnelle mondiale.\nVotre expertise est votre actif le plus précieux, cet audit est sa validation ultime.\nRejoignez le réseau MBA-Consult et redéfinissez les standards de votre industrie.",
            vVigilance: "⚠ SEUIL CRITIQUE : 80% (40/50 pts). L'ÉLITE NE CONNAÎT PAS L'APPROXIMATION.",
            vBtn: "DÉPLOYER L'AUDIT STRATÉGIQUE",
            sTitle: "SÉLECTION DE L'UNITÉ DE COMPÉTENCE",
            qSubmit: "VALIDER LA DÉCISION & AVIS",
            lComment: "VOTRE AVIS D'EXPERT (FACULTATIF) :",
            promptJob: "SÉLECTIONNEZ VOTRE MÉTIER :",
            promptName: "NOM COMPLET DE L'EXPERT :",
            cConfirm: "Ce document atteste solennellement que",
            cExpert: "A validé son accréditation mondiale pour le métier de :",
            fail: "ÉCHEC. SCORE INSUFFISANT POUR L'ACCRÉDITATION."
        }
    };

    let curL = 'fr', score = 0, step = 0, selectedJob = "", currentSector = "";

    function setLang(l) {
        curL = l;
        document.body.className = l === 'ar' ? 'rtl' : '';
        const d = TRANSLATIONS[l];
        document.getElementById('v-speech').innerText = d.vSpeech;
        document.getElementById('v-vigilance').innerText = d.vVigilance;
        document.getElementById('v-btn').innerText = d.vBtn;
        document.getElementById('s-title').innerText = d.sTitle;
        document.getElementById('q-submit').innerText = d.qSubmit;
        document.getElementById('l-comment').innerText = d.lComment;
        initSectors();
    }

    function initSectors() {
        const grid = document.getElementById('sector-grid'); grid.innerHTML = "";
        for (const [id, data] of Object.entries(DATABASE)) {
            grid.innerHTML += `<div class="sector-card" onclick="selectSector('${id}')"><span style="font-size:4em;">${data.logo}</span><h3>${id}</h3></div>`;
        }
    }

    function selectSector(id) {
        currentSector = id;
        const jobs = DATABASE[id].list;
        selectedJob = prompt(`${TRANSLATIONS[curL].promptJob}\n\n${jobs.slice(0,10).join(" | ")}...`) || jobs[0];
        document.getElementById('selection-interface').style.display = 'none';
        document.getElementById('audit-interface').style.display = 'block';
        document.getElementById('job-badge').innerText = selectedJob;
        loadQ();
    }

    function loadQ() {
        const sectorQs = SECTOR_QUESTIONS[currentSector] || SECTOR_QUESTIONS["Finance"];
        if(step >= 5) { conclude(); return; }
        const qData = sectorQs[step % sectorQs.length];
        document.getElementById('audit-step').innerText = `STEP ${step+1}/5`;
        document.getElementById('q-text').innerText = qData.q;
        const stack = document.getElementById('options-stack'); stack.innerHTML = "";
        qData.r.forEach((o) => {
            let pts = o.includes("Alpha") ? 10 : (o.includes("Beta") ? 7 : 4);
            stack.innerHTML += `<button class="opt-button" onclick="sel(this, ${pts})">${o}</button>`;
        });
        document.getElementById('q-comment').value = "";
        tempPts = 0;
    }

    function sel(btn, p) {
        document.querySelectorAll('.opt-button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected'); tempPts = p;
    }

    function submitStep() { if(tempPts) { score += tempPts; step++; loadQ(); } }

    function conclude() {
        document.getElementById('audit-interface').style.display = 'none';
        if(score < 40) { alert(TRANSLATIONS[curL].fail); location.reload(); }
        else {
            const name = prompt(TRANSLATIONS[curL].promptName) || "EXPERT";
            document.getElementById('certificat-wrapper').style.display = 'block';
            document.getElementById('c-name').innerText = name.toUpperCase();
            document.getElementById('c-job').innerText = selectedJob;
            document.getElementById('c-score-pct').innerText = (score / 50 * 100) + "%";
            document.getElementById('c-sig').innerText = name;
            document.getElementById('c-confirm').innerText = TRANSLATIONS[curL].cConfirm;
            document.getElementById('c-expert-text').innerText = TRANSLATIONS[curL].cExpert;
            const hash = "MBA-" + Math.random().toString(36).substr(2, 9).toUpperCase();
            document.getElementById('c-hash').innerText = hash;
            document.getElementById('c-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${hash}`;
        }
    }

    function generatePDF() {
        const element = document.getElementById('cert-area');
        const opt = {
            margin: 0,
            filename: 'MBA-CONSULT-ACCREDITATION.pdf',
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
        };
        html2pdf().set(opt).from(element).save();
    }

    function shareLinkedIn() {
        const text = encodeURIComponent(`Accréditation MBA-CONSULT validée avec un score de ${score/50*100}% !`);
        window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${window.location.href}`, '_blank');
    }

    setLang('fr');
</script>
</body>
</html>
