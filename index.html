<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA-CONSULT | GLOBAL KMS V400</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;600;800&family=Amiri:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --gold: #c5a021; --navy: #0a1128; --bg: #f4f7f9; }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: var(--navy); }
        body.rtl { direction: rtl; font-family: 'Amiri', serif; }

        /* HEADER & UI */
        header { background: var(--navy); color: var(--gold); padding: 25px; text-align: center; border-bottom: 5px solid var(--gold); font-family: 'Cinzel'; font-size: 1.8em; letter-spacing: 6px; }
        #lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 40000; display: flex; gap: 8px; background: rgba(10,17,40,0.95); padding: 10px; border-radius: 8px; border: 1px solid var(--gold); }
        .lang-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 6px 14px; cursor: pointer; font-weight: 800; border-radius: 4px; }

        /* PORTAIL DE VISION */
        #vision-portal { position: fixed; inset: 0; background: var(--navy); z-index: 30000; display: flex; justify-content: center; align-items: center; color: white; padding: 20px; text-align: center; }
        .welcome-box { background: rgba(15, 25, 55, 0.98); border: 2px solid var(--gold); padding: 60px; border-radius: 15px; max-width: 1000px; }

        /* GRILLES DE SÉLECTION */
        .sector-grid, .job-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; max-width: 1200px; margin: 0 auto; }
        .sector-card, .job-item { background: white; padding: 30px; border-radius: 12px; border: 2px solid #eee; cursor: pointer; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .sector-card:hover, .job-item:hover { border-color: var(--gold); transform: translateY(-5px); }

        /* MODULE SIGNATURE */
        #signature-pad-container { display: none; text-align: center; padding: 30px; background: white; border-radius: 15px; max-width: 550px; margin: 40px auto; border: 3px solid var(--gold); }
        canvas#signature-pad { border: 2px dashed var(--navy); background: #fff; cursor: crosshair; touch-action: none; }

        /* CERTIFICAT LANDSCAPE V400 */
        #certificat-wrapper { display: none; padding: 40px 0; text-align: center; }
        #cert-area { width: 1050px; height: 740px; background: white; margin: 0 auto; padding: 50px; position: relative; border: 30px double var(--gold); overflow: hidden; }
        .cert-validation-block { position: absolute; top: 60px; left: 60px; text-align: left; width: 180px; }
        .cert-qr { width: 130px; border: 1px solid #eee; margin-bottom: 10px; }
        .cert-score-pct { font-size: 1.8em; font-weight: 900; color: var(--navy); }
        .cert-footer { position: absolute; bottom: 50px; left: 60px; right: 60px; display: flex; justify-content: space-between; align-items: flex-end; }
        #final-signature-img { width: 220px; height: 90px; object-fit: contain; border-bottom: 2px solid var(--navy); }
    </style>
</head>
<body>

<div id="lang-switcher">
    <button class="lang-btn" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
</div>

<div id="vision-portal">
    <div class="welcome-box">
        <h1 style="font-family: 'Cinzel'; font-size: 3.5em; margin: 0; color: var(--gold);">MBA-CONSULT</h1>
        <div class="speech-text" id="v-speech" style="font-size: 1.4em; margin: 30px 0; font-style: italic; opacity: 0.9;"></div>
        <button class="lang-btn" id="v-btn" onclick="document.getElementById('vision-portal').style.display='none'" style="margin-top: 30px; padding: 18px 50px; color:white; border: 2px solid var(--gold); font-size: 1.1em;"></button>
    </div>
</div>

<header>MBA-CONSULT | GLOBAL KMS V400</header>

<div class="container">
    <div id="selection-interface">
        <h2 id="s-title" style="text-align:center; font-family: 'Cinzel'; padding-top:40px;"></h2>
        <div class="sector-grid" id="sector-grid"></div>
    </div>

    <div id="job-selection-interface" style="display:none; text-align:center; padding:40px;">
        <h2 id="j-title" style="font-family: 'Cinzel';"></h2>
        <div class="job-grid" id="job-grid"></div>
    </div>

    <div id="audit-interface" style="display:none; max-width:900px; margin:40px auto; background:white; padding:50px; border-radius:15px; border-left:10px solid var(--gold); box-shadow: 0 20px 40px rgba(0,0,0,0.1);">
        <div id="audit-step" style="font-weight:800; color:var(--gold); font-size: 1.2em;"></div>
        <h2 id="q-text" style="margin:25px 0; line-height: 1.4;"></h2>
        <div id="options-stack"></div>
        <button onclick="submitStep()" style="width:100%; padding:22px; background:var(--gold); border:none; margin-top:30px; font-weight:800; cursor:pointer; font-size: 1.1em;">VALIDER LA DÉCISION</button>
    </div>

    <div id="signature-pad-container">
        <h3 style="font-family: 'Cinzel'; color: var(--navy);">SIGNATURE ÉLECTRONIQUE REQUISE</h3>
        <p>Veuillez signer dans le cadre ci-dessous à l'aide de votre souris ou de votre doigt.</p>
        <canvas id="signature-pad" width="450" height="220"></canvas>
        <div style="margin-top:20px; display: flex; justify-content: center; gap: 15px;">
            <button onclick="clearPad()" style="padding: 10px 20px; cursor:pointer;">EFFACER</button>
            <button onclick="saveSignature()" style="background:var(--gold); color:var(--navy); border:none; padding:12px 30px; font-weight:800; cursor:pointer;">FINALISER L'ACCRÉDITATION</button>
        </div>
    </div>

    <div id="certificat-wrapper">
        <button onclick="generatePDF()" style="padding:20px 40px; background:#27ae60; color:white; border:none; cursor:pointer; font-weight:800; border-radius: 5px; margin-bottom: 25px;">
            <i class="fa-solid fa-file-pdf"></i> TÉLÉCHARGER LE CERTIFICAT OFFICIEL (PDF)
        </button>
        <div id="cert-area">
            <div class="cert-validation-block">
                <img id="c-qr" class="cert-qr" src="">
                <div class="cert-score-pct" id="c-score-pct"></div>
                <div style="font-weight:800; color:var(--gold); letter-spacing: 1px;">WORLD RANK: #1 TOP TIER</div>
            </div>
            <div style="font-family:'Cinzel'; font-size:42px; margin-top:55px; margin-left:170px;">CERTIFICATE OF EXCELLENCE</div>
            <p id="c-confirm" style="font-size:1.6em; margin-top:85px;"></p>
            <div id="c-name" style="font-family:'Amiri'; font-size:58px; border-bottom:3px solid #333; display:inline-block; padding:0 50px; margin: 15px 0;"></div>
            <p id="c-expert-text" style="font-size:1.6em; margin-top: 10px;"></p>
            <div id="c-job" style="font-size:40px; font-weight:900; color:var(--gold); text-transform: uppercase;"></div>
            <div class="cert-footer">
                <div style="text-align:left;">
                    <img id="final-signature-img" src="">
                    <small style="display:block; font-weight:800; margin-top: 5px;">SIGNATURE ÉLECTRONIQUE DE L'EXPERT</small>
                </div>
                <div style="text-align:right;">
                    <div id="c-hash" style="color:var(--gold); font-weight:bold; font-size: 1.1em;"></div>
                    <div style="font-family:'Cinzel'; font-size:22px; border-bottom:2px solid #333; width:280px; margin-top: 10px;">MBA BOARD ALPHA</div>
                    <small style="display:block; font-weight:800; margin-top: 5px;">ACCRÉDITATION MBA-CONSULT</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const DATABASE_JOBS = {
        Finance: ["Trader Haute Fréquence", "Analyste M&A", "Auditeur Senior", "Risk Manager", "Directeur Trésorerie", "Banquier d'Affaires", "Fiscaliste International", "Actuaire", "Gestionnaire de Fortune", "Analyste ESG"],
        IT_AI: ["Data Scientist", "Cloud Architect", "Expert Cybersécurité", "Prompt Engineer", "ML Ops", "Pentester", "Architecte Données", "SOC Analyst", "DevSecOps", "Robotics Lead"]
    };

    const TRANSLATIONS = {
        fr: { vSpeech: "Franchissez les frontières du savoir pour intégrer l'élite mondiale.\nVotre expertise est validée par MBA-Consult.", vBtn: "DÉPLOYER L'AUDIT", sTitle: "UNITÉ D'ACCRÉDITATION", jTitle: "VOTRE MÉTIER D'EXPERTISE", promptName: "NOM COMPLET DE L'EXPERT :" },
        en: { vSpeech: "Cross the boundaries of knowledge to join the world's elite.\nYour expertise is validated by MBA-Consult.", vBtn: "START AUDIT", sTitle: "ACCREDITATION UNIT", jTitle: "PROFESSION OF EXPERTISE", promptName: "EXPERT FULL NAME :" }
    };

    let curL = 'fr', score = 0, step = 0, selectedJob = "", expertName = "";
    
    // Logic Signature
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    canvas.addEventListener('mousedown', () => drawing = true);
    canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('mousemove', (e) => {
        if (!drawing) return;
        ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.strokeStyle = '#0a1128';
        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke(); ctx.beginPath(); ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    });

    function clearPad() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function setLang(l) {
        curL = l; 
        document.getElementById('v-speech').innerText = TRANSLATIONS[l].vSpeech;
        document.getElementById('v-btn').innerText = TRANSLATIONS[l].vBtn;
        document.getElementById('s-title').innerText = TRANSLATIONS[l].sTitle;
        document.getElementById('j-title').innerText = TRANSLATIONS[l].jTitle;
        initSectors();
    }

    function initSectors() {
        const grid = document.getElementById('sector-grid'); grid.innerHTML = "";
        Object.keys(DATABASE_JOBS).forEach(s => grid.innerHTML += `<div class="sector-card" onclick="showJobs('${s}')"><h3>${s}</h3></div>`);
    }

    function showJobs(sector) {
        document.getElementById('selection-interface').style.display = 'none';
        document.getElementById('job-selection-interface').style.display = 'block';
        const grid = document.getElementById('job-grid'); grid.innerHTML = "";
        DATABASE_JOBS[sector].forEach(job => grid.innerHTML += `<div class="job-item" onclick="startAudit('${job}')"><b>${job}</b></div>`);
    }

    function startAudit(job) {
        selectedJob = job;
        document.getElementById('job-selection-interface').style.display = 'none';
        document.getElementById('audit-interface').style.display = 'block';
        loadQ();
    }

    function loadQ() {
        if(step >= 5) { conclude(); return; }
        document.getElementById('audit-step').innerText = `ÉVALUATION STRATÉGIQUE : STEP ${step+1}/5`;
        document.getElementById('q-text').innerText = `Scénario Alpha pour un ${selectedJob} : Quelle décision garantit la performance maximale ?`;
        const stack = document.getElementById('options-stack'); stack.innerHTML = "";
        ["Alpha Decision (+10)", "Beta Decision (+7)", "Gamma Decision (+4)"].forEach((o, i) => {
            stack.innerHTML += `<button class="lang-btn" onclick="score+=${[10,7,4][i]}; step++; loadQ();" style="display:block; width:100%; margin: 10px 0; color: #0a1128; border-color: #ddd;">${o}</button>`;
        });
    }

    function conclude() {
        document.getElementById('audit-interface').style.display = 'none';
        if(score < 40) { alert("SCORE INSUFFISANT"); location.reload(); }
        else {
            expertName = prompt(TRANSLATIONS[curL].promptName) || "EXPERT";
            document.getElementById('signature-pad-container').style.display = 'block';
        }
    }

    function saveSignature() {
        document.getElementById('final-signature-img').src = canvas.toDataURL();
        document.getElementById('signature-pad-container').style.display = 'none';
        document.getElementById('certificat-wrapper').style.display = 'block';
        document.getElementById('c-name').innerText = expertName.toUpperCase();
        document.getElementById('c-job').innerText = selectedJob;
        document.getElementById('c-score-pct').innerText = (score/50*100) + "%";
        document.getElementById('c-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=MBA-KMS-V400-${expertName}`;
        document.getElementById('c-hash').innerText = "HASH:" + Math.random().toString(36).substr(2, 9).toUpperCase();
    }

    function generatePDF() {
        html2pdf().set({ margin:0, filename:`MBA_CERT_${expertName}.pdf`, jsPDF:{format:'a4', orientation:'landscape'} }).from(document.getElementById('cert-area')).save();
    }

    setLang('fr');
</script>
</body>
</html>
